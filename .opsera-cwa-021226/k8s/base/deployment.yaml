apiVersion: apps/v1
kind: Deployment
metadata:
  name: cwa-021226
  labels:
    app: cwa-021226
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cwa-021226
  template:
    metadata:
      labels:
        app: cwa-021226
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
      containers:
        - name: app
          image: PLACEHOLDER_ECR_URI
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
      imagePullSecrets:
        - name: ecr-pull-secret

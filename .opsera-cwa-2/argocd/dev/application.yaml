# ════════════════════════════════════════════════════════════════════════════
# ARGOCD APPLICATION - DEV environment
# RULE 59: Use destination.name for hub-spoke (NOT destination.server)
# ════════════════════════════════════════════════════════════════════════════

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cwa-2-dev
  namespace: argocd
  labels:
    app: cwa-2
    tenant: opsera
    environment: dev
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: PLACEHOLDER_REPO_URL
    targetRevision: HEAD
    path: .opsera-cwa-2/k8s/overlays/dev

  destination:
    # CRITICAL (RULE 59): Use 'name' for spoke cluster, NOT 'server'
    name: opsera-use1-np
    namespace: opsera-cwa-2-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

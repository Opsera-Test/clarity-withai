# ════════════════════════════════════════════════════════════════════════════
# KUSTOMIZATION - DEV overlay
# RULE 99: Each environment needs its own overlay
# ════════════════════════════════════════════════════════════════════════════

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: opsera-cwa-2-dev

resources:
  - ../../base
  - namespace.yaml

commonLabels:
  environment: dev

images:
  - name: cwa-2
    newName: 792373136340.dkr.ecr.us-east-1.amazonaws.com/opsera/cwa-2
    newTag: 1ec59a4-20260130203703

patches:
  - target:
      kind: Ingress
      name: cwa-2
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: opsera-cwa-2-dev.agent.opsera.dev
      - op: replace
        path: /spec/tls/0/hosts/0
        value: opsera-cwa-2-dev.agent.opsera.dev

replicas:
  - name: cwa-2
    count: 2

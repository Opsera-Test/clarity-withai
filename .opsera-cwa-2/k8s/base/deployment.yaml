# ════════════════════════════════════════════════════════════════════════════
# DEPLOYMENT - Base configuration
# RULE 80: imagePullPolicy: Always required for Argo Rollouts
# RULE 81: imagePullSecrets required for private ECR
# ════════════════════════════════════════════════════════════════════════════

apiVersion: apps/v1
kind: Deployment
metadata:
  name: cwa-2
  labels:
    app: cwa-2
    tenant: opsera
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cwa-2
  template:
    metadata:
      labels:
        app: cwa-2
        tenant: opsera
    spec:
      imagePullSecrets:
        - name: ecr-credentials
      containers:
        - name: cwa-2
          image: cwa-2:latest  # Replaced by Kustomize
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false

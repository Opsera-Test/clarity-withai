# ════════════════════════════════════════════════════════════════════════════
# SERVICE - Base configuration
# RULE 23: Services MUST be type ClusterIP (NOT LoadBalancer) for shared NGINX Ingress
# ════════════════════════════════════════════════════════════════════════════

apiVersion: v1
kind: Service
metadata:
  name: cwa-1
  labels:
    app: cwa-1
    tenant: opsera
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: cwa-1

# ════════════════════════════════════════════════════════════════════════════
# INGRESS - Base configuration
# RULE 82: Check for existing Ingress before creating
# RULE 83: Each environment needs its OWN TLS certificate
# ════════════════════════════════════════════════════════════════════════════

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cwa-1
  labels:
    app: cwa-1
    tenant: opsera
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - PLACEHOLDER_HOST
      secretName: PLACEHOLDER_TLS_SECRET
  rules:
    - host: PLACEHOLDER_HOST
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cwa-1
                port:
                  number: 80

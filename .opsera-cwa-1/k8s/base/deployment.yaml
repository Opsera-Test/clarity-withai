# ════════════════════════════════════════════════════════════════════════════
# DEPLOYMENT - Base configuration
# RULE 81: imagePullSecrets REQUIRED for private ECR registries
# ════════════════════════════════════════════════════════════════════════════

apiVersion: apps/v1
kind: Deployment
metadata:
  name: cwa-1
  labels:
    app: cwa-1
    tenant: opsera
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cwa-1
  template:
    metadata:
      labels:
        app: cwa-1
        tenant: opsera
    spec:
      # RULE 81: imagePullSecrets for private ECR
      imagePullSecrets:
        - name: ecr-secret
      containers:
        - name: cwa-1
          image: cwa-1:latest  # Replaced by kustomize
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # RULE 79: SPA health check is /
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL

apiVersion: apps/v1
kind: Deployment
metadata:
  name: clarity-withai-2020-eaa74
  labels:
    app: clarity-withai-2020-eaa74
    environment: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clarity-withai-2020-eaa74
  template:
    metadata:
      labels:
        app: clarity-withai-2020-eaa74
        environment: dev
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
      imagePullSecrets:
        - name: ecr-pull-secret
      containers:
        - name: clarity-withai-2020-eaa74
          image: clarity-withai-2020-eaa74:placeholder
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20

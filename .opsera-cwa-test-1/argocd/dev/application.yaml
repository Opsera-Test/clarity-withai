apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: opsera-cwa-test-1-dev
  namespace: argocd
  labels:
    app: cwa-test-1
    tenant: opsera
    environment: dev
spec:
  project: default
  source:
    repoURL: https://github.com/Opsera-Test/clarity-withai.git
    targetRevision: main
    path: .opsera-cwa-test-1/k8s/overlays/dev
  destination:
    name: opsera-usw2-np
    namespace: opsera-cwa-test-1-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - Replace=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

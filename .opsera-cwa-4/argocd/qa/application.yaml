# ════════════════════════════════════════════════════════════════════════════
# ARGOCD APPLICATION - QA
# RULE 59: Use destination.name for hub-spoke (NOT destination.server)
# Strategy: Canary
# ════════════════════════════════════════════════════════════════════════════
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cwa-4-qa
  namespace: argocd
  labels:
    app: cwa-4
    environment: qa
    tenant: opsera
spec:
  project: default

  source:
    repoURL: https://github.com/opsera-agentic/clarity-withai.git
    targetRevision: HEAD
    path: .opsera-cwa-4/k8s/overlays/qa

  destination:
    # RULE 59: CRITICAL - Use 'name' for spoke cluster, NOT 'server'
    name: opsera-usw2-np
    namespace: opsera-cwa-4-qa

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

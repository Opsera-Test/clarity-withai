app:
  name: cwa-4
  tenant: opsera
  version: "1.0.0"

cloud:
  provider: aws
  region: us-west-2
  region_short: usw2

clusters:
  hub:
    name: argocd-usw2
    purpose: ArgoCD control plane
  spoke:
    name: opsera-usw2-np
    purpose: Application workloads (non-production)

ecr:
  repository: opsera/cwa-4
  # Full URI will be: ${AWS_ACCOUNT_ID}.dkr.ecr.us-west-2.amazonaws.com/opsera/cwa-4

dns:
  base_domain: agent.opsera.dev
  pattern: "${tenant}-${app}-${env}.agent.opsera.dev"
  # Examples:
  #   dev: opsera-cwa-4-dev.agent.opsera.dev
  #   qa: opsera-cwa-4-qa.agent.opsera.dev
  #   staging: opsera-cwa-4-staging.agent.opsera.dev

tls:
  strategy: wildcard
  secret_name: opsera-wildcard-tls
  issuer: letsencrypt-prod

environments:
  dev:
    namespace: opsera-cwa-4-dev
    strategy: rolling
    replicas: 2
    auto_promote: false
  qa:
    namespace: opsera-cwa-4-qa
    strategy: canary
    replicas: 3
    auto_promote: false
  staging:
    namespace: opsera-cwa-4-staging
    strategy: blue-green
    replicas: 3
    auto_promote: false

integrations:
  slack:
    enabled: false
  jira:
    enabled: false
  sonarqube:
    enabled: false

security:
  scanning:
    gitleaks:
      enabled: true
      mode: warn
    grype:
      enabled: true
      mode: warn
      severity_threshold: high


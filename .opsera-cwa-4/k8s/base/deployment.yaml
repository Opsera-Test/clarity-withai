# ════════════════════════════════════════════════════════════════════════════
# BASE DEPLOYMENT
# RULE 80: imagePullPolicy: Always required for Argo Rollouts
# RULE 81: imagePullSecrets required for private ECR
# ════════════════════════════════════════════════════════════════════════════
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cwa-4
  labels:
    app: cwa-4
    tenant: opsera
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cwa-4
  template:
    metadata:
      labels:
        app: cwa-4
        tenant: opsera
    spec:
      # RULE 81: Required for private ECR
      imagePullSecrets:
        - name: ecr-registry-secret
      containers:
        - name: cwa-4
          image: cwa-4:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false

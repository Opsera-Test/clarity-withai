# ════════════════════════════════════════════════════════════════════════════
# BASE INGRESS
# Using cert-manager to auto-provision TLS certificates
# RULE 23: Shared NGINX Ingress Controller pattern
# ════════════════════════════════════════════════════════════════════════════
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cwa-4
  labels:
    app: cwa-4
    tenant: opsera
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    cert-manager.io/cluster-issuer: "letsencrypt-staging"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - PLACEHOLDER_SUBDOMAIN
      secretName: cwa-4-tls
  rules:
    - host: PLACEHOLDER_SUBDOMAIN
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cwa-4
                port:
                  number: 80

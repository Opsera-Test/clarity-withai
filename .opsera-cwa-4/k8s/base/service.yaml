# BASE SERVICE
# RULE 23: ClusterIP for shared NGINX Ingress pattern
# ════════════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Service
metadata:
  name: cwa-4
  labels:
    app: cwa-4
    tenant: opsera
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: cwa-4

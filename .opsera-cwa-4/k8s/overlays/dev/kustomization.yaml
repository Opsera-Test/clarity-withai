# ════════════════════════════════════════════════════════════════════════════
# DEV KUSTOMIZATION
# Strategy: Rolling (direct deployment)
# ════════════════════════════════════════════════════════════════════════════
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: opsera-cwa-4-dev

resources:
  - ../../base
  - namespace.yaml

commonLabels:
  environment: dev

images:
  - name: cwa-4
    newName: 792373136340.dkr.ecr.us-west-2.amazonaws.com/opsera/cwa-4
    newTag: 5bc8c2e-20260130214458

patches:
  - target:
      kind: Ingress
      name: cwa-4
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: opsera-cwa-4-dev.agent.opsera.dev
      - op: replace
        path: /spec/tls/0/hosts/0
        value: opsera-cwa-4-dev.agent.opsera.dev
      - op: replace
        path: /spec/tls/0/secretName
        value: cwa-4-dev-tls

  - target:
      kind: Deployment
      name: cwa-4
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cwa-test-4
  labels:
    app: cwa-test-4
    environment: dev
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: cwa-test-4-dev.agent.opsera.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cwa-test-4
                port:
                  number: 80

apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: cwa-test-4
  labels:
    app: cwa-test-4
    tenant: opsera
    environment: staging
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cwa-test-4
  template:
    metadata:
      labels:
        app: cwa-test-4
        tenant: opsera
        environment: staging
    spec:
      serviceAccountName: cwa-test-4
      imagePullSecrets:
        - name: ecr-pull-secret
      containers:
        - name: cwa-test-4
          image: PLACEHOLDER_ECR_URI
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: cwa-test-4-config
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            runAsGroup: 101
            allowPrivilegeEscalation: false
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
      securityContext:
        fsGroup: 101
  strategy:
    blueGreen:
      activeService: cwa-test-4
      previewService: cwa-test-4-preview
      autoPromotionEnabled: true
      autoPromotionSeconds: 60
      scaleDownDelaySeconds: 30

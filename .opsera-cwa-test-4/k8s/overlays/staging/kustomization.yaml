apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: opsera-cwa-test-4-staging

resources:
  - namespace.yaml
  - rollout.yaml
  - service-preview.yaml
  - ingress.yaml
  - ../../base

labels:
  - pairs:
      environment: staging
    includeSelectors: false
    includeTemplates: true

images:
  - name: PLACEHOLDER_ECR_URI
    newName: PLACEHOLDER_ECR_REGISTRY/opsera/cwa-test-4
    newTag: v1.0.0

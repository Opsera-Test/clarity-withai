apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: cwa-test-4-canary-analysis
  labels:
    app: cwa-test-4
    environment: qa
spec:
  metrics:
    - name: error-rate
      count: 1
      interval: 1m
      successCondition: result[0] < 0.05
      failureLimit: 3
      provider:
        prometheus:
          address: http://prometheus-server.monitoring.svc.cluster.local:9090
          query: |
            sum(rate(http_requests_total{app="cwa-test-4",status=~"5.."}[2m])) /
            sum(rate(http_requests_total{app="cwa-test-4"}[2m]))
    - name: latency-p95
      count: 1
      interval: 1m
      successCondition: result[0] < 0.5
      failureLimit: 3
      provider:
        prometheus:
          address: http://prometheus-server.monitoring.svc.cluster.local:9090
          query: |
            histogram_quantile(0.95,
              sum(rate(http_request_duration_seconds_bucket{app="cwa-test-4"}[2m])) by (le)
            )

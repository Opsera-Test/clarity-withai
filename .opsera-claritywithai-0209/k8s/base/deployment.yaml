apiVersion: apps/v1
kind: Deployment
metadata:
  name: claritywithai-0209
  labels:
    app: claritywithai-0209
spec:
  replicas: 1
  selector:
    matchLabels:
      app: claritywithai-0209
  template:
    metadata:
      labels:
        app: claritywithai-0209
    spec:
      runAsNonRoot: true
      runAsUser: 101
      runAsGroup: 101
      imagePullSecrets:
        - name: ecr-pull-secret
      containers:
        - name: app
          image: PLACEHOLDER_ECR_URI:dev-placeholder
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: clarity-1
  namespace: opsera-clarity-1-qa
  labels:
    app: clarity-1
    environment: qa
    tenant: opsera
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  rules:
    - host: clarity-1-qa.agent.opsera.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: clarity-1
                port:
                  number: 80

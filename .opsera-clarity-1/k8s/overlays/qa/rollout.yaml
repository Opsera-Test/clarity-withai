apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: clarity-1
  namespace: opsera-clarity-1-qa
  labels:
    app: clarity-1
    environment: qa
    tenant: opsera
spec:
  replicas: 2
  selector:
    matchLabels:
      app: clarity-1
  template:
    metadata:
      labels:
        app: clarity-1
        environment: qa
        tenant: opsera
    spec:
      serviceAccountName: clarity-1
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 101
      containers:
        - name: clarity-1
          image: clarity-1
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: ENVIRONMENT
              value: qa
          envFrom:
            - configMapRef:
                name: clarity-1-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
  strategy:
    canary:
      canaryService: clarity-1-canary
      stableService: clarity-1
      steps:
        - setWeight: 20
        - pause: {duration: 30s}
        - analysis:
            templates:
              - templateName: clarity-1-success-rate
            args:
              - name: service-name
                value: clarity-1-canary
        - setWeight: 50
        - pause: {duration: 30s}
        - setWeight: 80
        - pause: {duration: 30s}
        - setWeight: 100

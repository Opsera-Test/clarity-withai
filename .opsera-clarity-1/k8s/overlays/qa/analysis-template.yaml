apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: clarity-1-success-rate
  namespace: opsera-clarity-1-qa
  labels:
    app: clarity-1
    environment: qa
    tenant: opsera
spec:
  args:
    - name: service-name
  metrics:
    - name: success-rate
      count: 1
      interval: 30s
      successCondition: result[0] >= 0.95
      failureLimit: 3
      provider:
        web:
          url: "http://prometheus-server.monitoring.svc.cluster.local:9090/api/v1/query?query=sum(rate(nginx_ingress_controller_requests{service='{{args.service-name}}',status!~'[45]..'}[2m]))/sum(rate(nginx_ingress_controller_requests{service='{{args.service-name}}'}[2m]))"
          jsonPath: "{$.data.result[0].value[1]}"

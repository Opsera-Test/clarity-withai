apiVersion: apps/v1
kind: Deployment
metadata:
  name: clarity-1
  namespace: opsera-clarity-1-dev
  labels:
    app: clarity-1
    environment: dev
    tenant: opsera
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clarity-1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: clarity-1
        environment: dev
        tenant: opsera
    spec:
      serviceAccountName: clarity-1
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 101
      containers:
        - name: clarity-1
          image: clarity-1
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: ENVIRONMENT
              value: dev
          envFrom:
            - configMapRef:
                name: clarity-1-config
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL

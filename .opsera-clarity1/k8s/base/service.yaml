# ════════════════════════════════════════════════════════════════════════════
# SERVICE - clarity1 Frontend
# RULE 23: ClusterIP for shared NGINX Ingress pattern
# ════════════════════════════════════════════════════════════════════════════

apiVersion: v1
kind: Service
metadata:
  name: clarity1
  labels:
    app: clarity1
    tenant: opsera
spec:
  type: ClusterIP  # RULE 23: NOT LoadBalancer - shared NGINX Ingress
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
      name: http
  selector:
    app: clarity1

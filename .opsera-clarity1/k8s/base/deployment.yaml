# ════════════════════════════════════════════════════════════════════════════
# DEPLOYMENT - clarity1 Frontend
# RULE 80: imagePullPolicy: Always required for Argo Rollouts
# RULE 81: imagePullSecrets required for private ECR
# ════════════════════════════════════════════════════════════════════════════

apiVersion: apps/v1
kind: Deployment
metadata:
  name: clarity1
  labels:
    app: clarity1
    tenant: opsera
spec:
  replicas: 2
  selector:
    matchLabels:
      app: clarity1
  template:
    metadata:
      labels:
        app: clarity1
        tenant: opsera
    spec:
      # RULE 81: imagePullSecrets for private ECR
      imagePullSecrets:
        - name: ecr-registry-secret
      containers:
        - name: clarity1
          image: clarity1:latest  # Replaced by Kustomize
          imagePullPolicy: Always  # RULE 80
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 101  # nginx user
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL

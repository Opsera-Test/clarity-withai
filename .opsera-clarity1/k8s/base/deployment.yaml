apiVersion: apps/v1
kind: Deployment
metadata:
  name: clarity1
  labels:
    app: clarity1
    tenant: opsera
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clarity1
  template:
    metadata:
      labels:
        app: clarity1
        tenant: opsera
    spec:
      # RULE 81: imagePullSecrets required for private ECR
      imagePullSecrets:
        - name: ecr-registry-secret
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 101
      containers:
        - name: clarity1
          image: clarity1:latest
          # RULE 80: imagePullPolicy Always required for Argo Rollouts
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          # RULE 79: SPA health check is /
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL

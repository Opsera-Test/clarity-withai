# ════════════════════════════════════════════════════════════════════════════
# KUSTOMIZATION - Base Configuration
# RULE 106: Use labels with includeSelectors: false, NOT commonLabels
# ════════════════════════════════════════════════════════════════════════════

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml
  - ingress.yaml

# RULE 106: Use labels instead of commonLabels to avoid immutable selector errors
labels:
  - pairs:
      app.kubernetes.io/name: clarity1
      app.kubernetes.io/managed-by: argocd
    includeSelectors: false

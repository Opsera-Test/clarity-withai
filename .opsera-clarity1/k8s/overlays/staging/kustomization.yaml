apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: opsera-clarity1-staging

resources:
  - ../../base
  - namespace.yaml

labels:
  - pairs:
      environment: staging
    includeSelectors: false

replicas:
  - name: clarity1
    count: 2

images:
  - name: clarity1
    newName: PLACEHOLDER_ECR_URI/opsera/clarity1
    newTag: latest

patches:
  - target:
      kind: Ingress
      name: clarity1
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: opsera-clarity1-staging.agent.opsera.dev
      - op: replace
        path: /spec/tls/0/hosts/0
        value: opsera-clarity1-staging.agent.opsera.dev

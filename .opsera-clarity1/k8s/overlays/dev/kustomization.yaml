# ════════════════════════════════════════════════════════════════════════════
# KUSTOMIZATION - DEV Environment Overlay
# RULE 99: Environment-specific overlay with namespace
# RULE 106: Use labels with includeSelectors: false, NOT commonLabels
# ════════════════════════════════════════════════════════════════════════════

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: opsera-clarity1-dev

resources:
  - ../../base
  - namespace.yaml

# RULE 106: Use labels instead of commonLabels to avoid immutable selector errors
labels:
  - pairs:
      environment: dev
    includeSelectors: false

images:
  - name: clarity1
    newName: 792373136340.dkr.ecr.us-west-2.amazonaws.com/opsera/clarity1
    newTag: 03371c9-20260131224838

patches:
  # Patch Ingress with environment-specific hostname
  - target:
      kind: Ingress
      name: clarity1
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: opsera-clarity1-dev.agent.opsera.dev
      - op: replace
        path: /spec/tls/0/hosts/0
        value: opsera-clarity1-dev.agent.opsera.dev

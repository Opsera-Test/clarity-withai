# ════════════════════════════════════════════════════════════════════════════
# ARGOCD APPLICATION - DEV Environment
# RULE 59: Use destination.name for hub-spoke (NOT destination.server)
# ════════════════════════════════════════════════════════════════════════════

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: clarity1-dev
  namespace: argocd
  labels:
    tenant: opsera
    app: clarity1
    environment: dev
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: PLACEHOLDER_REPO_URL
    targetRevision: HEAD
    path: .opsera-clarity1/k8s/overlays/dev

  destination:
    # CRITICAL (RULE 59): Use 'name' for spoke cluster, NOT 'server'
    # This ensures deployment goes to spoke cluster, not hub
    name: opsera-usw2-np
    namespace: opsera-clarity1-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

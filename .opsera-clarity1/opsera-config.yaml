  strategy: wildcard
  secret_name: opsera-wildcard-tls
  # RULE 104: Use wildcard cert to avoid Let's Encrypt rate limits

environments:
  dev:
    namespace: opsera-clarity1-dev
    hostname: opsera-clarity1-dev.agent.opsera.dev
    strategy: rolling
    replicas: 1
  qa:
    namespace: opsera-clarity1-qa
    hostname: opsera-clarity1-qa.agent.opsera.dev
    strategy: canary
    replicas: 2
  staging:
    namespace: opsera-clarity1-staging
    hostname: opsera-clarity1-staging.agent.opsera.dev
    strategy: blueGreen
    replicas: 2

deployment:
  auto_promote: false  # RULE 65: Disabled until DEV verified working
  health_check_path: /  # RULE 79: SPA health check is / not /health


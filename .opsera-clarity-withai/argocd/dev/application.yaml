apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: clarity-withai-dev
  namespace: argocd
  labels:
    tenant: opsera
    app: clarity-withai
    environment: dev
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: PLACEHOLDER_REPO_URL
    targetRevision: HEAD
    path: .opsera-clarity-withai/k8s/overlays/dev

  destination:
    # CRITICAL (RULE 59): Use 'name' for spoke cluster, NOT 'server'
    # Hub cluster: argocd-use1
    # Spoke cluster: opsera-use1-np (where workloads deploy)
    name: opsera-use1-np
    namespace: opsera-clarity-withai-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

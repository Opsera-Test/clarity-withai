# Application Settings
app:
  name: clarity-withai
  type: spa  # Single Page Application (React/Vite)
  port: 8080

# Tenant Settings (RULE 100: Consistent tenant naming)
tenant:
  name: opsera
  domain: agent.opsera.dev

# Cloud Settings
cloud:
  provider: aws
  region: us-east-1
  region_short: use1

# Cluster Settings (Hub-Spoke Architecture)
clusters:
  # RULE 70: Hub cluster naming convention
  hub:
    name: argocd-use1
    role: argocd-control-plane
  
  # RULE 71: Spoke cluster naming convention
  spoke:
    name: opsera-use1-np
    role: workload-cluster
    type: non-production

# ECR Settings (RULE 101: Tenant/App pattern)
ecr:
  repository: opsera/clarity-withai
  # Full URI set dynamically: {account}.dkr.ecr.{region}.amazonaws.com/{tenant}/{app}

# Environment Configuration
environments:
  dev:
    enabled: true
    namespace: opsera-clarity-withai-dev
    hostname: opsera-clarity-withai-dev.agent.opsera.dev
    tls_secret: opsera-clarity-withai-dev-tls
    replicas: 1
    strategy: rolling
  
  qa:
    enabled: false  # Will enable after DEV verified
    namespace: opsera-clarity-withai-qa
    hostname: opsera-clarity-withai-qa.agent.opsera.dev
    tls_secret: opsera-clarity-withai-qa-tls
    replicas: 2
    strategy: canary
  
  staging:
    enabled: false  # Will enable after QA verified
    namespace: opsera-clarity-withai-staging
    hostname: opsera-clarity-withai-staging.agent.opsera.dev
    tls_secret: opsera-clarity-withai-staging-tls
    replicas: 2
    strategy: blue-green

# Security Scanning
scanning:
  gitleaks:
    enabled: true
    mode: warn  # warn or block
  grype:
    enabled: true
    mode: warn
    severity_threshold: critical

# Integrations (Optional)
integrations:
  slack:
    enabled: false
  jira:
    enabled: false
  sonarqube:
    enabled: false


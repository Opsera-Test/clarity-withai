# INGRESS - clarity-withai (Base)
# NGINX Ingress with cert-manager TLS
# Generated by Opsera Code-to-Cloud Enterprise v1.7.2
# ════════════════════════════════════════════════════════════════════════════
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: clarity-withai
  labels:
    app: clarity-withai
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - PLACEHOLDER_HOST
      secretName: PLACEHOLDER_TLS_SECRET
  rules:
    - host: PLACEHOLDER_HOST
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: clarity-withai
                port:
                  number: 80

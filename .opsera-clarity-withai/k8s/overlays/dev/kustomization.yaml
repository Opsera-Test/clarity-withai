# ════════════════════════════════════════════════════════════════════════════
# KUSTOMIZATION - clarity-withai DEV Overlay
# RULE 100: Tenant prefix in namespace
# Generated by Opsera Code-to-Cloud Enterprise v1.7.2
# ════════════════════════════════════════════════════════════════════════════
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: opsera-clarity-withai-dev

resources:
  - ../../base
  - namespace.yaml

commonLabels:
  environment: dev
  tenant: opsera

# Image will be updated by CI/CD pipeline
images:
  - name: clarity-withai
    newName: PLACEHOLDER_ECR_REPO
    newTag: latest

# Patches for DEV environment
patches:
  # Patch Ingress with DEV hostname and TLS
  - target:
      kind: Ingress
      name: clarity-withai
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: opsera-clarity-withai-dev.agent.opsera.dev
      - op: replace
        path: /spec/tls/0/hosts/0
        value: opsera-clarity-withai-dev.agent.opsera.dev
      - op: replace
        path: /spec/tls/0/secretName
        value: opsera-clarity-withai-dev-tls
  # Scale down for DEV (cost savings)
  - target:
      kind: Deployment
      name: clarity-withai
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1

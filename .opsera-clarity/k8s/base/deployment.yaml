apiVersion: apps/v1
kind: Deployment
metadata:
  name: clarity
  labels:
    app: clarity
spec:
  replicas: 2
  selector:
    matchLabels:
      app: clarity
  template:
    metadata:
      labels:
        app: clarity
    spec:
      # RULE 81: imagePullSecrets required for private ECR
      imagePullSecrets:
        - name: ecr-registry-secret
      containers:
        - name: clarity
          image: clarity:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          # RULE 79: SPA health check is /
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false

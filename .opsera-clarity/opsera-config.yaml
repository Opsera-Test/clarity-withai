# Application Settings
app:
  name: clarity
  type: vite-react-spa
  port: 8080

# Tenant Settings
tenant:
  name: opsera
  
# Cloud Provider
cloud:
  provider: aws
  region: us-west-2
  region_short: usw2

# Cluster Configuration
clusters:
  hub:
    name: argocd-usw2
    role: argocd-control-plane
  spoke:
    name: opsera-usw2-np
    role: workload-cluster

# Domain Configuration
dns:
  base_domain: agent.opsera.dev
  pattern: "{tenant}-{app}-{env}.{base_domain}"
  
# Environments
environments:
  dev:
    enabled: true
    strategy: rolling
    replicas: 1
    subdomain: opsera-clarity-dev.agent.opsera.dev
    
# TLS Configuration
tls:
  strategy: wildcard
  secret_name: opsera-wildcard-tls
  issuer: letsencrypt-prod

# Container Registry
registry:
  type: ecr
  pattern: "{account_id}.dkr.ecr.{region}.amazonaws.com/{tenant}/{app}"

# Generated
metadata:
  generated_by: opsera-code-to-cloud-enterprise
  version: "0.901"
  generated_at: "2026-01-31"

app:
  name: cwa-5
  tenant: opsera
  framework: vite-react-typescript
  description: "Clarity With AI - Chat Interface Application"

cloud:
  provider: aws
  region: us-west-2
  region_short: usw2

clusters:
  hub:
    name: argocd-usw2
    role: argocd-control-plane
  spoke:
    name: opsera-usw2-np
    role: workload-cluster
    environments: [dev, qa, staging]

container_registry:
  type: ecr
  # Pattern: {account_id}.dkr.ecr.{region}.amazonaws.com/{tenant}/{app}
  repository: opsera/cwa-5

networking:
  # Direct NLB - Bypasses shared NGINX Ingress
  mode: direct-nlb
  load_balancer:
    type: nlb
    scheme: internet-facing
    name_pattern: "{tenant}-{app}-{env}-nlb"
    # Example: opsera-cwa-5-dev-nlb
  # Note: No TLS termination at NLB level (HTTP only)
  # For HTTPS, use AWS Certificate Manager + ALB or add NGINX Ingress back

deployment:
  strategies:
    dev: rolling
    qa: canary
    staging: blue-green
  
environments:
  dev:
    namespace: opsera-cwa-5-dev
    replicas: 2
    strategy: rolling
    auto_promote: false  # RULE 65: Disabled until verified working
    
security:
  scanning:
    gitleaks: true
    grype: true
    mode: warn  # Non-blocking
  image:
    base: nginxinc/nginx-unprivileged:alpine
    run_as_non_root: true


# ════════════════════════════════════════════════════════════════════════════
# INGRESS - NGINX Ingress with TLS
# RULE 104: Use wildcard TLS certificate (opsera-wildcard-tls)
# RULE 64: Domain is agent.opsera.dev (singular, NOT agents)
# ════════════════════════════════════════════════════════════════════════════
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cwa-5
  labels:
    app: cwa-5
    tenant: opsera
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # cert-manager annotation for TLS certificate
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - opsera-cwa-5-dev.agent.opsera.dev
      # RULE 104: Use wildcard TLS secret (shared across tenant apps)
      secretName: opsera-wildcard-tls
  rules:
    - host: opsera-cwa-5-dev.agent.opsera.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cwa-5
                port:
                  number: 80

# ════════════════════════════════════════════════════════════════════════════
# SERVICE - AWS Network Load Balancer (Direct attachment to pods)
# Bypasses shared NGINX Ingress - dedicated NLB per application
# ════════════════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Service
metadata:
  name: cwa-5
  labels:
    app: cwa-5
    tenant: opsera
  annotations:
    # AWS Load Balancer Controller annotations
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
    service.beta.kubernetes.io/aws-load-balancer-name: "opsera-cwa-5-dev-nlb"
    service.beta.kubernetes.io/aws-load-balancer-additional-resource-tags: "tenant=opsera,app=cwa-5,environment=dev"
    # Health check configuration
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-path: "/"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-protocol: "HTTP"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-port: "8080"
spec:
  type: LoadBalancer
  selector:
    app: cwa-5
  ports:
    - name: http
      port: 80
      targetPort: 8080
      protocol: TCP

# QA CANARY ROLLOUT
# Generated by Code-to-Cloud Enterprise v1.7
# Strategy: 10% → 30% → 60% → 100% with analysis
# ════════════════════════════════════════════════════════════════════════════
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: clarity-withai-1
  labels:
    app: clarity-withai-1
    environment: qa
    tenant: opsera
spec:
  replicas: 2
  strategy:
    canary:
      canaryService: clarity-withai-1-canary
      stableService: clarity-withai-1-stable
      steps:
        - setWeight: 10
        - pause: {duration: 30s}
        - setWeight: 30
        - pause: {duration: 30s}
        - setWeight: 60
        - pause: {duration: 30s}
        - setWeight: 100
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: clarity-withai-1
  template:
    metadata:
      labels:
        app: clarity-withai-1
        tenant: opsera
    spec:
      # RULE 112: No imagePullSecrets needed for EKS with IAM/IRSA
      containers:
        - name: clarity-withai-1
          image: clarity-withai-1:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

# ════════════════════════════════════════════════════════════════════════════
# CI/CD BUILD & PUSH - cwa-2
# Generated by Code-to-Cloud Enterprise v1.7.3
# RULE 68: Use AWS Access Keys (not OIDC)
# ════════════════════════════════════════════════════════════════════════════

name: "🔨 cwa-2: CI Build & Push"

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'index.html'
      - 'vite.config.ts'
      - 'tailwind.config.ts'
      - '.opsera-cwa-2/Dockerfile'
      - '.opsera-cwa-2/nginx.conf'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        options: [dev]
        default: dev
      skip_build:
        description: 'Skip build (use existing image)'
        type: boolean
        default: false

env:
  APP_NAME: cwa-2
  TENANT: opsera
  AWS_REGION: us-east-1
  EKS_SPOKE_CLUSTER: opsera-use1-np
  EKS_HUB_CLUSTER: argocd-use1

permissions:
  contents: write
  id-token: write

# Prevent duplicate runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # VERIFY BOOTSTRAP (RULE 10)
  # ════════════════════════════════════════════════════════════════════════════
  verify-bootstrap:
    name: "🔍 Verify Bootstrap"
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      namespace: ${{ steps.env.outputs.namespace }}
      ecr_uri: ${{ steps.ecr.outputs.ecr_uri }}
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - name: Determine Environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            ENVIRONMENT="dev"
          else
            ENVIRONMENT="${{ inputs.environment }}"
          fi
          echo "environment=${ENVIRONMENT}" >> $GITHUB_OUTPUT
          echo "namespace=${{ env.TENANT }}-${{ env.APP_NAME }}-${ENVIRONMENT}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get ECR URI
        id: ecr
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_URI="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.TENANT }}/${{ env.APP_NAME }}"
          echo "ecr_uri=${ECR_URI}" >> $GITHUB_OUTPUT

      - name: Verify ECR Repository Exists
        run: |
          ECR_REPO="${{ env.TENANT }}/${{ env.APP_NAME }}"
          if ! aws ecr describe-repositories --repository-names "$ECR_REPO" 2>/dev/null; then
            echo "::error::ECR repository not found. Run bootstrap workflow first."
            exit 1
          fi
          echo "✅ ECR repository exists"

      - name: Generate Image Tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          IMAGE_TAG="${SHORT_SHA}-${TIMESTAMP}"
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "### Image Tag: \`${IMAGE_TAG}\`" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # BUILD & PUSH
  # ════════════════════════════════════════════════════════════════════════════
  build-and-push:
    name: "🔨 Build & Push"
    needs: [verify-bootstrap]
    if: inputs.skip_build != true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            docker login --username AWS --password-stdin ${{ needs.verify-bootstrap.outputs.ecr_uri }}

      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ needs.verify-bootstrap.outputs.ecr_uri }}:${{ needs.verify-bootstrap.outputs.image_tag }} \
            -t ${{ needs.verify-bootstrap.outputs.ecr_uri }}:latest \
            -f .opsera-${{ env.APP_NAME }}/Dockerfile \
            .

      - name: Push to ECR
        run: |
          docker push ${{ needs.verify-bootstrap.outputs.ecr_uri }}:${{ needs.verify-bootstrap.outputs.image_tag }}
          docker push ${{ needs.verify-bootstrap.outputs.ecr_uri }}:latest
          
          echo "### 📦 Image Pushed" >> $GITHUB_STEP_SUMMARY
          echo "\`${{ needs.verify-bootstrap.outputs.ecr_uri }}:${{ needs.verify-bootstrap.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # UPDATE MANIFESTS
  # ════════════════════════════════════════════════════════════════════════════
  update-manifests:
    name: "📝 Update Manifests"
    needs: [verify-bootstrap, build-and-push]
    # RULE 42: always() for skipped upstream
    if: always() && needs.verify-bootstrap.result == 'success' && (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Pull Latest
        run: git pull --rebase origin main

      - name: Update Kustomization
        run: |
          ENVIRONMENT="${{ needs.verify-bootstrap.outputs.environment }}"
          IMAGE_TAG="${{ needs.verify-bootstrap.outputs.image_tag }}"
          KUSTOMIZE_FILE=".opsera-${{ env.APP_NAME }}/k8s/overlays/${ENVIRONMENT}/kustomization.yaml"
          
          # Update image tag
          sed -i "s/newTag: .*/newTag: ${IMAGE_TAG}/" "$KUSTOMIZE_FILE"
          
          echo "Updated ${KUSTOMIZE_FILE} with tag: ${IMAGE_TAG}"

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .opsera-${{ env.APP_NAME }}/k8s/overlays/
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "deploy(${{ needs.verify-bootstrap.outputs.environment }}): Update image to ${{ needs.verify-bootstrap.outputs.image_tag }} [skip ci]"
            git push origin main
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # SYNC ARGOCD (RULE 66)
  # ════════════════════════════════════════════════════════════════════════════
  sync-argocd:
    name: "🔄 Sync ArgoCD"
    needs: [verify-bootstrap, update-manifests]
    if: always() && needs.update-manifests.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      deploy_success: ${{ steps.wait.outputs.success }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for Hub
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Force ArgoCD Sync (RULE 66)
        run: |
          APP_NAME="${{ env.APP_NAME }}-${{ needs.verify-bootstrap.outputs.environment }}"
          
          # RULE 93: Use kubectl fallback
          kubectl annotate application "$APP_NAME" -n argocd \
            argocd.argoproj.io/refresh=hard --overwrite || true
          
          echo "✅ ArgoCD sync triggered" >> $GITHUB_STEP_SUMMARY

      - name: Wait for Deployment
        id: wait
        run: |
          NAMESPACE="${{ needs.verify-bootstrap.outputs.namespace }}"
          
          # Switch to spoke cluster
          aws eks update-kubeconfig --name ${{ env.EKS_SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}
          
          # RULE 43: Environment-aware timeout (dev = 5 min)
          TIMEOUT=300
          ELAPSED=0
          
          echo "Waiting for deployment in namespace: ${NAMESPACE}"
          
          while [ $ELAPSED -lt $TIMEOUT ]; do
            READY=$(kubectl get pods -n "$NAMESPACE" -o jsonpath='{.items[*].status.phase}' 2>/dev/null | tr ' ' '\n' | grep -c Running || echo 0)
            TOTAL=$(kubectl get pods -n "$NAMESPACE" --no-headers 2>/dev/null | wc -l || echo 0)
            
            echo "Pods: ${READY}/${TOTAL} running (${ELAPSED}s elapsed)"
            
            if [ "$TOTAL" -gt 0 ] && [ "$READY" -eq "$TOTAL" ]; then
              echo "✅ All pods running" >> $GITHUB_STEP_SUMMARY
              echo "success=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            
            sleep 15
            ELAPSED=$((ELAPSED + 15))
          done
          
          # L450: Always set output
          echo "⚠️ Deployment timeout - check ArgoCD" >> $GITHUB_STEP_SUMMARY
          echo "success=false" >> $GITHUB_OUTPUT

  # ════════════════════════════════════════════════════════════════════════════
  # SUMMARY
  # ════════════════════════════════════════════════════════════════════════════
  summary:
    name: "📋 Summary"
    needs: [verify-bootstrap, build-and-push, update-manifests, sync-argocd]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate Summary
        run: |
          cat << EOF >> $GITHUB_STEP_SUMMARY
          
          ---
          
          ## 📋 Pipeline Summary
          
          | Stage | Status |
          |-------|--------|
          | Verify Bootstrap | ${{ needs.verify-bootstrap.result }} |
          | Build & Push | ${{ needs.build-and-push.result }} |
          | Update Manifests | ${{ needs.update-manifests.result }} |
          | Sync ArgoCD | ${{ needs.sync-argocd.result }} |
          
          ### Details
          - **Environment**: \`${{ needs.verify-bootstrap.outputs.environment }}\`
          - **Namespace**: \`${{ needs.verify-bootstrap.outputs.namespace }}\`
          - **Image Tag**: \`${{ needs.verify-bootstrap.outputs.image_tag }}\`
          
          ### Application URL
          \`https://opsera-cwa-2-${{ needs.verify-bootstrap.outputs.environment }}.agent.opsera.dev\`
          
          EOF

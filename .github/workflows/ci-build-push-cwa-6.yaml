# ════════════════════════════════════════════════════════════════════════════
# CI/CD BUILD & PUSH - cwa-6
# Code-to-Cloud Enterprise v1.7.3
# ════════════════════════════════════════════════════════════════════════════

name: "🔄 cwa-6: CI Build & Push"

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'vite.config.ts'
      - 'tailwind.config.ts'
      - '.opsera-cwa-6/Dockerfile'
      - '.opsera-cwa-6/nginx.conf'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        options: [dev]
        default: 'dev'

env:
  APP_NAME: cwa-6
  TENANT: opsera
  AWS_REGION: us-east-1
  HUB_CLUSTER: argocd-use1
  SPOKE_CLUSTER: opsera-use1-np

permissions:
  contents: write
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # VERIFY BOOTSTRAP
  # ════════════════════════════════════════════════════════════════════════════
  verify-bootstrap:
    name: "🔍 Verify Bootstrap"
    runs-on: ubuntu-latest
    outputs:
      ecr_repo: ${{ steps.ecr.outputs.repo }}
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get AWS Account ID and Verify ECR
        id: ecr
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_REPO="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.TENANT }}/${{ env.APP_NAME }}"
          
          # Verify ECR repo exists (RULE 10)
          if ! aws ecr describe-repositories --repository-names "${{ env.TENANT }}/${{ env.APP_NAME }}" &>/dev/null; then
            echo "::error::ECR repository not found. Run bootstrap workflow first."
            exit 1
          fi
          
          echo "repo=${ECR_REPO}" >> $GITHUB_OUTPUT
          echo "### ECR Repository" >> $GITHUB_STEP_SUMMARY
          echo "✅ Found: \`${ECR_REPO}\`" >> $GITHUB_STEP_SUMMARY

      - name: Generate Image Tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TIMESTAMP=$(date -u +"%Y%m%d%H%M%S")
          IMAGE_TAG="${SHORT_SHA}-${TIMESTAMP}"
          echo "tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "- Image Tag: \`${IMAGE_TAG}\`" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # BUILD AND PUSH
  # ════════════════════════════════════════════════════════════════════════════
  build-and-push:
    name: "🏗️ Build & Push"
    runs-on: ubuntu-latest
    needs: [verify-bootstrap]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .opsera-cwa-6/Dockerfile
          push: true
          tags: |
            ${{ needs.verify-bootstrap.outputs.ecr_repo }}:${{ needs.verify-bootstrap.outputs.image_tag }}
            ${{ needs.verify-bootstrap.outputs.ecr_repo }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image Summary
        run: |
          echo "### Docker Image" >> $GITHUB_STEP_SUMMARY
          echo "✅ Pushed: \`${{ needs.verify-bootstrap.outputs.ecr_repo }}:${{ needs.verify-bootstrap.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # UPDATE MANIFESTS
  # ════════════════════════════════════════════════════════════════════════════
  update-manifests:
    name: "📝 Update Manifests"
    runs-on: ubuntu-latest
    needs: [verify-bootstrap, build-and-push]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Update Image Tag in Kustomization
        run: |
          IMAGE_TAG="${{ needs.verify-bootstrap.outputs.image_tag }}"
          
          # Update dev overlay
          sed -i "s/newTag: .*/newTag: ${IMAGE_TAG}/" .opsera-cwa-6/k8s/overlays/dev/kustomization.yaml
          
          echo "### Manifest Update" >> $GITHUB_STEP_SUMMARY
          echo "- Updated image tag to: \`${IMAGE_TAG}\`" >> $GITHUB_STEP_SUMMARY

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .opsera-cwa-6/k8s/overlays/dev/kustomization.yaml
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "deploy: Update cwa-6-dev to ${{ needs.verify-bootstrap.outputs.image_tag }} [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # SYNC AND MONITOR
  # ════════════════════════════════════════════════════════════════════════════
  sync-and-monitor:
    name: "🔄 Sync & Monitor"
    runs-on: ubuntu-latest
    needs: [verify-bootstrap, update-manifests]
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for Hub Cluster
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Force ArgoCD Sync (RULE 66)
        run: |
          APP_NAME="${{ env.APP_NAME }}-dev"
          
          # Force hard refresh
          kubectl annotate application $APP_NAME -n argocd \
            argocd.argoproj.io/refresh=hard --overwrite || true
          
          echo "### ArgoCD Sync" >> $GITHUB_STEP_SUMMARY
          echo "✅ Triggered sync for \`$APP_NAME\`" >> $GITHUB_STEP_SUMMARY

      - name: Monitor Deployment
        run: |
          APP_NAME="${{ env.APP_NAME }}-dev"
          NAMESPACE="${{ env.TENANT }}-${{ env.APP_NAME }}-dev"
          
          echo "Waiting for ArgoCD sync..."
          
          # Wait up to 5 minutes
          TIMEOUT=300
          ELAPSED=0
          
          while [ $ELAPSED -lt $TIMEOUT ]; do
            SYNC_STATUS=$(kubectl get application $APP_NAME -n argocd -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "Unknown")
            HEALTH_STATUS=$(kubectl get application $APP_NAME -n argocd -o jsonpath='{.status.health.status}' 2>/dev/null || echo "Unknown")
            
            echo "Sync: $SYNC_STATUS, Health: $HEALTH_STATUS"
            
            if [ "$SYNC_STATUS" = "Synced" ] && [ "$HEALTH_STATUS" = "Healthy" ]; then
              echo "✅ Deployment successful!"
              echo "- Sync Status: \`$SYNC_STATUS\`" >> $GITHUB_STEP_SUMMARY
              echo "- Health Status: \`$HEALTH_STATUS\`" >> $GITHUB_STEP_SUMMARY
              break
            fi
            
            sleep 15
            ELAPSED=$((ELAPSED + 15))
          done
          
          # Final status check
          if [ "$SYNC_STATUS" != "Synced" ] || [ "$HEALTH_STATUS" != "Healthy" ]; then
            echo "⚠️ Deployment may still be in progress"
            echo "- Final Sync: \`$SYNC_STATUS\`" >> $GITHUB_STEP_SUMMARY
            echo "- Final Health: \`$HEALTH_STATUS\`" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Configure kubectl for Spoke Cluster
        run: |
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Check Pods
        run: |
          NAMESPACE="${{ env.TENANT }}-${{ env.APP_NAME }}-dev"
          
          echo "### Pod Status" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n $NAMESPACE -o wide 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "Namespace not ready yet" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # SUMMARY
  # ════════════════════════════════════════════════════════════════════════════
  summary:
    name: "📋 Deployment Summary"
    runs-on: ubuntu-latest
    needs: [verify-bootstrap, build-and-push, update-manifests, sync-and-monitor]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          cat << EOF >> $GITHUB_STEP_SUMMARY
          
          ---
          
          ## 🎉 CI/CD Pipeline Complete
          
          | Stage | Status |
          |-------|--------|
          | Verify Bootstrap | ${{ needs.verify-bootstrap.result }} |
          | Build & Push | ${{ needs.build-and-push.result }} |
          | Update Manifests | ${{ needs.update-manifests.result }} |
          | Sync & Monitor | ${{ needs.sync-and-monitor.result }} |
          
          ### Application Info
          - **Image**: \`${{ needs.verify-bootstrap.outputs.ecr_repo }}:${{ needs.verify-bootstrap.outputs.image_tag }}\`
          - **Hostname**: \`${{ env.TENANT }}-${{ env.APP_NAME }}-dev.agent.opsera.dev\`
          
          ### Next Steps
          1. **Setup DNS**: Run \`dns-setup-cwa-6.yaml\` if not already done
          2. **Verify**: Visit https://${{ env.TENANT }}-${{ env.APP_NAME }}-dev.agent.opsera.dev
          3. **Debug**: Run \`diagnostics-cwa-6.yaml\` if issues occur
          EOF

name: Bootstrap Infrastructure - claritywithai-0209
on:
  workflow_dispatch:
permissions:
  contents: write
  id-token: write
env:
  APP_NAME: claritywithai-0209
  TENANT: opsera
  AWS_REGION: us-west-2
  REGION_SHORT: usw2
  SPOKE_CLUSTER: opsera-usw2-np
  HUB_CLUSTER: argocd-usw2
  ARGOCD_SERVER: argocd-usw2.agent.opsera.dev
  NAMESPACE_DEV: opsera-claritywithai-0209-dev

jobs:
  setup-ecr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pre-flight – trim AWS secrets (avoid Invalid header value)
        run: |
          echo "AWS_ACCESS_KEY_ID=$(echo -n "${{ secrets.AWS_ACCESS_KEY_ID }}" | tr -d '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=$(echo -n "${{ secrets.AWS_SECRET_ACCESS_KEY }}" | tr -d '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')" >> $GITHUB_ENV
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Get AWS Account ID
        id: aws
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=$AWS_ACCOUNT_ID" >> $GITHUB_OUTPUT
      - name: Create ECR repository if not exists
        run: |
          aws ecr describe-repositories --repository-names ${{ env.APP_NAME }} --region ${{ env.AWS_REGION }} 2>/dev/null || \
          aws ecr create-repository --repository-name ${{ env.APP_NAME }} --region ${{ env.AWS_REGION }}

  create-opsera-config:
    runs-on: ubuntu-latest
    needs: setup-ecr
    steps:
      - uses: actions/checkout@v4
      - name: Ensure Opsera config folder exists
        run: |
          mkdir -p .opsera-${{ env.APP_NAME }}/k8s/base .opsera-${{ env.APP_NAME }}/k8s/overlays/dev .opsera-${{ env.APP_NAME }}/argocd/dev
          git status --short .opsera-${{ env.APP_NAME }} || true

  update-config-files:
    runs-on: ubuntu-latest
    needs: create-opsera-config
    steps:
      - uses: actions/checkout@v4
      - name: Update ArgoCD application with repo URL
        run: |
          REPO="${{ github.repository }}"
          sed -i "s|PLACEHOLDER_GH_ORG/PLACEHOLDER_GH_REPO|${REPO}|g" .opsera-${{ env.APP_NAME }}/argocd/dev/application.yaml
          grep -E "repoURL|path|targetRevision" .opsera-${{ env.APP_NAME }}/argocd/dev/application.yaml
      - name: Commit config updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main || true
          git add .opsera-${{ env.APP_NAME }}/argocd/
          git diff --staged --quiet || git commit -m "chore(opsera): resolve ArgoCD repo placeholders for claritywithai-0209"
          git push origin main || true

  create-ecr-pull-secret:
    runs-on: ubuntu-latest
    needs: update-config-files
    steps:
      - uses: actions/checkout@v4
      - name: Pre-flight – trim AWS secrets (avoid Invalid header value)
        run: |
          echo "AWS_ACCESS_KEY_ID=$(echo -n "${{ secrets.AWS_ACCESS_KEY_ID }}" | tr -d '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=$(echo -n "${{ secrets.AWS_SECRET_ACCESS_KEY }}" | tr -d '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')" >> $GITHUB_ENV
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: azure/setup-kubectl@v3
      - name: Get AWS Account ID
        id: aws
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=$AWS_ACCOUNT_ID" >> $GITHUB_OUTPUT
      - name: Configure kubeconfig (EKS)
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.SPOKE_CLUSTER }} --kubeconfig $(pwd)/kubeconfig
          echo "KUBECONFIG=$(pwd)/kubeconfig" >> $GITHUB_ENV
          kubectl get nodes || true
      - name: Create namespace
        run: |
          kubectl create namespace ${{ env.NAMESPACE_DEV }} --dry-run=client -o yaml | kubectl apply -f -
      - name: Create ECR pull secret
        run: |
          ECR_TOKEN=$(aws ecr get-login-password --region ${{ env.AWS_REGION }})
          kubectl create secret docker-registry ecr-pull-secret \
            --docker-server=${{ steps.aws.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com \
            --docker-username=AWS --docker-password="$ECR_TOKEN" \
            --namespace=${{ env.NAMESPACE_DEV }} \
            --dry-run=client -o yaml | kubectl apply -f -

  register-argocd-repo:
    runs-on: ubuntu-latest
    needs: create-ecr-pull-secret
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v3
      - name: Pre-flight – verify KUBECONFIG_HUB (decode and cluster-info)
        id: preflight
        run: |
          echo "${{ secrets.KUBECONFIG_HUB }}" | base64 -d > kubeconfig
          if [ ! -s kubeconfig ]; then
            echo "skip_hub=true" >> $GITHUB_OUTPUT
            echo "::notice::KUBECONFIG_HUB is missing or empty. ArgoCD hub steps will be skipped. Add the hub kubeconfig (base64) to GitHub Secrets and re-run to complete."
            exit 0
          fi
          export KUBECONFIG=$(pwd)/kubeconfig
          if ! kubectl cluster-info 2>/dev/null; then
            echo "skip_hub=true" >> $GITHUB_OUTPUT
            echo "::notice::KUBECONFIG_HUB is invalid or cluster unreachable. ArgoCD hub steps will be skipped. Fix the secret and re-run to complete."
            exit 0
          fi
          echo "skip_hub=false" >> $GITHUB_OUTPUT
          echo "KUBECONFIG=$(pwd)/kubeconfig" >> $GITHUB_ENV
      - name: Hub skipped (no valid KUBECONFIG_HUB)
        if: steps.preflight.outputs.skip_hub == 'true'
        run: |
          echo "## ArgoCD hub steps skipped" >> $GITHUB_STEP_SUMMARY
          echo "Add **KUBECONFIG_HUB** (base64-encoded hub cluster kubeconfig) to GitHub Secrets, then re-run this workflow to register the repo and apply the ArgoCD application." >> $GITHUB_STEP_SUMMARY
      - name: Register repository with ArgoCD
        if: steps.preflight.outputs.skip_hub != 'true'
        run: |
          kubectl create secret generic repo-${{ env.APP_NAME }} \
            --from-literal=url=https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}.git \
            --from-literal=password=${{ secrets.GH_PAT }} \
            --from-literal=username=git \
            -n argocd \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl label secret repo-${{ env.APP_NAME }} -n argocd argocd.argoproj.io/secret-type=repository --overwrite

  apply-argocd-application:
    runs-on: ubuntu-latest
    needs: register-argocd-repo
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v3
      - name: Pre-flight – verify KUBECONFIG_HUB (decode and cluster-info)
        id: preflight
        run: |
          echo "${{ secrets.KUBECONFIG_HUB }}" | base64 -d > kubeconfig
          if [ ! -s kubeconfig ]; then
            echo "skip_hub=true" >> $GITHUB_OUTPUT
            echo "::notice::KUBECONFIG_HUB is missing or empty. Apply step skipped."
            exit 0
          fi
          export KUBECONFIG=$(pwd)/kubeconfig
          if ! kubectl cluster-info 2>/dev/null; then
            echo "skip_hub=true" >> $GITHUB_OUTPUT
            echo "::notice::KUBECONFIG_HUB is invalid or cluster unreachable. Apply step skipped."
            exit 0
          fi
          echo "skip_hub=false" >> $GITHUB_OUTPUT
          echo "KUBECONFIG=$(pwd)/kubeconfig" >> $GITHUB_ENV
      - name: Apply step skipped (no valid KUBECONFIG_HUB)
        if: steps.preflight.outputs.skip_hub == 'true'
        run: |
          echo "## ArgoCD apply skipped" >> $GITHUB_STEP_SUMMARY
          echo "Add **KUBECONFIG_HUB** and re-run the workflow to apply the ArgoCD application." >> $GITHUB_STEP_SUMMARY
      - name: Apply ArgoCD Application
        if: steps.preflight.outputs.skip_hub != 'true'
        run: |
          kubectl apply -f .opsera-${{ env.APP_NAME }}/argocd/dev/application.yaml

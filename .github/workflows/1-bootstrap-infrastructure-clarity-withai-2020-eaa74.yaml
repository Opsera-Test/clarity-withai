# ================================================================
# REQUIRED SECRETS (configure in GitHub)
# ================================================================
# - AWS_ACCESS_KEY_ID: AWS access key for ECR and EKS
# - AWS_SECRET_ACCESS_KEY: AWS secret key
# - GH_PAT: GitHub Personal Access Token (scopes: repo, workflow)
# ================================================================

name: "Bootstrap Infrastructure - clarity-withai-2020-eaa74"

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/1-bootstrap-infrastructure-clarity-withai-2020-eaa74.yaml'

env:
  APP_NAME: clarity-withai-2020-eaa74
  TENANT: opsera
  AWS_REGION: us-west-2
  REGION_SHORT: usw2
  HUB_CLUSTER: argocd-usw2
  SPOKE_CLUSTER: opsera-usw2-np
  ECR_REPO: opsera/clarity-withai-2020-eaa74

permissions:
  contents: read
  id-token: write

jobs:
  setup-ecr:
    name: "1. Setup ECR Repository"
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create ECR Repository (Idempotent)
        run: |
          if aws ecr describe-repositories --repository-names "${ECR_REPO}" --region ${AWS_REGION} &>/dev/null; then
            echo "ECR repository already exists: ${ECR_REPO}"
          else
            aws ecr create-repository \
              --repository-name "${ECR_REPO}" \
              --image-tag-mutability IMMUTABLE \
              --encryption-configuration encryptionType=AES256 \
              --tags Key=tenant,Value=${TENANT} Key=app,Value=${APP_NAME} Key=managed-by,Value=opsera-c2c
            echo "ECR repository created: ${ECR_REPO}"
          fi

  register-repo-argocd:
    name: "2. Register Repository with ArgoCD"
    runs-on: ubuntu-latest
    needs: [setup-ecr]
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Kubeconfig (Hub)
        run: |
          aws eks update-kubeconfig --name ${HUB_CLUSTER} --region ${AWS_REGION} --alias hub
          kubectl config use-context hub

      - name: Register Repository (Idempotent)
        run: |
          REPO_SECRET_NAME="repo-${GITHUB_REPOSITORY_OWNER}-${APP_NAME}"
          if kubectl --context hub get secret "$REPO_SECRET_NAME" -n argocd &>/dev/null; then
            echo "Repository secret already exists - skipping"
            exit 0
          fi

          cat <<EOF | kubectl --context hub apply -f -
          apiVersion: v1
          kind: Secret
          metadata:
            name: ${REPO_SECRET_NAME}
            namespace: argocd
            labels:
              argocd.argoproj.io/secret-type: repository
          type: Opaque
          stringData:
            type: git
            url: https://github.com/${GITHUB_REPOSITORY}.git
            password: ${{ secrets.GH_PAT }}
            username: git
          EOF
          echo "Repository registered with ArgoCD"

  register-spoke-cluster:
    name: "3. Register Spoke Cluster with ArgoCD"
    runs-on: ubuntu-latest
    needs: [register-repo-argocd]
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Kubeconfig (Hub + Spoke)
        run: |
          aws eks update-kubeconfig --name ${HUB_CLUSTER} --region ${AWS_REGION} --alias hub
          aws eks update-kubeconfig --name ${SPOKE_CLUSTER} --region ${AWS_REGION} --alias spoke
          kubectl config use-context hub

      - name: Check and Register Spoke Cluster
        run: |
          if kubectl --context hub get secret -n argocd cluster-${SPOKE_CLUSTER} 2>/dev/null; then
            echo "Spoke cluster already registered: ${SPOKE_CLUSTER}"
            exit 0
          fi

          echo "Registering spoke cluster with ArgoCD..."

          SPOKE_SERVER=$(aws eks describe-cluster --name ${SPOKE_CLUSTER} --region ${AWS_REGION} \
            --query 'cluster.endpoint' --output text)
          SPOKE_CA=$(aws eks describe-cluster --name ${SPOKE_CLUSTER} --region ${AWS_REGION} \
            --query 'cluster.certificateAuthority.data' --output text)

          if [ -z "$SPOKE_SERVER" ] || [ "$SPOKE_SERVER" = "None" ]; then
            echo "Failed to get spoke cluster endpoint"
            exit 1
          fi

          kubectl --context spoke create serviceaccount argocd-manager -n kube-system --dry-run=client -o yaml | kubectl --context spoke apply -f -
          kubectl --context spoke create clusterrolebinding argocd-manager --clusterrole=cluster-admin --serviceaccount=kube-system:argocd-manager --dry-run=client -o yaml | kubectl --context spoke apply -f -

          TOKEN=$(kubectl --context spoke create token argocd-manager -n kube-system --duration=87600h 2>/dev/null || \
            kubectl --context spoke get secret -n kube-system $(kubectl --context spoke get sa argocd-manager -n kube-system -o jsonpath='{.secrets[0].name}') -o jsonpath='{.data.token}' | base64 -d)

          cat <<EOF | kubectl --context hub apply -f -
          apiVersion: v1
          kind: Secret
          metadata:
            name: cluster-${SPOKE_CLUSTER}
            namespace: argocd
            labels:
              argocd.argoproj.io/secret-type: cluster
          type: Opaque
          stringData:
            name: "${SPOKE_CLUSTER}"
            server: "${SPOKE_SERVER}"
            config: |
              {
                "bearerToken": "${TOKEN}",
                "tlsClientConfig": {
                  "insecure": false,
                  "caData": "${SPOKE_CA}"
                }
              }
          EOF
          echo "Spoke cluster registered: ${SPOKE_CLUSTER}"

  create-namespaces:
    name: "4. Create Namespaces"
    runs-on: ubuntu-latest
    needs: [register-spoke-cluster]
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Kubeconfig (Spoke)
        run: |
          aws eks update-kubeconfig --name ${SPOKE_CLUSTER} --region ${AWS_REGION} --alias ${SPOKE_CLUSTER}
          kubectl config use-context ${SPOKE_CLUSTER}

      - name: Create Namespaces
        run: |
          for ENV in dev; do
            NAMESPACE="${TENANT}-${APP_NAME}-${ENV}"
            if kubectl get namespace ${NAMESPACE} &>/dev/null; then
              echo "Namespace already exists: ${NAMESPACE}"
            else
              kubectl create namespace ${NAMESPACE}
              kubectl label namespace ${NAMESPACE} tenant=${TENANT} app=${APP_NAME} environment=${ENV} managed-by=opsera-c2c
              echo "Namespace created: ${NAMESPACE}"
            fi
          done

  create-service-accounts:
    name: "5. Create Service Accounts"
    runs-on: ubuntu-latest
    needs: [create-namespaces]
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Kubeconfig (Spoke)
        run: |
          aws eks update-kubeconfig --name ${SPOKE_CLUSTER} --region ${AWS_REGION} --alias ${SPOKE_CLUSTER}
          kubectl config use-context ${SPOKE_CLUSTER}

      - name: Create Service Accounts
        run: |
          for ENV in dev; do
            NAMESPACE="${TENANT}-${APP_NAME}-${ENV}"
            SA_NAME="${APP_NAME}-sa"
            if kubectl get sa ${SA_NAME} -n ${NAMESPACE} &>/dev/null; then
              echo "Service account already exists: ${SA_NAME}"
            else
              kubectl create serviceaccount ${SA_NAME} -n ${NAMESPACE}
              echo "Service account created: ${SA_NAME}"
            fi
          done

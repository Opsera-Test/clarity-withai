name: "CI/CD: clarity-1-staging"

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Action (deploy|rollback)"
        default: deploy

env:
  APP_NAME: clarity-1
  TENANT: opsera
  ENV: staging
  REGION: us-west-2
  ECR_REPO: clarity-1
  NAMESPACE: opsera-clarity-1-staging
  HUB_CLUSTER: argocd-usw2
  SPOKE_CLUSTER: opsera-usw2-np

permissions:
  contents: write
  id-token: write
  security-events: write

jobs:
  # Stage 0: Bootstrap Prerequisites Check
  bootstrap-check:
    name: "Bootstrap Check"
    runs-on: ubuntu-latest
    outputs:
      ready: ${{ steps.check.outputs.ready }}
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.REGION }}

      - name: Check Bootstrap Prerequisites
        id: check
        run: |
          if ! aws ecr describe-repositories --repository-names ${{ env.ECR_REPO }} &>/dev/null; then
            echo "❌ ECR repository missing. Run bootstrap first."
            exit 1
          fi
          echo "ready=true" >> $GITHUB_OUTPUT

  # Stage 1: Security Scan (warn-only)
  security-scan:
    name: "Security Scan"
    runs-on: ubuntu-latest
    needs: bootstrap-check
    if: needs.bootstrap-check.outputs.ready == 'true'
    continue-on-error: ${{ vars.GITLEAKS_MODE != 'block' }}
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Secret Scan
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: Upload Gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: gitleaks-report-staging-${{ github.sha }}
          path: results.sarif
          retention-days: 30

  # Stage 2: Build and Push to ECR
  build-push:
    name: "Build & Push"
    runs-on: ubuntu-latest
    needs: [bootstrap-check, security-scan]
    if: always() && needs.bootstrap-check.outputs.ready == 'true'
    outputs:
      image-tag: ${{ steps.tag.outputs.tag }}
      ecr-uri: ${{ steps.login.outputs.registry }}/${{ env.ECR_REPO }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.REGION }}

      - name: Login to ECR
        id: login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: tag
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:8}"
          TAG="${{ env.ENV }}-${SHORT_SHA}-$(date +%Y%m%d%H%M%S)"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Build and push
        run: |
          IMAGE_URI="${{ steps.login.outputs.registry }}/${{ env.ECR_REPO }}:${{ steps.tag.outputs.tag }}"
          docker build -f .opsera-${{ env.APP_NAME }}/Dockerfile -t ${IMAGE_URI} .
          docker push ${IMAGE_URI}

  # Stage 3: Container Scan (Grype - warn-only)
  container-scan:
    name: "Container Scan"
    runs-on: ubuntu-latest
    needs: build-push
    continue-on-error: ${{ vars.GRYPE_MODE != 'block' }}
    permissions:
      security-events: write
      id-token: write
    steps:
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Grype Vulnerability Scan
        uses: anchore/scan-action@v3
        continue-on-error: true
        with:
          image: "${{ needs.build-push.outputs.ecr-uri }}:${{ needs.build-push.outputs.image-tag }}"
          fail-build: false
          severity-cutoff: ${{ vars.GRYPE_FAIL_SEVERITY || 'critical' }}
          output-format: sarif

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: results.sarif

      - name: Upload scan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grype-scan-staging-${{ needs.build-push.outputs.image-tag }}
          path: results.sarif
          retention-days: 30

  # Stage 4: Update Manifests
  update-manifests:
    name: "Update Manifests"
    runs-on: ubuntu-latest
    needs: [build-push, container-scan]
    if: always() && needs.build-push.result == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Pull latest changes
        run: |
          git config user.name "opsera-agent"
          git config user.email "agent@opsera.dev"
          git pull --rebase origin main

      - name: Update image tag in kustomization
        run: |
          cd .opsera-${{ env.APP_NAME }}/k8s/overlays/${{ env.ENV }}
          sed -i "s|newName:.*|newName: ${{ needs.build-push.outputs.ecr-uri }}|g" kustomization.yaml
          sed -i "s|newTag:.*|newTag: ${{ needs.build-push.outputs.image-tag }}|g" kustomization.yaml

      - name: Commit and push
        run: |
          git add .opsera-${{ env.APP_NAME }}/k8s/
          git diff --staged --quiet || git commit -m "ci: update clarity-1-staging image ${{ needs.build-push.outputs.image-tag }} [skip ci]"
          git push origin main || (git pull --rebase origin main && git push origin main)

  # Stage 5: Deploy via ArgoCD (Blue-Green)
  deploy:
    name: "Deploy"
    runs-on: ubuntu-latest
    needs: update-manifests
    if: always() && needs.update-manifests.result == 'success'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.REGION }}

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/v1.28.0/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Connect to Hub Cluster
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.REGION }} --alias hub

      - name: Create or Update ArgoCD Application (Idempotent)
        run: |
          git pull --rebase origin main
          kubectl --context hub apply -f .opsera-${{ env.APP_NAME }}/argocd/${{ env.ENV }}/application.yaml

      - name: Hard Refresh ArgoCD Application
        run: |
          ARGOCD_APP="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ env.ENV }}"
          kubectl --context hub patch application ${ARGOCD_APP} -n argocd \
            --type merge -p '{"metadata":{"annotations":{"argocd.argoproj.io/refresh":"hard"}}}'
          sleep 5

      - name: Sync ArgoCD Application
        run: |
          ARGOCD_APP="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ env.ENV }}"
          kubectl --context hub patch application ${ARGOCD_APP} -n argocd \
            --type merge -p '{"operation":{"initiatedBy":{"username":"github-actions"},"sync":{"syncStrategy":{"hook":{"force":true}}}}}'

          for i in $(seq 1 30); do
            PHASE=$(kubectl --context hub get application ${ARGOCD_APP} -n argocd \
              -o jsonpath='{.status.operationState.phase}')
            HEALTH=$(kubectl --context hub get application ${ARGOCD_APP} -n argocd \
              -o jsonpath='{.status.health.status}')
            echo "Attempt $i/30: Phase=${PHASE}, Health=${HEALTH}"

            if [ "$PHASE" = "Succeeded" ] && [ "$HEALTH" = "Healthy" ]; then
              echo "✅ ArgoCD sync succeeded"
              break
            fi

            if [ $i -eq 30 ]; then
              echo "⚠️ Sync timeout"
              exit 1
            fi
            sleep 10
          done

      - name: Connect to Spoke Cluster
        run: |
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.REGION }} --alias spoke

      - name: Verify Blue-Green Rollout
        run: |
          echo "## Staging Blue-Green Deployment Verification" >> $GITHUB_STEP_SUMMARY
          kubectl --context spoke get pods -n ${{ env.NAMESPACE }} || true
          kubectl --context spoke wait --for=condition=Ready pods \
            -l app=${{ env.APP_NAME }} -n ${{ env.NAMESPACE }} --timeout=300s
          echo "| App URL | https://clarity-1-staging.agent.opsera.dev |" >> $GITHUB_STEP_SUMMARY
          echo "✅ Staging Blue-Green deployment verified - https://clarity-1-staging.agent.opsera.dev"

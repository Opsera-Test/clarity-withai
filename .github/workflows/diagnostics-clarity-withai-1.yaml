# ════════════════════════════════════════════════════════════════════════════
# DIAGNOSTICS WORKFLOW - clarity-withai-1
# Generated by Code-to-Cloud Enterprise v1.7
# RULE 50: Mandatory diagnostics workflow
# ════════════════════════════════════════════════════════════════════════════
name: "🔬 clarity-withai-1: Diagnostics"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to diagnose'
        type: choice
        options: [dev, qa, staging]
        default: dev
      diagnostic_type:
        description: 'Type of diagnostic'
        type: choice
        options:
          - full-pipeline
          - pod-logs
          - argocd-debug
          - force-sync
          - cert-debug
        default: full-pipeline

env:
  APP_NAME: clarity-withai-1
  TENANT: opsera
  AWS_REGION: us-west-2
  HUB_CLUSTER: argocd-usw2
  SPOKE_CLUSTER: opsera-usw2-np

permissions:
  contents: read
  id-token: write

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # FULL PIPELINE DIAGNOSTICS
  # ════════════════════════════════════════════════════════════════════════════
  full-pipeline:
    name: "🔍 Full Pipeline"
    runs-on: ubuntu-latest
    if: inputs.diagnostic_type == 'full-pipeline'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: "1️⃣ ECR Check"
        run: |
          echo "### 📦 Stage 1: ECR Repository" >> $GITHUB_STEP_SUMMARY
          ECR_REPO="${{ env.TENANT }}/${{ env.APP_NAME }}"

          if aws ecr describe-repositories --repository-names "$ECR_REPO" &>/dev/null; then
            echo "✅ ECR repository exists" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Latest Images:**" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            aws ecr describe-images --repository-name "$ECR_REPO" \
              --query 'imageDetails[*].[imageTags[0],imagePushedAt]' \
              --output table | head -10 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ ECR repository NOT found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: "2️⃣ Cluster Check"
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🎯 Stage 2: EKS Clusters" >> $GITHUB_STEP_SUMMARY

          # Hub cluster
          if aws eks describe-cluster --name ${{ env.HUB_CLUSTER }} &>/dev/null; then
            echo "✅ Hub cluster: ${{ env.HUB_CLUSTER }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Hub cluster NOT found" >> $GITHUB_STEP_SUMMARY
          fi

          # Spoke cluster
          if aws eks describe-cluster --name ${{ env.SPOKE_CLUSTER }} &>/dev/null; then
            echo "✅ Spoke cluster: ${{ env.SPOKE_CLUSTER }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Spoke cluster NOT found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Configure kubectl for Spoke
        run: |
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: "3️⃣ Namespace & Pods"
        run: |
          NAMESPACE="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ inputs.environment }}"
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🚀 Stage 3: Namespace & Pods" >> $GITHUB_STEP_SUMMARY
          echo "**Namespace:** \`$NAMESPACE\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if kubectl get namespace $NAMESPACE &>/dev/null; then
            echo "✅ Namespace exists" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Pods:**" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            kubectl get pods -n $NAMESPACE -o wide >> $GITHUB_STEP_SUMMARY 2>&1 || echo "No pods found" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Namespace NOT found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Configure kubectl for Hub
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: "4️⃣ ArgoCD Application"
        run: |
          APP="${{ env.APP_NAME }}-${{ inputs.environment }}"
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔄 Stage 4: ArgoCD Application" >> $GITHUB_STEP_SUMMARY
          echo "**Application:** \`$APP\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if kubectl get application $APP -n argocd &>/dev/null; then
            SYNC=$(kubectl get application $APP -n argocd -o jsonpath='{.status.sync.status}')
            HEALTH=$(kubectl get application $APP -n argocd -o jsonpath='{.status.health.status}')
            echo "- Sync Status: **$SYNC**" >> $GITHUB_STEP_SUMMARY
            echo "- Health: **$HEALTH**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ ArgoCD Application NOT found" >> $GITHUB_STEP_SUMMARY
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # POD LOGS
  # ════════════════════════════════════════════════════════════════════════════
  pod-logs:
    name: "📋 Pod Logs"
    runs-on: ubuntu-latest
    if: inputs.diagnostic_type == 'pod-logs'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Get Pod Logs
        run: |
          NAMESPACE="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ inputs.environment }}"
          echo "### 📋 Pod Logs - $NAMESPACE"

          for POD in $(kubectl get pods -n $NAMESPACE -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
            echo ""
            echo "=== Pod: $POD ==="
            kubectl logs $POD -n $NAMESPACE --tail=100 2>/dev/null || echo "No logs available"
            echo ""
            echo "=== Previous Container ==="
            kubectl logs $POD -n $NAMESPACE --previous --tail=50 2>/dev/null || echo "No previous logs"
          done

  # ════════════════════════════════════════════════════════════════════════════
  # FORCE SYNC
  # ════════════════════════════════════════════════════════════════════════════
  force-sync:
    name: "⚡ Force Sync"
    runs-on: ubuntu-latest
    if: inputs.diagnostic_type == 'force-sync'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for Hub
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Force Sync
        run: |
          APP="${{ env.APP_NAME }}-${{ inputs.environment }}"
          echo "### ⚡ Force Sync: $APP"

          kubectl annotate application $APP -n argocd argocd.argoproj.io/refresh=hard --overwrite
          echo "✅ Hard refresh triggered"

          sleep 30

          SYNC=$(kubectl get application $APP -n argocd -o jsonpath='{.status.sync.status}')
          HEALTH=$(kubectl get application $APP -n argocd -o jsonpath='{.status.health.status}')
          echo "Status after sync:"
          echo "- Sync: $SYNC"
          echo "- Health: $HEALTH"

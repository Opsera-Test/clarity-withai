# ════════════════════════════════════════════════════════════════════════════
# CI/CD BUILD & PUSH - cwa-4
# Generated by Code-to-Cloud Enterprise v1.7.3
# RULE 6: Race condition prevention with [skip ci]
# RULE 10: Verify bootstrap before CI/CD
# ════════════════════════════════════════════════════════════════════════════

name: "🏗️ cwa-4: CI Build & Push"

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'vite.config.ts'
      - 'tailwind.config.ts'
      - '.opsera-cwa-4/Dockerfile'
      - '.opsera-cwa-4/nginx.conf'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        options: [dev, qa, staging]
        default: dev

env:
  APP_NAME: cwa-4
  TENANT: opsera
  AWS_REGION: us-west-2
  HUB_CLUSTER: argocd-usw2
  SPOKE_CLUSTER: opsera-usw2-np
  ECR_REPO: opsera/cwa-4

permissions:
  contents: write
  id-token: write

# Prevent duplicate runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # VERIFY BOOTSTRAP (RULE 10)
  # ════════════════════════════════════════════════════════════════════════════
  verify-bootstrap:
    name: "🔍 Verify Bootstrap"
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      image_tag: ${{ steps.tag.outputs.image_tag }}
      ecr_uri: ${{ steps.aws.outputs.ecr_uri }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine Environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            ENVIRONMENT="dev"
          else
            ENVIRONMENT="${{ inputs.environment }}"
          fi
          echo "environment=${ENVIRONMENT}" >> $GITHUB_OUTPUT
          echo "### Environment: \`${ENVIRONMENT}\`" >> $GITHUB_STEP_SUMMARY

      - name: Generate Image Tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          IMAGE_TAG="${SHORT_SHA}-${TIMESTAMP}"
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "### Image Tag: \`${IMAGE_TAG}\`" >> $GITHUB_STEP_SUMMARY

      # RULE 68: Use AWS Access Keys
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get AWS Account Info
        id: aws
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_URI="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          echo "ecr_uri=${ECR_URI}" >> $GITHUB_OUTPUT

      # RULE 10: Verify ECR exists
      - name: Verify ECR Repository
        run: |
          if ! aws ecr describe-repositories --repository-names "${{ env.ECR_REPO }}" 2>/dev/null; then
            echo "::error::ECR repository not found. Run bootstrap workflow first."
            exit 1
          fi
          echo "✅ ECR repository verified"

  # ════════════════════════════════════════════════════════════════════════════
  # SECURITY SCANNING (Parallel with Build)
  # ════════════════════════════════════════════════════════════════════════════
  security-scan:
    name: "🔐 Security Scan"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Grype SCA Scan
        uses: anchore/scan-action@v3
        continue-on-error: true
        with:
          path: "."
          fail-build: false
          severity-cutoff: high

  # ════════════════════════════════════════════════════════════════════════════
  # BUILD & PUSH
  # ════════════════════════════════════════════════════════════════════════════
  build-push:
    name: "🔨 Build & Push"
    needs: [verify-bootstrap]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            docker login --username AWS --password-stdin ${{ needs.verify-bootstrap.outputs.ecr_uri }}

      - name: Build Docker Image
        run: |
          IMAGE="${{ needs.verify-bootstrap.outputs.ecr_uri }}/${{ env.ECR_REPO }}:${{ needs.verify-bootstrap.outputs.image_tag }}"
          docker build -f .opsera-${{ env.APP_NAME }}/Dockerfile -t $IMAGE .
          echo "IMAGE=${IMAGE}" >> $GITHUB_ENV

      - name: Push Docker Image
        run: |
          docker push $IMAGE
          echo "### Docker Image" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "$IMAGE" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # UPDATE MANIFESTS
  # ════════════════════════════════════════════════════════════════════════════
  update-manifests:
    name: "📝 Update Manifests"
    needs: [verify-bootstrap, build-push]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      # RULE 8: Git pull before modification
      - name: Pull Latest
        run: git pull --rebase origin main

      - name: Update Kustomization
        env:
          ENVIRONMENT: ${{ needs.verify-bootstrap.outputs.environment }}
          IMAGE_TAG: ${{ needs.verify-bootstrap.outputs.image_tag }}
        run: |
          KUST_FILE=".opsera-${{ env.APP_NAME }}/k8s/overlays/${ENVIRONMENT}/kustomization.yaml"
          sed -i "s/newTag: .*/newTag: ${IMAGE_TAG}/" "$KUST_FILE"
          echo "✅ Updated ${ENVIRONMENT} to image tag: ${IMAGE_TAG}"
          cat "$KUST_FILE"

      # RULE 6: Use [skip ci] to prevent infinite loops
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "deploy(${{ needs.verify-bootstrap.outputs.environment }}): Update image to ${{ needs.verify-bootstrap.outputs.image_tag }} [skip ci]"
          git pull --rebase origin main
          git push origin main

  # ════════════════════════════════════════════════════════════════════════════
  # SYNC ARGOCD & MONITOR
  # ════════════════════════════════════════════════════════════════════════════
  sync-and-monitor:
    name: "🔄 Sync & Monitor"
    needs: [verify-bootstrap, update-manifests]
    # RULE 42: Use always() for downstream jobs
    if: always() && needs.update-manifests.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      deploy_success: ${{ steps.wait.outputs.success }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for Hub
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      # RULE 66: Force ArgoCD sync
      - name: Force ArgoCD Sync
        env:
          ENVIRONMENT: ${{ needs.verify-bootstrap.outputs.environment }}
        run: |
          APP_NAME="${{ env.APP_NAME }}-${ENVIRONMENT}"
          kubectl annotate application $APP_NAME -n argocd \
            argocd.argoproj.io/refresh=hard --overwrite || true
          echo "✅ ArgoCD sync triggered for ${APP_NAME}"

      - name: Configure kubectl for Spoke
        run: |
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}

      # RULE 43: Environment-aware timeouts
      - name: Wait for Deployment
        id: wait
        env:
          ENVIRONMENT: ${{ needs.verify-bootstrap.outputs.environment }}
        run: |
          NAMESPACE="${{ env.TENANT }}-${{ env.APP_NAME }}-${ENVIRONMENT}"

          # RULE 43: Environment-aware timeouts
          case "$ENVIRONMENT" in
            dev) TIMEOUT=300 ;;      # 5 min for rolling
            qa|staging) TIMEOUT=600 ;; # 10 min for canary/blue-green
          esac

          echo "Waiting for deployment in namespace: ${NAMESPACE}"
          echo "Timeout: ${TIMEOUT}s"

          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            READY=$(kubectl get pods -n $NAMESPACE -l app=${{ env.APP_NAME }} -o jsonpath='{.items[*].status.phase}' 2>/dev/null | tr ' ' '\n' | grep -c Running || echo 0)
            TOTAL=$(kubectl get pods -n $NAMESPACE -l app=${{ env.APP_NAME }} --no-headers 2>/dev/null | wc -l || echo 0)

            echo "Pods: ${READY}/${TOTAL} ready (${ELAPSED}s elapsed)"

            if [ "$TOTAL" -gt 0 ] && [ "$READY" -eq "$TOTAL" ]; then
              echo "✅ All pods ready!"
              echo "success=true" >> $GITHUB_OUTPUT
              exit 0
            fi

            sleep 15
            ELAPSED=$((ELAPSED + 15))
          done

          echo "⚠️ Timeout waiting for pods"
          echo "success=false" >> $GITHUB_OUTPUT
          # Don't fail - let summary job report status

  # ════════════════════════════════════════════════════════════════════════════
  # SUMMARY
  # ════════════════════════════════════════════════════════════════════════════
  summary:
    name: "📋 Summary"
    needs: [verify-bootstrap, build-push, update-manifests, sync-and-monitor, security-scan]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate Summary
        env:
          ENVIRONMENT: ${{ needs.verify-bootstrap.outputs.environment }}
          IMAGE_TAG: ${{ needs.verify-bootstrap.outputs.image_tag }}
          DEPLOY_SUCCESS: ${{ needs.sync-and-monitor.outputs.deploy_success }}
        run: |
          if [ "$DEPLOY_SUCCESS" = "true" ]; then
            STATUS="✅ SUCCESS"
            EMOJI="🎉"
          else
            STATUS="⚠️ TIMEOUT/PENDING"
            EMOJI="⏳"
          fi

          cat << EOF >> $GITHUB_STEP_SUMMARY
          # ${EMOJI} Deployment Summary: ${{ env.APP_NAME }}

          ## Status: ${STATUS}

          | Stage | Status |
          |-------|--------|
          | Bootstrap Verified | ${{ needs.verify-bootstrap.result == 'success' && '✅' || '❌' }} |
          | Security Scan | ${{ needs.security-scan.result == 'success' && '✅' || '⚠️ (warnings)' }} |
          | Build & Push | ${{ needs.build-push.result == 'success' && '✅' || '❌' }} |
          | Update Manifests | ${{ needs.update-manifests.result == 'success' && '✅' || '❌' }} |
          | Deploy | ${STATUS} |

          ## Details
          | Field | Value |
          |-------|-------|
          | **Environment** | \`${ENVIRONMENT}\` |
          | **Image Tag** | \`${IMAGE_TAG}\` |
          | **Namespace** | \`${{ env.TENANT }}-${{ env.APP_NAME }}-${ENVIRONMENT}\` |

          ## URL
          \`https://${{ env.TENANT }}-${{ env.APP_NAME }}-${ENVIRONMENT}.agent.opsera.dev\`

          ---
          *Generated by Code-to-Cloud Enterprise v1.7.3*
          EOF

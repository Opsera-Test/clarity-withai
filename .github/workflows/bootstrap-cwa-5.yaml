# ════════════════════════════════════════════════════════════════════════════
# BOOTSTRAP WORKFLOW - One-time Infrastructure Setup
# RULE 103: Spoke registration ONLY happens here (not in CI/CD)
# Generated by Code-to-Cloud Enterprise v1.7.3
# ════════════════════════════════════════════════════════════════════════════

name: "🚀 cwa-5: Bootstrap Infrastructure"

on:
  workflow_dispatch:
    inputs:
      proceed:
        description: '☑️ I confirm bootstrap setup'
        type: boolean
        default: false
        required: true

env:
  APP_NAME: cwa-5
  TENANT: opsera
  AWS_REGION: us-west-2
  REGION_SHORT: usw2
  EKS_HUB_CLUSTER: argocd-usw2
  EKS_SPOKE_CLUSTER: opsera-usw2-np
  ENVIRONMENT: dev

permissions:
  contents: write
  id-token: write

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # VALIDATION
  # ════════════════════════════════════════════════════════════════════════════
  validate:
    name: "✅ Validate Prerequisites"
    runs-on: ubuntu-latest
    if: inputs.proceed == true
    outputs:
      repo_url: ${{ steps.repo.outputs.url }}
      ecr_uri: ${{ steps.ecr.outputs.uri }}
      account_id: ${{ steps.account.outputs.id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Repository URL
        id: repo
        run: |
          REPO_URL="https://github.com/${{ github.repository }}.git"
          echo "url=${REPO_URL}" >> $GITHUB_OUTPUT
          echo "### Repository" >> $GITHUB_STEP_SUMMARY
          echo "URL: \`${REPO_URL}\`" >> $GITHUB_STEP_SUMMARY

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # RULE 7: Get AWS Account ID dynamically
      - name: Get AWS Account ID
        id: account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "id=${ACCOUNT_ID}" >> $GITHUB_OUTPUT
          echo "AWS Account: \`${ACCOUNT_ID}\`" >> $GITHUB_STEP_SUMMARY

      - name: Calculate ECR URI
        id: ecr
        run: |
          ACCOUNT_ID="${{ steps.account.outputs.id }}"
          ECR_URI="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          echo "uri=${ECR_URI}" >> $GITHUB_OUTPUT
          echo "ECR URI: \`${ECR_URI}\`" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # CREATE ECR REPOSITORY
  # ════════════════════════════════════════════════════════════════════════════
  create-ecr:
    name: "📦 Create ECR Repository"
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # RULE 101: ECR repository uses tenant/app pattern
      - name: Create ECR Repository
        run: |
          REPO_NAME="${{ env.TENANT }}/${{ env.APP_NAME }}"
          
          echo "### ECR Repository" >> $GITHUB_STEP_SUMMARY
          
          if aws ecr describe-repositories --repository-names "${REPO_NAME}" 2>/dev/null; then
            echo "✅ ECR repository already exists: \`${REPO_NAME}\`" >> $GITHUB_STEP_SUMMARY
          else
            aws ecr create-repository \
              --repository-name "${REPO_NAME}" \
              --image-scanning-configuration scanOnPush=true \
              --encryption-configuration encryptionType=AES256 \
              --tags Key=tenant,Value=${{ env.TENANT }} Key=app,Value=${{ env.APP_NAME }}
            echo "✅ Created ECR repository: \`${REPO_NAME}\`" >> $GITHUB_STEP_SUMMARY
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # VERIFY SPOKE CLUSTER
  # ════════════════════════════════════════════════════════════════════════════
  verify-spoke:
    name: "🔍 Verify Spoke Cluster"
    runs-on: ubuntu-latest
    needs: [validate]
    outputs:
      spoke_exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # RULE 90: Verify infrastructure via direct API, not metadata
      - name: Check Spoke Cluster Exists
        id: check
        run: |
          echo "### Spoke Cluster Verification" >> $GITHUB_STEP_SUMMARY
          
          if aws eks describe-cluster --name ${{ env.EKS_SPOKE_CLUSTER }} 2>/dev/null; then
            echo "✅ Spoke cluster exists: \`${{ env.EKS_SPOKE_CLUSTER }}\`" >> $GITHUB_STEP_SUMMARY
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Spoke cluster NOT found: \`${{ env.EKS_SPOKE_CLUSTER }}\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Action Required:** Create the spoke cluster first, or verify cluster name." >> $GITHUB_STEP_SUMMARY
            echo "exists=false" >> $GITHUB_OUTPUT
            exit 1
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # UPDATE MANIFESTS
  # ════════════════════════════════════════════════════════════════════════════
  update-manifests:
    name: "📝 Update Manifests"
    runs-on: ubuntu-latest
    needs: [validate, create-ecr, verify-spoke]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # RULE 58: Resolve ALL placeholder variables before commit
      - name: Update Kustomization with ECR URI
        run: |
          ECR_URI="${{ needs.validate.outputs.ecr_uri }}"
          
          # Update dev overlay
          sed -i "s|PLACEHOLDER_ECR_URI|${ECR_URI}|g" \
            .opsera-${{ env.APP_NAME }}/k8s/overlays/dev/kustomization.yaml
          
          echo "### Kustomization Updated" >> $GITHUB_STEP_SUMMARY
          echo "ECR URI: \`${ECR_URI}\`" >> $GITHUB_STEP_SUMMARY

      - name: Update ArgoCD Application with Repo URL
        run: |
          REPO_URL="${{ needs.validate.outputs.repo_url }}"
          
          # Update ArgoCD application
          sed -i "s|PLACEHOLDER_REPO_URL|${REPO_URL}|g" \
            .opsera-${{ env.APP_NAME }}/argocd/dev/application.yaml
          
          echo "### ArgoCD Application Updated" >> $GITHUB_STEP_SUMMARY
          echo "Repo URL: \`${REPO_URL}\`" >> $GITHUB_STEP_SUMMARY

      - name: Commit Changes
        run: |
          git add .opsera-${{ env.APP_NAME }}/
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: Bootstrap ${{ env.APP_NAME }} infrastructure [skip ci]

- Updated ECR URI in kustomization
- Updated repo URL in ArgoCD application
- Environment: ${{ env.ENVIRONMENT }}

Co-Authored-By: Opsera Code-to-Cloud <noreply@opsera.io>"
            
            git pull --rebase origin main
            git push origin main
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # CREATE ARGOCD REPO SECRET
  # ════════════════════════════════════════════════════════════════════════════
  create-argocd-secret:
    name: "🔐 Create ArgoCD Repo Secret"
    runs-on: ubuntu-latest
    needs: [validate, update-manifests]
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for Hub Cluster
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      # RULE 63: Create ArgoCD repository secret with GH_PAT
      - name: Create Repository Secret
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          REPO_URL: ${{ needs.validate.outputs.repo_url }}
        run: |
          SECRET_NAME="repo-${{ env.APP_NAME }}"
          
          echo "### ArgoCD Repository Secret" >> $GITHUB_STEP_SUMMARY
          
          if kubectl get secret "${SECRET_NAME}" -n argocd 2>/dev/null; then
            echo "✅ Repository secret already exists: \`${SECRET_NAME}\`" >> $GITHUB_STEP_SUMMARY
          else
            kubectl create secret generic "${SECRET_NAME}" -n argocd \
              --from-literal=type=git \
              --from-literal=url="${REPO_URL}" \
              --from-literal=username=git \
              --from-literal=password="${GH_PAT}"
            
            kubectl label secret "${SECRET_NAME}" -n argocd \
              argocd.argoproj.io/secret-type=repository
            
            echo "✅ Created repository secret: \`${SECRET_NAME}\`" >> $GITHUB_STEP_SUMMARY
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # APPLY ARGOCD APPLICATION
  # ════════════════════════════════════════════════════════════════════════════
  apply-argocd-app:
    name: "🚀 Apply ArgoCD Application"
    runs-on: ubuntu-latest
    needs: [update-manifests, create-argocd-secret]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main  # Get latest changes after manifest update

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for Hub Cluster
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Apply ArgoCD Application
        run: |
          echo "### ArgoCD Application" >> $GITHUB_STEP_SUMMARY
          
          kubectl apply -f .opsera-${{ env.APP_NAME }}/argocd/dev/application.yaml
          
          echo "✅ Applied ArgoCD application: \`${{ env.APP_NAME }}-dev\`" >> $GITHUB_STEP_SUMMARY

      - name: Verify Application Created
        run: |
          sleep 5
          kubectl get application ${{ env.APP_NAME }}-dev -n argocd -o wide
          
          SYNC_STATUS=$(kubectl get application ${{ env.APP_NAME }}-dev -n argocd \
            -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "Unknown")
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Sync Status:** \`${SYNC_STATUS}\`" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # SUMMARY
  # ════════════════════════════════════════════════════════════════════════════
  summary:
    name: "📋 Bootstrap Summary"
    runs-on: ubuntu-latest
    needs: [validate, create-ecr, verify-spoke, update-manifests, create-argocd-secret, apply-argocd-app]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          cat << 'EOF' >> $GITHUB_STEP_SUMMARY
          # 🎉 Bootstrap Complete
          
          ## Configuration
          | Setting | Value |
          |---------|-------|
          | **App Name** | `${{ env.APP_NAME }}` |
          | **Tenant** | `${{ env.TENANT }}` |
          | **Environment** | `${{ env.ENVIRONMENT }}` |
          | **Region** | `${{ env.AWS_REGION }}` |
          | **Spoke Cluster** | `${{ env.EKS_SPOKE_CLUSTER }}` |
          | **Hub Cluster** | `${{ env.EKS_HUB_CLUSTER }}` |
          
          ## Next Steps
          
          1. **Trigger CI/CD Pipeline:**
             ```bash
             git push origin main
             ```
             Or manually trigger:
             ```bash
             gh workflow run "ci-build-push-cwa-5.yaml"
             ```
          
          2. **Monitor Deployment:**
             ```bash
             gh workflow run "diagnostics-cwa-5.yaml" -f environment=dev
             ```
          
          3. **Access Application:**
             - URL: `https://opsera-cwa-5-dev.agent.opsera.dev`
             - (Available after first successful deployment)
          
          ## Required Secrets
          Ensure these secrets are configured in your repository:
          - ✅ `AWS_ACCESS_KEY_ID`
          - ✅ `AWS_SECRET_ACCESS_KEY`
          - ✅ `GH_PAT` (for ArgoCD repo access)
          EOF

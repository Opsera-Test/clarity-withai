# ════════════════════════════════════════════════════════════════════════════
# CI/CD WORKFLOW - Build, Push, and Deploy
# Generated by Code-to-Cloud Enterprise v1.7.3
# ════════════════════════════════════════════════════════════════════════════

name: "🔄 cwa-5: CI Build & Push"

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'vite.config.ts'
      - 'tailwind.config.ts'
      - '.opsera-cwa-5/Dockerfile'
      - '.opsera-cwa-5/nginx.conf'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        options: [dev]
        default: 'dev'

env:
  APP_NAME: cwa-5
  TENANT: opsera
  AWS_REGION: us-west-2
  EKS_SPOKE_CLUSTER: opsera-usw2-np
  EKS_HUB_CLUSTER: argocd-usw2

# Prevent duplicate runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # VERIFY BOOTSTRAP
  # ════════════════════════════════════════════════════════════════════════════
  verify-bootstrap:
    name: "🔍 Verify Bootstrap"
    runs-on: ubuntu-latest
    outputs:
      ecr_uri: ${{ steps.ecr.outputs.uri }}
      account_id: ${{ steps.account.outputs.id }}
      image_tag: ${{ steps.tag.outputs.value }}
      environment: ${{ steps.env.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine Environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "value=dev" >> $GITHUB_OUTPUT
          else
            echo "value=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # RULE 7: Get AWS Account ID dynamically
      - name: Get AWS Account ID
        id: account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "id=${ACCOUNT_ID}" >> $GITHUB_OUTPUT

      - name: Calculate ECR URI
        id: ecr
        run: |
          ECR_URI="${{ steps.account.outputs.id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          echo "uri=${ECR_URI}" >> $GITHUB_OUTPUT

      - name: Generate Image Tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          IMAGE_TAG="${SHORT_SHA}-${TIMESTAMP}"
          echo "value=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "### Image Tag" >> $GITHUB_STEP_SUMMARY
          echo "\`${IMAGE_TAG}\`" >> $GITHUB_STEP_SUMMARY

      # RULE 10: Verify ECR repository exists
      - name: Verify ECR Repository
        run: |
          REPO_NAME="${{ env.TENANT }}/${{ env.APP_NAME }}"
          
          if ! aws ecr describe-repositories --repository-names "${REPO_NAME}" 2>/dev/null; then
            echo "❌ ECR repository not found: ${REPO_NAME}"
            echo "Run bootstrap workflow first: gh workflow run bootstrap-cwa-5.yaml -f proceed=true"
            exit 1
          fi
          
          echo "✅ ECR repository exists: ${REPO_NAME}" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # SECURITY SCANNING
  # ════════════════════════════════════════════════════════════════════════════
  security-scan:
    name: "🔐 Security Scan"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for Gitleaks

      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true  # Warn mode
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Grype SCA Scan
        uses: anchore/scan-action@v3
        continue-on-error: true  # Warn mode
        with:
          path: "."
          fail-build: false

  # ════════════════════════════════════════════════════════════════════════════
  # BUILD AND PUSH
  # ════════════════════════════════════════════════════════════════════════════
  build-and-push:
    name: "🏗️ Build & Push"
    runs-on: ubuntu-latest
    needs: [verify-bootstrap, security-scan]
    # RULE 42: Run even if security-scan is skipped
    if: always() && needs.verify-bootstrap.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        env:
          ECR_URI: ${{ needs.verify-bootstrap.outputs.ecr_uri }}
          IMAGE_TAG: ${{ needs.verify-bootstrap.outputs.image_tag }}
        run: |
          FULL_IMAGE="${ECR_URI}/${{ env.TENANT }}/${{ env.APP_NAME }}:${IMAGE_TAG}"
          LATEST_IMAGE="${ECR_URI}/${{ env.TENANT }}/${{ env.APP_NAME }}:latest"
          
          echo "### Building Image" >> $GITHUB_STEP_SUMMARY
          echo "Tag: \`${IMAGE_TAG}\`" >> $GITHUB_STEP_SUMMARY
          
          # Build using Dockerfile in .opsera-cwa-5/
          docker build \
            -f .opsera-${{ env.APP_NAME }}/Dockerfile \
            -t "${FULL_IMAGE}" \
            -t "${LATEST_IMAGE}" \
            .
          
          # Push both tags
          docker push "${FULL_IMAGE}"
          docker push "${LATEST_IMAGE}"
          
          echo "✅ Pushed: \`${FULL_IMAGE}\`" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # UPDATE MANIFESTS
  # ════════════════════════════════════════════════════════════════════════════
  update-manifests:
    name: "📝 Update Manifests"
    runs-on: ubuntu-latest
    needs: [verify-bootstrap, build-and-push]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # RULE 8: Git pull BEFORE modifying files
      - name: Pull Latest Changes
        run: git pull --rebase origin main

      - name: Update Kustomization Image Tag
        env:
          IMAGE_TAG: ${{ needs.verify-bootstrap.outputs.image_tag }}
          ENVIRONMENT: ${{ needs.verify-bootstrap.outputs.environment }}
        run: |
          KUSTOMIZATION_FILE=".opsera-${{ env.APP_NAME }}/k8s/overlays/${ENVIRONMENT}/kustomization.yaml"
          
          # Update the image tag
          sed -i "s/newTag: .*/newTag: ${IMAGE_TAG}/" "${KUSTOMIZATION_FILE}"
          
          echo "### Kustomization Updated" >> $GITHUB_STEP_SUMMARY
          echo "Environment: \`${ENVIRONMENT}\`" >> $GITHUB_STEP_SUMMARY
          echo "Image Tag: \`${IMAGE_TAG}\`" >> $GITHUB_STEP_SUMMARY

      - name: Commit and Push
        env:
          IMAGE_TAG: ${{ needs.verify-bootstrap.outputs.image_tag }}
          ENVIRONMENT: ${{ needs.verify-bootstrap.outputs.environment }}
        run: |
          git add .opsera-${{ env.APP_NAME }}/k8s/overlays/${ENVIRONMENT}/kustomization.yaml
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "deploy: Update ${ENVIRONMENT} to ${IMAGE_TAG} [skip ci]

Environment: ${ENVIRONMENT}
Image: ${IMAGE_TAG}
Triggered by: ${{ github.actor }}

Co-Authored-By: Opsera Code-to-Cloud <noreply@opsera.io>"
            
            git push origin main
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # SYNC AND MONITOR
  # ════════════════════════════════════════════════════════════════════════════
  sync-and-monitor:
    name: "🔄 Sync & Monitor"
    runs-on: ubuntu-latest
    needs: [verify-bootstrap, update-manifests]
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for Hub Cluster
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      # RULE 66: Force ArgoCD sync (don't rely on auto-sync)
      - name: Force ArgoCD Sync
        env:
          ENVIRONMENT: ${{ needs.verify-bootstrap.outputs.environment }}
        run: |
          APP_NAME="${{ env.APP_NAME }}-${ENVIRONMENT}"
          
          echo "### ArgoCD Sync" >> $GITHUB_STEP_SUMMARY
          
          # Force hard refresh
          kubectl annotate application ${APP_NAME} -n argocd \
            argocd.argoproj.io/refresh=hard --overwrite || true
          
          echo "✅ Triggered sync for: \`${APP_NAME}\`" >> $GITHUB_STEP_SUMMARY

      - name: Wait for Sync
        env:
          ENVIRONMENT: ${{ needs.verify-bootstrap.outputs.environment }}
        run: |
          APP_NAME="${{ env.APP_NAME }}-${ENVIRONMENT}"
          TIMEOUT=120
          ELAPSED=0
          
          echo "Waiting for ArgoCD sync..."
          
          while [ $ELAPSED -lt $TIMEOUT ]; do
            SYNC_STATUS=$(kubectl get application ${APP_NAME} -n argocd \
              -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "Unknown")
            
            HEALTH_STATUS=$(kubectl get application ${APP_NAME} -n argocd \
              -o jsonpath='{.status.health.status}' 2>/dev/null || echo "Unknown")
            
            echo "Sync: ${SYNC_STATUS}, Health: ${HEALTH_STATUS}"
            
            if [ "$SYNC_STATUS" = "Synced" ] && [ "$HEALTH_STATUS" = "Healthy" ]; then
              echo "✅ Application synced and healthy!" >> $GITHUB_STEP_SUMMARY
              exit 0
            fi
            
            sleep 10
            ELAPSED=$((ELAPSED + 10))
          done
          
          echo "⚠️ Sync timeout - check ArgoCD for details" >> $GITHUB_STEP_SUMMARY
          # Don't fail - deployment may still complete

  # ════════════════════════════════════════════════════════════════════════════
  # SUMMARY
  # ════════════════════════════════════════════════════════════════════════════
  summary:
    name: "📋 Deployment Summary"
    runs-on: ubuntu-latest
    needs: [verify-bootstrap, build-and-push, update-manifests, sync-and-monitor]
    if: always()
    steps:
      - name: Generate Summary
        env:
          IMAGE_TAG: ${{ needs.verify-bootstrap.outputs.image_tag }}
          ENVIRONMENT: ${{ needs.verify-bootstrap.outputs.environment }}
        run: |
          cat << EOF >> $GITHUB_STEP_SUMMARY
          # 🎉 Deployment Complete
          
          ## Details
          | Field | Value |
          |-------|-------|
          | **Application** | \`${{ env.APP_NAME }}\` |
          | **Environment** | \`${ENVIRONMENT}\` |
          | **Image Tag** | \`${IMAGE_TAG}\` |
          | **Triggered By** | ${{ github.actor }} |
          
          ## Application URL
          🌐 https://opsera-${{ env.APP_NAME }}-${ENVIRONMENT}.agent.opsera.dev
          
          ## Verify Deployment
          \`\`\`bash
          gh workflow run "diagnostics-cwa-5.yaml" -f environment=${ENVIRONMENT}
          \`\`\`
          EOF

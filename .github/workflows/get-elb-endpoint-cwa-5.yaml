# ════════════════════════════════════════════════════════════════════════════
# GET ELB ENDPOINT - Retrieve Load Balancer endpoint for cwa-5
# ════════════════════════════════════════════════════════════════════════════

name: "🌐 cwa-5: Get ELB Endpoint"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        options: [dev]
        default: dev
      force_sync:
        description: 'Force ArgoCD sync before checking'
        type: boolean
        default: true

env:
  APP_NAME: cwa-5
  TENANT: opsera
  AWS_REGION: us-west-2
  EKS_SPOKE_CLUSTER: opsera-usw2-np
  EKS_HUB_CLUSTER: argocd-usw2

permissions:
  contents: read
  id-token: write

jobs:
  get-elb-endpoint:
    name: "🌐 Get ELB Endpoint"
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for Hub Cluster
        if: inputs.force_sync
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Force ArgoCD Sync
        if: inputs.force_sync
        run: |
          APP_NAME="${{ env.APP_NAME }}-${{ inputs.environment }}"
          
          echo "### 🔄 Forcing ArgoCD Sync" >> $GITHUB_STEP_SUMMARY
          
          kubectl annotate application ${APP_NAME} -n argocd \
            argocd.argoproj.io/refresh=hard --overwrite || true
          
          echo "✅ Sync triggered for: \`${APP_NAME}\`" >> $GITHUB_STEP_SUMMARY
          
          # Wait for sync to complete
          echo "Waiting for sync..."
          sleep 30

      - name: Configure kubectl for Spoke Cluster
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Wait for LoadBalancer Provisioning
        id: wait-lb
        run: |
          NAMESPACE="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ inputs.environment }}"
          SERVICE_NAME="${{ env.APP_NAME }}"
          MAX_ATTEMPTS=30
          ATTEMPT=0
          
          echo "### ⏳ Waiting for Load Balancer" >> $GITHUB_STEP_SUMMARY
          echo "Namespace: \`${NAMESPACE}\`" >> $GITHUB_STEP_SUMMARY
          echo "Service: \`${SERVICE_NAME}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            
            # Try to get hostname (AWS NLB)
            LB_HOSTNAME=$(kubectl get svc ${SERVICE_NAME} -n ${NAMESPACE} \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")
            
            # If no hostname, try IP (fallback)
            if [ -z "$LB_HOSTNAME" ]; then
              LB_HOSTNAME=$(kubectl get svc ${SERVICE_NAME} -n ${NAMESPACE} \
                -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "")
            fi
            
            if [ -n "$LB_HOSTNAME" ] && [ "$LB_HOSTNAME" != "null" ]; then
              echo "lb_hostname=${LB_HOSTNAME}" >> $GITHUB_OUTPUT
              echo "✅ Load Balancer provisioned!" >> $GITHUB_STEP_SUMMARY
              break
            fi
            
            echo "Attempt ${ATTEMPT}/${MAX_ATTEMPTS} - LoadBalancer not ready yet..."
            sleep 10
          done
          
          if [ -z "$LB_HOSTNAME" ] || [ "$LB_HOSTNAME" = "null" ]; then
            echo "❌ LoadBalancer not provisioned after ${MAX_ATTEMPTS} attempts" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Service Status:**" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            kubectl get svc ${SERVICE_NAME} -n ${NAMESPACE} -o yaml >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Display ELB Endpoint
        env:
          LB_HOSTNAME: ${{ steps.wait-lb.outputs.lb_hostname }}
        run: |
          NAMESPACE="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ inputs.environment }}"
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# 🎉 ELB Endpoint Ready" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Application URL" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### HTTP Endpoint:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "http://${LB_HOSTNAME}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Full Hostname:" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${LB_HOSTNAME}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Get service details
          echo "## Service Details" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get svc ${{ env.APP_NAME }} -n ${NAMESPACE} -o wide >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          # Get pod status
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Pod Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n ${NAMESPACE} -o wide >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Health Check
        env:
          LB_HOSTNAME: ${{ steps.wait-lb.outputs.lb_hostname }}
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Health Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Wait a bit for DNS propagation
          sleep 10
          
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "http://${LB_HOSTNAME}" 2>/dev/null || echo "000")
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Application is accessible: HTTP ${HTTP_CODE}" >> $GITHUB_STEP_SUMMARY
          elif [ "$HTTP_CODE" = "000" ]; then
            echo "⚠️ Connection timeout - NLB may still be initializing" >> $GITHUB_STEP_SUMMARY
            echo "Try again in 2-3 minutes: \`curl http://${LB_HOSTNAME}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ HTTP ${HTTP_CODE} - Application may not be ready" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Copy this URL:**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "http://${LB_HOSTNAME}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY

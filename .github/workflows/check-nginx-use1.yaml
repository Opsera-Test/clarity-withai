# Check NGINX Ingress Controller status on us-east-1 cluster
name: "🔍 us-east-1: Check NGINX & ELB"

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  CLUSTER_NAME: opsera-use1-np

jobs:
  check-cluster:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region ${{ env.AWS_REGION }}
          echo "✅ Connected to cluster: ${{ env.CLUSTER_NAME }}"

      - name: Check cluster info
        run: |
          echo "=== Cluster Info ==="
          kubectl cluster-info
          
          echo ""
          echo "=== Nodes ==="
          kubectl get nodes

      - name: Check NGINX Ingress Controller
        run: |
          echo "=== Checking ingress-nginx namespace ==="
          kubectl get namespace ingress-nginx 2>/dev/null && echo "✅ Namespace exists" || echo "❌ Namespace not found"
          
          echo ""
          echo "=== NGINX Ingress Controller Pods ==="
          kubectl get pods -n ingress-nginx 2>/dev/null || echo "No pods in ingress-nginx namespace"
          
          echo ""
          echo "=== NGINX Ingress Controller Service ==="
          kubectl get svc -n ingress-nginx 2>/dev/null || echo "No services in ingress-nginx namespace"

      - name: Check Load Balancers
        run: |
          echo "=== All LoadBalancer Services ==="
          kubectl get svc -A --field-selector spec.type=LoadBalancer
          
          echo ""
          echo "=== ELBs in AWS ==="
          aws elbv2 describe-load-balancers --query 'LoadBalancers[*].[LoadBalancerName,DNSName,State.Code]' --output table 2>/dev/null || \
          aws elb describe-load-balancers --query 'LoadBalancerDescriptions[*].[LoadBalancerName,DNSName]' --output table 2>/dev/null || \
          echo "Could not list ELBs"

      - name: Check Ingress Classes
        run: |
          echo "=== Ingress Classes ==="
          kubectl get ingressclass 2>/dev/null || echo "No ingress classes found"

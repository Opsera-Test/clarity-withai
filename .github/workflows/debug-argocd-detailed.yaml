name: "🔍 Debug ArgoCD Detailed"

on:
  workflow_dispatch:

env:
  APP_NAME: 1cwa
  AWS_REGION: us-west-2
  HUB_CLUSTER: argocd-usw2
  SPOKE_CLUSTER: opsera-usw2-np

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for Hub
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: List All Registered Cluster Names (Decoded)
        run: |
          echo "### 🌐 All Registered Clusters in ArgoCD"
          echo ""
          for secret in $(kubectl get secrets -n argocd -l argocd.argoproj.io/secret-type=cluster -o jsonpath='{.items[*].metadata.name}'); do
            CLUSTER_NAME=$(kubectl get secret $secret -n argocd -o jsonpath='{.data.name}' | base64 -d)
            CLUSTER_SERVER=$(kubectl get secret $secret -n argocd -o jsonpath='{.data.server}' | base64 -d)
            echo "Secret: $secret"
            echo "  Cluster Name: $CLUSTER_NAME"
            echo "  Server: $CLUSTER_SERVER"
            echo ""
          done

      - name: Check Application Destination Match
        run: |
          echo "### 📊 Application Destination Configuration"
          echo ""
          DEST_NAME=$(kubectl get application ${{ env.APP_NAME }}-dev -n argocd -o jsonpath='{.spec.destination.name}')
          DEST_NS=$(kubectl get application ${{ env.APP_NAME }}-dev -n argocd -o jsonpath='{.spec.destination.namespace}')
          echo "Application destination.name: $DEST_NAME"
          echo "Application destination.namespace: $DEST_NS"
          echo ""
          
          # Check if cluster with this name exists
          FOUND="false"
          for secret in $(kubectl get secrets -n argocd -l argocd.argoproj.io/secret-type=cluster -o jsonpath='{.items[*].metadata.name}'); do
            CLUSTER_NAME=$(kubectl get secret $secret -n argocd -o jsonpath='{.data.name}' | base64 -d)
            if [ "$CLUSTER_NAME" = "$DEST_NAME" ]; then
              echo "✅ MATCH FOUND: Cluster '$CLUSTER_NAME' matches destination"
              FOUND="true"
              break
            fi
          done
          
          if [ "$FOUND" = "false" ]; then
            echo "❌ NO MATCH: No cluster with name '$DEST_NAME' found!"
            echo "Available cluster names:"
            for secret in $(kubectl get secrets -n argocd -l argocd.argoproj.io/secret-type=cluster -o jsonpath='{.items[*].metadata.name}'); do
              CLUSTER_NAME=$(kubectl get secret $secret -n argocd -o jsonpath='{.data.name}' | base64 -d)
              echo "  - $CLUSTER_NAME"
            done
          fi

      - name: Check Application Sync Status and Errors
        run: |
          echo ""
          echo "### ⚠️ Application Status Details"
          echo ""
          kubectl get application ${{ env.APP_NAME }}-dev -n argocd -o jsonpath='{.status}' | jq .
          
      - name: Check Application Conditions
        run: |
          echo ""
          echo "### 🔴 Application Conditions (Errors)"
          echo ""
          kubectl get application ${{ env.APP_NAME }}-dev -n argocd -o jsonpath='{.status.conditions}' | jq . || echo "No conditions found"

      - name: Check Source Repo Status
        run: |
          echo ""
          echo "### 📁 Source Repository Status"
          echo ""
          REPO_URL=$(kubectl get application ${{ env.APP_NAME }}-dev -n argocd -o jsonpath='{.spec.source.repoURL}')
          REPO_PATH=$(kubectl get application ${{ env.APP_NAME }}-dev -n argocd -o jsonpath='{.spec.source.path}')
          echo "Repo URL: $REPO_URL"
          echo "Path: $REPO_PATH"
          echo ""
          kubectl get application ${{ env.APP_NAME }}-dev -n argocd -o jsonpath='{.status.sourceType}'
          echo ""

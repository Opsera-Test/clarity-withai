# ════════════════════════════════════════════════════════════════
# CI/CD Pipeline - cwa-test-4 - QA (Canary via Argo Rollouts)
# Promotes an existing image from dev — no rebuild
# Trigger: workflow_dispatch with image_tag input
# ════════════════════════════════════════════════════════════════

name: "CI/CD: cwa-test-4 - QA (Canary)"

concurrency:
  group: cicd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to promote from dev (e.g. abc1234-20260224120000)"
        required: true
        type: string

env:
  APP_NAME: cwa-test-4
  TENANT: opsera
  ENV: qa
  AWS_REGION: us-west-2
  HUB_CLUSTER: argocd-usw2
  SPOKE_CLUSTER: opsera-usw2-np
  NAMESPACE: opsera-cwa-test-4-qa
  ECR_REPO_NAME: opsera/cwa-test-4
  ARGOCD_APP_NAME: opsera-cwa-test-4-qa

jobs:

  # ── Stage 1: Verify Image Exists in ECR ───────────────────────
  verify-image:
    name: "✅ Verify Image in ECR"
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check Image Exists
        run: |
          IMAGE_TAG=${{ inputs.image_tag }}
          if aws ecr describe-images \
            --repository-name "${ECR_REPO_NAME}" \
            --image-ids imageTag="${IMAGE_TAG}" \
            --region ${AWS_REGION} 2>/dev/null; then
            echo "✓ Image found: ${ECR_REPO_NAME}:${IMAGE_TAG}"
          else
            echo "❌ Image not found: ${ECR_REPO_NAME}:${IMAGE_TAG}"
            echo "   Run dev CI/CD first to build and push the image"
            exit 1
          fi

  # ── Stage 2: Update QA Manifests ──────────────────────────────
  update-manifests:
    name: "📝 Update QA Manifests"
    runs-on: ubuntu-latest
    needs: [verify-image]
    permissions:
      contents: write
      id-token: write
    outputs:
      ecr_uri: ${{ steps.set-ecr.outputs.ecr_uri }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set ECR URI
        id: set-ecr
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO_NAME}"
          echo "ecr_uri=${ECR_URI}" >> $GITHUB_OUTPUT

      - name: Update QA Kustomize Image Tag
        run: |
          IMAGE_TAG=${{ inputs.image_tag }}
          ECR_URI=${{ steps.set-ecr.outputs.ecr_uri }}
          KUSTOMIZE_FILE=".opsera-cwa-test-4/k8s/overlays/qa/kustomization.yaml"

          sed -i "s|newName:.*|newName: ${ECR_URI}|g" ${KUSTOMIZE_FILE}
          sed -i "s|newTag:.*|newTag: ${IMAGE_TAG}|g" ${KUSTOMIZE_FILE}

          echo "✓ Updated QA kustomization with ${IMAGE_TAG}"

      - name: Commit and Push with Retry
        run: |
          IMAGE_TAG=${{ inputs.image_tag }}

          if git diff --quiet && git diff --cached --quiet; then
            echo "✓ No changes to commit"
            exit 0
          fi

          git add -A
          git commit -m "chore: promote image ${IMAGE_TAG} to qa [skip ci]"

          for i in {1..3}; do
            if git push origin ${{ github.ref_name }}; then
              echo "✅ Pushed successfully"
              exit 0
            fi
            git pull --rebase origin ${{ github.ref_name }}
            sleep 2
          done
          exit 1

  # ── Stage 3: Create/Update ArgoCD App ─────────────────────────
  create-argocd-app:
    name: "🚀 Create ArgoCD Application"
    runs-on: ubuntu-latest
    needs: [update-manifests]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Hub Access
        run: aws eks update-kubeconfig --name ${HUB_CLUSTER} --region ${AWS_REGION} --alias hub

      - name: Apply ArgoCD Application
        run: |
          git pull --rebase origin ${{ github.ref_name }} 2>/dev/null || true
          kubectl --context hub apply -f .opsera-cwa-test-4/argocd/qa/application.yaml
          echo "✓ ArgoCD QA application applied"

  # ── Stage 4: Refresh ECR Secret ───────────────────────────────
  refresh-ecr-secret:
    name: "🔑 Refresh ECR Secret"
    runs-on: ubuntu-latest
    needs: [create-argocd-app]
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Spoke Access
        run: aws eks update-kubeconfig --name ${SPOKE_CLUSTER} --region ${AWS_REGION} --alias spoke

      - name: Refresh ECR Pull Secret
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          ECR_PASSWORD=$(aws ecr get-login-password --region ${AWS_REGION})

          kubectl --context spoke create secret docker-registry ecr-pull-secret \
            --docker-server="${ECR_REGISTRY}" \
            --docker-username=AWS \
            --docker-password="${ECR_PASSWORD}" \
            --namespace=${NAMESPACE} \
            --dry-run=client -o yaml | kubectl --context spoke apply -f -

          echo "✓ ECR pull secret refreshed in ${NAMESPACE}"

  # ── Stage 5: Sync ArgoCD ──────────────────────────────────────
  sync-and-deploy:
    name: "🔄 Sync ArgoCD QA"
    runs-on: ubuntu-latest
    needs: [refresh-ecr-secret]
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Hub Access
        run: aws eks update-kubeconfig --name ${HUB_CLUSTER} --region ${AWS_REGION} --alias hub

      - name: Hard Refresh and Sync
        run: |
          kubectl --context hub annotate application ${ARGOCD_APP_NAME} \
            -n argocd argocd.argoproj.io/refresh=hard --overwrite
          sleep 10
          kubectl --context hub patch application ${ARGOCD_APP_NAME} \
            -n argocd --type merge \
            -p '{"operation":{"initiatedBy":{"username":"github-actions"},"sync":{"syncStrategy":{"hook":{"force":true}},"prune":true}}}'

      - name: Wait for ArgoCD Sync
        run: |
          TIMEOUT=180; ELAPSED=0; INTERVAL=15
          while [ $ELAPSED -lt $TIMEOUT ]; do
            SYNC=$(kubectl --context hub get application ${ARGOCD_APP_NAME} \
              -n argocd -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "Unknown")
            echo "  ArgoCD Sync: ${SYNC} | ${ELAPSED}s"
            [ "${SYNC}" = "Synced" ] && echo "✓ Synced" && break
            sleep ${INTERVAL}; ELAPSED=$((ELAPSED + INTERVAL))
          done

  # ── Stage 6: Monitor Canary Rollout ───────────────────────────
  monitor-canary:
    name: "🐦 Monitor Canary Rollout"
    runs-on: ubuntu-latest
    needs: [sync-and-deploy]
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Spoke Access
        run: aws eks update-kubeconfig --name ${SPOKE_CLUSTER} --region ${AWS_REGION} --alias spoke

      - name: Wait for Canary Rollout
        run: |
          echo "Monitoring canary rollout (steps: 20% → 50% → 100%, ~10min with analysis)..."
          TIMEOUT=900; ELAPSED=0; INTERVAL=20
          while [ $ELAPSED -lt $TIMEOUT ]; do
            PHASE=$(kubectl --context spoke get rollout ${APP_NAME} \
              -n ${NAMESPACE} -o jsonpath='{.status.phase}' 2>/dev/null || echo "Unknown")
            CURRENT_STEP=$(kubectl --context spoke get rollout ${APP_NAME} \
              -n ${NAMESPACE} -o jsonpath='{.status.currentStepIndex}' 2>/dev/null || echo "?")
            echo "  Phase: ${PHASE} | Step: ${CURRENT_STEP} | ${ELAPSED}s"
            if [ "${PHASE}" = "Healthy" ]; then
              echo "✅ Canary rollout complete — 100% traffic promoted"
              break
            elif [ "${PHASE}" = "Degraded" ] || [ "${PHASE}" = "Error" ]; then
              echo "❌ Canary rollout FAILED: ${PHASE}"
              kubectl --context spoke get rollout ${APP_NAME} -n ${NAMESPACE} -o yaml | grep -A 20 "status:"
              exit 1
            fi
            sleep ${INTERVAL}; ELAPSED=$((ELAPSED + INTERVAL))
          done

      - name: QA Deployment Summary
        run: |
          echo "════════════════════════════════════════════"
          echo "  QA CANARY DEPLOYMENT COMPLETE ✅"
          echo "  Image: ${{ inputs.image_tag }}"
          echo "  URL:   https://cwa-test-4-qa.agent.opsera.dev"
          echo "════════════════════════════════════════════"
          echo "  To promote to Staging:"
          echo "  gh workflow run cicd-cwa-test-4-staging.yaml \\"
          echo "    -f image_tag=${{ inputs.image_tag }}"
          echo "════════════════════════════════════════════"

  # ── Slack Notification ────────────────────────────────────────
  notify-slack:
    name: "📢 Slack Notification"
    runs-on: ubuntu-latest
    needs: [monitor-canary]
    if: always() && needs.monitor-canary.result == 'failure'
    steps:
      - name: Send Failure Notification
        run: |
          curl -s -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"❌ *cwa-test-4 QA Canary* FAILED for image \`${{ inputs.image_tag }}\`\n*Run:* <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|#${{ github.run_number }}>\"}" \
            ${{ secrets.SLACK_WEBHOOK_URL }}

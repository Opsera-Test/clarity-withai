# Fix TLS using per-subdomain certificate with letsencrypt-prod
# Based on the working solution: HTTP-01 challenge for specific subdomain
name: "🔐 cwa-4: Fix Cert (Prod Issuer)"

on:
  workflow_dispatch:

env:
  AWS_REGION: us-west-2
  SPOKE_CLUSTER: opsera-usw2-np
  APP_NAMESPACE: opsera-cwa-4-dev
  APP_NAME: cwa-4

jobs:
  fix-cert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Delete old certificate objects
        run: |
          echo "=== Cleaning up old cert-manager objects ==="
          kubectl delete certificate --all -n ${{ env.APP_NAMESPACE }} 2>/dev/null || true
          kubectl delete certificaterequest --all -n ${{ env.APP_NAMESPACE }} 2>/dev/null || true
          kubectl delete order --all -n ${{ env.APP_NAMESPACE }} 2>/dev/null || true
          kubectl delete challenge --all -n ${{ env.APP_NAMESPACE }} 2>/dev/null || true
          kubectl delete secret ${{ env.APP_NAME }}-dev-tls -n ${{ env.APP_NAMESPACE }} 2>/dev/null || true
          echo "✅ Old objects deleted"

      - name: Recreate ingress with letsencrypt-prod
        run: |
          echo "=== Deleting existing ingress ==="
          kubectl delete ingress ${{ env.APP_NAME }} -n ${{ env.APP_NAMESPACE }} 2>/dev/null || true
          sleep 5
          
          echo "=== Creating ingress with letsencrypt-prod ==="
          cat <<EOF | kubectl apply -f -
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: ${{ env.APP_NAME }}
            namespace: ${{ env.APP_NAMESPACE }}
            labels:
              app: ${{ env.APP_NAME }}
              tenant: opsera
              environment: dev
            annotations:
              kubernetes.io/ingress.class: nginx
              nginx.ingress.kubernetes.io/ssl-redirect: "true"
              nginx.ingress.kubernetes.io/proxy-body-size: "10m"
              cert-manager.io/cluster-issuer: "letsencrypt-prod"
          spec:
            ingressClassName: nginx
            tls:
              - hosts:
                  - opsera-${{ env.APP_NAME }}-dev.agent.opsera.dev
                secretName: ${{ env.APP_NAME }}-dev-tls
            rules:
              - host: opsera-${{ env.APP_NAME }}-dev.agent.opsera.dev
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: ${{ env.APP_NAME }}
                          port:
                            number: 80
          EOF
          echo "✅ Ingress created with cert-manager annotation"

      - name: Wait for certificate provisioning
        run: |
          echo "=== Waiting for cert-manager to provision certificate ==="
          echo "This uses HTTP-01 challenge for the specific subdomain"
          
          for i in {1..60}; do
            CERT_STATUS=$(kubectl get certificate -n ${{ env.APP_NAMESPACE }} -o jsonpath='{.items[0].status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || echo "Pending")
            SECRET_EXISTS=$(kubectl get secret ${{ env.APP_NAME }}-dev-tls -n ${{ env.APP_NAMESPACE }} 2>/dev/null && echo "Yes" || echo "No")
            
            echo "Attempt $i/60: Certificate Ready=$CERT_STATUS, Secret Exists=$SECRET_EXISTS"
            
            if [ "$CERT_STATUS" = "True" ] && [ "$SECRET_EXISTS" = "Yes" ]; then
              echo "✅ Certificate is ready!"
              break
            fi
            
            # Show certificate request status
            kubectl get certificaterequest -n ${{ env.APP_NAMESPACE }} 2>/dev/null | tail -5 || true
            
            sleep 10
          done

      - name: Verify certificate
        run: |
          echo "=== Certificate Status ==="
          kubectl get certificates -n ${{ env.APP_NAMESPACE }}
          
          echo ""
          echo "=== TLS Secret ==="
          kubectl get secret ${{ env.APP_NAME }}-dev-tls -n ${{ env.APP_NAMESPACE }} 2>/dev/null || echo "Secret not found"
          
          echo ""
          echo "=== Certificate Details ==="
          kubectl describe certificate -n ${{ env.APP_NAMESPACE }} 2>/dev/null | tail -30 || true

      - name: Test endpoint
        run: |
          echo ""
          echo "=========================================="
          echo "🌐 Application Endpoint:"
          echo "   https://opsera-${{ env.APP_NAME }}-dev.agent.opsera.dev"
          echo ""
          echo "Certificate should now be valid (issued by Let's Encrypt)"
          echo "=========================================="

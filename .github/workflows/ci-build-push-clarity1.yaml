# ════════════════════════════════════════════════════════════════════════════
# CI/CD WORKFLOW - Build, Push, Deploy
# Generated by Code-to-Cloud Enterprise v0.901
# ════════════════════════════════════════════════════════════════════════════

name: "🔨 clarity1: CI Build & Push"

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.ts'
      - 'tailwind.config.ts'
      - 'tsconfig*.json'
      - 'index.html'
      - '.opsera-clarity1/Dockerfile'
      - '.opsera-clarity1/nginx.conf'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        options: [dev, qa, staging]
        default: dev
      skip_tests:
        description: 'Skip tests'
        type: boolean
        default: false

# Prevent duplicate runs
concurrency:
  group: ci-${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

env:
  APP_NAME: clarity1
  TENANT: opsera
  AWS_REGION: us-east-1
  HUB_CLUSTER: argocd-use1
  SPOKE_CLUSTER: opsera-use1-np

permissions:
  contents: write
  id-token: write

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # VERIFY PREREQUISITES
  # ════════════════════════════════════════════════════════════════════════════
  verify-bootstrap:
    name: "🔍 Verify Bootstrap"
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      ecr_uri: ${{ steps.aws.outputs.ecr_uri }}
      image_tag: ${{ steps.tag.outputs.image_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine Environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            ENVIRONMENT="dev"
          else
            ENVIRONMENT="${{ inputs.environment }}"
          fi
          echo "environment=${ENVIRONMENT}" >> $GITHUB_OUTPUT
          echo "### Environment: ${ENVIRONMENT}" >> $GITHUB_STEP_SUMMARY

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get AWS Account & Verify ECR
        id: aws
        run: |
          # RULE 7: Get account ID dynamically
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_URI="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          echo "ecr_uri=${ECR_URI}" >> $GITHUB_OUTPUT
          
          # RULE 10: Verify ECR repo exists
          REPO_NAME="${{ env.TENANT }}/${{ env.APP_NAME }}"
          if aws ecr describe-repositories --repository-names "${REPO_NAME}" &>/dev/null; then
            echo "✅ ECR repository exists: ${REPO_NAME}" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ ECR repository not found: ${REPO_NAME}" >> $GITHUB_STEP_SUMMARY
            echo "::error::ECR repository not found. Run bootstrap workflow first."
            exit 1
          fi

      - name: Generate Image Tag
        id: tag
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          TIMESTAMP=$(date -u +"%Y%m%d%H%M%S")
          IMAGE_TAG="${SHORT_SHA}-${TIMESTAMP}"
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "### Image Tag: ${IMAGE_TAG}" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # QUALITY GATES (Parallel with Build)
  # ════════════════════════════════════════════════════════════════════════════
  security-scan:
    name: "🔐 Security Scan"
    runs-on: ubuntu-latest
    continue-on-error: true  # Warn only mode
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Grype SCA Scan
        uses: anchore/scan-action@v3
        continue-on-error: true
        with:
          path: "."
          fail-build: false
          severity-cutoff: critical

  # ════════════════════════════════════════════════════════════════════════════
  # BUILD AND PUSH
  # ════════════════════════════════════════════════════════════════════════════
  build-and-push:
    name: "🔨 Build & Push"
    needs: [verify-bootstrap]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Run Tests
        if: inputs.skip_tests != true
        run: |
          npm install --legacy-peer-deps
          npm test || echo "Tests skipped or none found"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push Docker Image
        env:
          ECR_URI: ${{ needs.verify-bootstrap.outputs.ecr_uri }}
          IMAGE_TAG: ${{ needs.verify-bootstrap.outputs.image_tag }}
        run: |
          REPO="${ECR_URI}/${{ env.TENANT }}/${{ env.APP_NAME }}"
          
          docker build \
            -f .opsera-${{ env.APP_NAME }}/Dockerfile \
            -t "${REPO}:${IMAGE_TAG}" \
            -t "${REPO}:latest" \
            .
          
          docker push "${REPO}:${IMAGE_TAG}"
          docker push "${REPO}:latest"
          
          echo "### 🐳 Image Pushed" >> $GITHUB_STEP_SUMMARY
          echo "- Tag: \`${IMAGE_TAG}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Repository: \`${REPO}\`" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # UPDATE MANIFESTS
  # ════════════════════════════════════════════════════════════════════════════
  update-manifests:
    name: "📝 Update Manifests"
    needs: [verify-bootstrap, build-and-push]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          ref: main

      - name: Pull Latest Changes
        run: git pull --rebase origin main

      - name: Update Kustomization
        env:
          ENVIRONMENT: ${{ needs.verify-bootstrap.outputs.environment }}
          IMAGE_TAG: ${{ needs.verify-bootstrap.outputs.image_tag }}
        run: |
          KUST_FILE=".opsera-${{ env.APP_NAME }}/k8s/overlays/${ENVIRONMENT}/kustomization.yaml"
          
          # Update image tag
          sed -i "s/newTag: .*/newTag: ${IMAGE_TAG}/" "$KUST_FILE"
          
          echo "### Updated: ${KUST_FILE}" >> $GITHUB_STEP_SUMMARY
          echo "- New Tag: \`${IMAGE_TAG}\`" >> $GITHUB_STEP_SUMMARY

      - name: Commit and Push
        env:
          IMAGE_TAG: ${{ needs.verify-bootstrap.outputs.image_tag }}
          ENVIRONMENT: ${{ needs.verify-bootstrap.outputs.environment }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .opsera-${{ env.APP_NAME }}/k8s/overlays/${ENVIRONMENT}/
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "deploy(${ENVIRONMENT}): Update image to ${IMAGE_TAG} [skip ci]

Environment: ${ENVIRONMENT}
Image: ${IMAGE_TAG}
Triggered by: ${{ github.actor }}

Co-Authored-By: Opsera Code-to-Cloud <noreply@opsera.io>"
            
            git pull --rebase origin main
            git push origin main
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # SYNC AND MONITOR
  # ════════════════════════════════════════════════════════════════════════════
  sync-and-wait:
    name: "🔄 Sync & Monitor"
    needs: [verify-bootstrap, update-manifests]
    if: always() && needs.update-manifests.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      deploy_success: ${{ steps.wait.outputs.success }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for hub cluster
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Force ArgoCD Sync
        env:
          ENVIRONMENT: ${{ needs.verify-bootstrap.outputs.environment }}
        run: |
          APP_NAME="${{ env.APP_NAME }}-${ENVIRONMENT}"
          
          # RULE 66: Force sync, don't rely on auto-sync
          kubectl annotate application ${APP_NAME} -n argocd \
            argocd.argoproj.io/refresh=hard --overwrite || true
          
          echo "✅ ArgoCD sync triggered for: ${APP_NAME}" >> $GITHUB_STEP_SUMMARY

      - name: Wait for Deployment
        id: wait
        env:
          ENVIRONMENT: ${{ needs.verify-bootstrap.outputs.environment }}
        run: |
          # Configure kubectl for spoke cluster
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}
          
          NAMESPACE="${{ env.TENANT }}-${{ env.APP_NAME }}-${ENVIRONMENT}"
          
          # RULE 43: Environment-aware timeouts
          case "$ENVIRONMENT" in
            dev) TIMEOUT=300 ;;      # 5 min
            qa|staging) TIMEOUT=600 ;; # 10 min
          esac
          
          echo "Waiting for deployment in namespace: ${NAMESPACE}"
          echo "Timeout: ${TIMEOUT}s"
          
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            READY=$(kubectl get pods -n ${NAMESPACE} -o jsonpath='{.items[*].status.phase}' 2>/dev/null | tr ' ' '\n' | grep -c Running || echo 0)
            TOTAL=$(kubectl get pods -n ${NAMESPACE} --no-headers 2>/dev/null | wc -l || echo 0)
            
            echo "Pods: ${READY}/${TOTAL} ready (${ELAPSED}s elapsed)"
            
            if [ "$TOTAL" -gt 0 ] && [ "$READY" -eq "$TOTAL" ]; then
              echo "✅ All pods ready!" >> $GITHUB_STEP_SUMMARY
              echo "success=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            
            sleep 15
            ELAPSED=$((ELAPSED + 15))
          done
          
          echo "⚠️ Deployment verification timed out" >> $GITHUB_STEP_SUMMARY
          echo "success=false" >> $GITHUB_OUTPUT

  # ════════════════════════════════════════════════════════════════════════════
  # SUMMARY
  # ════════════════════════════════════════════════════════════════════════════
  summary:
    name: "📋 Summary"
    needs: [verify-bootstrap, build-and-push, update-manifests, sync-and-wait, security-scan]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate Summary
        env:
          ENVIRONMENT: ${{ needs.verify-bootstrap.outputs.environment }}
          IMAGE_TAG: ${{ needs.verify-bootstrap.outputs.image_tag }}
          DEPLOY_SUCCESS: ${{ needs.sync-and-wait.outputs.deploy_success }}
        run: |
          cat << EOF >> $GITHUB_STEP_SUMMARY
          
          # 📋 Pipeline Summary
          
          ## Deployment Status
          | Stage | Status |
          |-------|--------|
          | **Bootstrap Verified** | ${{ needs.verify-bootstrap.result == 'success' && '✅' || '❌' }} |
          | **Security Scan** | ${{ needs.security-scan.result == 'success' && '✅' || '⚠️ (warn only)' }} |
          | **Build & Push** | ${{ needs.build-and-push.result == 'success' && '✅' || '❌' }} |
          | **Update Manifests** | ${{ needs.update-manifests.result == 'success' && '✅' || '❌' }} |
          | **Deployment** | ${{ env.DEPLOY_SUCCESS == 'true' && '✅' || '⚠️' }} |
          
          ## Details
          | Field | Value |
          |-------|-------|
          | **Environment** | \`${ENVIRONMENT}\` |
          | **Image Tag** | \`${IMAGE_TAG}\` |
          | **Namespace** | \`${{ env.TENANT }}-${{ env.APP_NAME }}-${ENVIRONMENT}\` |
          | **URL** | \`https://${{ env.TENANT }}-${{ env.APP_NAME }}-${ENVIRONMENT}.agent.opsera.dev\` |
          
          ## Next Steps
          EOF
          
          if [ "$DEPLOY_SUCCESS" = "true" ]; then
            cat << EOF >> $GITHUB_STEP_SUMMARY
          
          1. **Setup DNS** (if not already done):
             \`\`\`bash
             gh workflow run "dns-setup-clarity1.yaml" -f environment=${ENVIRONMENT}
             \`\`\`
          
          2. **Verify Application**:
             \`\`\`bash
             curl -I https://${{ env.TENANT }}-${{ env.APP_NAME }}-${ENVIRONMENT}.agent.opsera.dev
             \`\`\`
          
          3. **Promote to next environment** (after verification):
             \`\`\`bash
             gh workflow run "promote-clarity1.yaml" -f target_environment=qa -f image_tag=${IMAGE_TAG} -f confirm_promotion=true
             \`\`\`
          EOF
          else
            cat << EOF >> $GITHUB_STEP_SUMMARY
          
          ⚠️ **Deployment may need attention**. Run diagnostics:
          \`\`\`bash
          gh workflow run "diagnostics-clarity1.yaml" -f environment=${ENVIRONMENT} -f diagnostic_type=full-pipeline
          \`\`\`
          EOF
          fi

# ════════════════════════════════════════════════════════════════════════════
# CI/CD WORKFLOW - Build, Push, and Deploy
# Generated by Code-to-Cloud Enterprise v0.901
# ════════════════════════════════════════════════════════════════════════════
name: "🔄 1cwa: CI Build & Push"

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'vite.config.ts'
      - 'tailwind.config.ts'
      - '.opsera-1cwa/Dockerfile'
      - '.opsera-1cwa/nginx.conf'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        options: [dev, qa, staging]
        default: dev

env:
  APP_NAME: 1cwa
  TENANT: opsera
  AWS_REGION: us-west-2
  SPOKE_CLUSTER: opsera-usw2-np
  HUB_CLUSTER: argocd-usw2
  DOMAIN: agent.opsera.dev

permissions:
  contents: write
  id-token: write

# Prevent duplicate runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # VERIFY BOOTSTRAP (RULE 10)
  # ════════════════════════════════════════════════════════════════════════════
  verify-bootstrap:
    name: "🔍 Verify Bootstrap"
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      ecr_uri: ${{ steps.ecr.outputs.uri }}
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Determine Environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "environment=dev" >> $GITHUB_OUTPUT
          else
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get ECR URI
        id: ecr
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_URI="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.TENANT }}/${{ env.APP_NAME }}"
          echo "uri=$ECR_URI" >> $GITHUB_OUTPUT

          # RULE 75: Auto-create ECR if not exists
          if ! aws ecr describe-repositories --repository-names "${{ env.TENANT }}/${{ env.APP_NAME }}" 2>/dev/null; then
            echo "Creating ECR repository..."
            aws ecr create-repository \
              --repository-name "${{ env.TENANT }}/${{ env.APP_NAME }}" \
              --image-scanning-configuration scanOnPush=true
          fi

      - name: Generate Image Tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          TAG="${SHORT_SHA}-${TIMESTAMP}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "### Image Tag: \`$TAG\`" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # SECURITY SCANS (Parallel)
  # ════════════════════════════════════════════════════════════════════════════
  security-scan:
    name: "🔐 Security Scan"
    runs-on: ubuntu-latest
    continue-on-error: true  # RULE 78: Non-blocking
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Grype SCA Scan
        uses: anchore/scan-action@v3
        continue-on-error: true
        with:
          path: "."
          fail-build: false

  # ════════════════════════════════════════════════════════════════════════════
  # BUILD AND PUSH
  # ════════════════════════════════════════════════════════════════════════════
  build-and-push:
    name: "🏗️ Build & Push"
    runs-on: ubuntu-latest
    needs: [verify-bootstrap]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            docker login --username AWS --password-stdin ${{ needs.verify-bootstrap.outputs.ecr_uri }}

      - name: Build Docker Image
        run: |
          docker build \
            -f .opsera-${{ env.APP_NAME }}/Dockerfile \
            -t ${{ needs.verify-bootstrap.outputs.ecr_uri }}:${{ needs.verify-bootstrap.outputs.image_tag }} \
            -t ${{ needs.verify-bootstrap.outputs.ecr_uri }}:latest \
            .

      - name: Push Docker Image
        run: |
          docker push ${{ needs.verify-bootstrap.outputs.ecr_uri }}:${{ needs.verify-bootstrap.outputs.image_tag }}
          docker push ${{ needs.verify-bootstrap.outputs.ecr_uri }}:latest
          echo "### Image Pushed" >> $GITHUB_STEP_SUMMARY
          echo "\`${{ needs.verify-bootstrap.outputs.ecr_uri }}:${{ needs.verify-bootstrap.outputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # UPDATE MANIFESTS
  # ════════════════════════════════════════════════════════════════════════════
  update-manifests:
    name: "📝 Update Manifests"
    runs-on: ubuntu-latest
    needs: [verify-bootstrap, build-and-push]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Pull Latest
        run: git pull --rebase origin main

      - name: Update Kustomization
        run: |
          KUSTOMIZATION=".opsera-${{ env.APP_NAME }}/k8s/overlays/${{ needs.verify-bootstrap.outputs.environment }}/kustomization.yaml"
          
          # Update image tag
          sed -i "s|newTag:.*|newTag: ${{ needs.verify-bootstrap.outputs.image_tag }}|g" "$KUSTOMIZATION"
          
          echo "Updated kustomization with tag: ${{ needs.verify-bootstrap.outputs.image_tag }}"

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .opsera-${{ env.APP_NAME }}/k8s/overlays/
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "deploy(${{ needs.verify-bootstrap.outputs.environment }}): Update to ${{ needs.verify-bootstrap.outputs.image_tag }} [skip ci]

Image: ${{ needs.verify-bootstrap.outputs.ecr_uri }}:${{ needs.verify-bootstrap.outputs.image_tag }}
Triggered by: ${{ github.actor }}

Co-Authored-By: Opsera Code-to-Cloud <noreply@opsera.io>"
            git pull --rebase origin main
            git push origin main
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # SYNC AND MONITOR (RULE 66)
  # ════════════════════════════════════════════════════════════════════════════
  sync-and-monitor:
    name: "🔄 Sync & Monitor"
    runs-on: ubuntu-latest
    needs: [verify-bootstrap, update-manifests]
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for Hub
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Force ArgoCD Sync (RULE 66)
        run: |
          APP="${{ env.APP_NAME }}-${{ needs.verify-bootstrap.outputs.environment }}"
          
          # Force refresh
          kubectl annotate application "$APP" -n argocd \
            argocd.argoproj.io/refresh=hard --overwrite || true
          
          echo "✅ ArgoCD sync triggered" >> $GITHUB_STEP_SUMMARY

      - name: Monitor Deployment
        run: |
          APP="${{ env.APP_NAME }}-${{ needs.verify-bootstrap.outputs.environment }}"
          NAMESPACE="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ needs.verify-bootstrap.outputs.environment }}"
          
          # RULE 43: 5 min timeout for DEV
          TIMEOUT=300
          ELAPSED=0
          
          echo "Waiting for deployment..."
          
          while [ $ELAPSED -lt $TIMEOUT ]; do
            # Check ArgoCD sync status
            SYNC_STATUS=$(kubectl get application "$APP" -n argocd \
              -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "Unknown")
            
            HEALTH_STATUS=$(kubectl get application "$APP" -n argocd \
              -o jsonpath='{.status.health.status}' 2>/dev/null || echo "Unknown")
            
            echo "Sync: $SYNC_STATUS, Health: $HEALTH_STATUS (${ELAPSED}s/${TIMEOUT}s)"
            
            if [ "$SYNC_STATUS" = "Synced" ] && [ "$HEALTH_STATUS" = "Healthy" ]; then
              echo "✅ Deployment successful!" >> $GITHUB_STEP_SUMMARY
              exit 0
            fi
            
            sleep 15
            ELAPSED=$((ELAPSED + 15))
          done
          
          echo "⚠️ Deployment monitoring timeout - check ArgoCD" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # SUMMARY
  # ════════════════════════════════════════════════════════════════════════════
  summary:
    name: "📋 Deployment Summary"
    runs-on: ubuntu-latest
    needs: [verify-bootstrap, build-and-push, sync-and-monitor]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          cat << EOF >> $GITHUB_STEP_SUMMARY
          # 🎉 Deployment Complete

          ## Details
          | Field | Value |
          |-------|-------|
          | **App** | \`${{ env.APP_NAME }}\` |
          | **Environment** | \`${{ needs.verify-bootstrap.outputs.environment }}\` |
          | **Image Tag** | \`${{ needs.verify-bootstrap.outputs.image_tag }}\` |
          | **Namespace** | \`${{ env.TENANT }}-${{ env.APP_NAME }}-${{ needs.verify-bootstrap.outputs.environment }}\` |

          ## URL
          \`\`\`
          https://${{ env.TENANT }}-${{ env.APP_NAME }}-${{ needs.verify-bootstrap.outputs.environment }}.${{ env.DOMAIN }}
          \`\`\`

          ## Commands
          \`\`\`bash
          # Check deployment status
          gh workflow run "diagnostics-1cwa.yaml" -f environment=${{ needs.verify-bootstrap.outputs.environment }}
          
          # View logs
          gh workflow run "diagnostics-1cwa.yaml" -f environment=${{ needs.verify-bootstrap.outputs.environment }} -f diagnostic_type=pod-logs
          \`\`\`
          EOF

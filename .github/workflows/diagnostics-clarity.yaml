# ════════════════════════════════════════════════════════════════════════════
# DIAGNOSTICS WORKFLOW - Troubleshooting toolkit
# Generated by: Opsera Code-to-Cloud Enterprise v0.901
# RULE 50: MANDATORY diagnostics workflow
# ════════════════════════════════════════════════════════════════════════════

name: "🔬 Diagnostics: clarity"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        options: [dev]
        default: dev
      diagnostic_type:
        description: 'Type of diagnostic'
        type: choice
        options:
          - full-pipeline
          - pod-logs
          - argocd-debug
          - force-sync
        default: full-pipeline

env:
  APP_NAME: clarity
  TENANT: opsera
  AWS_REGION: us-west-2
  EKS_HUB_CLUSTER: argocd-usw2
  EKS_SPOKE_CLUSTER: opsera-usw2-np

permissions:
  contents: read
  id-token: write

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # FULL PIPELINE DIAGNOSTICS
  # ════════════════════════════════════════════════════════════════════════════
  full-pipeline:
    name: "🔍 Full Pipeline Diagnostics"
    runs-on: ubuntu-latest
    if: inputs.diagnostic_type == 'full-pipeline'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: "1️⃣ ECR Repository Check"
        run: |
          echo "### 📦 Stage 1: ECR Repository" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          REPO_NAME="${{ env.TENANT }}/${{ env.APP_NAME }}"
          
          if aws ecr describe-repositories --repository-names "$REPO_NAME" &>/dev/null; then
            echo "✅ ECR repository exists: \`$REPO_NAME\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Latest Images:**" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            aws ecr describe-images --repository-name "$REPO_NAME" \
              --query 'imageDetails[*].[imageTags[0],imagePushedAt]' \
              --output table 2>/dev/null | head -10 >> $GITHUB_STEP_SUMMARY || echo "No images found"
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ ECR repository NOT found" >> $GITHUB_STEP_SUMMARY
            echo "Run: \`gh workflow run bootstrap-clarity.yaml -f proceed=true\`" >> $GITHUB_STEP_SUMMARY
          fi

      - name: "2️⃣ EKS Cluster Check"
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🎯 Stage 2: EKS Clusters" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Check hub cluster
          if aws eks describe-cluster --name ${{ env.EKS_HUB_CLUSTER }} &>/dev/null; then
            echo "✅ Hub cluster: \`${{ env.EKS_HUB_CLUSTER }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Hub cluster NOT found: \`${{ env.EKS_HUB_CLUSTER }}\`" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Check spoke cluster
          if aws eks describe-cluster --name ${{ env.EKS_SPOKE_CLUSTER }} &>/dev/null; then
            echo "✅ Spoke cluster: \`${{ env.EKS_SPOKE_CLUSTER }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Spoke cluster NOT found: \`${{ env.EKS_SPOKE_CLUSTER }}\`" >> $GITHUB_STEP_SUMMARY
          fi

      - name: "3️⃣ ArgoCD Application Check"
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔄 Stage 3: ArgoCD Application" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          aws eks update-kubeconfig --name ${{ env.EKS_HUB_CLUSTER }} --region ${{ env.AWS_REGION }}
          
          APP_NAME="${{ env.APP_NAME }}-${{ inputs.environment }}"
          
          if kubectl get application ${APP_NAME} -n argocd &>/dev/null; then
            SYNC_STATUS=$(kubectl get application ${APP_NAME} -n argocd -o jsonpath='{.status.sync.status}')
            HEALTH_STATUS=$(kubectl get application ${APP_NAME} -n argocd -o jsonpath='{.status.health.status}')
            
            echo "✅ ArgoCD application: \`${APP_NAME}\`" >> $GITHUB_STEP_SUMMARY
            echo "- Sync: \`${SYNC_STATUS}\`" >> $GITHUB_STEP_SUMMARY
            echo "- Health: \`${HEALTH_STATUS}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ ArgoCD application NOT found: \`${APP_NAME}\`" >> $GITHUB_STEP_SUMMARY
            echo "Run: \`gh workflow run bootstrap-clarity.yaml -f proceed=true\`" >> $GITHUB_STEP_SUMMARY
          fi

      - name: "4️⃣ Pod Status Check"
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🐳 Stage 4: Pod Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          aws eks update-kubeconfig --name ${{ env.EKS_SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}
          
          NAMESPACE="opsera-${{ env.APP_NAME }}-${{ inputs.environment }}"
          
          if kubectl get namespace ${NAMESPACE} &>/dev/null; then
            echo "✅ Namespace: \`${NAMESPACE}\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Pods:**" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            kubectl get pods -n ${NAMESPACE} -o wide 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No pods found"
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Namespace NOT found: \`${NAMESPACE}\`" >> $GITHUB_STEP_SUMMARY
          fi

      - name: "5️⃣ Health Check"
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🏥 Stage 5: Health Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          URL="https://opsera-${{ env.APP_NAME }}-${{ inputs.environment }}.agent.opsera.dev"
          
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL" 2>/dev/null || echo "000")
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Application accessible: HTTP ${HTTP_CODE}" >> $GITHUB_STEP_SUMMARY
            echo "URL: \`${URL}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Application returned: HTTP ${HTTP_CODE}" >> $GITHUB_STEP_SUMMARY
            echo "URL: \`${URL}\`" >> $GITHUB_STEP_SUMMARY
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # POD LOGS
  # ════════════════════════════════════════════════════════════════════════════
  pod-logs:
    name: "📋 Pod Logs"
    runs-on: ubuntu-latest
    if: inputs.diagnostic_type == 'pod-logs'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get Pod Logs
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}
          
          NAMESPACE="opsera-${{ env.APP_NAME }}-${{ inputs.environment }}"
          
          echo "### 📋 Pod Logs - ${NAMESPACE}" >> $GITHUB_STEP_SUMMARY
          
          for POD in $(kubectl get pods -n ${NAMESPACE} -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "#### Pod: \`${POD}\`" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            kubectl logs ${POD} -n ${NAMESPACE} --tail=50 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No logs available"
            echo '```' >> $GITHUB_STEP_SUMMARY
          done

  # ════════════════════════════════════════════════════════════════════════════
  # ARGOCD DEBUG
  # ════════════════════════════════════════════════════════════════════════════
  argocd-debug:
    name: "🔄 ArgoCD Debug"
    runs-on: ubuntu-latest
    if: inputs.diagnostic_type == 'argocd-debug'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Debug ArgoCD Application
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_HUB_CLUSTER }} --region ${{ env.AWS_REGION }}
          
          APP_NAME="${{ env.APP_NAME }}-${{ inputs.environment }}"
          
          echo "### 🔄 ArgoCD Debug: ${APP_NAME}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "**Application YAML:**" >> $GITHUB_STEP_SUMMARY
          echo '```yaml' >> $GITHUB_STEP_SUMMARY
          kubectl get application ${APP_NAME} -n argocd -o yaml 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "Application not found"
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Recent Events:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get events -n argocd --field-selector involvedObject.name=${APP_NAME} --sort-by='.lastTimestamp' 2>/dev/null | tail -20 >> $GITHUB_STEP_SUMMARY || echo "No events"
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # FORCE SYNC
  # ════════════════════════════════════════════════════════════════════════════
  force-sync:
    name: "⚡ Force Sync"
    runs-on: ubuntu-latest
    if: inputs.diagnostic_type == 'force-sync'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force Sync ArgoCD
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_HUB_CLUSTER }} --region ${{ env.AWS_REGION }}
          
          APP_NAME="${{ env.APP_NAME }}-${{ inputs.environment }}"
          
          echo "### ⚡ Force Sync: ${APP_NAME}" >> $GITHUB_STEP_SUMMARY
          
          # Hard refresh
          kubectl annotate application ${APP_NAME} -n argocd \
            argocd.argoproj.io/refresh=hard --overwrite
          
          echo "✅ Force sync triggered" >> $GITHUB_STEP_SUMMARY
          
          sleep 10
          
          # Check status
          SYNC_STATUS=$(kubectl get application ${APP_NAME} -n argocd -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "Unknown")
          echo "**Status after sync:** \`${SYNC_STATUS}\`" >> $GITHUB_STEP_SUMMARY

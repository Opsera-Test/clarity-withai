name: CI Build & Push - claritywithai-0209 (dev)
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
  id-token: write
env:
  APP_NAME: claritywithai-0209
  TENANT: opsera
  AWS_REGION: us-west-2
  ENV: dev
  SPOKE_CLUSTER: opsera-usw2-np

jobs:
  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  build-push:
    runs-on: ubuntu-latest
    needs: [security-scan]
    if: always() && (needs.security-scan.result == 'success' || needs.security-scan.result == 'skipped')
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      ecr_uri: ${{ steps.ecr.outputs.ecr_uri }}
    steps:
      - uses: actions/checkout@v4
      - name: Pre-flight – trim AWS secrets (avoid Invalid header value)
        run: |
          echo "AWS_ACCESS_KEY_ID=$(echo -n "${{ secrets.AWS_ACCESS_KEY_ID }}" | tr -d '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=$(echo -n "${{ secrets.AWS_SECRET_ACCESS_KEY }}" | tr -d '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')" >> $GITHUB_ENV
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Get AWS Account ID
        id: aws
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=$AWS_ACCOUNT_ID" >> $GITHUB_OUTPUT
      - name: Set ECR URI
        id: ecr
        run: |
          ECR_URI="${{ steps.aws.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.APP_NAME }}"
          echo "ecr_uri=${ECR_URI}" >> $GITHUB_OUTPUT
      - name: Set image tag
        id: meta
        run: |
          IMAGE_TAG="${{ env.ENV }}-${GITHUB_SHA::8}-$(date +%Y%m%d%H%M%S)"
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push
        run: |
          docker build -t ${{ steps.ecr.outputs.ecr_uri }}:${{ steps.meta.outputs.image_tag }} .
          docker push ${{ steps.ecr.outputs.ecr_uri }}:${{ steps.meta.outputs.image_tag }}
      - name: Grype scan
        uses: anchore/scan-action@v3
        with:
          image: ${{ steps.ecr.outputs.ecr_uri }}:${{ steps.meta.outputs.image_tag }}
          fail-build: false
        continue-on-error: true

  update-manifests:
    runs-on: ubuntu-latest
    needs: [build-push]
    steps:
      - uses: actions/checkout@v4
      - name: Pre-flight – trim AWS secrets (avoid Invalid header value)
        run: |
          echo "AWS_ACCESS_KEY_ID=$(echo -n "${{ secrets.AWS_ACCESS_KEY_ID }}" | tr -d '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=$(echo -n "${{ secrets.AWS_SECRET_ACCESS_KEY }}" | tr -d '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')" >> $GITHUB_ENV
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Get AWS Account ID
        id: aws
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=$AWS_ACCOUNT_ID" >> $GITHUB_OUTPUT
      - name: Update Kustomize image
        run: |
          ECR_URI="${{ steps.aws.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.APP_NAME }}"
          cd .opsera-${{ env.APP_NAME }}/k8s/overlays/${{ env.ENV }}
          sed -i "s|PLACEHOLDER_ECR_URI|${ECR_URI}|g" kustomization.yaml
          sed -i "s|newTag:.*|newTag: ${{ needs.build-push.outputs.image_tag }}|g" kustomization.yaml
          sed -i "s|newName:.*|newName: ${ECR_URI}|g" kustomization.yaml
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add .opsera-${{ env.APP_NAME }}/k8s/overlays/${{ env.ENV }}/kustomization.yaml
          git diff --staged --quiet || git commit -m "chore(opsera): deploy ${{ env.APP_NAME }} ${{ env.ENV }} - ${{ needs.build-push.outputs.image_tag }}"
          git push origin main

  deploy-dev:
    runs-on: ubuntu-latest
    needs: [update-manifests]
    steps:
      - uses: actions/checkout@v4
      - name: Pre-flight – trim AWS secrets (avoid Invalid header value)
        run: |
          echo "AWS_ACCESS_KEY_ID=$(echo -n "${{ secrets.AWS_ACCESS_KEY_ID }}" | tr -d '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=$(echo -n "${{ secrets.AWS_SECRET_ACCESS_KEY }}" | tr -d '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')" >> $GITHUB_ENV
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ env.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Get AWS Account ID
        id: aws
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=$AWS_ACCOUNT_ID" >> $GITHUB_OUTPUT
      - uses: azure/setup-kubectl@v3
      - name: Configure kubeconfig (EKS spoke)
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.SPOKE_CLUSTER }} --kubeconfig $(pwd)/kubeconfig
          echo "KUBECONFIG=$(pwd)/kubeconfig" >> $GITHUB_ENV
      - name: Set namespace and ECR URI
        id: vars
        run: |
          echo "namespace=opsera-claritywithai-0209-dev" >> $GITHUB_OUTPUT
          echo "ecr_uri=${{ steps.aws.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/claritywithai-0209" >> $GITHUB_OUTPUT
      - name: Refresh ECR pull secret
        run: |
          ECR_TOKEN=$(aws ecr get-login-password --region ${{ env.AWS_REGION }})
          kubectl create secret docker-registry ecr-pull-secret \
            --docker-server=${{ steps.aws.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com \
            --docker-username=AWS --docker-password="$ECR_TOKEN" \
            --namespace=${{ steps.vars.outputs.namespace }} \
            --dry-run=client -o yaml | kubectl apply -f -
      - name: Apply manifests
        run: |
          kubectl apply -k .opsera-claritywithai-0209/k8s/overlays/dev --server-side --force-conflicts 2>/dev/null || kubectl apply -k .opsera-claritywithai-0209/k8s/overlays/dev
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/claritywithai-0209 -n ${{ steps.vars.outputs.namespace }} --timeout=300s
      - name: Pod status
        run: |
          kubectl get pods -n ${{ steps.vars.outputs.namespace }} -l app=claritywithai-0209 -o wide | tee -a $GITHUB_STEP_SUMMARY
      - name: Health check (port-forward)
        run: |
          POD=$(kubectl get pods -n ${{ steps.vars.outputs.namespace }} -l app=claritywithai-0209 -o jsonpath='{.items[0].metadata.name}')
          kubectl port-forward -n ${{ steps.vars.outputs.namespace }} $POD 8081:8080 &
          sleep 3
          wget -qO- http://localhost:8081/ | head -c 200
          echo ""
      - name: Deployment summary
        run: |
          echo "## Deploy complete" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: dev" >> $GITHUB_STEP_SUMMARY
          echo "- Namespace: ${{ steps.vars.outputs.namespace }}" >> $GITHUB_STEP_SUMMARY

  trigger-landscape:
    needs: [deploy-dev]
    if: success()
    uses: ./.github/workflows/deployment-landscape.yaml
    secrets: inherit

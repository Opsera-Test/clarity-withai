# ════════════════════════════════════════════════════════════════════════════
# CI/CD WORKFLOW - clarity-withai-1
# Generated by Code-to-Cloud Enterprise v1.7
# ════════════════════════════════════════════════════════════════════════════
name: "🚀 clarity-withai-1: CI Build & Push"

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'package*.json'
      - 'vite.config.ts'
      - 'tailwind.config.ts'
      - 'tsconfig*.json'
      - '.opsera-clarity-withai-1/Dockerfile'
      - '.opsera-clarity-withai-1/nginx.conf'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        options: [dev, qa, staging]
        default: dev
      image_tag:
        description: 'Use existing image tag (skip build)'
        type: string

env:
  APP_NAME: clarity-withai-1
  TENANT: opsera
  AWS_REGION: us-west-2
  HUB_CLUSTER: argocd-usw2
  SPOKE_CLUSTER: opsera-usw2-np
  DOMAIN: agent.opsera.dev

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write
  packages: write

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # VERIFY BOOTSTRAP
  # ════════════════════════════════════════════════════════════════════════════
  verify-bootstrap:
    name: "🔍 Verify Bootstrap"
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      image_tag: ${{ steps.tag.outputs.image_tag }}
      ecr_uri: ${{ steps.ecr.outputs.uri }}
      build_needed: ${{ steps.check.outputs.build_needed }}
    steps:
      - name: Determine Environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "environment=dev" >> $GITHUB_OUTPUT
          else
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get ECR URI
        id: ecr
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_URI="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          echo "uri=$ECR_URI" >> $GITHUB_OUTPUT

      - name: Verify ECR Repository
        run: |
          ECR_REPO="${{ env.TENANT }}/${{ env.APP_NAME }}"
          if ! aws ecr describe-repositories --repository-names "$ECR_REPO" &>/dev/null; then
            echo "❌ ECR repository not found. Run bootstrap first."
            exit 1
          fi
          echo "✅ ECR repository verified"

      - name: Determine Image Tag
        id: tag
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "image_tag=${{ inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            TIMESTAMP=$(date +%Y%m%d%H%M%S)
            echo "image_tag=${SHORT_SHA}-${TIMESTAMP}" >> $GITHUB_OUTPUT
          fi

      - name: Check if Build Needed
        id: check
        run: |
          if [ -n "${{ inputs.image_tag }}" ]; then
            echo "build_needed=false" >> $GITHUB_OUTPUT
          else
            echo "build_needed=true" >> $GITHUB_OUTPUT
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # BUILD & PUSH
  # ════════════════════════════════════════════════════════════════════════════
  build-and-push:
    name: "🔨 Build & Push"
    runs-on: ubuntu-latest
    needs: [verify-bootstrap]
    if: needs.verify-bootstrap.outputs.build_needed == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            docker login --username AWS --password-stdin ${{ needs.verify-bootstrap.outputs.ecr_uri }}

      - name: Build Docker Image
        run: |
          IMAGE="${{ needs.verify-bootstrap.outputs.ecr_uri }}/${{ env.TENANT }}/${{ env.APP_NAME }}"
          TAG="${{ needs.verify-bootstrap.outputs.image_tag }}"

          docker build \
            -f .opsera-${{ env.APP_NAME }}/Dockerfile \
            -t ${IMAGE}:${TAG} \
            -t ${IMAGE}:latest \
            .

      - name: Push Docker Image
        run: |
          IMAGE="${{ needs.verify-bootstrap.outputs.ecr_uri }}/${{ env.TENANT }}/${{ env.APP_NAME }}"
          TAG="${{ needs.verify-bootstrap.outputs.image_tag }}"

          docker push ${IMAGE}:${TAG}
          docker push ${IMAGE}:latest
          echo "✅ Pushed: ${IMAGE}:${TAG}"

  # ════════════════════════════════════════════════════════════════════════════
  # UPDATE MANIFESTS
  # ════════════════════════════════════════════════════════════════════════════
  update-manifests:
    name: "📝 Update Manifests"
    runs-on: ubuntu-latest
    needs: [verify-bootstrap, build-and-push]
    if: always() && needs.verify-bootstrap.result == 'success' && (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Update Kustomization
        run: |
          ENV="${{ needs.verify-bootstrap.outputs.environment }}"
          TAG="${{ needs.verify-bootstrap.outputs.image_tag }}"
          KUST_FILE=".opsera-${{ env.APP_NAME }}/k8s/overlays/${ENV}/kustomization.yaml"

          if [ -f "$KUST_FILE" ]; then
            sed -i "s/newTag: .*/newTag: ${TAG}/" "$KUST_FILE"
            echo "✅ Updated image tag to: ${TAG}"
            cat "$KUST_FILE"
          fi

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .opsera-${{ env.APP_NAME }}/
          git diff --cached --quiet || git commit -m "deploy: Update ${{ needs.verify-bootstrap.outputs.environment }} to ${{ needs.verify-bootstrap.outputs.image_tag }} [skip ci]

          Environment: ${{ needs.verify-bootstrap.outputs.environment }}
          Image: ${{ needs.verify-bootstrap.outputs.image_tag }}
          Triggered by: ${{ github.actor }}

          Co-Authored-By: Opsera Code-to-Cloud <noreply@opsera.io>"

          git pull --rebase origin main
          git push origin main

  # ════════════════════════════════════════════════════════════════════════════
  # SYNC & MONITOR - Deep Logging Version
  # ════════════════════════════════════════════════════════════════════════════
  sync-and-monitor:
    name: "🔄 Sync & Monitor"
    runs-on: ubuntu-latest
    needs: [verify-bootstrap, update-manifests]
    if: always() && needs.update-manifests.result == 'success'
    outputs:
      deploy_success: ${{ steps.wait.outputs.success }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for Hub
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}
          echo "✅ Connected to hub cluster: ${{ env.HUB_CLUSTER }}"

      - name: "🔍 ArgoCD Pre-Sync Status"
        run: |
          ENV="${{ needs.verify-bootstrap.outputs.environment }}"
          APP="${{ env.APP_NAME }}-${ENV}"

          echo "═══════════════════════════════════════════════════════════════"
          echo "📊 ARGOCD APPLICATION STATUS (BEFORE SYNC)"
          echo "═══════════════════════════════════════════════════════════════"

          echo ""
          echo "### Checking if application exists..."
          if kubectl get application ${APP} -n argocd &>/dev/null; then
            echo "✅ Application ${APP} exists"
          else
            echo "❌ Application ${APP} NOT FOUND!"
            echo "Available applications:"
            kubectl get applications -n argocd -o wide || echo "No applications found"
            exit 1
          fi

          echo ""
          echo "### Application YAML:"
          kubectl get application ${APP} -n argocd -o yaml

          echo ""
          echo "### Application Status Summary:"
          kubectl get application ${APP} -n argocd -o jsonpath='
          App: {.metadata.name}
          Sync Status: {.status.sync.status}
          Health: {.status.health.status}
          Source Repo: {.spec.source.repoURL}
          Source Path: {.spec.source.path}
          Destination: {.spec.destination.name}
          Namespace: {.spec.destination.namespace}
          ' && echo ""

          echo ""
          echo "### Sync Conditions:"
          kubectl get application ${APP} -n argocd -o jsonpath='{.status.conditions[*]}' | jq . 2>/dev/null || echo "No conditions"

          echo ""
          echo "### Resource Status:"
          kubectl get application ${APP} -n argocd -o jsonpath='{.status.resources[*]}' | jq . 2>/dev/null || echo "No resources"

      - name: "🔄 Force ArgoCD Sync (RULE 66)"
        run: |
          ENV="${{ needs.verify-bootstrap.outputs.environment }}"
          APP="${{ env.APP_NAME }}-${ENV}"

          echo "═══════════════════════════════════════════════════════════════"
          echo "🔄 TRIGGERING ARGOCD SYNC"
          echo "═══════════════════════════════════════════════════════════════"

          echo ""
          echo "### Triggering hard refresh..."
          kubectl annotate application ${APP} -n argocd \
            argocd.argoproj.io/refresh=hard --overwrite

          echo ""
          echo "### Waiting 10s for sync to start..."
          sleep 10

          echo ""
          echo "### Post-refresh status:"
          kubectl get application ${APP} -n argocd -o jsonpath='
          Sync Status: {.status.sync.status}
          Health: {.status.health.status}
          Operation State: {.status.operationState.phase}
          Message: {.status.operationState.message}
          ' && echo ""

      - name: "🔍 ArgoCD Post-Sync Status"
        run: |
          ENV="${{ needs.verify-bootstrap.outputs.environment }}"
          APP="${{ env.APP_NAME }}-${ENV}"

          echo "═══════════════════════════════════════════════════════════════"
          echo "📊 ARGOCD APPLICATION STATUS (AFTER SYNC TRIGGER)"
          echo "═══════════════════════════════════════════════════════════════"

          echo ""
          echo "### Waiting additional 20s for sync to process..."
          sleep 20

          echo ""
          echo "### Current Status:"
          kubectl get application ${APP} -n argocd -o wide

          echo ""
          echo "### Sync Status Details:"
          SYNC_STATUS=$(kubectl get application ${APP} -n argocd -o jsonpath='{.status.sync.status}')
          HEALTH_STATUS=$(kubectl get application ${APP} -n argocd -o jsonpath='{.status.health.status}')
          echo "Sync: ${SYNC_STATUS}"
          echo "Health: ${HEALTH_STATUS}"

          echo ""
          echo "### Operation State:"
          kubectl get application ${APP} -n argocd -o jsonpath='{.status.operationState}' | jq . 2>/dev/null || echo "No operation state"

          echo ""
          echo "### Resources Managed by ArgoCD:"
          kubectl get application ${APP} -n argocd -o jsonpath='{range .status.resources[*]}{.kind}/{.name}: {.status} ({.health.status}){"\n"}{end}' 2>/dev/null || echo "No resources listed"

          echo ""
          echo "### Sync Result:"
          kubectl get application ${APP} -n argocd -o jsonpath='{.status.sync}' | jq . 2>/dev/null || echo "No sync result"

      - name: Configure kubectl for Spoke
        run: |
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}
          echo "✅ Connected to spoke cluster: ${{ env.SPOKE_CLUSTER }}"

      - name: "🔍 Namespace & Resources Check"
        run: |
          ENV="${{ needs.verify-bootstrap.outputs.environment }}"
          NAMESPACE="${{ env.TENANT }}-${{ env.APP_NAME }}-${ENV}"

          echo "═══════════════════════════════════════════════════════════════"
          echo "📊 NAMESPACE & KUBERNETES RESOURCES"
          echo "═══════════════════════════════════════════════════════════════"

          echo ""
          echo "### Checking namespace: ${NAMESPACE}"
          if kubectl get namespace ${NAMESPACE} &>/dev/null; then
            echo "✅ Namespace exists"
            kubectl get namespace ${NAMESPACE} -o yaml
          else
            echo "❌ Namespace ${NAMESPACE} does NOT exist!"
            echo ""
            echo "### All namespaces:"
            kubectl get namespaces | grep -E "(opsera|clarity)" || echo "No matching namespaces"
          fi

          echo ""
          echo "### All resources in namespace:"
          kubectl get all -n ${NAMESPACE} 2>/dev/null || echo "No resources found or namespace doesn't exist"

          echo ""
          echo "### Deployments:"
          kubectl get deployments -n ${NAMESPACE} -o wide 2>/dev/null || echo "No deployments"

          echo ""
          echo "### Pods:"
          kubectl get pods -n ${NAMESPACE} -o wide 2>/dev/null || echo "No pods"

          echo ""
          echo "### Services:"
          kubectl get services -n ${NAMESPACE} -o wide 2>/dev/null || echo "No services"

          echo ""
          echo "### Ingress:"
          kubectl get ingress -n ${NAMESPACE} -o wide 2>/dev/null || echo "No ingress"

          echo ""
          echo "### Events (last 20):"
          kubectl get events -n ${NAMESPACE} --sort-by='.lastTimestamp' 2>/dev/null | tail -20 || echo "No events"

      - name: "⏳ Wait for Deployment"
        id: wait
        timeout-minutes: 10
        run: |
          ENV="${{ needs.verify-bootstrap.outputs.environment }}"
          NAMESPACE="${{ env.TENANT }}-${{ env.APP_NAME }}-${ENV}"

          echo "═══════════════════════════════════════════════════════════════"
          echo "⏳ WAITING FOR DEPLOYMENT"
          echo "═══════════════════════════════════════════════════════════════"
          echo "Namespace: ${NAMESPACE}"
          echo "App Label: app=${{ env.APP_NAME }}"

          # RULE 43: Environment-aware timeouts
          case "$ENV" in
            dev) TIMEOUT=300 ;;
            qa|staging) TIMEOUT=600 ;;
            *) TIMEOUT=300 ;;
          esac
          echo "Timeout: ${TIMEOUT}s"

          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            echo ""
            echo "--- Check at ${ELAPSED}s ---"

            # Check if namespace exists
            if ! kubectl get namespace ${NAMESPACE} &>/dev/null; then
              echo "⚠️ Namespace ${NAMESPACE} does not exist yet"
              sleep 15
              ELAPSED=$((ELAPSED + 15))
              continue
            fi

            # Get pod info with safer handling
            POD_INFO=$(kubectl get pods -n ${NAMESPACE} -l app=${{ env.APP_NAME }} --no-headers 2>/dev/null || echo "")

            if [ -z "$POD_INFO" ]; then
              echo "⚠️ No pods found with label app=${{ env.APP_NAME }}"
              echo "Checking all pods in namespace:"
              kubectl get pods -n ${NAMESPACE} --no-headers 2>/dev/null || echo "No pods at all"
              TOTAL=0
              READY=0
            else
              echo "Pod info:"
              echo "$POD_INFO"
              TOTAL=$(echo "$POD_INFO" | wc -l | tr -d ' ')
              READY=$(echo "$POD_INFO" | grep -c "Running" || echo "0")
            fi

            echo "Pods: ${READY}/${TOTAL} ready"

            # Safe numeric comparison
            if [ "${TOTAL:-0}" -gt 0 ] && [ "${READY:-0}" -eq "${TOTAL:-0}" ]; then
              echo ""
              echo "✅ All pods are running!"
              echo "success=true" >> $GITHUB_OUTPUT
              exit 0
            fi

            # Show pod details if pods exist but not ready
            if [ "${TOTAL:-0}" -gt 0 ]; then
              echo ""
              echo "Pod details:"
              kubectl describe pods -n ${NAMESPACE} -l app=${{ env.APP_NAME }} 2>/dev/null | head -100 || true
            fi

            sleep 15
            ELAPSED=$((ELAPSED + 15))
          done

          echo ""
          echo "═══════════════════════════════════════════════════════════════"
          echo "❌ DEPLOYMENT TIMEOUT"
          echo "═══════════════════════════════════════════════════════════════"
          echo ""
          echo "### Final state - All resources:"
          kubectl get all -n ${NAMESPACE} 2>/dev/null || echo "Namespace may not exist"
          echo ""
          echo "### Final state - Events:"
          kubectl get events -n ${NAMESPACE} --sort-by='.lastTimestamp' 2>/dev/null | tail -30 || echo "No events"

          echo "success=false" >> $GITHUB_OUTPUT

  # ════════════════════════════════════════════════════════════════════════════
  # SLACK NOTIFICATION
  # ════════════════════════════════════════════════════════════════════════════
  notify:
    name: "📢 Notify"
    runs-on: ubuntu-latest
    needs: [verify-bootstrap, sync-and-monitor]
    if: always()
    steps:
      - name: Slack Notification
        if: env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.25.0
        with:
          channel-id: ${{ vars.SLACK_CHANNEL }}
          payload: |
            {
              "text": "${{ needs.sync-and-monitor.outputs.deploy_success == 'true' && '✅' || '❌' }} Deployment ${{ needs.sync-and-monitor.result }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "${{ needs.sync-and-monitor.outputs.deploy_success == 'true' && '✅ Deployment Succeeded' || '❌ Deployment Failed' }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {"type": "mrkdwn", "text": "*App:*\n`${{ env.APP_NAME }}`"},
                    {"type": "mrkdwn", "text": "*Env:*\n`${{ needs.verify-bootstrap.outputs.environment }}`"},
                    {"type": "mrkdwn", "text": "*Tag:*\n`${{ needs.verify-bootstrap.outputs.image_tag }}`"},
                    {"type": "mrkdwn", "text": "*By:*\n${{ github.actor }}"}
                  ]
                },
                {
                  "type": "actions",
                  "elements": [{
                    "type": "button",
                    "text": {"type": "plain_text", "text": "View Workflow"},
                    "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                  }]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ════════════════════════════════════════════════════════════════════════════
  # SUMMARY
  # ════════════════════════════════════════════════════════════════════════════
  summary:
    name: "📋 Summary"
    runs-on: ubuntu-latest
    needs: [verify-bootstrap, build-and-push, update-manifests, sync-and-monitor]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          ENV="${{ needs.verify-bootstrap.outputs.environment }}"
          TAG="${{ needs.verify-bootstrap.outputs.image_tag }}"
          SUCCESS="${{ needs.sync-and-monitor.outputs.deploy_success }}"

          cat << EOF >> $GITHUB_STEP_SUMMARY
          # 🚀 CI/CD Summary

          ## Deployment Details
          | Field | Value |
          |-------|-------|
          | **App** | \`${{ env.APP_NAME }}\` |
          | **Environment** | \`${ENV}\` |
          | **Image Tag** | \`${TAG}\` |
          | **Status** | $( [ "$SUCCESS" = "true" ] && echo "✅ Success" || echo "❌ Failed" ) |

          ## URLs
          - **Application**: https://${{ env.TENANT }}-${{ env.APP_NAME }}-${ENV}.${{ env.DOMAIN }}

          ## Next Steps
          $( [ "$SUCCESS" = "true" ] && echo "To promote to next environment:" || echo "To troubleshoot:" )
          \`\`\`bash
          $( [ "$SUCCESS" = "true" ] && echo "gh workflow run promote-${{ env.APP_NAME }}.yaml -f target_environment=qa -f image_tag=${TAG}" || echo "gh workflow run diagnostics-${{ env.APP_NAME }}.yaml -f environment=${ENV}" )
          \`\`\`
          EOF

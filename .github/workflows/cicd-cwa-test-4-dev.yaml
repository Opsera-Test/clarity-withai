# ════════════════════════════════════════════════════════════════
# CI/CD Pipeline - cwa-test-4 - Dev (Rolling)
# Recommended Setup v2.4 | 11 Stages + SonarQube + Slack
# Triggers: push to main (source code changes only)
# ════════════════════════════════════════════════════════════════

name: "CI/CD: cwa-test-4 - Dev"

concurrency:
  group: cicd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches: [main]
    paths-ignore:
      - '.opsera-cwa-test-4/k8s/**'
      - '.opsera-cwa-test-4/argocd/**'
      - '.github/workflows/00-bootstrap-infrastructure.yaml'
      - '.github/workflows/cicd-cwa-test-4-qa.yaml'
      - '.github/workflows/cicd-cwa-test-4-staging.yaml'
      - '**/*.md'
  workflow_dispatch:

env:
  APP_NAME: cwa-test-4
  TENANT: opsera
  ENV: dev
  AWS_REGION: us-west-2
  HUB_CLUSTER: argocd-usw2
  SPOKE_CLUSTER: opsera-usw2-np
  NAMESPACE: opsera-cwa-test-4-dev
  ECR_REPO_NAME: opsera/cwa-test-4
  ARGOCD_APP_NAME: opsera-cwa-test-4-dev
  SONAR_HOST_URL: https://691b48d8f95f3e491f76c256-1769440549.prodqa.opsera.io
  SONAR_PROJECT_KEY: cwa-test-4

jobs:

  # ── Stage 1: Bootstrap Prerequisites Check ────────────────────
  bootstrap-check:
    name: "✅ Bootstrap Prerequisites"
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify ECR Repository
        run: |
          aws ecr describe-repositories --repository-names "${ECR_REPO_NAME}" \
            --region ${AWS_REGION} 2>/dev/null || \
            (echo "❌ ECR not found — run bootstrap first" && exit 1)
          echo "✓ ECR repository found"

      - name: Setup Spoke Access
        run: aws eks update-kubeconfig --name ${SPOKE_CLUSTER} --region ${AWS_REGION} --alias spoke

      - name: Verify Namespace
        run: |
          kubectl --context spoke get namespace ${NAMESPACE} &>/dev/null || \
            (echo "❌ Namespace not found — run bootstrap first" && exit 1)
          echo "✓ Namespace found: ${NAMESPACE}"

  # ── Stage 2a: Gitleaks Security Scan (warn) ───────────────────
  security-scan:
    name: "🔒 Gitleaks Security Scan"
    runs-on: ubuntu-latest
    needs: [bootstrap-check]
    continue-on-error: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Report
        run: echo "🔒 Gitleaks scan complete (warn-only)"

  # ── Stage 2b: SonarQube Scan (warn-only, parallel) ────────────
  sonarqube-scan:
    name: "🔍 SonarQube Code Quality"
    runs-on: ubuntu-latest
    needs: [bootstrap-check]
    continue-on-error: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run SonarQube Analysis
        uses: SonarSource/sonarqube-scan-action@master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ env.SONAR_PROJECT_KEY }}
            -Dsonar.sources=src
        continue-on-error: true

      - name: Report
        run: echo "🔍 SonarQube scan complete (warn-only)"

  # ── Stage 3: Build Docker Image ───────────────────────────────
  build-image:
    name: "🐳 Build Image"
    runs-on: ubuntu-latest
    needs: [security-scan, sonarqube-scan]
    outputs:
      image_tag: ${{ steps.set-tag.outputs.image_tag }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set Image Tag
        id: set-tag
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          IMAGE_TAG="${SHORT_SHA}-${TIMESTAMP}"
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "Image tag: ${IMAGE_TAG}"

      - name: Build Docker Image
        run: |
          IMAGE_TAG=${{ steps.set-tag.outputs.image_tag }}
          docker build -f Dockerfile -t ${APP_NAME}:${IMAGE_TAG} .
          echo "✓ Image built: ${APP_NAME}:${IMAGE_TAG}"

      - name: Save Image Artifact
        run: docker save ${APP_NAME}:${{ steps.set-tag.outputs.image_tag }} -o /tmp/image.tar

      - name: Upload Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1

  # ── Stage 4: Grype Vulnerability Scan (warn) ──────────────────
  grype-scan:
    name: "🛡️ Grype Vulnerability Scan"
    runs-on: ubuntu-latest
    needs: [build-image]
    continue-on-error: true
    steps:
      - name: Download Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker Image
        run: docker load -i /tmp/image.tar

      - name: Install Grype
        run: curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Run Grype Scan
        run: |
          grype ${{ env.APP_NAME }}:${{ needs.build-image.outputs.image_tag }} \
            --output table 2>&1 | tee grype-report.txt || true

      - name: Upload Grype Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: grype-report
          path: grype-report.txt
          retention-days: 30

  # ── Stage 5: Push to ECR ──────────────────────────────────────
  push-to-ecr:
    name: "📤 Push to ECR"
    runs-on: ubuntu-latest
    needs: [build-image, grype-scan]
    if: always() && needs.build-image.result == 'success'
    outputs:
      ecr_uri: ${{ steps.push.outputs.ecr_uri }}
      image_tag: ${{ needs.build-image.outputs.image_tag }}
    steps:
      - name: Download Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker Image
        run: docker load -i /tmp/image.tar

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR and Push
        id: push
        run: |
          IMAGE_TAG=${{ needs.build-image.outputs.image_tag }}
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          ECR_URI="${ECR_REGISTRY}/${ECR_REPO_NAME}"

          aws ecr get-login-password --region ${AWS_REGION} | \
            docker login --username AWS --password-stdin ${ECR_REGISTRY}

          docker tag ${APP_NAME}:${IMAGE_TAG} ${ECR_URI}:${IMAGE_TAG}
          docker push ${ECR_URI}:${IMAGE_TAG}

          echo "ecr_uri=${ECR_URI}" >> $GITHUB_OUTPUT
          echo "✓ Pushed: ${ECR_URI}:${IMAGE_TAG}"

  # ── Stage 6: Update Manifests ─────────────────────────────────
  update-manifests:
    name: "📝 Update Manifests"
    runs-on: ubuntu-latest
    needs: [push-to-ecr]
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update Dev Kustomize Image Tag
        run: |
          IMAGE_TAG=${{ needs.push-to-ecr.outputs.image_tag }}
          ECR_URI=${{ needs.push-to-ecr.outputs.ecr_uri }}
          KUSTOMIZE_FILE=".opsera-cwa-test-4/k8s/overlays/dev/kustomization.yaml"

          sed -i "s|newName:.*|newName: ${ECR_URI}|g" ${KUSTOMIZE_FILE}
          sed -i "s|newTag:.*|newTag: ${IMAGE_TAG}|g" ${KUSTOMIZE_FILE}

          echo "✓ Updated dev kustomization with ${IMAGE_TAG}"

      - name: Commit and Push with Retry
        run: |
          IMAGE_TAG=${{ needs.push-to-ecr.outputs.image_tag }}

          if git diff --quiet && git diff --cached --quiet; then
            echo "✓ No changes to commit"
            exit 0
          fi

          git add -A
          git commit -m "chore: update dev image to ${IMAGE_TAG} [skip ci]"

          for i in {1..3}; do
            if git push origin ${{ github.ref_name }}; then
              echo "✅ Pushed successfully"
              exit 0
            fi
            echo "Push failed retrying ${i}/3"
            git pull --rebase origin ${{ github.ref_name }}
            sleep 2
          done
          exit 1

  # ── Stage 7: Create/Update ArgoCD App ─────────────────────────
  create-argocd-app:
    name: "🚀 Create ArgoCD Application"
    runs-on: ubuntu-latest
    needs: [update-manifests]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Hub Access
        run: aws eks update-kubeconfig --name ${HUB_CLUSTER} --region ${AWS_REGION} --alias hub

      - name: Apply ArgoCD Application
        run: |
          git pull --rebase origin ${{ github.ref_name }} 2>/dev/null || true
          kubectl --context hub apply -f .opsera-cwa-test-4/argocd/dev/application.yaml
          echo "✓ ArgoCD application applied: ${ARGOCD_APP_NAME}"

  # ── Stage 8: Refresh ECR Secret on Spoke ──────────────────────
  refresh-ecr-secret:
    name: "🔑 Refresh ECR Secret"
    runs-on: ubuntu-latest
    needs: [create-argocd-app]
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Spoke Access
        run: aws eks update-kubeconfig --name ${SPOKE_CLUSTER} --region ${AWS_REGION} --alias spoke

      - name: Refresh ECR Pull Secret
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          ECR_PASSWORD=$(aws ecr get-login-password --region ${AWS_REGION})

          kubectl --context spoke create secret docker-registry ecr-pull-secret \
            --docker-server="${ECR_REGISTRY}" \
            --docker-username=AWS \
            --docker-password="${ECR_PASSWORD}" \
            --namespace=${NAMESPACE} \
            --dry-run=client -o yaml | kubectl --context spoke apply -f -

          echo "✓ ECR pull secret refreshed"

  # ── Stage 9: Sync and Deploy ──────────────────────────────────
  sync-and-deploy:
    name: "🔄 Sync ArgoCD"
    runs-on: ubuntu-latest
    needs: [refresh-ecr-secret]
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Hub Access
        run: aws eks update-kubeconfig --name ${HUB_CLUSTER} --region ${AWS_REGION} --alias hub

      - name: Hard Refresh and Sync
        run: |
          kubectl --context hub annotate application ${ARGOCD_APP_NAME} \
            -n argocd argocd.argoproj.io/refresh=hard --overwrite
          sleep 10
          kubectl --context hub patch application ${ARGOCD_APP_NAME} \
            -n argocd --type merge \
            -p '{"operation":{"initiatedBy":{"username":"github-actions"},"sync":{"syncStrategy":{"hook":{"force":true}},"prune":true}}}'
          echo "✓ Sync triggered"

      - name: Wait for Sync
        run: |
          TIMEOUT=300; ELAPSED=0; INTERVAL=15
          while [ $ELAPSED -lt $TIMEOUT ]; do
            SYNC=$(kubectl --context hub get application ${ARGOCD_APP_NAME} \
              -n argocd -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "Unknown")
            HEALTH=$(kubectl --context hub get application ${ARGOCD_APP_NAME} \
              -n argocd -o jsonpath='{.status.health.status}' 2>/dev/null || echo "Unknown")
            echo "  Sync: ${SYNC} | Health: ${HEALTH} | ${ELAPSED}s"
            [ "${SYNC}" = "Synced" ] && [ "${HEALTH}" = "Healthy" ] && echo "✓ Synced and Healthy" && break
            sleep ${INTERVAL}; ELAPSED=$((ELAPSED + INTERVAL))
          done

  # ── Stage 10: Verify Deployment ───────────────────────────────
  verify-deployment:
    name: "✅ Verify Deployment"
    runs-on: ubuntu-latest
    needs: [sync-and-deploy]
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Spoke Access
        run: aws eks update-kubeconfig --name ${SPOKE_CLUSTER} --region ${AWS_REGION} --alias spoke

      - name: Verify Pods Running
        run: |
          TIMEOUT=180; ELAPSED=0; INTERVAL=15
          while [ $ELAPSED -lt $TIMEOUT ]; do
            READY=$(kubectl --context spoke get pods -n ${NAMESPACE} \
              -l app=${APP_NAME} --field-selector=status.phase=Running \
              --no-headers 2>/dev/null | wc -l)
            TOTAL=$(kubectl --context spoke get pods -n ${NAMESPACE} \
              -l app=${APP_NAME} --no-headers 2>/dev/null | wc -l)
            echo "  Pods ready: ${READY}/${TOTAL} | ${ELAPSED}s"
            [ "$TOTAL" -gt "0" ] && [ "$READY" -eq "$TOTAL" ] && echo "✓ All pods running" && break
            sleep ${INTERVAL}; ELAPSED=$((ELAPSED + INTERVAL))
          done
          kubectl --context spoke get pods -n ${NAMESPACE} -l app=${APP_NAME}

      - name: Deployment Summary
        run: |
          echo "════════════════════════════════════════════"
          echo "  DEV DEPLOYMENT COMPLETE ✅"
          echo "  URL: https://cwa-test-4-dev.agent.opsera.dev"
          echo "════════════════════════════════════════════"
          echo "  To promote to QA:"
          echo "  gh workflow run cicd-cwa-test-4-qa.yaml \\"
          echo "    -f image_tag=\$(cat .opsera-cwa-test-4/k8s/overlays/dev/kustomization.yaml | grep newTag | awk '{print \$2}')"
          echo "════════════════════════════════════════════"

  # ── Stage 11: Deployment Landscape ────────────────────────────
  deployment-landscape:
    name: "🗺️ Deployment Landscape"
    runs-on: ubuntu-latest
    needs: [verify-deployment]
    if: always() && needs.verify-deployment.result == 'success'
    continue-on-error: true
    steps:
      - name: Publish Landscape
        run: echo "✓ Landscape: ${APP_NAME}-${ENV} $(date -u +%Y-%m-%dT%H:%M:%SZ)"

  # ── Slack Notification on Failure ─────────────────────────────
  notify-slack:
    name: "📢 Slack Notification"
    runs-on: ubuntu-latest
    needs: [verify-deployment]
    if: always() && needs.verify-deployment.result == 'failure'
    steps:
      - name: Send Failure Notification
        run: |
          curl -s -X POST -H 'Content-type: application/json' \
            --data "{\"text\":\"❌ *cwa-test-4 Dev* deployment FAILED\n*Run:* <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|#${{ github.run_number }}>\n*Commit:* \`${{ github.sha }}\`\"}" \
            ${{ secrets.SLACK_WEBHOOK_URL }}
          echo "✓ Slack notification sent"

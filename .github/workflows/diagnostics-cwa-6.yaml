# ════════════════════════════════════════════════════════════════════════════
# DIAGNOSTICS - cwa-6
# Code-to-Cloud Enterprise v1.7.3
# ════════════════════════════════════════════════════════════════════════════

name: "🔬 cwa-6: Diagnostics"

on:
  workflow_dispatch:
    inputs:
      diagnostic_type:
        description: 'Type of diagnostic'
        required: true
        type: choice
        options:
          - full-pipeline
          - pod-logs
          - argocd-debug
          - force-sync
        default: full-pipeline

env:
  APP_NAME: cwa-6
  TENANT: opsera
  AWS_REGION: us-east-1
  HUB_CLUSTER: argocd-use1
  SPOKE_CLUSTER: opsera-use1-np
  NAMESPACE: opsera-cwa-6-dev

permissions:
  contents: read
  id-token: write

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # FULL PIPELINE DIAGNOSTICS
  # ════════════════════════════════════════════════════════════════════════════
  full-pipeline:
    name: "🔍 Full Pipeline Diagnostics"
    runs-on: ubuntu-latest
    if: inputs.diagnostic_type == 'full-pipeline'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: "1️⃣ ECR Check"
        run: |
          echo "### 📦 Stage 1: ECR Repository" >> $GITHUB_STEP_SUMMARY
          REPO="${{ env.TENANT }}/${{ env.APP_NAME }}"
          
          if aws ecr describe-repositories --repository-names "$REPO" &>/dev/null; then
            echo "✅ ECR repository exists" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Latest Images:**" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            aws ecr describe-images --repository-name "$REPO" \
              --query 'imageDetails[*].[imageTags[0],imagePushedAt]' \
              --output table | head -10 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ ECR repository NOT found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: "2️⃣ Hub Cluster - ArgoCD Check"
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🎯 Stage 2: ArgoCD Application" >> $GITHUB_STEP_SUMMARY
          
          APP_NAME="${{ env.APP_NAME }}-dev"
          if kubectl get application $APP_NAME -n argocd &>/dev/null; then
            SYNC=$(kubectl get application $APP_NAME -n argocd -o jsonpath='{.status.sync.status}')
            HEALTH=$(kubectl get application $APP_NAME -n argocd -o jsonpath='{.status.health.status}')
            echo "✅ Application exists" >> $GITHUB_STEP_SUMMARY
            echo "- Sync Status: \`$SYNC\`" >> $GITHUB_STEP_SUMMARY
            echo "- Health Status: \`$HEALTH\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ ArgoCD application NOT found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: "3️⃣ Spoke Cluster - Namespace Check"
        run: |
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔧 Stage 3: Kubernetes Resources" >> $GITHUB_STEP_SUMMARY
          
          if kubectl get namespace ${{ env.NAMESPACE }} &>/dev/null; then
            echo "✅ Namespace exists: \`${{ env.NAMESPACE }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Namespace NOT found" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pods:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n ${{ env.NAMESPACE }} -o wide 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No pods found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Services:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get svc -n ${{ env.NAMESPACE }} 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No services found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Ingress:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get ingress -n ${{ env.NAMESPACE }} 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No ingress found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: "4️⃣ Health Check"
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🏥 Stage 4: Health Checks" >> $GITHUB_STEP_SUMMARY
          
          URL="https://${{ env.TENANT }}-${{ env.APP_NAME }}-dev.agent.opsera.dev"
          echo "Testing: \`$URL\`" >> $GITHUB_STEP_SUMMARY
          
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL" 2>/dev/null || echo "000")
          
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ] || [ "$STATUS" = "302" ]; then
            echo "✅ Endpoint accessible: HTTP $STATUS" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Endpoint returned: HTTP $STATUS" >> $GITHUB_STEP_SUMMARY
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # POD LOGS
  # ════════════════════════════════════════════════════════════════════════════
  pod-logs:
    name: "📋 Pod Logs"
    runs-on: ubuntu-latest
    if: inputs.diagnostic_type == 'pod-logs'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get Pod Logs
        run: |
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}
          
          echo "### 📋 Pod Logs" >> $GITHUB_STEP_SUMMARY
          
          for POD in $(kubectl get pods -n ${{ env.NAMESPACE }} -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "#### Pod: \`$POD\`" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            kubectl logs $POD -n ${{ env.NAMESPACE }} --tail=50 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No logs available" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          done

  # ════════════════════════════════════════════════════════════════════════════
  # ARGOCD DEBUG
  # ════════════════════════════════════════════════════════════════════════════
  argocd-debug:
    name: "🔄 ArgoCD Debug"
    runs-on: ubuntu-latest
    if: inputs.diagnostic_type == 'argocd-debug'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Debug ArgoCD Application
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}
          
          APP_NAME="${{ env.APP_NAME }}-dev"
          
          echo "### 🔄 ArgoCD Debug: \`$APP_NAME\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Application YAML:**" >> $GITHUB_STEP_SUMMARY
          echo '```yaml' >> $GITHUB_STEP_SUMMARY
          kubectl get application $APP_NAME -n argocd -o yaml 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "Application not found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # FORCE SYNC
  # ════════════════════════════════════════════════════════════════════════════
  force-sync:
    name: "⚡ Force Sync"
    runs-on: ubuntu-latest
    if: inputs.diagnostic_type == 'force-sync'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force Sync ArgoCD
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}
          
          APP_NAME="${{ env.APP_NAME }}-dev"
          
          echo "### ⚡ Force Sync: \`$APP_NAME\`" >> $GITHUB_STEP_SUMMARY
          
          # Hard refresh
          kubectl annotate application $APP_NAME -n argocd argocd.argoproj.io/refresh=hard --overwrite
          
          echo "✅ Force sync triggered" >> $GITHUB_STEP_SUMMARY
          
          # Wait and check status
          sleep 30
          STATUS=$(kubectl get application $APP_NAME -n argocd -o jsonpath='{.status.sync.status}')
          HEALTH=$(kubectl get application $APP_NAME -n argocd -o jsonpath='{.status.health.status}')
          echo "- Sync: \`$STATUS\`" >> $GITHUB_STEP_SUMMARY
          echo "- Health: \`$HEALTH\`" >> $GITHUB_STEP_SUMMARY

# ════════════════════════════════════════════════════════════════════════════
# DIAGNOSTICS - cwa-2
# Generated by Code-to-Cloud Enterprise v1.7.3
# RULE 50: MANDATORY diagnostics workflow
# ════════════════════════════════════════════════════════════════════════════

name: "🔬 cwa-2: Diagnostics"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        options: [dev]
        default: dev
      diagnostic_type:
        description: 'Diagnostic type'
        type: choice
        options:
          - full-pipeline
          - pod-logs
          - argocd-debug
          - force-sync
        default: full-pipeline

env:
  APP_NAME: cwa-2
  TENANT: opsera
  AWS_REGION: us-east-1
  EKS_SPOKE_CLUSTER: opsera-use1-np
  EKS_HUB_CLUSTER: argocd-use1

permissions:
  contents: read
  id-token: write

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # FULL PIPELINE DIAGNOSTICS
  # ════════════════════════════════════════════════════════════════════════════
  full-pipeline:
    name: "🔍 Full Pipeline Diagnostics"
    runs-on: ubuntu-latest
    if: inputs.diagnostic_type == 'full-pipeline'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: "1️⃣ ECR Check"
        run: |
          echo "### 📦 Stage 1: ECR Repository" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          ECR_REPO="${{ env.TENANT }}/${{ env.APP_NAME }}"
          
          if aws ecr describe-repositories --repository-names "$ECR_REPO" 2>/dev/null; then
            echo "✅ ECR repository exists" >> $GITHUB_STEP_SUMMARY
            
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Latest Images:**" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            aws ecr describe-images --repository-name "$ECR_REPO" \
              --query 'imageDetails[*].[imageTags[0],imagePushedAt]' \
              --output table 2>/dev/null | head -10 >> $GITHUB_STEP_SUMMARY || echo "No images found" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ ECR repository NOT found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: "2️⃣ EKS/Namespace Check"
        run: |
          NAMESPACE="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ inputs.environment }}"
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🎯 Stage 2: EKS Namespace" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          aws eks update-kubeconfig --name ${{ env.EKS_SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}
          
          if kubectl get namespace "$NAMESPACE" 2>/dev/null; then
            echo "✅ Namespace exists: \`$NAMESPACE\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Namespace NOT found: \`$NAMESPACE\`" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pods:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n "$NAMESPACE" -o wide 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No pods found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Services:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get svc -n "$NAMESPACE" 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No services found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Ingress:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get ingress -n "$NAMESPACE" 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No ingress found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: "3️⃣ ArgoCD Status"
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔄 Stage 3: ArgoCD Application" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          aws eks update-kubeconfig --name ${{ env.EKS_HUB_CLUSTER }} --region ${{ env.AWS_REGION }}
          
          ARGOCD_APP="${{ env.APP_NAME }}-${{ inputs.environment }}"
          
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get application "$ARGOCD_APP" -n argocd -o wide 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "ArgoCD app not found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          SYNC_STATUS=$(kubectl get application "$ARGOCD_APP" -n argocd -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "Unknown")
          HEALTH_STATUS=$(kubectl get application "$ARGOCD_APP" -n argocd -o jsonpath='{.status.health.status}' 2>/dev/null || echo "Unknown")
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Sync | $SYNC_STATUS |" >> $GITHUB_STEP_SUMMARY
          echo "| Health | $HEALTH_STATUS |" >> $GITHUB_STEP_SUMMARY

      - name: "4️⃣ Health Check"
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🏥 Stage 4: Health Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          URL="https://opsera-${{ env.APP_NAME }}-${{ inputs.environment }}.agent.opsera.dev"
          
          set +e
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL" 2>/dev/null || echo "000")
          set -e
          
          echo "URL: \`$URL\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Health check: HTTP $HTTP_CODE" >> $GITHUB_STEP_SUMMARY
          elif [ "$HTTP_CODE" = "000" ]; then
            echo "⚠️ Health check: Connection failed (DNS or service not ready)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Health check: HTTP $HTTP_CODE" >> $GITHUB_STEP_SUMMARY
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # POD LOGS
  # ════════════════════════════════════════════════════════════════════════════
  pod-logs:
    name: "📋 Pod Logs"
    runs-on: ubuntu-latest
    if: inputs.diagnostic_type == 'pod-logs'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get Pod Logs
        run: |
          NAMESPACE="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ inputs.environment }}"
          
          aws eks update-kubeconfig --name ${{ env.EKS_SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}
          
          echo "### 📋 Pod Logs - $NAMESPACE" >> $GITHUB_STEP_SUMMARY
          
          for POD in $(kubectl get pods -n "$NAMESPACE" -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "#### Pod: \`$POD\`" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            kubectl logs "$POD" -n "$NAMESPACE" --tail=50 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No logs available" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Previous Container:**" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            kubectl logs "$POD" -n "$NAMESPACE" --previous --tail=20 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No previous logs" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          done

  # ════════════════════════════════════════════════════════════════════════════
  # ARGOCD DEBUG
  # ════════════════════════════════════════════════════════════════════════════
  argocd-debug:
    name: "🔄 ArgoCD Debug"
    runs-on: ubuntu-latest
    if: inputs.diagnostic_type == 'argocd-debug'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Debug ArgoCD
        run: |
          ARGOCD_APP="${{ env.APP_NAME }}-${{ inputs.environment }}"
          
          aws eks update-kubeconfig --name ${{ env.EKS_HUB_CLUSTER }} --region ${{ env.AWS_REGION }}
          
          echo "### 🔄 ArgoCD Debug: $ARGOCD_APP" >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Application YAML:**" >> $GITHUB_STEP_SUMMARY
          echo '```yaml' >> $GITHUB_STEP_SUMMARY
          kubectl get application "$ARGOCD_APP" -n argocd -o yaml 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "Not found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Recent Events:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get events -n argocd --field-selector involvedObject.name="$ARGOCD_APP" --sort-by='.lastTimestamp' 2>/dev/null | tail -20 >> $GITHUB_STEP_SUMMARY || echo "No events" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # FORCE SYNC
  # ════════════════════════════════════════════════════════════════════════════
  force-sync:
    name: "⚡ Force Sync"
    runs-on: ubuntu-latest
    if: inputs.diagnostic_type == 'force-sync'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force Sync ArgoCD
        run: |
          ARGOCD_APP="${{ env.APP_NAME }}-${{ inputs.environment }}"
          
          aws eks update-kubeconfig --name ${{ env.EKS_HUB_CLUSTER }} --region ${{ env.AWS_REGION }}
          
          echo "### ⚡ Force Sync: $ARGOCD_APP" >> $GITHUB_STEP_SUMMARY
          
          # Hard refresh
          kubectl annotate application "$ARGOCD_APP" -n argocd \
            argocd.argoproj.io/refresh=hard --overwrite 2>/dev/null || true
          
          echo "✅ Force sync triggered" >> $GITHUB_STEP_SUMMARY
          
          # Wait and check
          sleep 30
          
          SYNC_STATUS=$(kubectl get application "$ARGOCD_APP" -n argocd -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "Unknown")
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status after sync:** $SYNC_STATUS" >> $GITHUB_STEP_SUMMARY

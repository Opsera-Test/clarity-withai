# ════════════════════════════════════════════════════════════════════════════
# QUALITY GATES WORKFLOW - clarity-withai-1
# Generated by Code-to-Cloud Enterprise v1.7
# RULE 45: Runs in PARALLEL with CI Build
# ════════════════════════════════════════════════════════════════════════════
name: "🛡️ clarity-withai-1: Quality Gates"

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'package*.json'
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  APP_NAME: clarity-withai-1

permissions:
  contents: read
  security-events: write

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # SECRETS DETECTION
  # ════════════════════════════════════════════════════════════════════════════
  secrets-scan:
    name: "🔐 Gitleaks"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true  # Warn mode
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ════════════════════════════════════════════════════════════════════════════
  # SCA - VULNERABILITY SCANNING
  # ════════════════════════════════════════════════════════════════════════════
  sca-scan:
    name: "🛡️ Grype SCA"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Grype
        uses: anchore/scan-action@v3
        id: grype
        continue-on-error: true  # Warn mode
        with:
          path: "."
          output-format: sarif
          severity-cutoff: critical

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}

  # ════════════════════════════════════════════════════════════════════════════
  # SAST - SONARQUBE
  # ════════════════════════════════════════════════════════════════════════════
  sast-scan:
    name: "🔍 SonarQube"
    runs-on: ubuntu-latest
    if: vars.SONAR_HOST_URL != ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@master
        continue-on-error: true  # Warn mode
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        with:
          args: >
            -Dsonar.projectKey=${{ env.APP_NAME }}
            -Dsonar.sources=src

  # ════════════════════════════════════════════════════════════════════════════
  # QUALITY GATE SUMMARY
  # ════════════════════════════════════════════════════════════════════════════
  quality-gate:
    name: "🚦 Quality Gate"
    runs-on: ubuntu-latest
    needs: [secrets-scan, sca-scan]
    if: always()
    steps:
      - name: Evaluate Gates
        run: |
          echo "### 🚦 Quality Gate Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Gate | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Secrets (Gitleaks) | ${{ needs.secrets-scan.result == 'success' && '✅ Pass' || '⚠️ Warn' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SCA (Grype) | ${{ needs.sca-scan.result == 'success' && '✅ Pass' || '⚠️ Warn' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Mode:** Warn Only (non-blocking)" >> $GITHUB_STEP_SUMMARY

name: "CI clarity1"

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'vite.config.ts'
      - 'tailwind.config.ts'
      - 'tsconfig*.json'
  workflow_dispatch:
    inputs:
      skip_build:
        description: 'Skip build'
        type: boolean
        default: false

concurrency:
  group: ci-clarity1-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_NAME: clarity1
  TENANT: opsera
  AWS_REGION: us-west-2
  SPOKE_CLUSTER: opsera-usw2-np
  HUB_CLUSTER: argocd-usw2

permissions:
  contents: write
  id-token: write

jobs:
  verify-bootstrap:
    name: "Verify Bootstrap"
    runs-on: ubuntu-latest
    outputs:
      ecr_uri: ${{ steps.ecr.outputs.uri }}
      image_tag: ${{ steps.tag.outputs.value }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get AWS Account ID
        id: aws
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=${ACCOUNT_ID}" >> $GITHUB_OUTPUT

      - name: Verify ECR Repository
        id: ecr
        run: |
          REPO_NAME="${TENANT}/${APP_NAME}"
          ACCOUNT_ID="${{ steps.aws.outputs.account_id }}"
          ECR_URI="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          
          if ! aws ecr describe-repositories --repository-names "$REPO_NAME" 2>/dev/null; then
            echo "ECR repository not found. Run bootstrap first!" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          
          echo "uri=${ECR_URI}" >> $GITHUB_OUTPUT
          echo "ECR repository verified" >> $GITHUB_STEP_SUMMARY

      - name: Generate Image Tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          TAG="${SHORT_SHA}-${TIMESTAMP}"
          echo "value=${TAG}" >> $GITHUB_OUTPUT
          echo "Image Tag: ${TAG}" >> $GITHUB_STEP_SUMMARY

  security-scan:
    name: "Security Scan"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-push:
    name: "Build and Push"
    needs: [verify-bootstrap]
    if: inputs.skip_build != true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .opsera-clarity1/Dockerfile
          push: true
          tags: |
            ${{ needs.verify-bootstrap.outputs.ecr_uri }}/${{ env.TENANT }}/${{ env.APP_NAME }}:${{ needs.verify-bootstrap.outputs.image_tag }}
            ${{ needs.verify-bootstrap.outputs.ecr_uri }}/${{ env.TENANT }}/${{ env.APP_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image Summary
        run: |
          echo "Docker Image Built" >> $GITHUB_STEP_SUMMARY
          echo "${{ needs.verify-bootstrap.outputs.ecr_uri }}/${{ env.TENANT }}/${{ env.APP_NAME }}:${{ needs.verify-bootstrap.outputs.image_tag }}" >> $GITHUB_STEP_SUMMARY

  update-manifests:
    name: "Update Manifests"
    needs: [verify-bootstrap, build-push]
    if: always() && needs.verify-bootstrap.result == 'success' && (needs.build-push.result == 'success' || needs.build-push.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Update Kustomization
        run: |
          IMAGE_TAG="${{ needs.verify-bootstrap.outputs.image_tag }}"
          sed -i "s/newTag: .*/newTag: ${IMAGE_TAG}/" \
            .opsera-clarity1/k8s/overlays/dev/kustomization.yaml
          echo "Updated image tag to: ${IMAGE_TAG}" >> $GITHUB_STEP_SUMMARY

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .opsera-clarity1/k8s/overlays/dev/kustomization.yaml
          
          if git diff --cached --quiet; then
            echo "No manifest changes"
          else
            git commit -m "deploy(dev): Update clarity1 to ${{ needs.verify-bootstrap.outputs.image_tag }} [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi

  sync-deploy:
    name: "Sync and Deploy"
    needs: [verify-bootstrap, update-manifests]
    if: always() && needs.update-manifests.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      deploy_success: ${{ steps.wait.outputs.success }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure Hub kubectl
        run: |
          echo "=========================================="
          echo "CONFIGURING HUB CLUSTER: ${{ env.HUB_CLUSTER }}"
          echo "=========================================="
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}
          echo "Hub cluster configured"
          kubectl config current-context
          echo ""

      - name: ArgoCD Pre-Sync Status
        run: |
          echo "=========================================="
          echo "ARGOCD PRE-SYNC STATUS"
          echo "=========================================="
          
          echo "--- ArgoCD Application Details ---"
          kubectl get application clarity1-dev -n argocd -o wide || echo "Application not found"
          echo ""
          
          echo "--- Application YAML (status section) ---"
          kubectl get application clarity1-dev -n argocd -o jsonpath='{.status}' | jq . 2>/dev/null || \
            kubectl get application clarity1-dev -n argocd -o yaml | grep -A 50 "status:" || echo "Could not get status"
          echo ""
          
          echo "--- Sync Status ---"
          SYNC_STATUS=$(kubectl get application clarity1-dev -n argocd -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "Unknown")
          HEALTH_STATUS=$(kubectl get application clarity1-dev -n argocd -o jsonpath='{.status.health.status}' 2>/dev/null || echo "Unknown")
          SYNC_REVISION=$(kubectl get application clarity1-dev -n argocd -o jsonpath='{.status.sync.revision}' 2>/dev/null || echo "Unknown")
          
          echo "Sync Status: $SYNC_STATUS"
          echo "Health Status: $HEALTH_STATUS"
          echo "Sync Revision: $SYNC_REVISION"
          echo ""
          
          echo "--- Application Conditions ---"
          kubectl get application clarity1-dev -n argocd -o jsonpath='{.status.conditions}' | jq . 2>/dev/null || echo "No conditions"
          echo ""
          
          echo "--- Resource Status ---"
          kubectl get application clarity1-dev -n argocd -o jsonpath='{.status.resources}' | jq . 2>/dev/null || echo "No resource status"
          echo ""

      - name: Force ArgoCD Sync
        run: |
          echo "=========================================="
          echo "FORCING ARGOCD SYNC"
          echo "=========================================="
          
          echo "--- Step 1: Hard Refresh ---"
          kubectl annotate application clarity1-dev -n argocd \
            argocd.argoproj.io/refresh=hard --overwrite
          echo "Hard refresh annotation applied"
          echo ""
          
          echo "--- Step 2: Wait 10 seconds for refresh ---"
          sleep 10
          echo ""
          
          echo "--- Step 3: Check sync status after refresh ---"
          SYNC_STATUS=$(kubectl get application clarity1-dev -n argocd -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "Unknown")
          echo "Sync Status after refresh: $SYNC_STATUS"
          echo ""
          
          echo "--- Step 4: Force sync operation ---"
          kubectl patch application clarity1-dev -n argocd --type merge -p '{"operation":{"initiatedBy":{"username":"github-actions"},"sync":{"prune":true}}}' 2>/dev/null || echo "Sync patch applied or already syncing"
          echo ""
          
          echo "--- Step 5: Wait 15 seconds for sync to start ---"
          sleep 15
          echo ""

      - name: ArgoCD Post-Sync Status
        run: |
          echo "=========================================="
          echo "ARGOCD POST-SYNC STATUS (after 25s)"
          echo "=========================================="
          
          echo "--- Application Status ---"
          kubectl get application clarity1-dev -n argocd -o wide
          echo ""
          
          SYNC_STATUS=$(kubectl get application clarity1-dev -n argocd -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "Unknown")
          HEALTH_STATUS=$(kubectl get application clarity1-dev -n argocd -o jsonpath='{.status.health.status}' 2>/dev/null || echo "Unknown")
          OPERATION_STATE=$(kubectl get application clarity1-dev -n argocd -o jsonpath='{.status.operationState.phase}' 2>/dev/null || echo "None")
          
          echo "Sync Status: $SYNC_STATUS"
          echo "Health Status: $HEALTH_STATUS"
          echo "Operation State: $OPERATION_STATE"
          echo ""
          
          echo "--- Operation State Details ---"
          kubectl get application clarity1-dev -n argocd -o jsonpath='{.status.operationState}' | jq . 2>/dev/null || echo "No operation state"
          echo ""
          
          echo "--- Sync Result ---"
          kubectl get application clarity1-dev -n argocd -o jsonpath='{.status.operationState.syncResult}' | jq . 2>/dev/null || echo "No sync result yet"
          echo ""
          
          echo "--- Any Errors? ---"
          kubectl get application clarity1-dev -n argocd -o jsonpath='{.status.operationState.message}' 2>/dev/null || echo "No error message"
          echo ""

      - name: Configure Spoke kubectl
        run: |
          echo "=========================================="
          echo "CONFIGURING SPOKE CLUSTER: ${{ env.SPOKE_CLUSTER }}"
          echo "=========================================="
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}
          echo "Spoke cluster configured"
          kubectl config current-context
          echo ""

      - name: Verify Namespace and Resources
        run: |
          NAMESPACE="opsera-clarity1-dev"
          
          echo "=========================================="
          echo "VERIFYING NAMESPACE: $NAMESPACE"
          echo "=========================================="
          
          echo "--- Namespace Status ---"
          kubectl get namespace $NAMESPACE -o wide 2>/dev/null || echo "Namespace not found!"
          echo ""
          
          echo "--- All Resources in Namespace ---"
          kubectl get all -n $NAMESPACE 2>/dev/null || echo "No resources found"
          echo ""
          
          echo "--- Deployments ---"
          kubectl get deployments -n $NAMESPACE -o wide 2>/dev/null || echo "No deployments"
          echo ""
          
          echo "--- ReplicaSets ---"
          kubectl get replicasets -n $NAMESPACE -o wide 2>/dev/null || echo "No replicasets"
          echo ""
          
          echo "--- Services ---"
          kubectl get services -n $NAMESPACE -o wide 2>/dev/null || echo "No services"
          echo ""
          
          echo "--- Ingress ---"
          kubectl get ingress -n $NAMESPACE -o wide 2>/dev/null || echo "No ingress"
          echo ""
          
          echo "--- Ingress Details ---"
          kubectl describe ingress -n $NAMESPACE 2>/dev/null || echo "No ingress to describe"
          echo ""

      - name: Wait for Deployment
        id: wait
        timeout-minutes: 10
        run: |
          NAMESPACE="opsera-clarity1-dev"
          
          echo "=========================================="
          echo "WAITING FOR DEPLOYMENT"
          echo "=========================================="
          
          echo "--- Checking Namespace ---"
          for i in {1..30}; do
            if kubectl get namespace $NAMESPACE 2>/dev/null; then
              echo "Namespace exists!"
              break
            fi
            echo "Waiting for namespace ($i/30)..."
            sleep 10
          done
          echo ""
          
          TIMEOUT=300
          ELAPSED=0
          
          while [ $ELAPSED -lt $TIMEOUT ]; do
            echo "=========================================="
            echo "CHECK AT ${ELAPSED}s / ${TIMEOUT}s"
            echo "=========================================="
            
            echo "--- Pods Status ---"
            kubectl get pods -n $NAMESPACE -o wide 2>/dev/null || echo "No pods"
            echo ""
            
            echo "--- Pod Details ---"
            for POD in $(kubectl get pods -n $NAMESPACE -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
              echo "Pod: $POD"
              kubectl get pod $POD -n $NAMESPACE -o jsonpath='{.status.phase}' 2>/dev/null
              echo ""
              kubectl get pod $POD -n $NAMESPACE -o jsonpath='{.status.conditions}' | jq . 2>/dev/null || echo "No conditions"
              echo ""
            done
            
            echo "--- Deployment Status ---"
            kubectl get deployment clarity1 -n $NAMESPACE -o wide 2>/dev/null || echo "Deployment not found"
            echo ""
            
            echo "--- Deployment Conditions ---"
            kubectl get deployment clarity1 -n $NAMESPACE -o jsonpath='{.status.conditions}' | jq . 2>/dev/null || echo "No deployment conditions"
            echo ""
            
            echo "--- Events (last 10) ---"
            kubectl get events -n $NAMESPACE --sort-by='.lastTimestamp' 2>/dev/null | tail -10 || echo "No events"
            echo ""
            
            READY=$(kubectl get pods -n $NAMESPACE -l app=clarity1 \
              -o jsonpath='{.items[*].status.phase}' 2>/dev/null | tr ' ' '\n' | grep -c Running || echo 0)
            TOTAL=$(kubectl get pods -n $NAMESPACE -l app=clarity1 --no-headers 2>/dev/null | wc -l || echo 0)
            
            echo "Summary: $READY/$TOTAL pods running"
            echo ""
            
            if [ "$TOTAL" -gt 0 ] && [ "$READY" -eq "$TOTAL" ]; then
              echo "=========================================="
              echo "SUCCESS! All pods running: $READY/$TOTAL"
              echo "=========================================="
              echo "success=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            
            sleep 15
            ELAPSED=$((ELAPSED + 15))
          done
          
          echo "=========================================="
          echo "TIMEOUT! Deployment did not complete in ${TIMEOUT}s"
          echo "=========================================="
          
          echo "--- Final Pod Status ---"
          kubectl get pods -n $NAMESPACE -o wide 2>/dev/null
          echo ""
          
          echo "--- Pod Descriptions ---"
          kubectl describe pods -n $NAMESPACE 2>/dev/null || echo "No pods to describe"
          echo ""
          
          echo "--- Pod Logs ---"
          for POD in $(kubectl get pods -n $NAMESPACE -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
            echo "=== Logs for $POD ==="
            kubectl logs $POD -n $NAMESPACE --tail=50 2>/dev/null || echo "No logs"
            echo ""
          done
          
          echo "success=false" >> $GITHUB_OUTPUT

      - name: Final Verification
        if: always()
        run: |
          NAMESPACE="opsera-clarity1-dev"
          
          echo "=========================================="
          echo "FINAL VERIFICATION"
          echo "=========================================="
          
          echo "--- Hub Cluster: ArgoCD Status ---"
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}
          kubectl get application clarity1-dev -n argocd -o wide 2>/dev/null
          echo ""
          
          echo "--- Spoke Cluster: Resources ---"
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}
          
          echo "Pods:"
          kubectl get pods -n $NAMESPACE -o wide 2>/dev/null || echo "No pods"
          echo ""
          
          echo "Services:"
          kubectl get svc -n $NAMESPACE 2>/dev/null || echo "No services"
          echo ""
          
          echo "Ingress:"
          kubectl get ingress -n $NAMESPACE 2>/dev/null || echo "No ingress"
          echo ""
          
          echo "Endpoints:"
          kubectl get endpoints -n $NAMESPACE 2>/dev/null || echo "No endpoints"
          echo ""

  summary:
    name: "Deployment Summary"
    needs: [verify-bootstrap, security-scan, build-push, update-manifests, sync-deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Generate Summary
        run: |
          DEPLOY_SUCCESS="${{ needs.sync-deploy.outputs.deploy_success }}"
          
          if [ "$DEPLOY_SUCCESS" = "true" ]; then
            STATUS="SUCCESS ✅"
          else
            STATUS="CHECK REQUIRED ⚠️"
          fi
          
          cat << EOF >> $GITHUB_STEP_SUMMARY
          
          # Deployment Summary
          
          ## Status: ${STATUS}
          
          | Stage | Result |
          |-------|--------|
          | Bootstrap Verification | ${{ needs.verify-bootstrap.result }} |
          | Security Scan | ${{ needs.security-scan.result }} |
          | Build and Push | ${{ needs.build-push.result }} |
          | Update Manifests | ${{ needs.update-manifests.result }} |
          | Sync and Deploy | ${{ needs.sync-deploy.result }} |
          
          ## Details
          - Image Tag: ${{ needs.verify-bootstrap.outputs.image_tag }}
          - Environment: dev
          - Namespace: opsera-clarity1-dev
          
          ## Application URL
          https://opsera-clarity1-dev.agent.opsera.dev
          EOF

      - name: Deep Debug - ArgoCD Status
        if: always()
        run: |
          echo "=========================================="
          echo "DEEP DEBUG: ARGOCD STATUS"
          echo "=========================================="
          
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}
          
          echo "--- Application Full YAML ---"
          kubectl get application clarity1-dev -n argocd -o yaml 2>/dev/null || echo "Application not found"
          echo ""
          
          echo "--- All ArgoCD Applications ---"
          kubectl get applications -n argocd 2>/dev/null || echo "No applications"
          echo ""
          
          echo "--- ArgoCD Pods ---"
          kubectl get pods -n argocd 2>/dev/null || echo "No ArgoCD pods"
          echo ""

      - name: Deep Debug - Spoke Cluster
        if: always()
        run: |
          NAMESPACE="opsera-clarity1-dev"
          
          echo "=========================================="
          echo "DEEP DEBUG: SPOKE CLUSTER"
          echo "=========================================="
          
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}
          
          echo "--- All Namespaces ---"
          kubectl get namespaces | grep -E "opsera|clarity" || echo "No matching namespaces"
          echo ""
          
          echo "--- Full Resource List ---"
          kubectl get all -n $NAMESPACE 2>/dev/null || echo "No resources"
          echo ""
          
          echo "--- Deployment YAML ---"
          kubectl get deployment clarity1 -n $NAMESPACE -o yaml 2>/dev/null || echo "Deployment not found"
          echo ""
          
          echo "--- Service YAML ---"
          kubectl get service clarity1 -n $NAMESPACE -o yaml 2>/dev/null || echo "Service not found"
          echo ""
          
          echo "--- Ingress YAML ---"
          kubectl get ingress clarity1-ingress -n $NAMESPACE -o yaml 2>/dev/null || echo "Ingress not found"
          echo ""
          
          echo "--- All Events ---"
          kubectl get events -n $NAMESPACE --sort-by='.lastTimestamp' 2>/dev/null || echo "No events"
          echo ""
          
          echo "--- Describe All Pods ---"
          kubectl describe pods -n $NAMESPACE 2>/dev/null || echo "No pods to describe"
          echo ""
          
          echo "--- Pod Logs (last 100 lines each) ---"
          for POD in $(kubectl get pods -n $NAMESPACE -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
            echo "========== LOGS: $POD =========="
            kubectl logs $POD -n $NAMESPACE --tail=100 2>/dev/null || echo "No logs"
            echo ""
          done

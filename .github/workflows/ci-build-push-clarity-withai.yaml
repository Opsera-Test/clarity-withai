# CI/CD Workflow - clarity-withai (DEV)
# Build, Push to ECR, Deploy via ArgoCD
# Generated by Opsera Code-to-Cloud Enterprise v1.7.2

name: "CI Build and Push clarity-withai"

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'vite.config.ts'
      - 'tailwind.config.ts'
      - 'tsconfig*.json'
      - '.opsera-clarity-withai/Dockerfile'
      - '.opsera-clarity-withai/nginx.conf'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        options:
          - dev
        default: dev
      skip_build:
        description: 'Skip build and use existing image'
        type: boolean
        default: false
      image_tag:
        description: 'Existing image tag if skip_build is true'
        type: string
        default: ''

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  APP_NAME: clarity-withai
  TENANT: opsera
  AWS_REGION: us-east-1
  SPOKE_CLUSTER: opsera-use1-np
  ECR_REPO: opsera/clarity-withai
  ENVIRONMENT: dev

permissions:
  contents: write
  id-token: write

jobs:
  verify-bootstrap:
    name: "Verify Bootstrap"
    runs-on: ubuntu-latest
    outputs:
      ecr_uri: ${{ steps.ecr.outputs.uri }}
      image_tag: ${{ steps.tag.outputs.value }}
      skip_build: ${{ steps.check.outputs.skip_build }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify ECR Repository Exists
        id: ecr
        run: |
          echo "### Bootstrap Verification" >> $GITHUB_STEP_SUMMARY
          if ! aws ecr describe-repositories --repository-names ${{ env.ECR_REPO }} 2>/dev/null; then
            echo "ECR repository not found: ${{ env.ECR_REPO }}" >> $GITHUB_STEP_SUMMARY
            echo "Run bootstrap workflow first!" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_URI="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}"
          echo "uri=${ECR_URI}" >> $GITHUB_OUTPUT
          echo "ECR repository verified: ${ECR_URI}" >> $GITHUB_STEP_SUMMARY

      - name: Determine Image Tag
        id: tag
        run: |
          if [ "${{ inputs.skip_build }}" == "true" ] && [ -n "${{ inputs.image_tag }}" ]; then
            IMAGE_TAG="${{ inputs.image_tag }}"
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            TIMESTAMP=$(date +%Y%m%d%H%M%S)
            IMAGE_TAG="${SHORT_SHA}-${TIMESTAMP}"
          fi
          echo "value=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "Image Tag: ${IMAGE_TAG}" >> $GITHUB_STEP_SUMMARY

      - name: Check Skip Build
        id: check
        run: |
          if [ "${{ inputs.skip_build }}" == "true" ]; then
            echo "skip_build=true" >> $GITHUB_OUTPUT
          else
            echo "skip_build=false" >> $GITHUB_OUTPUT
          fi

  security-scan:
    name: "Security Scan"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Grype
        uses: anchore/scan-action@v3
        continue-on-error: true
        with:
          path: "."
          fail-build: false
          severity-cutoff: critical

  build-push:
    name: "Build and Push"
    needs: [verify-bootstrap]
    if: needs.verify-bootstrap.outputs.skip_build != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .opsera-${{ env.APP_NAME }}/Dockerfile
          push: true
          tags: |
            ${{ needs.verify-bootstrap.outputs.ecr_uri }}:${{ needs.verify-bootstrap.outputs.image_tag }}
            ${{ needs.verify-bootstrap.outputs.ecr_uri }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image Build Summary
        run: |
          echo "### Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "Image: ${{ needs.verify-bootstrap.outputs.ecr_uri }}:${{ needs.verify-bootstrap.outputs.image_tag }}" >> $GITHUB_STEP_SUMMARY

  update-manifests:
    name: "Update Manifests"
    needs: [verify-bootstrap, build-push]
    if: |
      always() &&
      needs.verify-bootstrap.result == 'success' &&
      (needs.build-push.result == 'success' || needs.build-push.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Update Kustomization Image Tag
        run: |
          cd .opsera-${{ env.APP_NAME }}/k8s/overlays/${{ env.ENVIRONMENT }}
          sed -i "s/newTag: .*/newTag: ${{ needs.verify-bootstrap.outputs.image_tag }}/" kustomization.yaml
          echo "Updated image tag to: ${{ needs.verify-bootstrap.outputs.image_tag }}"
          cat kustomization.yaml

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .opsera-${{ env.APP_NAME }}/k8s/overlays/${{ env.ENVIRONMENT }}/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "deploy(${{ env.ENVIRONMENT }}): Update image to ${{ needs.verify-bootstrap.outputs.image_tag }} [skip ci]"
            git pull --rebase origin main
            git push origin main
            echo "Manifests updated" >> $GITHUB_STEP_SUMMARY
          fi

  sync-and-monitor:
    name: "Sync and Monitor"
    needs: [verify-bootstrap, update-manifests]
    if: always() && needs.update-manifests.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      deploy_success: ${{ steps.monitor.outputs.success }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for Spoke
        run: |
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Force ArgoCD Sync
        run: |
          aws eks update-kubeconfig --name argocd-use1 --region ${{ env.AWS_REGION }}
          kubectl annotate application ${{ env.APP_NAME }}-${{ env.ENVIRONMENT }} \
            -n argocd \
            argocd.argoproj.io/refresh=hard --overwrite || true
          echo "ArgoCD sync triggered" >> $GITHUB_STEP_SUMMARY

      - name: Monitor Deployment
        id: monitor
        timeout-minutes: 5
        run: |
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}
          NAMESPACE="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ env.ENVIRONMENT }}"
          echo "### Deployment Status" >> $GITHUB_STEP_SUMMARY
          TIMEOUT=300
          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            if ! kubectl get namespace $NAMESPACE 2>/dev/null; then
              echo "Waiting for namespace creation..."
              sleep 15
              ELAPSED=$((ELAPSED + 15))
              continue
            fi
            READY=$(kubectl get pods -n $NAMESPACE -l app=${{ env.APP_NAME }} \
              -o jsonpath='{.items[*].status.conditions[?(@.type=="Ready")].status}' 2>/dev/null | tr ' ' '\n' | grep -c True || echo 0)
            TOTAL=$(kubectl get pods -n $NAMESPACE -l app=${{ env.APP_NAME }} --no-headers 2>/dev/null | wc -l || echo 0)
            echo "Pods: $READY/$TOTAL ready (${ELAPSED}s elapsed)"
            if [ "$TOTAL" -gt 0 ] && [ "$READY" -eq "$TOTAL" ]; then
              echo "Deployment Successful!" >> $GITHUB_STEP_SUMMARY
              echo "Pods Ready: $READY/$TOTAL" >> $GITHUB_STEP_SUMMARY
              echo "success=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            sleep 15
            ELAPSED=$((ELAPSED + 15))
          done
          echo "Deployment timeout - showing diagnostics" >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n $NAMESPACE -o wide 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No pods found" >> $GITHUB_STEP_SUMMARY
          echo "success=false" >> $GITHUB_OUTPUT

  summary:
    name: "Summary"
    needs: [verify-bootstrap, security-scan, build-push, update-manifests, sync-and-monitor]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate Summary
        run: |
          echo "# CI/CD Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Verify Bootstrap | ${{ needs.verify-bootstrap.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Scan | ${{ needs.security-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build and Push | ${{ needs.build-push.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Update Manifests | ${{ needs.update-manifests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Sync and Monitor | ${{ needs.sync-and-monitor.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Deployment Info" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: ${{ env.ENVIRONMENT }}" >> $GITHUB_STEP_SUMMARY
          echo "- Image Tag: ${{ needs.verify-bootstrap.outputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- URL: https://${{ env.TENANT }}-${{ env.APP_NAME }}-${{ env.ENVIRONMENT }}.agent.opsera.dev" >> $GITHUB_STEP_SUMMARY

# APPLY ARGOCD APPLICATIONS - clarity-withai-1
# Generated by Code-to-Cloud Enterprise v0.901
# Fixes: ArgoCD Application not found error
# ════════════════════════════════════════════════════════════════════════════
name: "🔧 clarity-withai-1: Apply ArgoCD Apps"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to apply'
        type: choice
        options: [dev, qa, staging, all]
        default: all

env:
  APP_NAME: clarity-withai-1
  AWS_REGION: us-west-2
  HUB_CLUSTER: argocd-usw2

permissions:
  contents: read
  id-token: write

jobs:
  apply-apps:
    name: "🚀 Apply ArgoCD Applications"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for Hub
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}
          echo "✅ Connected to hub cluster: ${{ env.HUB_CLUSTER }}"

      - name: Apply ArgoCD Applications
        run: |
          ENVS="${{ inputs.environment }}"
          if [ "$ENVS" = "all" ]; then
            ENVS="dev qa staging"
          fi

          echo "### 🚀 Applying ArgoCD Applications" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          for ENV in $ENVS; do
            APP_FILE=".opsera-${{ env.APP_NAME }}/argocd/${ENV}/application.yaml"
            if [ -f "$APP_FILE" ]; then
              echo "Applying: $APP_FILE"
              kubectl apply -f "$APP_FILE"
              echo "✅ Applied: ${{ env.APP_NAME }}-${ENV}" >> $GITHUB_STEP_SUMMARY
            else
              echo "⚠️ File not found: $APP_FILE"
              echo "❌ Missing: $APP_FILE" >> $GITHUB_STEP_SUMMARY
            fi
          done

      - name: Force Sync Applications
        run: |
          ENVS="${{ inputs.environment }}"
          if [ "$ENVS" = "all" ]; then
            ENVS="dev qa staging"
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔄 Syncing Applications" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          for ENV in $ENVS; do
            APP="${{ env.APP_NAME }}-${ENV}"
            kubectl annotate application ${APP} -n argocd \
              argocd.argoproj.io/refresh=hard --overwrite 2>/dev/null || true
            echo "✅ Sync triggered: ${APP}" >> $GITHUB_STEP_SUMMARY
          done

      - name: Verify Applications
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Application Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get applications -n argocd -l app=${{ env.APP_NAME }} -o wide >> $GITHUB_STEP_SUMMARY 2>&1 || echo "No applications found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

# Check cert-manager and wildcard certificate status
name: "🔐 cwa-4: Check Cert-Manager"

on:
  workflow_dispatch:

env:
  AWS_REGION: us-west-2
  SPOKE_CLUSTER: opsera-usw2-np

permissions:
  contents: read
  id-token: write

jobs:
  check-cert:
    name: "🔍 Check Certificate Status"
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Check cert-manager installation
        run: |
          echo "### 🔐 Certificate Manager Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "**cert-manager pods:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n cert-manager 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "cert-manager namespace not found!" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Check ClusterIssuers
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**ClusterIssuers:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get clusterissuers 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No ClusterIssuers found!" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Check for wildcard certificate
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Wildcard TLS Secrets:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get secrets -A | grep -i "wildcard\|tls" 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No wildcard secrets found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Check certificates in app namespace
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Certificates in opsera-cwa-4-dev:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get certificates -n opsera-cwa-4-dev 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No certificates found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Certificate details:**" >> $GITHUB_STEP_SUMMARY
          echo '```yaml' >> $GITHUB_STEP_SUMMARY
          kubectl get certificates -n opsera-cwa-4-dev -o yaml 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "N/A" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Check TLS secrets in app namespace
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**TLS Secrets in opsera-cwa-4-dev:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get secrets -n opsera-cwa-4-dev | grep -i tls 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No TLS secrets found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Check ingress configuration
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Ingress in opsera-cwa-4-dev:**" >> $GITHUB_STEP_SUMMARY
          echo '```yaml' >> $GITHUB_STEP_SUMMARY
          kubectl get ingress -n opsera-cwa-4-dev -o yaml 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No ingress found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

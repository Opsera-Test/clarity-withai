# ════════════════════════════════════════════════════════════════════════════
# BOOTSTRAP INFRASTRUCTURE - cwa-2
# Generated by Code-to-Cloud Enterprise v1.7.3
# RULE 103: Spoke registration ONLY in infrastructure setup
# ════════════════════════════════════════════════════════════════════════════

name: "🚀 cwa-2: Bootstrap Infrastructure"

on:
  workflow_dispatch:
    inputs:
      proceed:
        description: '✅ Confirm bootstrap (creates ECR, registers spoke, applies ArgoCD app)'
        type: boolean
        default: false
        required: true

env:
  APP_NAME: cwa-2
  TENANT: opsera
  AWS_REGION: us-east-1
  EKS_SPOKE_CLUSTER: opsera-use1-np
  EKS_HUB_CLUSTER: argocd-use1
  NAMESPACE: opsera-cwa-2-dev

permissions:
  contents: write
  id-token: write

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # VALIDATION
  # ════════════════════════════════════════════════════════════════════════════
  validate:
    name: "✅ Validate"
    runs-on: ubuntu-latest
    if: inputs.proceed == true
    outputs:
      account_id: ${{ steps.account.outputs.account_id }}
      ecr_uri: ${{ steps.account.outputs.ecr_uri }}
      repo_url: ${{ steps.repo.outputs.repo_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get AWS Account ID
        id: account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=${ACCOUNT_ID}" >> $GITHUB_OUTPUT
          echo "ecr_uri=${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.TENANT }}/${{ env.APP_NAME }}" >> $GITHUB_OUTPUT
          echo "### AWS Account" >> $GITHUB_STEP_SUMMARY
          echo "Account ID: \`${ACCOUNT_ID}\`" >> $GITHUB_STEP_SUMMARY

      - name: Get Repository URL
        id: repo
        run: |
          REPO_URL="https://github.com/${{ github.repository }}.git"
          echo "repo_url=${REPO_URL}" >> $GITHUB_OUTPUT
          echo "Repository: \`${REPO_URL}\`" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # VERIFY SPOKE CONNECTIVITY (RULE 90)
  # ════════════════════════════════════════════════════════════════════════════
  verify-connectivity:
    name: "🔍 Verify Spoke Cluster"
    needs: [validate]
    runs-on: ubuntu-latest
    outputs:
      spoke_exists: ${{ steps.check.outputs.spoke_exists }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check Spoke Cluster Exists (RULE 90)
        id: check
        run: |
          echo "### Spoke Cluster Verification" >> $GITHUB_STEP_SUMMARY
          
          # RULE 90: Direct API verification, not metadata
          if aws eks describe-cluster --name ${{ env.EKS_SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }} 2>/dev/null; then
            echo "✅ Spoke cluster exists: ${{ env.EKS_SPOKE_CLUSTER }}" >> $GITHUB_STEP_SUMMARY
            echo "spoke_exists=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Spoke cluster NOT found: ${{ env.EKS_SPOKE_CLUSTER }}" >> $GITHUB_STEP_SUMMARY
            echo "spoke_exists=false" >> $GITHUB_OUTPUT
            echo "::error::Spoke cluster ${{ env.EKS_SPOKE_CLUSTER }} does not exist. Create it first."
            exit 1
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # CHECK SPOKE REGISTRATION (RULE 103)
  # ════════════════════════════════════════════════════════════════════════════
  check-spoke-registration:
    name: "🔗 Check Spoke Registration"
    needs: [validate, verify-connectivity]
    runs-on: ubuntu-latest
    outputs:
      spoke_registered: ${{ steps.check.outputs.spoke_registered }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for Hub
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Check Spoke Registration
        id: check
        run: |
          echo "### Spoke Registration Check" >> $GITHUB_STEP_SUMMARY
          
          # Check if cluster secret exists in ArgoCD namespace
          if kubectl get secret "cluster-${{ env.EKS_SPOKE_CLUSTER }}" -n argocd 2>/dev/null; then
            echo "✅ Spoke already registered with ArgoCD hub" >> $GITHUB_STEP_SUMMARY
            echo "spoke_registered=true" >> $GITHUB_OUTPUT
          else
            echo "📝 Spoke needs registration with ArgoCD hub" >> $GITHUB_STEP_SUMMARY
            echo "spoke_registered=false" >> $GITHUB_OUTPUT
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # REGISTER SPOKE WITH ARGOCD (RULE 103)
  # ════════════════════════════════════════════════════════════════════════════
  register-spoke:
    name: "🔗 Register Spoke (if needed)"
    needs: [validate, verify-connectivity, check-spoke-registration]
    if: needs.check-spoke-registration.outputs.spoke_registered == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Register Spoke with ArgoCD Hub
        run: |
          echo "### Spoke Registration" >> $GITHUB_STEP_SUMMARY
          
          # Get spoke cluster endpoint and CA
          SPOKE_ENDPOINT=$(aws eks describe-cluster --name ${{ env.EKS_SPOKE_CLUSTER }} --query 'cluster.endpoint' --output text)
          SPOKE_CA=$(aws eks describe-cluster --name ${{ env.EKS_SPOKE_CLUSTER }} --query 'cluster.certificateAuthority.data' --output text)
          
          # Configure kubectl for spoke to create service account
          aws eks update-kubeconfig --name ${{ env.EKS_SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}
          
          # Create ArgoCD manager service account on spoke
          kubectl apply -f - <<EOF
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: argocd-manager
            namespace: kube-system
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: argocd-manager-role-binding
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: cluster-admin
          subjects:
            - kind: ServiceAccount
              name: argocd-manager
              namespace: kube-system
          EOF
          
          # Create token for K8s 1.24+ (RULE 62)
          TOKEN=$(kubectl create token argocd-manager -n kube-system --duration=87600h)
          
          # Switch to hub cluster
          aws eks update-kubeconfig --name ${{ env.EKS_HUB_CLUSTER }} --region ${{ env.AWS_REGION }}
          
          # Create cluster secret in ArgoCD
          kubectl apply -f - <<EOF
          apiVersion: v1
          kind: Secret
          metadata:
            name: cluster-${{ env.EKS_SPOKE_CLUSTER }}
            namespace: argocd
            labels:
              argocd.argoproj.io/secret-type: cluster
          type: Opaque
          stringData:
            name: ${{ env.EKS_SPOKE_CLUSTER }}
            server: ${SPOKE_ENDPOINT}
            config: |
              {
                "bearerToken": "${TOKEN}",
                "tlsClientConfig": {
                  "insecure": false,
                  "caData": "${SPOKE_CA}"
                }
              }
          EOF
          
          echo "✅ Spoke cluster registered with ArgoCD hub" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # CREATE ECR REPOSITORY (RULE 75, 101)
  # ════════════════════════════════════════════════════════════════════════════
  create-ecr:
    name: "📦 Create ECR Repository"
    needs: [validate, verify-connectivity]
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create ECR Repository
        run: |
          ECR_REPO="${{ env.TENANT }}/${{ env.APP_NAME }}"
          echo "### ECR Repository" >> $GITHUB_STEP_SUMMARY
          
          # RULE 75: Auto-create if not exists
          if aws ecr describe-repositories --repository-names "$ECR_REPO" 2>/dev/null; then
            echo "✅ ECR repository already exists: \`$ECR_REPO\`" >> $GITHUB_STEP_SUMMARY
          else
            aws ecr create-repository \
              --repository-name "$ECR_REPO" \
              --image-scanning-configuration scanOnPush=true \
              --encryption-configuration encryptionType=AES256
            echo "✅ Created ECR repository: \`$ECR_REPO\`" >> $GITHUB_STEP_SUMMARY
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # CREATE ARGOCD REPO SECRET (RULE 63)
  # ════════════════════════════════════════════════════════════════════════════
  create-repo-secret:
    name: "🔑 Create ArgoCD Repo Secret"
    needs: [validate, verify-connectivity, check-spoke-registration]
    # RULE 89: Handle skipped job states
    if: always() && needs.validate.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for Hub
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Create Repository Secret
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          SECRET_NAME="repo-${{ env.APP_NAME }}"
          REPO_URL="${{ needs.validate.outputs.repo_url }}"
          
          echo "### ArgoCD Repository Secret" >> $GITHUB_STEP_SUMMARY
          
          # RULE 63: Check if exists first
          if kubectl get secret "$SECRET_NAME" -n argocd 2>/dev/null; then
            echo "✅ Repository secret already exists" >> $GITHUB_STEP_SUMMARY
          else
            if [ -z "$GH_PAT" ]; then
              echo "❌ GH_PAT secret not configured" >> $GITHUB_STEP_SUMMARY
              echo "::error::GH_PAT secret is required for ArgoCD repo access"
              exit 1
            fi
            
            kubectl create secret generic "$SECRET_NAME" -n argocd \
              --from-literal=type=git \
              --from-literal=url="$REPO_URL" \
              --from-literal=username=git \
              --from-literal=password="$GH_PAT" \
              --dry-run=client -o yaml | kubectl apply -f -
            
            kubectl label secret "$SECRET_NAME" -n argocd \
              argocd.argoproj.io/secret-type=repository --overwrite
            
            echo "✅ Created repository secret" >> $GITHUB_STEP_SUMMARY
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # UPDATE MANIFESTS WITH ACTUAL VALUES
  # ════════════════════════════════════════════════════════════════════════════
  update-manifests:
    name: "📝 Update Manifests"
    needs: [validate, create-ecr, create-repo-secret, register-spoke]
    # RULE 89: Handle skipped states
    if: always() && needs.validate.result == 'success' && needs.create-ecr.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Update Kustomization with ECR URI
        run: |
          ECR_URI="${{ needs.validate.outputs.ecr_uri }}"
          
          # Update dev overlay
          sed -i "s|PLACEHOLDER_ECR_URI|${ECR_URI}|g" .opsera-${{ env.APP_NAME }}/k8s/overlays/dev/kustomization.yaml
          
          echo "Updated ECR URI: ${ECR_URI}"

      - name: Update ArgoCD Application with Repo URL
        run: |
          REPO_URL="${{ needs.validate.outputs.repo_url }}"
          
          # Update ArgoCD application
          sed -i "s|PLACEHOLDER_REPO_URL|${REPO_URL}|g" .opsera-${{ env.APP_NAME }}/argocd/dev/application.yaml
          
          echo "Updated Repo URL: ${REPO_URL}"

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .opsera-${{ env.APP_NAME }}/
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(${{ env.APP_NAME }}): Update manifests with actual values [skip ci]"
            git push
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # APPLY ARGOCD APPLICATION
  # ════════════════════════════════════════════════════════════════════════════
  apply-argocd-app:
    name: "🚀 Apply ArgoCD Application"
    needs: [validate, update-manifests, register-spoke]
    # RULE 89: Handle skipped states
    if: always() && needs.update-manifests.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull Latest Changes
        run: git pull origin main

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for Hub
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Apply ArgoCD Application
        run: |
          echo "### ArgoCD Application" >> $GITHUB_STEP_SUMMARY
          
          kubectl apply -f .opsera-${{ env.APP_NAME }}/argocd/dev/application.yaml
          
          echo "✅ Applied ArgoCD Application: ${{ env.APP_NAME }}-dev" >> $GITHUB_STEP_SUMMARY

      - name: Verify Application Created
        run: |
          sleep 5
          kubectl get application ${{ env.APP_NAME }}-dev -n argocd -o wide

  # ════════════════════════════════════════════════════════════════════════════
  # SUMMARY
  # ════════════════════════════════════════════════════════════════════════════
  summary:
    name: "📋 Summary"
    needs: [validate, verify-connectivity, create-ecr, create-repo-secret, apply-argocd-app]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate Summary
        run: |
          cat << 'EOF' >> $GITHUB_STEP_SUMMARY
          
          ---
          
          ## 🎉 Bootstrap Complete
          
          ### Configuration
          | Setting | Value |
          |---------|-------|
          | **App Name** | `cwa-2` |
          | **Tenant** | `opsera` |
          | **Environment** | `dev` |
          | **Namespace** | `opsera-cwa-2-dev` |
          | **Spoke Cluster** | `opsera-use1-np` |
          | **Hub Cluster** | `argocd-use1` |
          
          ### Next Steps
          1. **Push code to main** to trigger CI/CD:
             ```bash
             git push origin main
             ```
          
          2. **Or manually trigger CI/CD**:
             ```bash
             gh workflow run "ci-build-push-cwa-2.yaml" -f environment=dev
             ```
          
          3. **Check ArgoCD** for sync status
          
          4. **Access application** (after DNS setup):
             ```
             https://opsera-cwa-2-dev.agent.opsera.dev
             ```
          EOF

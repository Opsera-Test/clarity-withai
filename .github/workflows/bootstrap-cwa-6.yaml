# ════════════════════════════════════════════════════════════════════════════
# BOOTSTRAP INFRASTRUCTURE - cwa-6
# Code-to-Cloud Enterprise v1.7.3
# Generated: 2026-01-30
# ════════════════════════════════════════════════════════════════════════════

name: "🚀 cwa-6: Bootstrap Infrastructure"

on:
  workflow_dispatch:
    inputs:
      proceed:
        description: 'Confirm bootstrap (creates infrastructure)'
        type: boolean
        default: false
        required: true

env:
  APP_NAME: cwa-6
  TENANT: opsera
  AWS_REGION: us-east-1
  REGION_SHORT: use1
  HUB_CLUSTER: argocd-use1
  SPOKE_CLUSTER: opsera-use1-np
  NAMESPACE: opsera-cwa-6-dev
  DOMAIN: agent.opsera.dev

permissions:
  contents: write
  id-token: write

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # VERIFY PREREQUISITES
  # ════════════════════════════════════════════════════════════════════════════
  verify-prerequisites:
    name: "🔍 Verify Prerequisites"
    runs-on: ubuntu-latest
    if: inputs.proceed == true
    outputs:
      aws_account_id: ${{ steps.account.outputs.account_id }}
      ecr_repo: ${{ steps.account.outputs.ecr_repo }}
      repo_url: ${{ steps.repo.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get AWS Account ID
        id: account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=${ACCOUNT_ID}" >> $GITHUB_OUTPUT
          echo "ecr_repo=${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.TENANT }}/${{ env.APP_NAME }}" >> $GITHUB_OUTPUT
          echo "### AWS Account" >> $GITHUB_STEP_SUMMARY
          echo "- Account ID: \`${ACCOUNT_ID}\`" >> $GITHUB_STEP_SUMMARY

      - name: Get Repository URL
        id: repo
        run: |
          REPO_URL="https://github.com/${{ github.repository }}.git"
          echo "url=${REPO_URL}" >> $GITHUB_OUTPUT
          echo "- Repository: \`${REPO_URL}\`" >> $GITHUB_STEP_SUMMARY

      - name: Verify Spoke Cluster Exists (RULE 90)
        run: |
          echo "### Cluster Verification" >> $GITHUB_STEP_SUMMARY
          if aws eks describe-cluster --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }} &>/dev/null; then
            echo "✅ Spoke cluster exists: \`${{ env.SPOKE_CLUSTER }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Spoke cluster NOT found: \`${{ env.SPOKE_CLUSTER }}\`" >> $GITHUB_STEP_SUMMARY
            echo "::error::Spoke cluster does not exist. Please create it first."
            exit 1
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # CREATE ECR REPOSITORY
  # ════════════════════════════════════════════════════════════════════════════
  create-ecr:
    name: "📦 Create ECR Repository"
    runs-on: ubuntu-latest
    needs: [verify-prerequisites]
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create ECR Repository (RULE 101)
        run: |
          REPO_NAME="${{ env.TENANT }}/${{ env.APP_NAME }}"
          
          if aws ecr describe-repositories --repository-names "$REPO_NAME" &>/dev/null; then
            echo "✅ ECR repository already exists: $REPO_NAME" >> $GITHUB_STEP_SUMMARY
          else
            aws ecr create-repository \
              --repository-name "$REPO_NAME" \
              --image-scanning-configuration scanOnPush=true \
              --tags Key=tenant,Value=${{ env.TENANT }} Key=app,Value=${{ env.APP_NAME }}
            echo "✅ ECR repository created: $REPO_NAME" >> $GITHUB_STEP_SUMMARY
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # UPDATE MANIFESTS WITH ACTUAL VALUES
  # ════════════════════════════════════════════════════════════════════════════
  update-manifests:
    name: "📝 Update Manifests"
    runs-on: ubuntu-latest
    needs: [verify-prerequisites, create-ecr]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Update Kustomization with ECR
        run: |
          ECR_REPO="${{ needs.verify-prerequisites.outputs.ecr_repo }}"
          
          # Update dev overlay
          sed -i "s|PLACEHOLDER_ECR_REPO|${ECR_REPO}|g" .opsera-cwa-6/k8s/overlays/dev/kustomization.yaml
          
          echo "### Manifest Updates" >> $GITHUB_STEP_SUMMARY
          echo "- ECR Repository: \`${ECR_REPO}\`" >> $GITHUB_STEP_SUMMARY

      - name: Update ArgoCD Application
        run: |
          REPO_URL="${{ needs.verify-prerequisites.outputs.repo_url }}"
          
          # Update ArgoCD application with actual repo URL (RULE 58)
          sed -i "s|PLACEHOLDER_REPO_URL|${REPO_URL}|g" .opsera-cwa-6/argocd/dev/application.yaml
          
          echo "- ArgoCD Repo URL: \`${REPO_URL}\`" >> $GITHUB_STEP_SUMMARY

      - name: Update Ingress Hostname
        run: |
          HOSTNAME="${{ env.TENANT }}-${{ env.APP_NAME }}-dev.${{ env.DOMAIN }}"
          
          # Update base ingress
          sed -i "s|PLACEHOLDER_HOSTNAME|${HOSTNAME}|g" .opsera-cwa-6/k8s/base/ingress.yaml
          
          echo "- Hostname: \`${HOSTNAME}\`" >> $GITHUB_STEP_SUMMARY

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .opsera-cwa-6/
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: Bootstrap cwa-6 infrastructure [skip ci]

- Updated ECR repository path
- Updated ArgoCD application repo URL
- Updated ingress hostname

Co-Authored-By: Opsera Code-to-Cloud <noreply@opsera.io>"
            git pull --rebase origin main
            git push origin main
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # SETUP ARGOCD REPOSITORY SECRET (RULE 63)
  # ════════════════════════════════════════════════════════════════════════════
  setup-argocd-repo:
    name: "🔐 Setup ArgoCD Repository"
    runs-on: ubuntu-latest
    needs: [verify-prerequisites, update-manifests]
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for Hub Cluster
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Create ArgoCD Repository Secret
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          REPO_URL: ${{ needs.verify-prerequisites.outputs.repo_url }}
        run: |
          SECRET_NAME="repo-${{ env.APP_NAME }}"
          
          # Check if secret exists
          if kubectl get secret "$SECRET_NAME" -n argocd &>/dev/null; then
            echo "✅ Repository secret already exists" >> $GITHUB_STEP_SUMMARY
          else
            kubectl create secret generic "$SECRET_NAME" -n argocd \
              --from-literal=type=git \
              --from-literal=url="$REPO_URL" \
              --from-literal=password="$GH_PAT" \
              --from-literal=username=git
            
            kubectl label secret "$SECRET_NAME" -n argocd \
              argocd.argoproj.io/secret-type=repository
            
            echo "✅ Repository secret created" >> $GITHUB_STEP_SUMMARY
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # APPLY ARGOCD APPLICATION
  # ════════════════════════════════════════════════════════════════════════════
  apply-argocd-app:
    name: "🎯 Apply ArgoCD Application"
    runs-on: ubuntu-latest
    needs: [setup-argocd-repo, update-manifests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for Hub Cluster
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Pull Latest Changes
        run: |
          git pull origin main

      - name: Apply ArgoCD Application
        run: |
          kubectl apply -f .opsera-cwa-6/argocd/dev/application.yaml
          echo "### ArgoCD Application" >> $GITHUB_STEP_SUMMARY
          echo "✅ Applied: \`cwa-6-dev\`" >> $GITHUB_STEP_SUMMARY

      - name: Verify Application Created
        run: |
          sleep 5
          kubectl get application cwa-6-dev -n argocd -o wide
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status:**" >> $GITHUB_STEP_SUMMARY
          STATUS=$(kubectl get application cwa-6-dev -n argocd -o jsonpath='{.status.sync.status}')
          echo "- Sync Status: \`${STATUS}\`" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # SUMMARY
  # ════════════════════════════════════════════════════════════════════════════
  summary:
    name: "📋 Bootstrap Summary"
    runs-on: ubuntu-latest
    needs: [verify-prerequisites, create-ecr, update-manifests, setup-argocd-repo, apply-argocd-app]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          cat << EOF >> $GITHUB_STEP_SUMMARY
          
          ---
          
          ## 🎉 Bootstrap Complete!
          
          ### Infrastructure Created
          | Resource | Value |
          |----------|-------|
          | ECR Repository | \`${{ env.TENANT }}/${{ env.APP_NAME }}\` |
          | ArgoCD App | \`${{ env.APP_NAME }}-dev\` |
          | Namespace | \`${{ env.NAMESPACE }}\` |
          | Hostname | \`${{ env.TENANT }}-${{ env.APP_NAME }}-dev.${{ env.DOMAIN }}\` |
          
          ### Next Steps
          1. **Trigger CI/CD**: Push to main or run \`ci-build-push-cwa-6.yaml\`
          2. **Setup DNS**: Run \`dns-setup-cwa-6.yaml\` after first deployment
          3. **Verify**: Check ArgoCD dashboard for sync status
          
          \`\`\`bash
          # Trigger deployment
          gh workflow run "ci-build-push-cwa-6.yaml"
          \`\`\`
          EOF

# ════════════════════════════════════════════════════════════════════════════
# DIAGNOSTICS WORKFLOW - clarity-withai
# Full pipeline debugging (RULE 50: MANDATORY)
# Generated by Opsera Code-to-Cloud Enterprise v1.7.2
# ════════════════════════════════════════════════════════════════════════════

name: "🔬 clarity-withai: Diagnostics"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        options: [dev]
        default: dev
      diagnostic_type:
        description: 'Type of diagnostic'
        type: choice
        options:
          - full-pipeline
          - pod-logs
          - argocd-debug
          - force-sync
          - cert-debug
        default: full-pipeline

env:
  APP_NAME: clarity-withai
  TENANT: opsera
  AWS_REGION: us-east-1
  HUB_CLUSTER: argocd-use1
  SPOKE_CLUSTER: opsera-use1-np
  ECR_REPO: opsera/clarity-withai

permissions:
  contents: read
  id-token: write

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # FULL PIPELINE DIAGNOSTICS
  # ════════════════════════════════════════════════════════════════════════════
  full-pipeline:
    name: "🔍 Full Pipeline Diagnostics"
    runs-on: ubuntu-latest
    if: inputs.diagnostic_type == 'full-pipeline'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: "Stage 1: ECR Repository"
        run: |
          echo "### 📦 Stage 1: ECR Repository" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if aws ecr describe-repositories --repository-names ${{ env.ECR_REPO }} 2>/dev/null; then
            echo "✅ ECR repository exists" >> $GITHUB_STEP_SUMMARY
            
            # Get latest images
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Latest Images:**" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            aws ecr describe-images --repository-name ${{ env.ECR_REPO }} \
              --query 'imageDetails | sort_by(@, &imagePushedAt) | reverse(@) | [0:5].[imageTags[0], imagePushedAt]' \
              --output table >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No images found" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ ECR repository NOT found" >> $GITHUB_STEP_SUMMARY
            echo "Run bootstrap workflow first!" >> $GITHUB_STEP_SUMMARY
          fi

      - name: "Stage 2: EKS Clusters"
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🎯 Stage 2: EKS Clusters" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Check hub cluster
          if aws eks describe-cluster --name ${{ env.HUB_CLUSTER }} 2>/dev/null; then
            echo "✅ Hub cluster exists: \`${{ env.HUB_CLUSTER }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Hub cluster NOT found: \`${{ env.HUB_CLUSTER }}\`" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Check spoke cluster
          if aws eks describe-cluster --name ${{ env.SPOKE_CLUSTER }} 2>/dev/null; then
            echo "✅ Spoke cluster exists: \`${{ env.SPOKE_CLUSTER }}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Spoke cluster NOT found: \`${{ env.SPOKE_CLUSTER }}\`" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Configure kubectl for Hub
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: "Stage 3: ArgoCD Application"
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔄 Stage 3: ArgoCD Application" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          APP="${{ env.APP_NAME }}-${{ inputs.environment }}"
          
          if kubectl get application $APP -n argocd 2>/dev/null; then
            echo "✅ ArgoCD application exists" >> $GITHUB_STEP_SUMMARY
            
            SYNC_STATUS=$(kubectl get application $APP -n argocd -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "Unknown")
            HEALTH_STATUS=$(kubectl get application $APP -n argocd -o jsonpath='{.status.health.status}' 2>/dev/null || echo "Unknown")
            
            echo "- **Sync Status:** ${SYNC_STATUS}" >> $GITHUB_STEP_SUMMARY
            echo "- **Health Status:** ${HEALTH_STATUS}" >> $GITHUB_STEP_SUMMARY
            
            if [ "$SYNC_STATUS" == "Unknown" ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "⚠️ **Sync Unknown - Possible Issues:**" >> $GITHUB_STEP_SUMMARY
              echo "- Check repository URL in ArgoCD application" >> $GITHUB_STEP_SUMMARY
              echo "- Verify GH_PAT secret is valid" >> $GITHUB_STEP_SUMMARY
              echo "- Check ArgoCD repo secret exists" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "❌ ArgoCD application NOT found" >> $GITHUB_STEP_SUMMARY
            echo "Run bootstrap workflow first!" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Configure kubectl for Spoke
        run: |
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: "Stage 4: Kubernetes Resources"
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🎯 Stage 4: Kubernetes Resources" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          NAMESPACE="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ inputs.environment }}"
          
          # Check namespace
          if kubectl get namespace $NAMESPACE 2>/dev/null; then
            echo "✅ Namespace exists: \`$NAMESPACE\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Namespace NOT found: \`$NAMESPACE\`" >> $GITHUB_STEP_SUMMARY
            exit 0
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pods:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n $NAMESPACE -o wide 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No pods found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Services:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get svc -n $NAMESPACE 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No services found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Ingress:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get ingress -n $NAMESPACE 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No ingress found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: "Stage 5: Health Check"
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🏥 Stage 5: Health Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          URL="https://${{ env.TENANT }}-${{ env.APP_NAME }}-${{ inputs.environment }}.agent.opsera.dev"
          
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL" 2>/dev/null || echo "000")
          
          if [ "$HTTP_CODE" == "200" ]; then
            echo "✅ Application accessible: HTTP $HTTP_CODE" >> $GITHUB_STEP_SUMMARY
          elif [ "$HTTP_CODE" == "000" ]; then
            echo "❌ Application not reachable (DNS or network issue)" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Application returned HTTP $HTTP_CODE" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "**URL:** \`$URL\`" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # POD LOGS
  # ════════════════════════════════════════════════════════════════════════════
  pod-logs:
    name: "📋 Pod Logs"
    runs-on: ubuntu-latest
    if: inputs.diagnostic_type == 'pod-logs'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Get Pod Logs
        run: |
          NAMESPACE="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ inputs.environment }}"
          
          echo "### 📋 Pod Logs" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          for POD in $(kubectl get pods -n $NAMESPACE -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
            echo "#### Pod: $POD" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            kubectl logs $POD -n $NAMESPACE --tail=100 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No logs available" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Previous Container (if crashed):**" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            kubectl logs $POD -n $NAMESPACE --previous --tail=50 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No previous logs" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          done

  # ════════════════════════════════════════════════════════════════════════════
  # ARGOCD DEBUG
  # ════════════════════════════════════════════════════════════════════════════
  argocd-debug:
    name: "🔄 ArgoCD Debug"
    runs-on: ubuntu-latest
    if: inputs.diagnostic_type == 'argocd-debug'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for Hub
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Debug ArgoCD Application
        run: |
          APP="${{ env.APP_NAME }}-${{ inputs.environment }}"
          
          echo "### 🔄 ArgoCD Debug: $APP" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "**Application YAML:**" >> $GITHUB_STEP_SUMMARY
          echo '```yaml' >> $GITHUB_STEP_SUMMARY
          kubectl get application $APP -n argocd -o yaml 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "Application not found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Repository Secrets:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get secrets -n argocd -l argocd.argoproj.io/secret-type=repository 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No repo secrets" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Cluster Secrets:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get secrets -n argocd -l argocd.argoproj.io/secret-type=cluster 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No cluster secrets" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # FORCE SYNC
  # ════════════════════════════════════════════════════════════════════════════
  force-sync:
    name: "⚡ Force Sync"
    runs-on: ubuntu-latest
    if: inputs.diagnostic_type == 'force-sync'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for Hub
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Force Sync ArgoCD
        run: |
          APP="${{ env.APP_NAME }}-${{ inputs.environment }}"
          
          echo "### ⚡ Force Sync: $APP" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Hard refresh
          kubectl annotate application $APP -n argocd argocd.argoproj.io/refresh=hard --overwrite 2>/dev/null || echo "Failed to annotate"
          
          echo "✅ Force sync triggered" >> $GITHUB_STEP_SUMMARY
          
          # Wait and check status
          sleep 30
          
          SYNC_STATUS=$(kubectl get application $APP -n argocd -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "Unknown")
          HEALTH_STATUS=$(kubectl get application $APP -n argocd -o jsonpath='{.status.health.status}' 2>/dev/null || echo "Unknown")
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status after sync:**" >> $GITHUB_STEP_SUMMARY
          echo "- Sync: ${SYNC_STATUS}" >> $GITHUB_STEP_SUMMARY
          echo "- Health: ${HEALTH_STATUS}" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # CERT-MANAGER DEBUG (RULE 103)
  # ════════════════════════════════════════════════════════════════════════════
  cert-debug:
    name: "🔐 Certificate Debug"
    runs-on: ubuntu-latest
    if: inputs.diagnostic_type == 'cert-debug'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for Spoke
        run: |
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Debug cert-manager
        run: |
          NAMESPACE="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ inputs.environment }}"
          
          echo "### 🔐 Certificate Debug" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "**1. cert-manager pods:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n cert-manager 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "cert-manager namespace not found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**2. ClusterIssuer:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get clusterissuer letsencrypt-prod -o yaml 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "ClusterIssuer not found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**3. Certificates in namespace:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get certificates -n $NAMESPACE 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No certificates found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**4. Ingress:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get ingress -n $NAMESPACE -o yaml 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No ingress found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**5. TLS Secret:**" >> $GITHUB_STEP_SUMMARY
          TLS_SECRET="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ inputs.environment }}-tls"
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get secret $TLS_SECRET -n $NAMESPACE 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "TLS secret not found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

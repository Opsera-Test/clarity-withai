# ════════════════════════════════════════════════════════════════════════════
# DNS SETUP WORKFLOW - One-Time Per Environment
# RULE 94: DNS setup as separate workflow, not embedded in CI/CD
# Generated by Code-to-Cloud Enterprise v0.901
# ════════════════════════════════════════════════════════════════════════════

name: "🌐 clarity1: DNS Setup"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to setup DNS for'
        type: choice
        options: [dev, qa, staging, all]
        default: dev

env:
  APP_NAME: clarity1
  TENANT: opsera
  AWS_REGION: us-east-1
  SPOKE_CLUSTER: opsera-use1-np
  DOMAIN: agent.opsera.dev

permissions:
  contents: read
  id-token: write

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # CHECK DNS STATUS
  # ════════════════════════════════════════════════════════════════════════════
  check-dns:
    name: "🔍 Check DNS Status"
    runs-on: ubuntu-latest
    outputs:
      needs_setup: ${{ steps.check.outputs.needs_setup }}
      environments: ${{ steps.envs.outputs.list }}
    steps:
      - name: Determine Environments
        id: envs
        run: |
          if [ "${{ inputs.environment }}" = "all" ]; then
            echo 'list=["dev","qa","staging"]' >> $GITHUB_OUTPUT
          else
            echo 'list=["${{ inputs.environment }}"]' >> $GITHUB_OUTPUT
          fi

      - name: Check DNS Status
        id: check
        run: |
          NEEDS_SETUP="false"
          
          if [ "${{ inputs.environment }}" = "all" ]; then
            ENVS="dev qa staging"
          else
            ENVS="${{ inputs.environment }}"
          fi
          
          for ENV in $ENVS; do
            FQDN="${{ env.TENANT }}-${{ env.APP_NAME }}-${ENV}.${{ env.DOMAIN }}"
            
            if dig +short ${FQDN} @8.8.8.8 | head -1 | grep -q .; then
              RESOLVED=$(dig +short ${FQDN} @8.8.8.8 | head -1)
              echo "✅ ${ENV}: DNS already configured → ${RESOLVED}" >> $GITHUB_STEP_SUMMARY
            else
              echo "📝 ${ENV}: DNS not configured - setup needed" >> $GITHUB_STEP_SUMMARY
              NEEDS_SETUP="true"
            fi
          done
          
          echo "needs_setup=${NEEDS_SETUP}" >> $GITHUB_OUTPUT

  # ════════════════════════════════════════════════════════════════════════════
  # SETUP DNS
  # ════════════════════════════════════════════════════════════════════════════
  setup-dns:
    name: "🌐 Setup DNS"
    needs: [check-dns]
    if: needs.check-dns.outputs.needs_setup == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Get Load Balancer Hostname
        id: lb
        run: |
          LB_HOSTNAME=$(kubectl get svc ingress-nginx-controller -n ingress-nginx \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")
          
          if [ -z "$LB_HOSTNAME" ]; then
            echo "❌ Load Balancer not found" >> $GITHUB_STEP_SUMMARY
            echo "::error::NGINX Ingress Controller Load Balancer not found"
            exit 1
          fi
          
          echo "hostname=${LB_HOSTNAME}" >> $GITHUB_OUTPUT
          echo "### Load Balancer: ${LB_HOSTNAME}" >> $GITHUB_STEP_SUMMARY
          
          # RULE 91: Verify LB region
          if echo "$LB_HOSTNAME" | grep -q "${{ env.AWS_REGION }}"; then
            echo "✅ Load Balancer in correct region" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Load Balancer region may not match expected" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Discover Hosted Zone
        id: zone
        run: |
          ZONE_ID=$(aws route53 list-hosted-zones \
            --query "HostedZones[?Name=='${{ env.DOMAIN }}.'].Id" \
            --output text 2>/dev/null | cut -d'/' -f3 || echo "")
          
          if [ -z "$ZONE_ID" ]; then
            echo "❌ Hosted zone not found for: ${{ env.DOMAIN }}" >> $GITHUB_STEP_SUMMARY
            echo "::error::Route53 Hosted Zone not found"
            exit 1
          fi
          
          echo "zone_id=${ZONE_ID}" >> $GITHUB_OUTPUT
          echo "### Hosted Zone: ${ZONE_ID}" >> $GITHUB_STEP_SUMMARY

      - name: Create DNS Records
        env:
          LB_HOSTNAME: ${{ steps.lb.outputs.hostname }}
          ZONE_ID: ${{ steps.zone.outputs.zone_id }}
        run: |
          if [ "${{ inputs.environment }}" = "all" ]; then
            ENVS="dev qa staging"
          else
            ENVS="${{ inputs.environment }}"
          fi
          
          for ENV in $ENVS; do
            FQDN="${{ env.TENANT }}-${{ env.APP_NAME }}-${ENV}.${{ env.DOMAIN }}"
            
            # Check if already exists
            if dig +short ${FQDN} @8.8.8.8 | grep -q .; then
              echo "⏭️ Skipping ${ENV}: DNS already configured" >> $GITHUB_STEP_SUMMARY
              continue
            fi
            
            # Create change batch
            cat > /tmp/dns-change.json << EOF
          {
            "Changes": [{
              "Action": "UPSERT",
              "ResourceRecordSet": {
                "Name": "${FQDN}",
                "Type": "CNAME",
                "TTL": 300,
                "ResourceRecords": [{"Value": "${LB_HOSTNAME}"}]
              }
            }]
          }
          EOF
            
            # RULE 56: Try automation with graceful fallback
            set +e
            RESULT=$(aws route53 change-resource-record-sets \
              --hosted-zone-id ${ZONE_ID} \
              --change-batch file:///tmp/dns-change.json \
              --query 'ChangeInfo.Id' \
              --output text 2>&1)
            EXIT_CODE=$?
            set -e
            
            if [ $EXIT_CODE -eq 0 ]; then
              echo "✅ ${ENV}: DNS record created" >> $GITHUB_STEP_SUMMARY
            else
              echo "⚠️ ${ENV}: DNS automation failed - manual setup required" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "**Manual DNS Setup for ${ENV}:**" >> $GITHUB_STEP_SUMMARY
              echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
              echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
              echo "| Record Name | \`${FQDN}\` |" >> $GITHUB_STEP_SUMMARY
              echo "| Type | CNAME |" >> $GITHUB_STEP_SUMMARY
              echo "| Value | \`${LB_HOSTNAME}\` |" >> $GITHUB_STEP_SUMMARY
              echo "| TTL | 300 |" >> $GITHUB_STEP_SUMMARY
            fi
          done

  # ════════════════════════════════════════════════════════════════════════════
  # WAIT FOR PROPAGATION
  # ════════════════════════════════════════════════════════════════════════════
  wait-propagation:
    name: "⏳ Wait for Propagation"
    needs: [setup-dns]
    if: always() && needs.setup-dns.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for DNS Propagation
        run: |
          if [ "${{ inputs.environment }}" = "all" ]; then
            ENVS="dev qa staging"
          else
            ENVS="${{ inputs.environment }}"
          fi
          
          for ENV in $ENVS; do
            FQDN="${{ env.TENANT }}-${{ env.APP_NAME }}-${ENV}.${{ env.DOMAIN }}"
            
            echo "Waiting for DNS propagation: ${FQDN}"
            
            for i in $(seq 1 30); do
              if dig +short ${FQDN} @8.8.8.8 | grep -q .; then
                RESOLVED=$(dig +short ${FQDN} @8.8.8.8 | head -1)
                echo "✅ ${ENV}: DNS propagated → ${RESOLVED}" >> $GITHUB_STEP_SUMMARY
                break
              fi
              
              if [ $i -eq 30 ]; then
                echo "⚠️ ${ENV}: DNS propagation timeout - may need more time" >> $GITHUB_STEP_SUMMARY
              fi
              
              sleep 10
            done
          done

  # ════════════════════════════════════════════════════════════════════════════
  # SUMMARY
  # ════════════════════════════════════════════════════════════════════════════
  summary:
    name: "📋 Summary"
    needs: [check-dns, setup-dns, wait-propagation]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate Summary
        run: |
          cat << EOF >> $GITHUB_STEP_SUMMARY
          
          # 🌐 DNS Setup Complete
          
          ## Configured URLs
          EOF
          
          if [ "${{ inputs.environment }}" = "all" ]; then
            ENVS="dev qa staging"
          else
            ENVS="${{ inputs.environment }}"
          fi
          
          for ENV in $ENVS; do
            URL="https://${{ env.TENANT }}-${{ env.APP_NAME }}-${ENV}.${{ env.DOMAIN }}"
            echo "- **${ENV}:** \`${URL}\`" >> $GITHUB_STEP_SUMMARY
          done
          
          cat << EOF >> $GITHUB_STEP_SUMMARY
          
          ## Verification
          \`\`\`bash
          # Test DNS resolution
          dig +short ${{ env.TENANT }}-${{ env.APP_NAME }}-${{ inputs.environment }}.${{ env.DOMAIN }}
          
          # Test HTTPS
          curl -I https://${{ env.TENANT }}-${{ env.APP_NAME }}-${{ inputs.environment }}.${{ env.DOMAIN }}
          \`\`\`
          EOF

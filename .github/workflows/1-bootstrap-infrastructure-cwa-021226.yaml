# Bootstrap Infrastructure - cwa-021226 (ONE-TIME)
# Required: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, GH_PAT
# Trigger: gh workflow run 1-bootstrap-infrastructure-cwa-021226.yaml

name: "Bootstrap Infrastructure - cwa-021226"

on:
  workflow_dispatch:

env:
  APP_NAME: cwa-021226
  TENANT: opsera
  AWS_REGION: us-west-2
  REGION_SHORT: usw2
  HUB_CLUSTER: argocd-usw2
  SPOKE_CLUSTER: opsera-usw2-np
  ECR_REPO_NAME: opsera/cwa-021226

jobs:
  setup-ecr:
    name: "1. Setup ECR"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create ECR Repository
        run: |
          if aws ecr describe-repositories --repository-names "${{ env.ECR_REPO_NAME }}" 2>/dev/null; then
            echo "✓ ECR repository already exists"
          else
            aws ecr create-repository \
              --repository-name "${{ env.ECR_REPO_NAME }}" \
              --image-tag-mutability IMMUTABLE \
              --encryption-configuration encryptionType=AES256 \
              --tags Key=tenant,Value=${{ env.TENANT }} Key=app,Value=${{ env.APP_NAME }} Key=managed-by,Value=opsera-c2c
            echo "✓ ECR repository created"
          fi

  register-repo-argocd:
    name: "2. Register Repo with ArgoCD"
    needs: [setup-ecr]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }} --alias hub
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }} --alias spoke

      - name: Register Repository with ArgoCD
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          REPO_SECRET_NAME="repo-${{ github.repository_owner }}-${{ env.APP_NAME }}"
          if kubectl --context hub get secret "$REPO_SECRET_NAME" -n argocd 2>/dev/null; then
            echo "✓ Repository secret already exists"
            exit 0
          fi
          cat <<EOF | kubectl --context hub apply -f -
          apiVersion: v1
          kind: Secret
          metadata:
            name: ${REPO_SECRET_NAME}
            namespace: argocd
            labels:
              argocd.argoproj.io/secret-type: repository
          type: Opaque
          stringData:
            type: git
            url: https://github.com/${{ github.repository }}.git
            password: ${GH_PAT}
            username: git
          EOF
          echo "✓ Repository registered"

  register-spoke-cluster:
    name: "3. Register Spoke Cluster"
    needs: [register-repo-argocd]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Kubeconfig
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }} --alias hub
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }} --alias spoke

      - name: Check and Register Spoke Cluster
        run: |
          if kubectl --context hub get secret cluster-${{ env.SPOKE_CLUSTER }} -n argocd 2>/dev/null; then
            echo "✓ Spoke cluster already registered"
            exit 0
          fi
          SPOKE_SERVER=$(aws eks describe-cluster --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }} --query 'cluster.endpoint' --output text)
          SPOKE_CA=$(aws eks describe-cluster --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }} --query 'cluster.certificateAuthority.data' --output text)
          kubectl --context spoke create serviceaccount argocd-manager -n kube-system --dry-run=client -o yaml | kubectl --context spoke apply -f -
          kubectl --context spoke create clusterrolebinding argocd-manager --clusterrole=cluster-admin --serviceaccount=kube-system:argocd-manager --dry-run=client -o yaml | kubectl --context spoke apply -f -
          TOKEN=$(kubectl --context spoke create token argocd-manager -n kube-system --duration=87600h 2>/dev/null || kubectl --context spoke get secret -n kube-system $(kubectl --context spoke get sa argocd-manager -n kube-system -o jsonpath='{.secrets[0].name}') -o jsonpath='{.data.token}' | base64 -d)
          cat <<EOF | kubectl --context hub apply -f -
          apiVersion: v1
          kind: Secret
          metadata:
            name: cluster-${{ env.SPOKE_CLUSTER }}
            namespace: argocd
            labels:
              argocd.argoproj.io/secret-type: cluster
          type: Opaque
          stringData:
            name: "${{ env.SPOKE_CLUSTER }}"
            server: "${SPOKE_SERVER}"
            config: |
              {"bearerToken":"${TOKEN}","tlsClientConfig":{"insecure":false,"caData":"${SPOKE_CA}"}}
          EOF
          echo "✓ Spoke cluster registered"

  create-folder-structure:
    name: "4. Create Folder Structure"
    needs: [register-spoke-cluster]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create Folder Structure
        run: |
          mkdir -p .opsera-cwa-021226/k8s/base .opsera-cwa-021226/k8s/overlays/dev .opsera-cwa-021226/argocd/dev
          echo "✓ Folder structure created"

  create-namespaces:
    name: "5. Create Namespaces"
    needs: [create-folder-structure]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }} --alias spoke

      - name: Create Dev Namespace
        run: |
          NAMESPACE="opsera-cwa-021226-dev"
          kubectl --context spoke get namespace $NAMESPACE 2>/dev/null || kubectl --context spoke create namespace $NAMESPACE
          kubectl --context spoke label namespace $NAMESPACE tenant=opsera app=cwa-021226 environment=dev managed-by=opsera-c2c --overwrite
          echo "✓ Namespace ready"

  bootstrap-complete:
    name: "6. Bootstrap Complete"
    needs: [create-namespaces]
    runs-on: ubuntu-latest
    steps:
      - run: echo "✅ Bootstrap complete. Run CI/CD workflow for first deployment."

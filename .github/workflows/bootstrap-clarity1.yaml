# ════════════════════════════════════════════════════════════════════════════
# BOOTSTRAP WORKFLOW - Infrastructure Setup
# Generated by Code-to-Cloud Enterprise v0.901
# Updated: 2026-01-31
# ════════════════════════════════════════════════════════════════════════════

name: "🚀 clarity1: Bootstrap Infrastructure"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to bootstrap'
        type: choice
        options: [dev, qa, staging, all]
        default: dev
      proceed:
        description: '☑️ I confirm to proceed with bootstrap'
        type: boolean
        default: false

env:
  APP_NAME: clarity1
  TENANT: opsera
  AWS_REGION: us-east-1
  HUB_CLUSTER: argocd-use1
  SPOKE_CLUSTER: opsera-use1-np
  DOMAIN: agent.opsera.dev

permissions:
  contents: write
  id-token: write

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # VALIDATION
  # ════════════════════════════════════════════════════════════════════════════
  validate:
    name: "✅ Validate"
    runs-on: ubuntu-latest
    if: inputs.proceed == true
    outputs:
      repo_url: ${{ steps.repo.outputs.url }}
      ecr_uri: ${{ steps.account.outputs.ecr_uri }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Repository URL
        id: repo
        run: |
          REPO_URL="https://github.com/${{ github.repository }}.git"
          echo "url=${REPO_URL}" >> $GITHUB_OUTPUT
          echo "### Repository: ${REPO_URL}" >> $GITHUB_STEP_SUMMARY

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get AWS Account ID
        id: account
        run: |
          # RULE 7: Always get account ID dynamically
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_URI="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          echo "ecr_uri=${ECR_URI}" >> $GITHUB_OUTPUT
          echo "### AWS Account: ${ACCOUNT_ID}" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # CREATE ECR REPOSITORY
  # ════════════════════════════════════════════════════════════════════════════
  create-ecr:
    name: "📦 Create ECR Repository"
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create ECR Repository
        run: |
          # RULE 101: ECR repos use tenant/app pattern
          REPO_NAME="${{ env.TENANT }}/${{ env.APP_NAME }}"
          
          if aws ecr describe-repositories --repository-names "${REPO_NAME}" 2>/dev/null; then
            echo "✅ ECR repository already exists: ${REPO_NAME}"
          else
            aws ecr create-repository \
              --repository-name "${REPO_NAME}" \
              --image-scanning-configuration scanOnPush=true \
              --encryption-configuration encryptionType=AES256
            echo "✅ ECR repository created: ${REPO_NAME}"
          fi
          
          echo "### ECR Repository: ${REPO_NAME}" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # UPDATE MANIFESTS WITH ACTUAL VALUES
  # ════════════════════════════════════════════════════════════════════════════
  update-manifests:
    name: "📝 Update Manifests"
    needs: [validate, create-ecr]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Update Placeholders
        env:
          ECR_URI: ${{ needs.validate.outputs.ecr_uri }}
          REPO_URL: ${{ needs.validate.outputs.repo_url }}
        run: |
          # RULE 87: Resolve all placeholders before commit
          
          # Update ECR URI in kustomization files
          for env in dev qa staging; do
            KUST_FILE=".opsera-${{ env.APP_NAME }}/k8s/overlays/${env}/kustomization.yaml"
            if [ -f "$KUST_FILE" ]; then
              sed -i "s|PLACEHOLDER_ECR_URI|${ECR_URI}|g" "$KUST_FILE"
              echo "✅ Updated: $KUST_FILE"
            fi
          done
          
          # Update repo URL in ArgoCD applications
          for env in dev qa staging; do
            APP_FILE=".opsera-${{ env.APP_NAME }}/argocd/${env}/application.yaml"
            if [ -f "$APP_FILE" ]; then
              sed -i "s|PLACEHOLDER_REPO_URL|${REPO_URL}|g" "$APP_FILE"
              echo "✅ Updated: $APP_FILE"
            fi
          done
          
          echo "### Manifests Updated" >> $GITHUB_STEP_SUMMARY

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .opsera-${{ env.APP_NAME }}/
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: Update manifests with actual values [skip ci]

Bootstrap for: ${{ env.APP_NAME }}
Environment: ${{ inputs.environment }}
ECR URI: ${{ needs.validate.outputs.ecr_uri }}

Co-Authored-By: Opsera Code-to-Cloud <noreply@opsera.io>"
            
            git pull --rebase origin main
            git push origin main
            echo "✅ Changes committed" >> $GITHUB_STEP_SUMMARY
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # CREATE ARGOCD REPOSITORY SECRET
  # ════════════════════════════════════════════════════════════════════════════
  create-repo-secret:
    name: "🔐 Create ArgoCD Repo Secret"
    needs: [validate, update-manifests]
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for hub cluster
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Create Repository Secret
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          REPO_URL: ${{ needs.validate.outputs.repo_url }}
        run: |
          # RULE 63: ArgoCD repository secret required for private repos
          SECRET_NAME="repo-${{ env.APP_NAME }}"
          
          if kubectl get secret "$SECRET_NAME" -n argocd &>/dev/null; then
            echo "✅ Repository secret already exists: $SECRET_NAME"
          else
            kubectl create secret generic "$SECRET_NAME" -n argocd \
              --from-literal=type=git \
              --from-literal=url="${REPO_URL}" \
              --from-literal=password="${GH_PAT}" \
              --from-literal=username=git
            
            kubectl label secret "$SECRET_NAME" -n argocd \
              argocd.argoproj.io/secret-type=repository
            
            echo "✅ Repository secret created: $SECRET_NAME"
          fi
          
          echo "### ArgoCD Repository Secret: $SECRET_NAME" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # APPLY ARGOCD APPLICATIONS
  # ════════════════════════════════════════════════════════════════════════════
  apply-argocd-apps:
    name: "🔄 Apply ArgoCD Applications"
    needs: [validate, create-repo-secret]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for hub cluster
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Apply ArgoCD Applications
        run: |
          # Apply based on environment selection
          if [ "${{ inputs.environment }}" = "all" ]; then
            ENVS="dev qa staging"
          else
            ENVS="${{ inputs.environment }}"
          fi
          
          for env in $ENVS; do
            APP_FILE=".opsera-${{ env.APP_NAME }}/argocd/${env}/application.yaml"
            if [ -f "$APP_FILE" ]; then
              kubectl apply -f "$APP_FILE"
              echo "✅ Applied ArgoCD Application: ${{ env.APP_NAME }}-${env}"
            else
              echo "⚠️ Application file not found: $APP_FILE"
            fi
          done
          
          echo "### ArgoCD Applications Applied" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # SUMMARY
  # ════════════════════════════════════════════════════════════════════════════
  summary:
    name: "📋 Summary"
    needs: [validate, create-ecr, update-manifests, create-repo-secret, apply-argocd-apps]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate Summary
        run: |
          cat << 'EOF' >> $GITHUB_STEP_SUMMARY
          
          # 🎉 Bootstrap Complete
          
          ## Configuration
          | Setting | Value |
          |---------|-------|
          | **App Name** | `${{ env.APP_NAME }}` |
          | **Tenant** | `${{ env.TENANT }}` |
          | **Environment** | `${{ inputs.environment }}` |
          | **Hub Cluster** | `${{ env.HUB_CLUSTER }}` |
          | **Spoke Cluster** | `${{ env.SPOKE_CLUSTER }}` |
          | **ECR Repository** | `${{ env.TENANT }}/${{ env.APP_NAME }}` |
          
          ## Next Steps
          
          1. **Build and deploy** - Push code to main branch to trigger CI/CD:
             ```bash
             git add . && git commit -m "feat: Initial deployment" && git push
             ```
          
          2. **Or manually trigger CI/CD**:
             ```bash
             gh workflow run "ci-build-push-clarity1.yaml" -f environment=dev
             ```
          
          3. **After deployment, setup DNS**:
             ```bash
             gh workflow run "dns-setup-clarity1.yaml" -f environment=dev
             ```
          
          4. **Check ArgoCD status**:
             ```bash
             gh workflow run "diagnostics-clarity1.yaml" -f diagnostic_type=full-pipeline -f environment=dev
             ```
          
          EOF

name: "🚀 1cwa: Bootstrap Infrastructure"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to bootstrap'
        type: choice
        options:
          - dev
          - qa
          - staging
        default: dev
      proceed:
        description: 'Confirm bootstrap'
        required: true
        type: boolean
        default: false

env:
  APP_NAME: 1cwa
  TENANT: opsera
  AWS_REGION: us-west-2
  SPOKE_CLUSTER: opsera-usw2-np
  HUB_CLUSTER: argocd-usw2
  DOMAIN: agent.opsera.dev

permissions:
  contents: write
  id-token: write

jobs:
  verify-prerequisites:
    name: "🔍 Verify Prerequisites"
    runs-on: ubuntu-latest
    if: inputs.proceed == true
    outputs:
      ecr_exists: ${{ steps.check-ecr.outputs.exists }}
      spoke_registered: ${{ steps.check-spoke.outputs.registered }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get AWS Account ID
        id: aws-account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=$ACCOUNT_ID" >> $GITHUB_OUTPUT
          echo "### AWS Account" >> $GITHUB_STEP_SUMMARY
          echo "Account ID: \`$ACCOUNT_ID\`" >> $GITHUB_STEP_SUMMARY

      - name: Check ECR Repository
        id: check-ecr
        run: |
          ECR_REPO="${{ env.TENANT }}/${{ env.APP_NAME }}"
          if aws ecr describe-repositories --repository-names "$ECR_REPO" 2>/dev/null; then
            echo "✅ ECR repository exists: $ECR_REPO" >> $GITHUB_STEP_SUMMARY
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "📝 ECR repository will be created: $ECR_REPO" >> $GITHUB_STEP_SUMMARY
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure kubectl for Hub Cluster
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Check Spoke Registration
        id: check-spoke
        run: |
          if kubectl get secret "cluster-${{ env.SPOKE_CLUSTER }}" -n argocd 2>/dev/null; then
            echo "✅ Spoke cluster registered in ArgoCD" >> $GITHUB_STEP_SUMMARY
            echo "registered=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ Spoke cluster NOT registered - will register" >> $GITHUB_STEP_SUMMARY
            echo "registered=false" >> $GITHUB_OUTPUT
          fi

  create-ecr:
    name: "📦 Create ECR Repository"
    runs-on: ubuntu-latest
    needs: [verify-prerequisites]
    if: needs.verify-prerequisites.outputs.ecr_exists == 'false'
    outputs:
      ecr_uri: ${{ steps.create.outputs.ecr_uri }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create ECR Repository
        id: create
        run: |
          ECR_REPO="${{ env.TENANT }}/${{ env.APP_NAME }}"
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          
          aws ecr create-repository \
            --repository-name "$ECR_REPO" \
            --image-scanning-configuration scanOnPush=true \
            --encryption-configuration encryptionType=AES256

          ECR_URI="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${ECR_REPO}"
          echo "ecr_uri=$ECR_URI" >> $GITHUB_OUTPUT
          echo "✅ ECR repository created: \`$ECR_URI\`" >> $GITHUB_STEP_SUMMARY

  register-spoke:
    name: "🔗 Register Spoke Cluster"
    runs-on: ubuntu-latest
    needs: [verify-prerequisites]
    if: needs.verify-prerequisites.outputs.spoke_registered == 'false'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Register Spoke with ArgoCD Hub
        run: |
          SPOKE_ENDPOINT=$(aws eks describe-cluster --name ${{ env.SPOKE_CLUSTER }} \
            --query 'cluster.endpoint' --output text)
          SPOKE_CA=$(aws eks describe-cluster --name ${{ env.SPOKE_CLUSTER }} \
            --query 'cluster.certificateAuthority.data' --output text)

          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}

          kubectl apply -f - <<EOF
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: argocd-manager
            namespace: kube-system
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: argocd-manager-role-binding
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: cluster-admin
          subjects:
          - kind: ServiceAccount
            name: argocd-manager
            namespace: kube-system
          EOF

          TOKEN=$(kubectl create token argocd-manager -n kube-system --duration=87600h)

          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

          kubectl apply -f - <<EOF
          apiVersion: v1
          kind: Secret
          metadata:
            name: cluster-${{ env.SPOKE_CLUSTER }}
            namespace: argocd
            labels:
              argocd.argoproj.io/secret-type: cluster
          type: Opaque
          stringData:
            name: ${{ env.SPOKE_CLUSTER }}
            server: ${SPOKE_ENDPOINT}
            config: |
              {
                "bearerToken": "${TOKEN}",
                "tlsClientConfig": {
                  "insecure": false,
                  "caData": "${SPOKE_CA}"
                }
              }
          EOF

          echo "✅ Spoke cluster registered with ArgoCD" >> $GITHUB_STEP_SUMMARY

  create-repo-secret:
    name: "🔑 Create ArgoCD Repo Secret"
    runs-on: ubuntu-latest
    needs: [verify-prerequisites, register-spoke]
    if: always() && needs.verify-prerequisites.result == 'success'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for Hub
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Create Repository Secret
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          REPO_URL="https://github.com/${{ github.repository }}"
          SECRET_NAME="repo-${{ env.APP_NAME }}"

          if kubectl get secret "$SECRET_NAME" -n argocd 2>/dev/null; then
            echo "✅ Repository secret already exists" >> $GITHUB_STEP_SUMMARY
          else
            kubectl create secret generic "$SECRET_NAME" -n argocd \
              --from-literal=type=git \
              --from-literal=url="$REPO_URL" \
              --from-literal=username=git \
              --from-literal=password="$GH_PAT" \
              --dry-run=client -o yaml | kubectl apply -f -

            kubectl label secret "$SECRET_NAME" -n argocd \
              argocd.argoproj.io/secret-type=repository --overwrite

            echo "✅ Repository secret created" >> $GITHUB_STEP_SUMMARY
          fi

  update-manifests:
    name: "📝 Update Manifests"
    runs-on: ubuntu-latest
    needs: [verify-prerequisites, create-ecr, create-repo-secret]
    if: always() && needs.verify-prerequisites.result == 'success'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update Kustomization with ECR URI
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_URI="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.TENANT }}/${{ env.APP_NAME }}"
          REPO_URL="https://github.com/${{ github.repository }}"

          sed -i "s|PLACEHOLDER_ECR_URI|${ECR_URI}|g" \
            .opsera-${{ env.APP_NAME }}/k8s/overlays/${{ inputs.environment }}/kustomization.yaml

          sed -i "s|PLACEHOLDER_REPO_URL|${REPO_URL}|g" \
            .opsera-${{ env.APP_NAME }}/argocd/${{ inputs.environment }}/application.yaml

          echo "✅ Manifests updated with resolved values" >> $GITHUB_STEP_SUMMARY

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .opsera-${{ env.APP_NAME }}/
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: Bootstrap ${{ env.APP_NAME }} for ${{ inputs.environment }} [skip ci]"
            git push
          fi

  apply-argocd-app:
    name: "🚀 Apply ArgoCD Application"
    runs-on: ubuntu-latest
    needs: [update-manifests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for Hub
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Pull Latest Changes
        run: git pull origin main

      - name: Apply ArgoCD Application
        run: |
          kubectl apply -f .opsera-${{ env.APP_NAME }}/argocd/${{ inputs.environment }}/application.yaml
          echo "✅ ArgoCD application applied" >> $GITHUB_STEP_SUMMARY

      - name: Verify Application Created
        run: |
          sleep 5
          kubectl get application ${{ env.APP_NAME }}-${{ inputs.environment }} -n argocd
          echo "### ArgoCD Application Status" >> $GITHUB_STEP_SUMMARY
          kubectl get application ${{ env.APP_NAME }}-${{ inputs.environment }} -n argocd \
            -o jsonpath='{.status.sync.status}' >> $GITHUB_STEP_SUMMARY

  summary:
    name: "📋 Bootstrap Summary"
    runs-on: ubuntu-latest
    needs: [apply-argocd-app]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          cat << 'EOF' >> $GITHUB_STEP_SUMMARY
          # 🎉 Bootstrap Complete

          ## Next Steps
          1. Push code changes to trigger CI/CD:
             ```bash
             git push origin main
             ```

          2. Or run CI/CD manually:
             ```bash
             gh workflow run "ci-build-push-1cwa.yaml" -f environment=${{ inputs.environment }}
             ```

          ## Expected URL
          ```
          https://${{ env.TENANT }}-${{ env.APP_NAME }}-${{ inputs.environment }}.${{ env.DOMAIN }}
          ```
          EOF

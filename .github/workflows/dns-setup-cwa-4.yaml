# ════════════════════════════════════════════════════════════════════════════
# DNS SETUP - cwa-4
# Generated by Code-to-Cloud Enterprise v1.7.3
# RULE 94: DNS setup as separate one-time workflow
# ════════════════════════════════════════════════════════════════════════════

name: "🌐 cwa-4: DNS Setup"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to setup DNS for'
        type: choice
        options: [dev, qa, staging, all]
        default: dev

env:
  APP_NAME: cwa-4
  TENANT: opsera
  AWS_REGION: us-west-2
  SPOKE_CLUSTER: opsera-usw2-np
  DOMAIN: agent.opsera.dev

permissions:
  contents: read
  id-token: write

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # CHECK DNS STATUS
  # ════════════════════════════════════════════════════════════════════════════
  check-dns:
    name: "🔍 Check DNS Status"
    runs-on: ubuntu-latest
    outputs:
      needs_setup: ${{ steps.check.outputs.needs_setup }}
      lb_hostname: ${{ steps.lb.outputs.hostname }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Get Load Balancer Hostname
        id: lb
        run: |
          # Get NGINX Ingress Controller Load Balancer
          LB_HOSTNAME=$(kubectl get svc ingress-nginx-controller -n ingress-nginx \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")
          
          if [ -z "$LB_HOSTNAME" ]; then
            echo "::error::NGINX Ingress Controller Load Balancer not found"
            exit 1
          fi
          
          echo "hostname=${LB_HOSTNAME}" >> $GITHUB_OUTPUT
          echo "### Load Balancer" >> $GITHUB_STEP_SUMMARY
          echo "\`${LB_HOSTNAME}\`" >> $GITHUB_STEP_SUMMARY

      - name: Check DNS Status
        id: check
        run: |
          ENVS="${{ inputs.environment }}"
          if [ "$ENVS" = "all" ]; then
            ENVS="dev qa staging"
          fi
          
          NEEDS_SETUP="false"
          
          for env in $ENVS; do
            FQDN="${{ env.TENANT }}-${{ env.APP_NAME }}-${env}.${{ env.DOMAIN }}"
            
            if dig +short $FQDN @8.8.8.8 | head -1 | grep -q .; then
              CURRENT=$(dig +short $FQDN @8.8.8.8 | head -1)
              echo "✅ DNS exists for ${env}: ${CURRENT}" >> $GITHUB_STEP_SUMMARY
            else
              echo "📝 DNS needed for ${env}: ${FQDN}" >> $GITHUB_STEP_SUMMARY
              NEEDS_SETUP="true"
            fi
          done
          
          echo "needs_setup=${NEEDS_SETUP}" >> $GITHUB_OUTPUT

  # ════════════════════════════════════════════════════════════════════════════
  # CONFIGURE DNS
  # ════════════════════════════════════════════════════════════════════════════
  configure-dns:
    name: "🌐 Configure DNS"
    needs: [check-dns]
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get Hosted Zone ID
        id: zone
        run: |
          ZONE_ID=$(aws route53 list-hosted-zones \
            --query "HostedZones[?Name=='${{ env.DOMAIN }}.'].Id" \
            --output text | cut -d'/' -f3)
          
          if [ -z "$ZONE_ID" ]; then
            echo "::error::Hosted zone not found for ${{ env.DOMAIN }}"
            exit 1
          fi
          
          echo "zone_id=${ZONE_ID}" >> $GITHUB_OUTPUT
          echo "### Hosted Zone" >> $GITHUB_STEP_SUMMARY
          echo "- Domain: \`${{ env.DOMAIN }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Zone ID: \`${ZONE_ID}\`" >> $GITHUB_STEP_SUMMARY

      - name: Create DNS Records
        env:
          LB_HOSTNAME: ${{ needs.check-dns.outputs.lb_hostname }}
          ZONE_ID: ${{ steps.zone.outputs.zone_id }}
        run: |
          ENVS="${{ inputs.environment }}"
          if [ "$ENVS" = "all" ]; then
            ENVS="dev qa staging"
          fi
          
          echo "### DNS Records" >> $GITHUB_STEP_SUMMARY
          
          for env in $ENVS; do
            FQDN="${{ env.TENANT }}-${{ env.APP_NAME }}-${env}.${{ env.DOMAIN }}"
            
            # Create change batch
            cat > /tmp/dns-change-${env}.json <<EOF
          {
            "Changes": [{
              "Action": "UPSERT",
              "ResourceRecordSet": {
                "Name": "${FQDN}",
                "Type": "CNAME",
                "TTL": 300,
                "ResourceRecords": [{"Value": "${LB_HOSTNAME}"}]
              }
            }]
          }
          EOF
            
            # Apply DNS change (with graceful fallback)
            set +e
            CHANGE_OUTPUT=$(aws route53 change-resource-record-sets \
              --hosted-zone-id $ZONE_ID \
              --change-batch file:///tmp/dns-change-${env}.json \
              --query 'ChangeInfo.Id' \
              --output text 2>&1)
            DNS_EXIT_CODE=$?
            set -e
            
            if [ $DNS_EXIT_CODE -eq 0 ]; then
              echo "✅ Created: \`${FQDN}\` → \`${LB_HOSTNAME}\`" >> $GITHUB_STEP_SUMMARY
            else
              echo "⚠️ Failed for ${env}: ${CHANGE_OUTPUT}" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "**Manual Setup for ${env}:**" >> $GITHUB_STEP_SUMMARY
              echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
              echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
              echo "| Record | \`${FQDN}\` |" >> $GITHUB_STEP_SUMMARY
              echo "| Type | CNAME |" >> $GITHUB_STEP_SUMMARY
              echo "| Value | \`${LB_HOSTNAME}\` |" >> $GITHUB_STEP_SUMMARY
            fi
          done

  # ════════════════════════════════════════════════════════════════════════════
  # WAIT FOR DNS PROPAGATION
  # ════════════════════════════════════════════════════════════════════════════
  wait-propagation:
    name: "⏳ Wait for DNS Propagation"
    needs: [check-dns, configure-dns]
    runs-on: ubuntu-latest
    steps:
      - name: Wait for DNS Propagation
        run: |
          ENVS="${{ inputs.environment }}"
          if [ "$ENVS" = "all" ]; then
            ENVS="dev qa staging"
          fi
          
          echo "### DNS Propagation" >> $GITHUB_STEP_SUMMARY
          
          for env in $ENVS; do
            FQDN="${{ env.TENANT }}-${{ env.APP_NAME }}-${env}.${{ env.DOMAIN }}"
            
            echo "Checking DNS for ${FQDN}..."
            
            for i in {1..24}; do
              RESOLVED=$(dig +short $FQDN @8.8.8.8 | head -1)
              
              if [ -n "$RESOLVED" ]; then
                echo "✅ ${env}: \`${FQDN}\` → \`${RESOLVED}\`" >> $GITHUB_STEP_SUMMARY
                break
              fi
              
              if [ $i -eq 24 ]; then
                echo "⏳ ${env}: Still propagating (check manually)" >> $GITHUB_STEP_SUMMARY
              fi
              
              sleep 5
            done
          done

  # ════════════════════════════════════════════════════════════════════════════
  # VERIFY HTTPS
  # ════════════════════════════════════════════════════════════════════════════
  verify-https:
    name: "🔒 Verify HTTPS"
    needs: [wait-propagation]
    runs-on: ubuntu-latest
    steps:
      - name: Test HTTPS Endpoints
        run: |
          ENVS="${{ inputs.environment }}"
          if [ "$ENVS" = "all" ]; then
            ENVS="dev qa staging"
          fi
          
          echo "### HTTPS Verification" >> $GITHUB_STEP_SUMMARY
          
          for env in $ENVS; do
            URL="https://${{ env.TENANT }}-${{ env.APP_NAME }}-${env}.${{ env.DOMAIN }}"
            
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 -k "$URL" 2>/dev/null || echo "000")
            
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "301" ] || [ "$HTTP_CODE" = "302" ]; then
              echo "✅ ${env}: \`${URL}\` - HTTP ${HTTP_CODE}" >> $GITHUB_STEP_SUMMARY
            else
              echo "⚠️ ${env}: \`${URL}\` - HTTP ${HTTP_CODE} (may need more time)" >> $GITHUB_STEP_SUMMARY
            fi
          done

  # ════════════════════════════════════════════════════════════════════════════
  # SUMMARY
  # ════════════════════════════════════════════════════════════════════════════
  summary:
    name: "📋 Summary"
    needs: [check-dns, configure-dns, wait-propagation, verify-https]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate Summary
        run: |
          ENVS="${{ inputs.environment }}"
          if [ "$ENVS" = "all" ]; then
            ENVS="dev qa staging"
          fi
          
          cat << EOF >> $GITHUB_STEP_SUMMARY
          # 🌐 DNS Setup Complete: ${{ env.APP_NAME }}
          
          ## Configured URLs
          EOF
          
          for env in $ENVS; do
            echo "- **${env}**: \`https://${{ env.TENANT }}-${{ env.APP_NAME }}-${env}.${{ env.DOMAIN }}\`" >> $GITHUB_STEP_SUMMARY
          done
          
          cat << EOF >> $GITHUB_STEP_SUMMARY
          
          ## Notes
          - DNS propagation typically takes 2-5 minutes
          - TLS certificate may take a few minutes to provision
          - If HTTPS shows certificate warning, wait and retry
          
          ---
          *Generated by Code-to-Cloud Enterprise v1.7.3*
          EOF

# ════════════════════════════════════════════════════════════════════════════
# PROMOTION WORKFLOW - clarity-withai-1
# Generated by Code-to-Cloud Enterprise v1.7
# RULE 95: Manual promotion with approval gates
# ════════════════════════════════════════════════════════════════════════════
name: "🚀 clarity-withai-1: Promote"

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: 'Target environment'
        type: choice
        options: [qa, staging]
        required: true
      image_tag:
        description: 'Image tag to promote (e.g., abc1234-20260131120000)'
        required: true
      confirm_promotion:
        description: '☑️ I confirm this promotion'
        type: boolean
        default: false
        required: true

env:
  APP_NAME: clarity-withai-1
  TENANT: opsera
  AWS_REGION: us-west-2
  HUB_CLUSTER: argocd-usw2
  SPOKE_CLUSTER: opsera-usw2-np
  DOMAIN: agent.opsera.dev

permissions:
  contents: write
  id-token: write

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # VALIDATE
  # ════════════════════════════════════════════════════════════════════════════
  validate:
    name: "✅ Validate Promotion"
    runs-on: ubuntu-latest
    outputs:
      source_env: ${{ steps.source.outputs.env }}
    steps:
      - name: Check Confirmation
        if: inputs.confirm_promotion != true
        run: |
          echo "❌ Promotion not confirmed"
          echo "Please check the '☑️ I confirm this promotion' checkbox"
          exit 1

      - name: Determine Source Environment
        id: source
        run: |
          case "${{ inputs.target_environment }}" in
            qa) echo "env=dev" >> $GITHUB_OUTPUT ;;
            staging) echo "env=qa" >> $GITHUB_OUTPUT ;;
          esac

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate Image Exists
        run: |
          ECR_REPO="${{ env.TENANT }}/${{ env.APP_NAME }}"
          if ! aws ecr describe-images \
            --repository-name "$ECR_REPO" \
            --image-ids imageTag=${{ inputs.image_tag }} \
            --region ${{ env.AWS_REGION }} &>/dev/null; then
            echo "❌ Image tag not found: ${{ inputs.image_tag }}"
            echo "Available tags:"
            aws ecr describe-images --repository-name "$ECR_REPO" \
              --query 'imageDetails[*].imageTags' --output text | head -10
            exit 1
          fi
          echo "✅ Image tag verified"

  # ════════════════════════════════════════════════════════════════════════════
  # VERIFY SOURCE HEALTH
  # ════════════════════════════════════════════════════════════════════════════
  verify-source:
    name: "🏥 Verify Source Health"
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - name: Check Source Environment
        run: |
          SOURCE_ENV="${{ needs.validate.outputs.source_env }}"
          SOURCE_URL="https://${{ env.TENANT }}-${{ env.APP_NAME }}-${SOURCE_ENV}.${{ env.DOMAIN }}"

          echo "Checking: $SOURCE_URL"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$SOURCE_URL" || echo "000")

          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "301" ] || [ "$HTTP_CODE" = "302" ]; then
            echo "✅ Source environment healthy: HTTP $HTTP_CODE"
          else
            echo "⚠️ Source environment returned: HTTP $HTTP_CODE"
            echo "Proceeding anyway - may be DNS propagation delay"
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # PROMOTE
  # ════════════════════════════════════════════════════════════════════════════
  promote:
    name: "🚀 Promote"
    runs-on: ubuntu-latest
    needs: [validate, verify-source]
    environment:
      name: ${{ inputs.target_environment }}
      url: https://${{ env.TENANT }}-${{ env.APP_NAME }}-${{ inputs.target_environment }}.${{ env.DOMAIN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Update Kustomization
        run: |
          KUST_FILE=".opsera-${{ env.APP_NAME }}/k8s/overlays/${{ inputs.target_environment }}/kustomization.yaml"

          if [ -f "$KUST_FILE" ]; then
            sed -i "s/newTag: .*/newTag: ${{ inputs.image_tag }}/" "$KUST_FILE"
            echo "✅ Updated image tag"
            cat "$KUST_FILE"
          else
            echo "❌ Kustomization file not found: $KUST_FILE"
            exit 1
          fi

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .opsera-${{ env.APP_NAME }}/
          git commit -m "promote: ${{ inputs.target_environment }} to ${{ inputs.image_tag }}

          Source: ${{ needs.validate.outputs.source_env }}
          Target: ${{ inputs.target_environment }}
          Image: ${{ inputs.image_tag }}
          Approved by: ${{ github.actor }}

          Co-Authored-By: Opsera Code-to-Cloud <noreply@opsera.io>"

          git pull --rebase origin main
          git push origin main

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for Hub
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Trigger ArgoCD Sync
        run: |
          APP="${{ env.APP_NAME }}-${{ inputs.target_environment }}"
          kubectl annotate application ${APP} -n argocd \
            argocd.argoproj.io/refresh=hard --overwrite
          echo "✅ Sync triggered"

      - name: Monitor Deployment
        timeout-minutes: 15
        run: |
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}

          NAMESPACE="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ inputs.target_environment }}"
          TIMEOUT=600

          ELAPSED=0
          while [ $ELAPSED -lt $TIMEOUT ]; do
            READY=$(kubectl get pods -n $NAMESPACE -l app=${{ env.APP_NAME }} \
              -o jsonpath='{.items[*].status.phase}' 2>/dev/null | tr ' ' '\n' | grep -c Running || echo 0)
            TOTAL=$(kubectl get pods -n $NAMESPACE -l app=${{ env.APP_NAME }} --no-headers 2>/dev/null | wc -l || echo 0)

            echo "Pods: $READY/$TOTAL ready (${ELAPSED}s elapsed)"

            if [ "$TOTAL" -gt 0 ] && [ "$READY" -eq "$TOTAL" ]; then
              echo "✅ Promotion complete"
              exit 0
            fi

            sleep 15
            ELAPSED=$((ELAPSED + 15))
          done

          echo "⚠️ Timeout - run diagnostics for more info"

  # ════════════════════════════════════════════════════════════════════════════
  # NOTIFY
  # ════════════════════════════════════════════════════════════════════════════
  notify:
    name: "📢 Notify"
    runs-on: ubuntu-latest
    needs: [promote]
    if: always()
    steps:
      - name: Slack Notification
        if: env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.25.0
        with:
          channel-id: ${{ vars.SLACK_CHANNEL }}
          payload: |
            {
              "text": "${{ needs.promote.result == 'success' && '✅' || '❌' }} Promotion ${{ needs.promote.result }}",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "${{ needs.promote.result == 'success' && '✅ Promotion Succeeded' || '❌ Promotion Failed' }}"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {"type": "mrkdwn", "text": "*App:*\n`${{ env.APP_NAME }}`"},
                    {"type": "mrkdwn", "text": "*Target:*\n`${{ inputs.target_environment }}`"},
                    {"type": "mrkdwn", "text": "*Tag:*\n`${{ inputs.image_tag }}`"},
                    {"type": "mrkdwn", "text": "*Approved By:*\n${{ github.actor }}"}
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

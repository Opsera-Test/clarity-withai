# ════════════════════════════════════════════════════════════════
# CI/CD Pipeline - cwa-test-1 - Dev Environment
# 11-Stage Pipeline (v2.4 Production-Validated)
#
# Required Secrets:
# - AWS_ACCESS_KEY_ID: AWS access key for ECR and EKS
# - AWS_SECRET_ACCESS_KEY: AWS secret key
# - GH_PAT: GitHub Personal Access Token (scopes: repo, workflow)
#
# Triggers: Push to main branch (app source changes only)
# Manual:   gh workflow run "cicd-cwa-test-1-dev.yaml"
# ════════════════════════════════════════════════════════════════

name: "CI/CD: cwa-test-1 - Dev"

# ═══════════════════════════════════════════════════════════
# CONCURRENCY CONTROL - Prevents duplicate runs
# ═══════════════════════════════════════════════════════════
concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

# ═══════════════════════════════════════════════════════════
# TRIGGER - Path-based filtering prevents workflow loops
# ═══════════════════════════════════════════════════════════
on:
  push:
    branches: [main]
    paths-ignore:
      - '.opsera-cwa-test-1/k8s/**'
      - '.github/workflows/00-bootstrap-infrastructure.yaml'
      - '.github/workflows/diagnostics-*.yaml'
      - '.github/workflows/deployment-landscape-*.yaml'
      - '**/*.md'
      - '**/*.disabled'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'dev'
        type: choice
        options: ['dev']

env:
  APP_NAME: cwa-test-1
  TENANT: opsera
  ENV: dev
  AWS_REGION: us-west-2
  REGION_SHORT: usw2
  HUB_CLUSTER: argocd-usw2
  SPOKE_CLUSTER: opsera-usw2-np
  NAMESPACE: opsera-cwa-test-1-dev
  ECR_REPO_NAME: opsera/cwa-test-1
  ARGOCD_APP_NAME: opsera-cwa-test-1-dev
  ARGOCD_SERVER: argocd-usw2.agent.opsera.dev
  DOCKERFILE_PATH: Dockerfile

jobs:

  # ─────────────────────────────────────────────────────────────
  # Stage 1: Bootstrap Prerequisites Check
  # ─────────────────────────────────────────────────────────────
  bootstrap-check:
    name: "✅ Bootstrap Prerequisites"
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify ECR Repository Exists
        run: |
          if aws ecr describe-repositories \
            --repository-names "${ECR_REPO_NAME}" \
            --region ${AWS_REGION} 2>/dev/null; then
            echo "✓ ECR repository found: ${ECR_REPO_NAME}"
          else
            echo "❌ ECR repository not found: ${ECR_REPO_NAME}"
            echo "   Run bootstrap first: gh workflow run 00-bootstrap-infrastructure.yaml"
            exit 1
          fi

      - name: Setup Spoke Cluster Access
        run: |
          aws eks update-kubeconfig \
            --name ${SPOKE_CLUSTER} \
            --region ${AWS_REGION} \
            --alias spoke

      - name: Verify Namespace Exists
        run: |
          if kubectl --context spoke get namespace ${NAMESPACE} &>/dev/null; then
            echo "✓ Namespace found: ${NAMESPACE}"
          else
            echo "❌ Namespace not found: ${NAMESPACE}"
            echo "   Run bootstrap first: gh workflow run 00-bootstrap-infrastructure.yaml"
            exit 1
          fi

  # ─────────────────────────────────────────────────────────────
  # Stage 2: Security Scan - Gitleaks (WARN MODE - RULE 205)
  # ─────────────────────────────────────────────────────────────
  security-scan:
    name: "🔒 Security Scan (Gitleaks)"
    runs-on: ubuntu-latest
    needs: [bootstrap-check]
    continue-on-error: true
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: true

      - name: Report Scan Status
        run: echo "🔒 Security scan complete (warn-only mode)"

  # ─────────────────────────────────────────────────────────────
  # Stage 3: Build Docker Image (local only - no push yet)
  # ─────────────────────────────────────────────────────────────
  build-image:
    name: "🐳 Build Image"
    runs-on: ubuntu-latest
    needs: [security-scan]
    outputs:
      image_tag: ${{ steps.set-tag.outputs.image_tag }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set Image Tag
        id: set-tag
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          IMAGE_TAG="${SHORT_SHA}-${TIMESTAMP}"
          echo "image_tag=${IMAGE_TAG}" >> $GITHUB_OUTPUT
          echo "Image tag: ${IMAGE_TAG}"

      - name: Build Docker Image
        run: |
          IMAGE_TAG=${{ steps.set-tag.outputs.image_tag }}
          docker build \
            -f ${DOCKERFILE_PATH} \
            -t ${APP_NAME}:${IMAGE_TAG} \
            -t ${APP_NAME}:latest \
            .
          echo "✓ Image built: ${APP_NAME}:${IMAGE_TAG}"

      - name: Save Image to Tar
        run: |
          IMAGE_TAG=${{ steps.set-tag.outputs.image_tag }}
          docker save ${APP_NAME}:${IMAGE_TAG} -o /tmp/image.tar
          echo "✓ Image saved for scan"

      - name: Upload Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1

  # ─────────────────────────────────────────────────────────────
  # Stage 4: Grype Vulnerability Scan (warn-only)
  # ─────────────────────────────────────────────────────────────
  grype-scan:
    name: "🛡️ Grype Vulnerability Scan"
    runs-on: ubuntu-latest
    needs: [build-image]
    continue-on-error: true
    steps:
      - name: Download Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker Image
        run: |
          docker load -i /tmp/image.tar
          echo "✓ Image loaded for scanning"

      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin
          grype version

      - name: Run Grype Scan
        run: |
          IMAGE_TAG=${{ needs.build-image.outputs.image_tag }}
          grype ${APP_NAME}:${IMAGE_TAG} \
            --output table \
            --fail-on critical \
            2>&1 | tee grype-report.txt || true
          echo "✓ Grype scan complete (warn-only)"

      - name: Upload Grype Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: grype-report
          path: grype-report.txt
          retention-days: 30

  # ─────────────────────────────────────────────────────────────
  # Stage 5: Push to ECR (unique timestamped tags - RULE 206)
  # ─────────────────────────────────────────────────────────────
  push-to-ecr:
    name: "📤 Push to ECR"
    runs-on: ubuntu-latest
    needs: [build-image, grype-scan]
    if: always() && needs.build-image.result == 'success'
    outputs:
      ecr_uri: ${{ steps.push.outputs.ecr_uri }}
      image_tag: ${{ needs.build-image.outputs.image_tag }}
    steps:
      - name: Download Image Artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker Image
        run: docker load -i /tmp/image.tar

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR and Push
        id: push
        run: |
          IMAGE_TAG=${{ needs.build-image.outputs.image_tag }}

          # Get AWS account ID dynamically (RULE 147)
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          ECR_URI="${ECR_REGISTRY}/${ECR_REPO_NAME}"

          # Login to ECR
          aws ecr get-login-password --region ${AWS_REGION} | \
            docker login --username AWS --password-stdin ${ECR_REGISTRY}

          # Tag and push with unique timestamped tag (never :latest)
          docker tag ${APP_NAME}:${IMAGE_TAG} ${ECR_URI}:${IMAGE_TAG}
          docker push ${ECR_URI}:${IMAGE_TAG}

          echo "ecr_uri=${ECR_URI}" >> $GITHUB_OUTPUT
          echo "✓ Image pushed: ${ECR_URI}:${IMAGE_TAG}"

  # ─────────────────────────────────────────────────────────────
  # Stage 6: Update Manifests (IDEMPOTENT - RULE 209, 234)
  # ─────────────────────────────────────────────────────────────
  update-manifests:
    name: "📝 Update Manifests"
    runs-on: ubuntu-latest
    needs: [push-to-ecr]
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update Kustomize Image Tag (idempotent)
        run: |
          IMAGE_TAG=${{ needs.push-to-ecr.outputs.image_tag }}
          ECR_URI=${{ needs.push-to-ecr.outputs.ecr_uri }}

          KUSTOMIZE_FILE=".opsera-cwa-test-1/k8s/overlays/dev/kustomization.yaml"

          echo "Updating image tag to: ${IMAGE_TAG}"
          echo "ECR URI: ${ECR_URI}"

          # Update newName and newTag (RULE 234 - replace BOTH fields)
          sed -i "s|newName:.*|newName: ${ECR_URI}|g" ${KUSTOMIZE_FILE}
          sed -i "s|newTag:.*|newTag: ${IMAGE_TAG}|g" ${KUSTOMIZE_FILE}

          echo "Updated kustomization.yaml:"
          cat ${KUSTOMIZE_FILE}

      - name: Commit and Push Manifest Updates
        run: |
          IMAGE_TAG=${{ needs.push-to-ecr.outputs.image_tag }}

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Pull first (RULE 143)
          git pull --rebase origin main

          git add .opsera-cwa-test-1/k8s/overlays/dev/kustomization.yaml

          # Only commit if there are changes (RULE 209 - idempotent)
          if git diff --staged --quiet; then
            echo "✓ No manifest changes - already up to date"
          else
            # [skip ci] prevents workflow loop
            git commit -m "chore(deploy): update dev image to ${IMAGE_TAG} [skip ci]"
            git push origin main
            echo "✓ Manifest updated and pushed"
          fi

  # ─────────────────────────────────────────────────────────────
  # Stage 7: Create/Update ArgoCD Application (HUB - RULE 213)
  # ─────────────────────────────────────────────────────────────
  create-argocd-app:
    name: "🚀 Create ArgoCD Application"
    runs-on: ubuntu-latest
    needs: [update-manifests]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Hub Cluster Access
        run: |
          aws eks update-kubeconfig \
            --name ${HUB_CLUSTER} \
            --region ${AWS_REGION} \
            --alias hub

      - name: Create/Update ArgoCD Application (idempotent)
        run: |
          # Pull latest to get updated manifests
          git pull --rebase origin main 2>/dev/null || true

          kubectl --context hub apply -f \
            .opsera-cwa-test-1/argocd/dev/application.yaml

          echo "✓ ArgoCD application created/updated: ${ARGOCD_APP_NAME}"

  # ─────────────────────────────────────────────────────────────
  # Stage 8: Refresh ECR Secret on SPOKE (BEFORE sync - RULE 163)
  # ─────────────────────────────────────────────────────────────
  refresh-ecr-secret:
    name: "🔑 Refresh ECR Secret (Spoke)"
    runs-on: ubuntu-latest
    needs: [create-argocd-app]
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Spoke Cluster Access
        run: |
          aws eks update-kubeconfig \
            --name ${SPOKE_CLUSTER} \
            --region ${AWS_REGION} \
            --alias spoke

      - name: Refresh ECR Pull Secret (idempotent)
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"

          # Get fresh ECR token (expires every 12 hours)
          ECR_PASSWORD=$(aws ecr get-login-password --region ${AWS_REGION})

          # Create/update secret on spoke (idempotent)
          kubectl --context spoke create secret docker-registry ecr-pull-secret \
            --docker-server="${ECR_REGISTRY}" \
            --docker-username=AWS \
            --docker-password="${ECR_PASSWORD}" \
            --namespace=${NAMESPACE} \
            --dry-run=client -o yaml | kubectl --context spoke apply -f -

          echo "✓ ECR pull secret refreshed in ${NAMESPACE}"

  # ─────────────────────────────────────────────────────────────
  # Stage 9: Sync and Deploy (HUB - hard refresh + sync)
  # ─────────────────────────────────────────────────────────────
  sync-and-deploy:
    name: "🔄 Sync and Deploy (ArgoCD)"
    runs-on: ubuntu-latest
    needs: [refresh-ecr-secret]
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Hub Cluster Access
        run: |
          aws eks update-kubeconfig \
            --name ${HUB_CLUSTER} \
            --region ${AWS_REGION} \
            --alias hub

      - name: Hard Refresh ArgoCD Application
        run: |
          # Force ArgoCD to re-read manifests from Git (bypass cache)
          kubectl --context hub annotate application ${ARGOCD_APP_NAME} \
            -n argocd \
            argocd.argoproj.io/refresh=hard \
            --overwrite

          echo "✓ ArgoCD hard refresh triggered"
          sleep 10

      - name: Sync ArgoCD Application
        run: |
          # Trigger sync via kubectl (RULE 93 - never use argocd CLI)
          kubectl --context hub patch application ${ARGOCD_APP_NAME} \
            -n argocd \
            --type merge \
            -p '{"operation":{"initiatedBy":{"username":"github-actions"},"sync":{"syncStrategy":{"hook":{"force":true}},"prune":true}}}'

          echo "✓ ArgoCD sync triggered"

      - name: Wait for Sync to Complete
        run: |
          echo "Waiting for ArgoCD sync to complete..."
          TIMEOUT=300
          ELAPSED=0
          INTERVAL=15

          while [ $ELAPSED -lt $TIMEOUT ]; do
            SYNC_STATUS=$(kubectl --context hub get application ${ARGOCD_APP_NAME} \
              -n argocd \
              -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "Unknown")

            HEALTH_STATUS=$(kubectl --context hub get application ${ARGOCD_APP_NAME} \
              -n argocd \
              -o jsonpath='{.status.health.status}' 2>/dev/null || echo "Unknown")

            echo "  Sync: ${SYNC_STATUS} | Health: ${HEALTH_STATUS} (${ELAPSED}s/${TIMEOUT}s)"

            if [ "${SYNC_STATUS}" = "Synced" ] && [ "${HEALTH_STATUS}" = "Healthy" ]; then
              echo "✓ Application synced and healthy!"
              break
            fi

            sleep ${INTERVAL}
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ $ELAPSED -ge $TIMEOUT ]; then
            echo "⚠️  Sync timeout - check ArgoCD for details"
            kubectl --context hub get application ${ARGOCD_APP_NAME} -n argocd -o yaml
          fi

  # ─────────────────────────────────────────────────────────────
  # Stage 10: Verify Deployment (SPOKE)
  # ─────────────────────────────────────────────────────────────
  verify-deployment:
    name: "✅ Verify Deployment"
    runs-on: ubuntu-latest
    needs: [sync-and-deploy]
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Spoke Cluster Access
        run: |
          aws eks update-kubeconfig \
            --name ${SPOKE_CLUSTER} \
            --region ${AWS_REGION} \
            --alias spoke

      - name: Verify Pod Health
        run: |
          echo "Checking pods in ${NAMESPACE}..."

          TIMEOUT=180
          ELAPSED=0
          INTERVAL=15

          while [ $ELAPSED -lt $TIMEOUT ]; do
            READY=$(kubectl --context spoke get pods -n ${NAMESPACE} \
              -l app=${APP_NAME} \
              --field-selector=status.phase=Running \
              --no-headers 2>/dev/null | wc -l)

            TOTAL=$(kubectl --context spoke get pods -n ${NAMESPACE} \
              -l app=${APP_NAME} \
              --no-headers 2>/dev/null | wc -l)

            echo "  Pods ready: ${READY}/${TOTAL} (${ELAPSED}s/${TIMEOUT}s)"

            if [ "$TOTAL" -gt "0" ] && [ "$READY" -eq "$TOTAL" ]; then
              echo "✓ All pods running!"
              break
            fi

            sleep ${INTERVAL}
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo ""
          echo "Pod Status:"
          kubectl --context spoke get pods -n ${NAMESPACE} -l app=${APP_NAME}

          echo ""
          echo "Deployment Status:"
          kubectl --context spoke get deployment ${APP_NAME} -n ${NAMESPACE} 2>/dev/null || \
          kubectl --context spoke get rollout ${APP_NAME} -n ${NAMESPACE} 2>/dev/null || \
          echo "Resource not yet found"

      - name: Verify Service
        run: |
          kubectl --context spoke get service ${APP_NAME} -n ${NAMESPACE}
          echo "✓ Service found"

      - name: Deployment Summary
        run: |
          IMAGE_TAG=${{ needs.push-to-ecr.outputs.image_tag || 'unknown' }}
          echo ""
          echo "════════════════════════════════════════════"
          echo "  DEPLOYMENT COMPLETE ✅"
          echo "════════════════════════════════════════════"
          echo "  App:       ${APP_NAME}"
          echo "  Env:       ${ENV}"
          echo "  Namespace: ${NAMESPACE}"
          echo "  Image Tag: ${IMAGE_TAG}"
          echo "  URL:       https://cwa-test-1-dev.agent.opsera.dev"
          echo "════════════════════════════════════════════"

  # ─────────────────────────────────────────────────────────────
  # Stage 11: Deployment Landscape
  # ─────────────────────────────────────────────────────────────
  deployment-landscape:
    name: "🗺️ Deployment Landscape"
    runs-on: ubuntu-latest
    needs: [verify-deployment]
    if: always() && needs.verify-deployment.result == 'success'
    continue-on-error: true
    steps:
      - name: Publish Deployment Landscape
        run: |
          echo "Deployment landscape update for ${APP_NAME}-${ENV}"
          echo "Timestamp: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "Status: Deployed"
          echo "✓ Landscape updated"

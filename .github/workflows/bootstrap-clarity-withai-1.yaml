# ════════════════════════════════════════════════════════════════════════════
# BOOTSTRAP INFRASTRUCTURE - clarity-withai-1
# Generated by Code-to-Cloud Enterprise v1.7
# RULE 61: Auto-register spoke cluster with ArgoCD hub
# RULE 63: Create ArgoCD repository secret with GH_PAT
# ════════════════════════════════════════════════════════════════════════════
name: "🏗️ clarity-withai-1: Bootstrap Infrastructure"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to bootstrap'
        type: choice
        options: [dev, qa, staging, all]
        default: dev
      proceed:
        description: 'I confirm to proceed with bootstrap'
        type: boolean
        default: false

env:
  APP_NAME: clarity-withai-1
  TENANT: opsera
  AWS_REGION: us-west-2
  HUB_CLUSTER: argocd-usw2
  SPOKE_CLUSTER: opsera-usw2-np
  DOMAIN: agent.opsera.dev

permissions:
  contents: write
  id-token: write

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # VERIFY PREREQUISITES
  # ════════════════════════════════════════════════════════════════════════════
  verify-prerequisites:
    name: "🔍 Verify Prerequisites"
    runs-on: ubuntu-latest
    if: inputs.proceed == true
    outputs:
      spoke_registered: ${{ steps.check-spoke.outputs.registered }}
      ecr_exists: ${{ steps.check-ecr.outputs.exists }}
      aws_account_id: ${{ steps.get-account.outputs.account_id }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get AWS Account ID
        id: get-account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=$ACCOUNT_ID" >> $GITHUB_OUTPUT
          echo "AWS Account: $ACCOUNT_ID"

      - name: Verify Spoke Cluster Exists (RULE 90)
        id: verify-spoke
        run: |
          if aws eks describe-cluster --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }} &>/dev/null; then
            echo "✅ Spoke cluster exists: ${{ env.SPOKE_CLUSTER }}"
          else
            echo "❌ Spoke cluster NOT found: ${{ env.SPOKE_CLUSTER }}"
            echo "Run cluster creation workflow first"
            exit 1
          fi

      - name: Configure kubectl for Hub
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Check Spoke Registration in ArgoCD
        id: check-spoke
        run: |
          if kubectl get secret "cluster-${{ env.SPOKE_CLUSTER }}" -n argocd &>/dev/null; then
            echo "✅ Spoke already registered in ArgoCD"
            echo "registered=true" >> $GITHUB_OUTPUT
          else
            echo "📝 Spoke not registered - will register"
            echo "registered=false" >> $GITHUB_OUTPUT
          fi

      - name: Check ECR Repository
        id: check-ecr
        run: |
          ECR_REPO="${{ env.TENANT }}/${{ env.APP_NAME }}"
          if aws ecr describe-repositories --repository-names "$ECR_REPO" --region ${{ env.AWS_REGION }} &>/dev/null; then
            echo "✅ ECR repository exists"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "📝 ECR repository will be created"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # REGISTER SPOKE CLUSTER
  # ════════════════════════════════════════════════════════════════════════════
  register-spoke:
    name: "🔗 Register Spoke Cluster"
    runs-on: ubuntu-latest
    needs: [verify-prerequisites]
    if: needs.verify-prerequisites.outputs.spoke_registered == 'false'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get Spoke Cluster Details
        id: spoke-details
        run: |
          SPOKE_ENDPOINT=$(aws eks describe-cluster --name ${{ env.SPOKE_CLUSTER }} \
            --query 'cluster.endpoint' --output text)
          SPOKE_CA=$(aws eks describe-cluster --name ${{ env.SPOKE_CLUSTER }} \
            --query 'cluster.certificateAuthority.data' --output text)
          echo "endpoint=$SPOKE_ENDPOINT" >> $GITHUB_OUTPUT
          echo "ca=$SPOKE_CA" >> $GITHUB_OUTPUT

      - name: Configure kubectl for Spoke
        run: |
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Create ArgoCD Manager ServiceAccount on Spoke
        run: |
          kubectl apply -f - <<EOF
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: argocd-manager
            namespace: kube-system
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRole
          metadata:
            name: argocd-manager-role
          rules:
            - apiGroups: ["*"]
              resources: ["*"]
              verbs: ["*"]
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: argocd-manager-binding
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: argocd-manager-role
          subjects:
            - kind: ServiceAccount
              name: argocd-manager
              namespace: kube-system
          EOF

      - name: Generate ServiceAccount Token (RULE 62)
        id: token
        run: |
          # RULE 62: K8s 1.24+ token generation
          TOKEN=$(kubectl create token argocd-manager -n kube-system --duration=87600h)
          echo "::add-mask::$TOKEN"
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Configure kubectl for Hub
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Register Spoke in ArgoCD Hub
        env:
          SPOKE_ENDPOINT: ${{ steps.spoke-details.outputs.endpoint }}
          SPOKE_CA: ${{ steps.spoke-details.outputs.ca }}
          SPOKE_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          kubectl apply -f - <<EOF
          apiVersion: v1
          kind: Secret
          metadata:
            name: cluster-${{ env.SPOKE_CLUSTER }}
            namespace: argocd
            labels:
              argocd.argoproj.io/secret-type: cluster
          type: Opaque
          stringData:
            name: ${{ env.SPOKE_CLUSTER }}
            server: ${SPOKE_ENDPOINT}
            config: |
              {
                "bearerToken": "${SPOKE_TOKEN}",
                "tlsClientConfig": {
                  "insecure": false,
                  "caData": "${SPOKE_CA}"
                }
              }
          EOF
          echo "✅ Spoke cluster registered in ArgoCD"

  # ════════════════════════════════════════════════════════════════════════════
  # CREATE RESOURCES
  # ════════════════════════════════════════════════════════════════════════════
  create-resources:
    name: "📦 Create Resources"
    runs-on: ubuntu-latest
    needs: [verify-prerequisites, register-spoke]
    if: always() && needs.verify-prerequisites.result == 'success' && (needs.register-spoke.result == 'success' || needs.register-spoke.result == 'skipped')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create ECR Repository
        if: needs.verify-prerequisites.outputs.ecr_exists == 'false'
        run: |
          ECR_REPO="${{ env.TENANT }}/${{ env.APP_NAME }}"
          aws ecr create-repository \
            --repository-name "$ECR_REPO" \
            --region ${{ env.AWS_REGION }} \
            --image-scanning-configuration scanOnPush=true \
            --tags Key=tenant,Value=${{ env.TENANT }} Key=app,Value=${{ env.APP_NAME }}
          echo "✅ ECR repository created: $ECR_REPO"

      - name: Configure kubectl for Hub
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Create ArgoCD Repository Secret (RULE 63)
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          REPO_URL="https://github.com/${{ github.repository }}"
          SECRET_NAME="repo-${{ env.APP_NAME }}"

          if kubectl get secret "$SECRET_NAME" -n argocd &>/dev/null; then
            echo "✅ Repository secret already exists"
          else
            kubectl create secret generic "$SECRET_NAME" -n argocd \
              --from-literal=type=git \
              --from-literal=url="$REPO_URL" \
              --from-literal=password="$GH_PAT" \
              --from-literal=username=git

            kubectl label secret "$SECRET_NAME" -n argocd \
              argocd.argoproj.io/secret-type=repository
            echo "✅ Repository secret created"
          fi

      - name: Update ECR URI in Kustomizations
        run: |
          ACCOUNT_ID="${{ needs.verify-prerequisites.outputs.aws_account_id }}"
          ECR_URI="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"

          # Update all kustomization files
          for ENV in dev qa staging; do
            KUST_FILE=".opsera-${{ env.APP_NAME }}/k8s/overlays/${ENV}/kustomization.yaml"
            if [ -f "$KUST_FILE" ]; then
              sed -i "s|PLACEHOLDER_ECR_URI|${ECR_URI}|g" "$KUST_FILE"
              echo "✅ Updated ECR URI in $KUST_FILE"
            fi
          done

      - name: Update ArgoCD Application Repository URLs
        run: |
          REPO_URL="https://github.com/${{ github.repository }}.git"

          for ENV in dev qa staging; do
            APP_FILE=".opsera-${{ env.APP_NAME }}/argocd/${ENV}/application.yaml"
            if [ -f "$APP_FILE" ]; then
              sed -i "s|https://github.com/opsera-agentic/clarity-withai.git|${REPO_URL}|g" "$APP_FILE"
              echo "✅ Updated repo URL in $APP_FILE"
            fi
          done

      - name: Commit Configuration Updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .opsera-${{ env.APP_NAME }}/
          git diff --cached --quiet || git commit -m "chore: Update ECR URI and repo URLs [skip ci]

          Bootstrap configuration for ${{ env.APP_NAME }}
          - ECR URI: ${{ needs.verify-prerequisites.outputs.aws_account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          - Repository: ${{ github.repository }}

          Co-Authored-By: Opsera Code-to-Cloud <noreply@opsera.io>"

          git pull --rebase origin main
          git push origin main

  # ════════════════════════════════════════════════════════════════════════════
  # APPLY ARGOCD APPLICATIONS
  # ════════════════════════════════════════════════════════════════════════════
  apply-argocd-apps:
    name: "🚀 Apply ArgoCD Applications"
    runs-on: ubuntu-latest
    needs: [create-resources]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for Hub
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Apply ArgoCD Applications
        run: |
          ENVS="${{ inputs.environment }}"
          if [ "$ENVS" = "all" ]; then
            ENVS="dev qa staging"
          fi

          for ENV in $ENVS; do
            APP_FILE=".opsera-${{ env.APP_NAME }}/argocd/${ENV}/application.yaml"
            if [ -f "$APP_FILE" ]; then
              kubectl apply -f "$APP_FILE"
              echo "✅ Applied ArgoCD Application: ${{ env.APP_NAME }}-${ENV}"
            fi
          done

      - name: Force Sync (RULE 66)
        run: |
          ENVS="${{ inputs.environment }}"
          if [ "$ENVS" = "all" ]; then
            ENVS="dev qa staging"
          fi

          for ENV in $ENVS; do
            kubectl annotate application "${{ env.APP_NAME }}-${ENV}" -n argocd \
              argocd.argoproj.io/refresh=hard --overwrite || true
            echo "✅ Triggered sync for ${{ env.APP_NAME }}-${ENV}"
          done

  # ════════════════════════════════════════════════════════════════════════════
  # SUMMARY
  # ════════════════════════════════════════════════════════════════════════════
  summary:
    name: "📋 Summary"
    runs-on: ubuntu-latest
    needs: [verify-prerequisites, register-spoke, create-resources, apply-argocd-apps]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          cat << 'EOF' >> $GITHUB_STEP_SUMMARY
          # 🏗️ Bootstrap Complete

          ## Configuration
          | Setting | Value |
          |---------|-------|
          | **App Name** | `${{ env.APP_NAME }}` |
          | **Tenant** | `${{ env.TENANT }}` |
          | **Region** | `${{ env.AWS_REGION }}` |
          | **Hub Cluster** | `${{ env.HUB_CLUSTER }}` |
          | **Spoke Cluster** | `${{ env.SPOKE_CLUSTER }}` |

          ## Resources Created
          - ✅ ECR Repository: `${{ env.TENANT }}/${{ env.APP_NAME }}`
          - ✅ ArgoCD Repository Secret
          - ✅ Spoke Cluster Registration

          ## ArgoCD Applications
          - ✅ `${{ env.APP_NAME }}-dev`
          - ✅ `${{ env.APP_NAME }}-qa`
          - ✅ `${{ env.APP_NAME }}-staging`

          ## Next Steps
          1. Push code to trigger CI/CD:
             ```bash
             git push origin main
             ```
          2. Or manually trigger CI/CD:
             ```bash
             gh workflow run "ci-build-push-${{ env.APP_NAME }}.yaml" -f environment=dev
             ```

          ## URLs (after deployment)
          - DEV: https://opsera-${{ env.APP_NAME }}-dev.${{ env.DOMAIN }}
          - QA: https://opsera-${{ env.APP_NAME }}-qa.${{ env.DOMAIN }}
          - Staging: https://opsera-${{ env.APP_NAME }}-staging.${{ env.DOMAIN }}
          EOF

# ════════════════════════════════════════════════════════════════════════════
# FIX HTTPS - Reconfigure NLB with proper TLS listener
# ════════════════════════════════════════════════════════════════════════════

name: "🔧 cwa-5: Fix HTTPS"

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-https-cwa-5.yaml'
  workflow_dispatch:

env:
  APP_NAME: cwa-5
  TENANT: opsera
  AWS_REGION: us-west-2
  SPOKE_CLUSTER: opsera-usw2-np
  NAMESPACE: opsera-cwa-5-dev
  DOMAIN: opsera-cwa-5-dev.agent.opsera.dev

jobs:
  fix-https:
    name: "🔧 Fix HTTPS"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get ACM Certificate ARN
        id: acm
        run: |
          # Get wildcard certificate
          CERT_ARN=$(aws acm list-certificates \
            --query "CertificateSummaryList[?contains(DomainName, 'agent.opsera.dev') && Status=='ISSUED'].CertificateArn | [0]" \
            --output text)
          
          if [ "$CERT_ARN" = "None" ] || [ -z "$CERT_ARN" ]; then
            echo "::error::No valid ACM certificate found"
            exit 1
          fi
          
          echo "cert_arn=${CERT_ARN}" >> $GITHUB_OUTPUT
          echo "Certificate ARN: ${CERT_ARN}"

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Delete and Recreate Service with TLS
        env:
          CERT_ARN: ${{ steps.acm.outputs.cert_arn }}
        run: |
          echo "=== Current Service ==="
          kubectl get svc ${{ env.APP_NAME }} -n ${{ env.NAMESPACE }} -o yaml || true
          
          echo ""
          echo "=== Deleting Service to force NLB recreation ==="
          kubectl delete svc ${{ env.APP_NAME }} -n ${{ env.NAMESPACE }} --ignore-not-found
          
          sleep 10
          
          echo ""
          echo "=== Creating Service with TLS ==="
          
          cat << EOF | kubectl apply -f -
          apiVersion: v1
          kind: Service
          metadata:
            name: ${{ env.APP_NAME }}
            namespace: ${{ env.NAMESPACE }}
            labels:
              app: ${{ env.APP_NAME }}
              tenant: ${{ env.TENANT }}
              environment: dev
            annotations:
              # NLB configuration
              service.beta.kubernetes.io/aws-load-balancer-type: "external"
              service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
              service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
              service.beta.kubernetes.io/aws-load-balancer-name: "opsera-cwa-5-dev-nlb"
              # TLS configuration
              service.beta.kubernetes.io/aws-load-balancer-ssl-cert: "${CERT_ARN}"
              service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "443"
              service.beta.kubernetes.io/aws-load-balancer-ssl-negotiation-policy: "ELBSecurityPolicy-TLS13-1-2-2021-06"
          spec:
            type: LoadBalancer
            selector:
              app: ${{ env.APP_NAME }}
              tenant: ${{ env.TENANT }}
              environment: dev
            ports:
              - name: https
                port: 443
                targetPort: 8080
                protocol: TCP
              - name: http
                port: 80
                targetPort: 8080
                protocol: TCP
          EOF
          
          echo ""
          echo "=== New Service Created ==="
          kubectl get svc ${{ env.APP_NAME }} -n ${{ env.NAMESPACE }}

      - name: Wait for NLB Provisioning
        run: |
          echo "Waiting for NLB to provision..."
          
          for i in {1..30}; do
            LB=$(kubectl get svc ${{ env.APP_NAME }} -n ${{ env.NAMESPACE }} \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")
            
            if [ -n "$LB" ] && [ "$LB" != "null" ]; then
              echo "NLB provisioned: ${LB}"
              break
            fi
            
            echo "Attempt ${i}/30 - waiting..."
            sleep 10
          done

      - name: Update Route 53 DNS
        run: |
          # Get NLB hostname
          NLB_HOSTNAME=$(kubectl get svc ${{ env.APP_NAME }} -n ${{ env.NAMESPACE }} \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          
          echo "NLB Hostname: ${NLB_HOSTNAME}"
          
          # Get hosted zone
          ZONE_ID=$(aws route53 list-hosted-zones-by-name \
            --dns-name "agent.opsera.dev" \
            --query "HostedZones[?Name=='agent.opsera.dev.'].Id" \
            --output text | sed 's|/hostedzone/||')
          
          echo "Zone ID: ${ZONE_ID}"
          
          # Get NLB hosted zone ID (us-west-2)
          NLB_ZONE_ID="Z18D5FSROUN65G"
          
          # Update DNS
          cat > /tmp/dns.json << EOF
          {
            "Changes": [{
              "Action": "UPSERT",
              "ResourceRecordSet": {
                "Name": "${{ env.DOMAIN }}",
                "Type": "A",
                "AliasTarget": {
                  "HostedZoneId": "${NLB_ZONE_ID}",
                  "DNSName": "${NLB_HOSTNAME}",
                  "EvaluateTargetHealth": true
                }
              }
            }]
          }
          EOF
          
          aws route53 change-resource-record-sets \
            --hosted-zone-id "${ZONE_ID}" \
            --change-batch file:///tmp/dns.json
          
          echo "DNS updated"

      - name: Wait for TLS Listener
        run: |
          echo "Waiting for TLS listener to become active..."
          echo "This may take 2-5 minutes..."
          
          sleep 60
          
          # Test HTTPS
          for i in {1..10}; do
            HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" \
              "https://${{ env.DOMAIN }}" --max-time 10 || echo "000")
            
            echo "Attempt ${i}/10 - HTTPS: ${HTTP_CODE}"
            
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ HTTPS is working!"
              break
            fi
            
            sleep 15
          done

      - name: Summary
        run: |
          echo ""
          echo "========================================="
          echo "🎉 HTTPS ENDPOINT:"
          echo "https://${{ env.DOMAIN }}"
          echo "========================================="
          echo ""
          echo "HTTP (also available):"
          echo "http://${{ env.DOMAIN }}"
          
          cat << EOF >> $GITHUB_STEP_SUMMARY
          # 🔒 HTTPS Configured
          
          ## Your Secure URL
          
          \`\`\`
          https://${{ env.DOMAIN }}
          \`\`\`
          
          ## Configuration
          
          | Setting | Value |
          |---------|-------|
          | **Load Balancer** | AWS NLB |
          | **TLS Termination** | NLB (Layer 4) |
          | **Certificate** | ACM Wildcard |
          | **Protocol** | TLS 1.3 |
          
          > Note: TLS listeners may take 2-5 minutes to fully activate after NLB recreation.
          EOF

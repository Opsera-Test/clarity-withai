# ════════════════════════════════════════════════════════════════════════════
# PROMOTION WORKFLOW - Manual Promotion with Approval Gates
# RULE 95: Manual intervention required for QA/Staging
# Generated by Code-to-Cloud Enterprise v0.901
# ════════════════════════════════════════════════════════════════════════════

name: "🚀 clarity1: Promote"

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: 'Target environment'
        type: choice
        options: [qa, staging]
        required: true
      image_tag:
        description: 'Image tag to promote (e.g., abc1234-20260131123456)'
        required: true
      confirm_promotion:
        description: '☑️ I confirm this promotion'
        type: boolean
        default: false
        required: true

env:
  APP_NAME: clarity1
  TENANT: opsera
  AWS_REGION: us-east-1
  HUB_CLUSTER: argocd-use1
  SPOKE_CLUSTER: opsera-use1-np

permissions:
  contents: write
  id-token: write

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # VALIDATE
  # ════════════════════════════════════════════════════════════════════════════
  validate:
    name: "✅ Validate Promotion"
    runs-on: ubuntu-latest
    outputs:
      source_env: ${{ steps.source.outputs.env }}
    steps:
      - name: Check Confirmation
        if: inputs.confirm_promotion != true
        run: |
          echo "❌ Promotion not confirmed"
          echo "Please check the '☑️ I confirm this promotion' checkbox"
          exit 1

      - name: Determine Source Environment
        id: source
        run: |
          case "${{ inputs.target_environment }}" in
            qa) SOURCE_ENV="dev" ;;
            staging) SOURCE_ENV="qa" ;;
          esac
          echo "env=${SOURCE_ENV}" >> $GITHUB_OUTPUT
          echo "### Promotion: ${SOURCE_ENV} → ${{ inputs.target_environment }}" >> $GITHUB_STEP_SUMMARY

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Validate Image Exists
        run: |
          REPO_NAME="${{ env.TENANT }}/${{ env.APP_NAME }}"
          
          if aws ecr describe-images \
            --repository-name "${REPO_NAME}" \
            --image-ids imageTag=${{ inputs.image_tag }} \
            --region ${{ env.AWS_REGION }} >/dev/null 2>&1; then
            echo "✅ Image tag verified: ${{ inputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Image tag not found: ${{ inputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
            echo "::error::Image tag not found in ECR"
            exit 1
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # VERIFY SOURCE HEALTH
  # ════════════════════════════════════════════════════════════════════════════
  verify-source:
    name: "🏥 Verify Source Environment"
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - name: Check Source Health
        run: |
          SOURCE_ENV="${{ needs.validate.outputs.source_env }}"
          SOURCE_URL="https://${{ env.TENANT }}-${{ env.APP_NAME }}-${SOURCE_ENV}.agent.opsera.dev"
          
          echo "Checking source environment: ${SOURCE_URL}"
          
          set +e
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${SOURCE_URL}")
          set -e
          
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Source environment healthy: HTTP ${HTTP_CODE}" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Source environment returned: HTTP ${HTTP_CODE}" >> $GITHUB_STEP_SUMMARY
            echo "::warning::Source environment may be unhealthy"
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # PROMOTE
  # ════════════════════════════════════════════════════════════════════════════
  promote:
    name: "🚀 Promote to ${{ inputs.target_environment }}"
    needs: [validate, verify-source]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Pull Latest
        run: git pull --rebase origin main

      - name: Update Kustomization
        run: |
          KUST_FILE=".opsera-${{ env.APP_NAME }}/k8s/overlays/${{ inputs.target_environment }}/kustomization.yaml"
          
          sed -i "s/newTag: .*/newTag: ${{ inputs.image_tag }}/" "$KUST_FILE"
          
          echo "### Updated: ${KUST_FILE}" >> $GITHUB_STEP_SUMMARY
          echo "- New Tag: \`${{ inputs.image_tag }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .opsera-${{ env.APP_NAME }}/k8s/overlays/${{ inputs.target_environment }}/
          
          git commit -m "promote(${{ inputs.target_environment }}): Update to ${{ inputs.image_tag }}

Promoted by: ${{ github.actor }}
Source: ${{ needs.validate.outputs.source_env }}
Target: ${{ inputs.target_environment }}
Image: ${{ inputs.image_tag }}

Co-Authored-By: Opsera Code-to-Cloud <noreply@opsera.io>"
          
          git pull --rebase origin main
          git push origin main

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Trigger ArgoCD Sync
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}
          
          APP_NAME="${{ env.APP_NAME }}-${{ inputs.target_environment }}"
          kubectl annotate application ${APP_NAME} -n argocd \
            argocd.argoproj.io/refresh=hard --overwrite || true
          
          echo "✅ ArgoCD sync triggered" >> $GITHUB_STEP_SUMMARY

      - name: Wait for Deployment
        run: |
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}
          
          NAMESPACE="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ inputs.target_environment }}"
          
          echo "Waiting for deployment in: ${NAMESPACE}"
          
          ELAPSED=0
          TIMEOUT=600  # 10 min for promotion
          
          while [ $ELAPSED -lt $TIMEOUT ]; do
            READY=$(kubectl get pods -n ${NAMESPACE} -o jsonpath='{.items[*].status.phase}' 2>/dev/null | tr ' ' '\n' | grep -c Running || echo 0)
            TOTAL=$(kubectl get pods -n ${NAMESPACE} --no-headers 2>/dev/null | wc -l || echo 0)
            
            echo "Pods: ${READY}/${TOTAL} (${ELAPSED}s)"
            
            if [ "$TOTAL" -gt 0 ] && [ "$READY" -eq "$TOTAL" ]; then
              echo "✅ Deployment complete!" >> $GITHUB_STEP_SUMMARY
              exit 0
            fi
            
            sleep 15
            ELAPSED=$((ELAPSED + 15))
          done
          
          echo "⚠️ Deployment verification timed out" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # SUMMARY
  # ════════════════════════════════════════════════════════════════════════════
  summary:
    name: "📋 Summary"
    needs: [validate, promote]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate Summary
        run: |
          cat << EOF >> $GITHUB_STEP_SUMMARY
          
          # 🚀 Promotion Summary
          
          | Field | Value |
          |-------|-------|
          | **Source** | \`${{ needs.validate.outputs.source_env }}\` |
          | **Target** | \`${{ inputs.target_environment }}\` |
          | **Image Tag** | \`${{ inputs.image_tag }}\` |
          | **Promoted By** | ${{ github.actor }} |
          | **Status** | ${{ needs.promote.result == 'success' && '✅ Success' || '❌ Failed' }} |
          
          ## Application URL
          \`https://${{ env.TENANT }}-${{ env.APP_NAME }}-${{ inputs.target_environment }}.agent.opsera.dev\`
          
          EOF

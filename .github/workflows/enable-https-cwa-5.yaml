# ════════════════════════════════════════════════════════════════════════════
# ENABLE HTTPS - TLS termination at NLB using ACM
# ════════════════════════════════════════════════════════════════════════════

name: "🔒 cwa-5: Enable HTTPS"

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/enable-https-cwa-5.yaml'
  workflow_dispatch:

env:
  APP_NAME: cwa-5
  TENANT: opsera
  AWS_REGION: us-west-2
  SPOKE_CLUSTER: opsera-usw2-np
  NAMESPACE: opsera-cwa-5-dev
  DOMAIN: opsera-cwa-5-dev.agent.opsera.dev
  WILDCARD_DOMAIN: "*.agent.opsera.dev"

jobs:
  enable-https:
    name: "🔒 Enable HTTPS"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Find or Request ACM Certificate
        id: acm
        run: |
          echo "### ACM Certificate" >> $GITHUB_STEP_SUMMARY
          
          # Look for existing wildcard certificate
          CERT_ARN=$(aws acm list-certificates \
            --query "CertificateSummaryList[?DomainName=='${{ env.WILDCARD_DOMAIN }}' && Status=='ISSUED'].CertificateArn | [0]" \
            --output text)
          
          if [ "$CERT_ARN" != "None" ] && [ -n "$CERT_ARN" ]; then
            echo "✅ Found existing wildcard certificate" >> $GITHUB_STEP_SUMMARY
            echo "cert_arn=${CERT_ARN}" >> $GITHUB_OUTPUT
            echo "Certificate ARN: ${CERT_ARN}"
          else
            # Look for specific domain certificate
            CERT_ARN=$(aws acm list-certificates \
              --query "CertificateSummaryList[?DomainName=='${{ env.DOMAIN }}' && Status=='ISSUED'].CertificateArn | [0]" \
              --output text)
            
            if [ "$CERT_ARN" != "None" ] && [ -n "$CERT_ARN" ]; then
              echo "✅ Found existing domain certificate" >> $GITHUB_STEP_SUMMARY
              echo "cert_arn=${CERT_ARN}" >> $GITHUB_OUTPUT
              echo "Certificate ARN: ${CERT_ARN}"
            else
              # Request new certificate
              echo "📝 Requesting new ACM certificate..." >> $GITHUB_STEP_SUMMARY
              
              CERT_ARN=$(aws acm request-certificate \
                --domain-name "${{ env.WILDCARD_DOMAIN }}" \
                --subject-alternative-names "agent.opsera.dev" \
                --validation-method DNS \
                --query 'CertificateArn' \
                --output text)
              
              echo "cert_arn=${CERT_ARN}" >> $GITHUB_OUTPUT
              echo "new_cert=true" >> $GITHUB_OUTPUT
              echo "📝 New certificate requested: ${CERT_ARN}" >> $GITHUB_STEP_SUMMARY
              echo "⚠️ DNS validation required!" >> $GITHUB_STEP_SUMMARY
            fi
          fi
          
          echo "- ARN: \`${CERT_ARN}\`" >> $GITHUB_STEP_SUMMARY

      - name: Validate Certificate (if new)
        if: steps.acm.outputs.new_cert == 'true'
        run: |
          CERT_ARN="${{ steps.acm.outputs.cert_arn }}"
          
          echo "Getting DNS validation records..."
          sleep 5
          
          # Get validation records
          VALIDATION=$(aws acm describe-certificate \
            --certificate-arn "${CERT_ARN}" \
            --query 'Certificate.DomainValidationOptions[0]')
          
          RECORD_NAME=$(echo "$VALIDATION" | jq -r '.ResourceRecord.Name')
          RECORD_VALUE=$(echo "$VALIDATION" | jq -r '.ResourceRecord.Value')
          
          echo "DNS Validation Record:"
          echo "  Name: ${RECORD_NAME}"
          echo "  Value: ${RECORD_VALUE}"
          
          # Get hosted zone
          ZONE_ID=$(aws route53 list-hosted-zones-by-name \
            --dns-name "agent.opsera.dev" \
            --query "HostedZones[?Name=='agent.opsera.dev.'].Id" \
            --output text | sed 's|/hostedzone/||')
          
          if [ -n "$ZONE_ID" ]; then
            echo "Creating DNS validation record..."
            
            cat > /tmp/validation.json << EOF
          {
            "Changes": [{
              "Action": "UPSERT",
              "ResourceRecordSet": {
                "Name": "${RECORD_NAME}",
                "Type": "CNAME",
                "TTL": 300,
                "ResourceRecords": [{"Value": "${RECORD_VALUE}"}]
              }
            }]
          }
          EOF
            
            aws route53 change-resource-record-sets \
              --hosted-zone-id "${ZONE_ID}" \
              --change-batch file:///tmp/validation.json
            
            echo "✅ DNS validation record created"
            echo "Waiting for certificate validation (this may take a few minutes)..."
            
            # Wait for validation (max 5 minutes)
            for i in {1..30}; do
              STATUS=$(aws acm describe-certificate \
                --certificate-arn "${CERT_ARN}" \
                --query 'Certificate.Status' \
                --output text)
              
              if [ "$STATUS" = "ISSUED" ]; then
                echo "✅ Certificate issued!"
                break
              fi
              
              echo "Status: ${STATUS} (attempt ${i}/30)"
              sleep 10
            done
          fi

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Update Service for HTTPS
        env:
          CERT_ARN: ${{ steps.acm.outputs.cert_arn }}
        run: |
          echo "### Service Update" >> $GITHUB_STEP_SUMMARY
          
          # Create updated service with TLS
          cat > /tmp/service-https.yaml << 'EOF'
          apiVersion: v1
          kind: Service
          metadata:
            name: cwa-5
            namespace: opsera-cwa-5-dev
            labels:
              app: cwa-5
              tenant: opsera
              environment: dev
              managed-by: opsera-code-to-cloud
            annotations:
              service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
              service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
              service.beta.kubernetes.io/aws-load-balancer-name: "opsera-cwa-5-dev-nlb"
              service.beta.kubernetes.io/aws-load-balancer-ssl-cert: "CERT_ARN_PLACEHOLDER"
              service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "443"
              service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "http"
          spec:
            type: LoadBalancer
            selector:
              app: cwa-5
              tenant: opsera
              environment: dev
            ports:
              - name: https
                port: 443
                targetPort: 8080
                protocol: TCP
              - name: http
                port: 80
                targetPort: 8080
                protocol: TCP
          EOF
          
          # Replace placeholder with actual cert ARN
          sed -i "s|CERT_ARN_PLACEHOLDER|${CERT_ARN}|g" /tmp/service-https.yaml
          
          echo "Applying service update..."
          cat /tmp/service-https.yaml
          
          kubectl apply -f /tmp/service-https.yaml
          
          echo "✅ Service updated with HTTPS" >> $GITHUB_STEP_SUMMARY

      - name: Wait for NLB Update
        run: |
          echo "Waiting for NLB to update with HTTPS listener..."
          sleep 30
          
          # Get service details
          kubectl get svc ${{ env.APP_NAME }} -n ${{ env.NAMESPACE }} -o wide
          
          # Get NLB hostname
          LB=$(kubectl get svc ${{ env.APP_NAME }} -n ${{ env.NAMESPACE }} \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          
          echo "NLB: ${LB}"

      - name: Verify HTTPS
        run: |
          echo "### Verification" >> $GITHUB_STEP_SUMMARY
          
          # Test HTTPS endpoint
          echo "Testing HTTPS endpoint..."
          
          sleep 10
          
          HTTP_CODE=$(curl -sk -o /dev/null -w "%{http_code}" \
            "https://${{ env.DOMAIN }}" --max-time 15 || echo "000")
          
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "301" ] || [ "$HTTP_CODE" = "302" ]; then
            echo "✅ HTTPS is working! (HTTP ${HTTP_CODE})" >> $GITHUB_STEP_SUMMARY
          else
            echo "⏳ HTTPS may still be provisioning (HTTP ${HTTP_CODE})" >> $GITHUB_STEP_SUMMARY
            echo "NLB TLS listener can take 2-5 minutes to become active" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# 🎉 HTTPS Endpoint Ready!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "https://${{ env.DOMAIN }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Summary
        env:
          CERT_ARN: ${{ steps.acm.outputs.cert_arn }}
        run: |
          cat << EOF >> $GITHUB_STEP_SUMMARY
          
          ## Configuration
          
          | Setting | Value |
          |---------|-------|
          | **Domain** | \`${{ env.DOMAIN }}\` |
          | **Certificate** | ACM (AWS managed) |
          | **TLS Termination** | NLB (Layer 4) |
          | **Backend** | HTTP on port 8080 |
          
          ## URLs
          
          | Protocol | URL |
          |----------|-----|
          | **HTTPS** | https://${{ env.DOMAIN }} |
          | **HTTP** | http://${{ env.DOMAIN }} |
          
          > Note: Both HTTP and HTTPS are available. Consider redirecting HTTP to HTTPS in NGINX config.
          EOF

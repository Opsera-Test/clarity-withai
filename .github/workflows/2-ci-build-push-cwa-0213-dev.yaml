# ════════════════════════════════════════════════════════════════
# REQUIRED SECRETS (configure in GitHub)
# ════════════════════════════════════════════════════════════════
# - AWS_ACCESS_KEY_ID: AWS access key for ECR and EKS
# - AWS_SECRET_ACCESS_KEY: AWS secret key
# - GH_PAT: GitHub Personal Access Token (scopes: repo, workflow)
# ════════════════════════════════════════════════════════════════

name: "CI/CD: Dev - cwa-0213"

concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches: [dev]
    paths-ignore:
      - '.opsera-**/k8s/**'
      - '.github/workflows/1-bootstrap-*.yaml'
      - '.github/workflows/diagnostics-*.yaml'
      - '.github/workflows/deployment-landscape-*.yaml'
      - '**/*.md'
      - '**/*.disabled'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        default: 'dev'
        type: choice
        options: ['dev']

env:
  APP_NAME: cwa-0213
  TENANT: opsera
  ENV: dev
  AWS_REGION: us-west-2
  REGION_SHORT: usw2
  HUB_CLUSTER: argocd-usw2
  SPOKE_CLUSTER: opsera-usw2-np
  ECR_REPO: opsera/cwa-0213

permissions:
  contents: write
  id-token: write

jobs:
  check-bootstrap-prerequisites:
    name: "✓ Check Bootstrap Prerequisites"
    runs-on: ubuntu-latest
    outputs:
      bootstrap_complete: ${{ steps.check.outputs.complete }}
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check Prerequisites
        id: check
        run: |
          ERRORS=()
          NAMESPACE="${TENANT}-${APP_NAME}-${ENV}"

          echo "Verifying Bootstrap Prerequisites for ${ENV}"

          if ! aws ecr describe-repositories --repository-names "${ECR_REPO}" --region ${AWS_REGION} &>/dev/null; then
            ERRORS+=("ECR repository not created")
          fi

          aws eks update-kubeconfig --name ${SPOKE_CLUSTER} --region ${AWS_REGION}
          if ! kubectl get namespace ${NAMESPACE} &>/dev/null; then
            ERRORS+=("Namespace not created")
          fi

          aws eks update-kubeconfig --name ${HUB_CLUSTER} --region ${AWS_REGION}
          if ! kubectl get secret repo-${GITHUB_REPOSITORY_OWNER}-${APP_NAME} -n argocd &>/dev/null; then
            ERRORS+=("ArgoCD repository not registered")
          fi
          if ! kubectl get secret cluster-${SPOKE_CLUSTER} -n argocd &>/dev/null; then
            ERRORS+=("Spoke cluster not registered")
          fi

          if [ ${#ERRORS[@]} -eq 0 ]; then
            echo "complete=true" >> $GITHUB_OUTPUT
            echo "✅ All bootstrap prerequisites met"
          else
            echo "complete=false" >> $GITHUB_OUTPUT
            echo "❌ Missing: ${ERRORS[*]}"
            echo "Run: gh workflow run '1-bootstrap-infrastructure-${APP_NAME}.yaml'"
            exit 1
          fi

  security-scan:
    name: "🔒 Security Scan (Gitleaks)"
    runs-on: ubuntu-latest
    needs: [check-bootstrap-prerequisites]
    if: needs.check-bootstrap-prerequisites.outputs.bootstrap_complete == 'true'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-image:
    name: "🔨 Build Image"
    runs-on: ubuntu-latest
    needs: [check-bootstrap-prerequisites]
    if: needs.check-bootstrap-prerequisites.outputs.bootstrap_complete == 'true'
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
      ecr_registry: ${{ steps.ecr.outputs.registry }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get ECR Registry
        id: ecr
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "registry=${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com" >> $GITHUB_OUTPUT

      - name: Generate Image Tag
        id: tag
        run: |
          IMAGE_TAG="${ENV}-${GITHUB_SHA::8}-$(date +%Y%m%d%H%M%S)"
          echo "tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Build Docker Image
        run: |
          ECR_REGISTRY="${{ steps.ecr.outputs.registry }}"
          IMAGE_TAG="${{ steps.tag.outputs.tag }}"
          docker build --platform linux/amd64 -t ${APP_NAME}:${IMAGE_TAG} -f Dockerfile .
          docker save ${APP_NAME}:${IMAGE_TAG} -o /tmp/image.tar

      - name: Upload Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar

  grype-scan:
    name: "🔍 Grype Scan"
    runs-on: ubuntu-latest
    needs: [build-image]
    continue-on-error: true
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docker-image
      - run: docker load -i image.tar
      - name: Run Grype
        uses: anchore/scan-action@v3
        with:
          image: cwa-0213:${{ needs.build-image.outputs.image_tag }}
          severity-cutoff: high
          fail-build: false

  push-to-ecr:
    name: "📤 Push to ECR"
    runs-on: ubuntu-latest
    needs: [build-image, grype-scan]
    if: always() && needs.build-image.result == 'success'
    outputs:
      image_tag: ${{ needs.build-image.outputs.image_tag }}
      ecr_uri: ${{ steps.push.outputs.ecr_uri }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docker-image
      - run: docker load -i image.tar

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag and Push
        id: push
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          TAG="${{ needs.build-image.outputs.image_tag }}"
          ECR_URI="${ACCOUNT}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPO}:${TAG}"
          docker tag ${APP_NAME}:${TAG} $ECR_URI
          docker push $ECR_URI
          echo "ecr_uri=$ECR_URI" >> $GITHUB_OUTPUT
          echo "✅ Pushed $ECR_URI"

  update-manifests:
    name: "📝 Update Manifests"
    runs-on: ubuntu-latest
    needs: [push-to-ecr]
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Update Kustomization
        run: |
          ECR_URI="${{ needs.push-to-ecr.outputs.ecr_uri }}"
          IMAGE_TAG="${{ needs.push-to-ecr.outputs.image_tag }}"
          ECR_BASE="${ECR_URI%:*}"
          KUSTOMIZATION=".${TENANT}-${APP_NAME}/k8s/overlays/${ENV}/kustomization.yaml"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin ${GITHUB_REF_NAME}

          if [ ! -f "$KUSTOMIZATION" ]; then
            echo "❌ $KUSTOMIZATION not found"
            exit 1
          fi

          sed -i.bak "s|newName:.*|newName: ${ECR_BASE}|" "$KUSTOMIZATION"
          sed -i.bak "s|newTag:.*|newTag: ${IMAGE_TAG}|" "$KUSTOMIZATION"
          rm -f "${KUSTOMIZATION}.bak"

          git add "$KUSTOMIZATION"
          git commit -m "chore(deploy): update ${ENV} image to ${IMAGE_TAG} [skip ci]"
          git push origin ${GITHUB_REF_NAME}

  create-argocd-app:
    name: "🔧 Create/Update ArgoCD App"
    runs-on: ubuntu-latest
    needs: [update-manifests]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Kubeconfig (Hub)
        run: |
          aws eks update-kubeconfig --name ${HUB_CLUSTER} --region ${AWS_REGION}
          kubectl config use-context ${HUB_CLUSTER}

      - name: Apply ArgoCD Application
        run: |
          APP_FULL="${TENANT}-${APP_NAME}-${ENV}"
          cat <<EOF | kubectl apply -f -
          apiVersion: argoproj.io/v1alpha1
          kind: Application
          metadata:
            name: ${APP_FULL}
            namespace: argocd
            labels:
              tenant: ${TENANT}
              app: ${APP_NAME}
              environment: ${ENV}
              managed-by: opsera-c2c
          spec:
            project: default
            source:
              repoURL: https://github.com/${GITHUB_REPOSITORY}.git
              targetRevision: ${GITHUB_REF_NAME}
              path: .${TENANT}-${APP_NAME}/k8s/overlays/${ENV}
            destination:
              name: ${SPOKE_CLUSTER}
              namespace: ${TENANT}-${APP_NAME}-${ENV}
            syncPolicy:
              automated:
                prune: false
                selfHeal: true
              syncOptions:
                - CreateNamespace=false
                - Replace=true
              retry:
                limit: 3
                backoff:
                  duration: 5s
                  factor: 2
                  maxDuration: 3m
          EOF
          echo "✓ ArgoCD application applied"

  refresh-ecr-secret:
    name: "🔐 Refresh ECR Secret"
    runs-on: ubuntu-latest
    needs: [create-argocd-app]
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Connect to Spoke
        run: |
          aws eks update-kubeconfig --name ${SPOKE_CLUSTER} --region ${AWS_REGION}
          kubectl config use-context ${SPOKE_CLUSTER}

      - name: Refresh ECR Pull Secret
        run: |
          NS="${TENANT}-${APP_NAME}-${ENV}"
          ECR_PASS=$(aws ecr get-login-password --region ${AWS_REGION})
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          kubectl create secret docker-registry ecr-pull-secret \
            --docker-server="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com" \
            --docker-username=AWS \
            --docker-password="$ECR_PASS" \
            --namespace="${NS}" \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "✓ ECR secret refreshed"

  sync-and-deploy:
    name: "🚀 Sync ArgoCD"
    runs-on: ubuntu-latest
    needs: [refresh-ecr-secret]
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Connect to Hub
        run: |
          aws eks update-kubeconfig --name ${HUB_CLUSTER} --region ${AWS_REGION}
          kubectl config use-context ${HUB_CLUSTER}

      - name: Hard Refresh and Sync
        run: |
          APP_FULL="${TENANT}-${APP_NAME}-${ENV}"
          kubectl annotate application ${APP_FULL} -n argocd argocd.argoproj.io/refresh=hard --overwrite
          sleep 3
          kubectl patch application ${APP_FULL} -n argocd --type merge \
            -p '{"operation":{"sync":{"prune":true,"syncOptions":["Replace=true"]}}}'

      - name: Wait for Sync
        run: |
          APP_FULL="${TENANT}-${APP_NAME}-${ENV}"
          for i in $(seq 1 60); do
            SYNC=$(kubectl get application ${APP_FULL} -n argocd -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "Unknown")
            HEALTH=$(kubectl get application ${APP_FULL} -n argocd -o jsonpath='{.status.health.status}' 2>/dev/null || echo "Unknown")
            echo "[$i/60] Sync: $SYNC | Health: $HEALTH"
            [ "$SYNC" = "Synced" ] && [ "$HEALTH" = "Healthy" ] && echo "✅ Sync complete" && exit 0
            sleep 5
          done
          echo "⚠️ Timeout - check ArgoCD UI"
          exit 0

  verify-deployment:
    name: "🔍 Verify Deployment"
    runs-on: ubuntu-latest
    needs: [sync-and-deploy]
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Connect to Spoke
        run: |
          aws eks update-kubeconfig --name ${SPOKE_CLUSTER} --region ${AWS_REGION}
          kubectl config use-context ${SPOKE_CLUSTER}

      - name: Verify Pods
        run: |
          NS="${TENANT}-${APP_NAME}-${ENV}"
          kubectl get pods -n $NS -o wide

      - name: Wait for Rollout
        run: |
          NS="${TENANT}-${APP_NAME}-${ENV}"
          kubectl rollout status deployment/cwa-0213 -n $NS --timeout=120s

      - name: Health Check (SPA - path /)
        run: |
          NS="${TENANT}-${APP_NAME}-${ENV}"
          kubectl port-forward -n $NS deployment/cwa-0213 8081:8080 &
          PF_PID=$!
          sleep 5
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8081/ || echo "000")
          kill $PF_PID 2>/dev/null || true
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Health check passed (HTTP $HTTP_CODE)"
          else
            echo "⚠️ Health check: HTTP $HTTP_CODE (SPA may still be loading)"
          fi

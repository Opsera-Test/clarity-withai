name: "🔬 Deep Debug ArgoCD"

on:
  workflow_dispatch:

env:
  APP_NAME: 1cwa
  TENANT: opsera
  AWS_REGION: us-west-2
  HUB_CLUSTER: argocd-usw2
  SPOKE_CLUSTER: opsera-usw2-np

jobs:
  deep-debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # ══════════════════════════════════════════════════════════════════
      # SECTION 1: CLUSTER REGISTRATION VERIFICATION
      # ══════════════════════════════════════════════════════════════════
      - name: "1️⃣ [CLUSTERS] List ALL cluster secrets in ArgoCD"
        run: |
          echo "═══════════════════════════════════════════════════════════════"
          echo "SECTION 1: CLUSTER REGISTRATION VERIFICATION"
          echo "═══════════════════════════════════════════════════════════════"
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}
          
          echo ""
          echo "📋 All secrets with cluster label:"
          kubectl get secrets -n argocd -l argocd.argoproj.io/secret-type=cluster
          
          echo ""
          echo "📋 Detailed cluster info (decoded):"
          for secret in $(kubectl get secrets -n argocd -l argocd.argoproj.io/secret-type=cluster -o jsonpath='{.items[*].metadata.name}'); do
            echo "────────────────────────────────────────"
            echo "Secret Name: $secret"
            CLUSTER_NAME=$(kubectl get secret $secret -n argocd -o jsonpath='{.data.name}' | base64 -d 2>/dev/null || echo "DECODE_ERROR")
            CLUSTER_SERVER=$(kubectl get secret $secret -n argocd -o jsonpath='{.data.server}' | base64 -d 2>/dev/null || echo "DECODE_ERROR")
            echo "  → Cluster Name (what ArgoCD uses): $CLUSTER_NAME"
            echo "  → Server URL: $CLUSTER_SERVER"
          done

      # ══════════════════════════════════════════════════════════════════
      # SECTION 2: REPOSITORY SECRET VERIFICATION
      # ══════════════════════════════════════════════════════════════════
      - name: "2️⃣ [REPOS] Check repository secrets"
        run: |
          echo ""
          echo "═══════════════════════════════════════════════════════════════"
          echo "SECTION 2: REPOSITORY SECRET VERIFICATION"
          echo "═══════════════════════════════════════════════════════════════"
          
          echo ""
          echo "📋 All repository secrets:"
          kubectl get secrets -n argocd -l argocd.argoproj.io/secret-type=repository
          
          echo ""
          echo "📋 Checking repo-${{ env.APP_NAME }} secret:"
          if kubectl get secret repo-${{ env.APP_NAME }} -n argocd 2>/dev/null; then
            REPO_TYPE=$(kubectl get secret repo-${{ env.APP_NAME }} -n argocd -o jsonpath='{.data.type}' | base64 -d 2>/dev/null)
            REPO_URL=$(kubectl get secret repo-${{ env.APP_NAME }} -n argocd -o jsonpath='{.data.url}' | base64 -d 2>/dev/null)
            echo "  → Type: $REPO_TYPE"
            echo "  → URL: $REPO_URL"
            echo "  → Password set: $(kubectl get secret repo-${{ env.APP_NAME }} -n argocd -o jsonpath='{.data.password}' | wc -c) bytes"
          else
            echo "  ❌ Secret NOT FOUND!"
          fi

      # ══════════════════════════════════════════════════════════════════
      # SECTION 3: APPLICATION CONFIGURATION
      # ══════════════════════════════════════════════════════════════════
      - name: "3️⃣ [APP CONFIG] Full Application YAML"
        run: |
          echo ""
          echo "═══════════════════════════════════════════════════════════════"
          echo "SECTION 3: APPLICATION CONFIGURATION"
          echo "═══════════════════════════════════════════════════════════════"
          
          echo ""
          echo "📋 Application ${{ env.APP_NAME }}-dev full spec:"
          kubectl get application ${{ env.APP_NAME }}-dev -n argocd -o yaml

      # ══════════════════════════════════════════════════════════════════
      # SECTION 4: DESTINATION MATCHING
      # ══════════════════════════════════════════════════════════════════
      - name: "4️⃣ [DEST] Verify destination.name matches registered cluster"
        run: |
          echo ""
          echo "═══════════════════════════════════════════════════════════════"
          echo "SECTION 4: DESTINATION MATCHING"
          echo "═══════════════════════════════════════════════════════════════"
          
          DEST_NAME=$(kubectl get application ${{ env.APP_NAME }}-dev -n argocd -o jsonpath='{.spec.destination.name}')
          DEST_NS=$(kubectl get application ${{ env.APP_NAME }}-dev -n argocd -o jsonpath='{.spec.destination.namespace}')
          DEST_SERVER=$(kubectl get application ${{ env.APP_NAME }}-dev -n argocd -o jsonpath='{.spec.destination.server}')
          
          echo ""
          echo "📋 Application Destination:"
          echo "  → destination.name: '$DEST_NAME'"
          echo "  → destination.namespace: '$DEST_NS'"
          echo "  → destination.server: '$DEST_SERVER'"
          
          echo ""
          echo "📋 Checking if '$DEST_NAME' exists in registered clusters..."
          FOUND="false"
          for secret in $(kubectl get secrets -n argocd -l argocd.argoproj.io/secret-type=cluster -o jsonpath='{.items[*].metadata.name}'); do
            CLUSTER_NAME=$(kubectl get secret $secret -n argocd -o jsonpath='{.data.name}' | base64 -d 2>/dev/null)
            if [ "$CLUSTER_NAME" = "$DEST_NAME" ]; then
              echo "  ✅ MATCH FOUND!"
              echo "     Secret: $secret"
              echo "     Cluster Name: $CLUSTER_NAME"
              FOUND="true"
              break
            fi
          done
          
          if [ "$FOUND" = "false" ]; then
            echo "  ❌ NO MATCHING CLUSTER FOUND!"
            echo ""
            echo "  Available cluster names in ArgoCD:"
            for secret in $(kubectl get secrets -n argocd -l argocd.argoproj.io/secret-type=cluster -o jsonpath='{.items[*].metadata.name}'); do
              CLUSTER_NAME=$(kubectl get secret $secret -n argocd -o jsonpath='{.data.name}' | base64 -d 2>/dev/null)
              echo "    - '$CLUSTER_NAME' (secret: $secret)"
            done
          fi

      # ══════════════════════════════════════════════════════════════════
      # SECTION 5: SYNC STATUS & CONDITIONS
      # ══════════════════════════════════════════════════════════════════
      - name: "5️⃣ [SYNC] Application Sync Status"
        run: |
          echo ""
          echo "═══════════════════════════════════════════════════════════════"
          echo "SECTION 5: SYNC STATUS & CONDITIONS"
          echo "═══════════════════════════════════════════════════════════════"
          
          echo ""
          echo "📋 Sync Status:"
          kubectl get application ${{ env.APP_NAME }}-dev -n argocd -o jsonpath='{.status.sync}' | jq .
          
          echo ""
          echo "📋 Health Status:"
          kubectl get application ${{ env.APP_NAME }}-dev -n argocd -o jsonpath='{.status.health}' | jq .
          
          echo ""
          echo "📋 Operation State (last sync operation):"
          kubectl get application ${{ env.APP_NAME }}-dev -n argocd -o jsonpath='{.status.operationState}' | jq . || echo "No operation state"
          
          echo ""
          echo "📋 Conditions (ERRORS/WARNINGS):"
          kubectl get application ${{ env.APP_NAME }}-dev -n argocd -o jsonpath='{.status.conditions}' | jq . || echo "No conditions"

      # ══════════════════════════════════════════════════════════════════
      # SECTION 6: SOURCE VERIFICATION
      # ══════════════════════════════════════════════════════════════════
      - name: "6️⃣ [SOURCE] Verify source path and repo access"
        run: |
          echo ""
          echo "═══════════════════════════════════════════════════════════════"
          echo "SECTION 6: SOURCE VERIFICATION"
          echo "═══════════════════════════════════════════════════════════════"
          
          REPO_URL=$(kubectl get application ${{ env.APP_NAME }}-dev -n argocd -o jsonpath='{.spec.source.repoURL}')
          REPO_PATH=$(kubectl get application ${{ env.APP_NAME }}-dev -n argocd -o jsonpath='{.spec.source.path}')
          REPO_REV=$(kubectl get application ${{ env.APP_NAME }}-dev -n argocd -o jsonpath='{.spec.source.targetRevision}')
          
          echo ""
          echo "📋 Source Configuration:"
          echo "  → repoURL: $REPO_URL"
          echo "  → path: $REPO_PATH"
          echo "  → targetRevision: $REPO_REV"
          
          echo ""
          echo "📋 Checking if path exists in local checkout:"
          if [ -d "$REPO_PATH" ]; then
            echo "  ✅ Path exists!"
            echo "  📁 Contents:"
            ls -la "$REPO_PATH"
          else
            echo "  ❌ Path NOT found: $REPO_PATH"
          fi

      # ══════════════════════════════════════════════════════════════════
      # SECTION 7: KUSTOMIZE BUILD TEST
      # ══════════════════════════════════════════════════════════════════
      - name: "7️⃣ [KUSTOMIZE] Test kustomize build locally"
        run: |
          echo ""
          echo "═══════════════════════════════════════════════════════════════"
          echo "SECTION 7: KUSTOMIZE BUILD TEST"
          echo "═══════════════════════════════════════════════════════════════"
          
          echo ""
          echo "📋 Testing kustomize build on .opsera-${{ env.APP_NAME }}/k8s/overlays/dev..."
          cd .opsera-${{ env.APP_NAME }}/k8s/overlays/dev
          
          echo ""
          echo "📋 kustomization.yaml contents:"
          cat kustomization.yaml
          
          echo ""
          echo "📋 Running: kustomize build ."
          kustomize build . 2>&1 || echo "❌ KUSTOMIZE BUILD FAILED!"

      # ══════════════════════════════════════════════════════════════════
      # SECTION 8: SPOKE CLUSTER CONNECTIVITY
      # ══════════════════════════════════════════════════════════════════
      - name: "8️⃣ [SPOKE] Test spoke cluster connectivity"
        run: |
          echo ""
          echo "═══════════════════════════════════════════════════════════════"
          echo "SECTION 8: SPOKE CLUSTER CONNECTIVITY"
          echo "═══════════════════════════════════════════════════════════════"
          
          echo ""
          echo "📋 Configuring kubectl for spoke cluster: ${{ env.SPOKE_CLUSTER }}"
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}
          
          echo ""
          echo "📋 Testing kubectl access to spoke:"
          kubectl cluster-info
          
          echo ""
          echo "📋 Listing namespaces on spoke:"
          kubectl get namespaces | grep -E "(opsera|${{ env.APP_NAME }}|NAME)"
          
          echo ""
          echo "📋 Checking namespace ${{ env.TENANT }}-${{ env.APP_NAME }}-dev:"
          kubectl get namespace ${{ env.TENANT }}-${{ env.APP_NAME }}-dev -o yaml 2>/dev/null || echo "❌ Namespace not found"
          
          echo ""
          echo "📋 Pods in namespace ${{ env.TENANT }}-${{ env.APP_NAME }}-dev:"
          kubectl get pods -n ${{ env.TENANT }}-${{ env.APP_NAME }}-dev 2>/dev/null || echo "❌ No pods or namespace not found"
          
          echo ""
          echo "📋 All resources in namespace:"
          kubectl get all -n ${{ env.TENANT }}-${{ env.APP_NAME }}-dev 2>/dev/null || echo "❌ Namespace not found"

      # ══════════════════════════════════════════════════════════════════
      # SECTION 9: ARGOCD EVENTS
      # ══════════════════════════════════════════════════════════════════
      - name: "9️⃣ [EVENTS] ArgoCD Application Events"
        run: |
          echo ""
          echo "═══════════════════════════════════════════════════════════════"
          echo "SECTION 9: ARGOCD APPLICATION EVENTS"
          echo "═══════════════════════════════════════════════════════════════"
          
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}
          
          echo ""
          echo "📋 Recent events for application ${{ env.APP_NAME }}-dev:"
          kubectl get events -n argocd --field-selector involvedObject.name=${{ env.APP_NAME }}-dev --sort-by='.lastTimestamp' 2>/dev/null | tail -20 || echo "No events found"
          
          echo ""
          echo "📋 All recent ArgoCD events:"
          kubectl get events -n argocd --sort-by='.lastTimestamp' 2>/dev/null | tail -30

      # ══════════════════════════════════════════════════════════════════
      # SECTION 10: FORCE SYNC WITH DETAILED OUTPUT
      # ══════════════════════════════════════════════════════════════════
      - name: "🔟 [SYNC] Force sync and watch"
        run: |
          echo ""
          echo "═══════════════════════════════════════════════════════════════"
          echo "SECTION 10: FORCE SYNC WITH DETAILED OUTPUT"
          echo "═══════════════════════════════════════════════════════════════"
          
          echo ""
          echo "📋 Triggering hard refresh..."
          kubectl annotate application ${{ env.APP_NAME }}-dev -n argocd argocd.argoproj.io/refresh=hard --overwrite
          
          echo ""
          echo "📋 Waiting 15 seconds for sync..."
          sleep 15
          
          echo ""
          echo "📋 Status after refresh:"
          kubectl get application ${{ env.APP_NAME }}-dev -n argocd
          
          echo ""
          echo "📋 Detailed sync status:"
          kubectl get application ${{ env.APP_NAME }}-dev -n argocd -o jsonpath='{.status.sync}' | jq .
          
          echo ""
          echo "📋 Conditions after sync:"
          kubectl get application ${{ env.APP_NAME }}-dev -n argocd -o jsonpath='{.status.conditions}' | jq . || echo "No conditions"
          
          echo ""
          echo "📋 Operation state after sync:"
          kubectl get application ${{ env.APP_NAME }}-dev -n argocd -o jsonpath='{.status.operationState}' | jq . || echo "No operation state"

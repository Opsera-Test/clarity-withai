# ════════════════════════════════════════════════════════════════════════════
# DNS SETUP - Route 53 for cwa-5
# Creates ALIAS record pointing to NLB on agent.opsera.dev domain
# ════════════════════════════════════════════════════════════════════════════

name: "🌐 cwa-5: Setup DNS"

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/dns-setup-cwa-5.yaml'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        type: choice
        options: [dev, qa, staging]
        default: dev

env:
  APP_NAME: cwa-5
  TENANT: opsera
  AWS_REGION: us-west-2
  SPOKE_CLUSTER: opsera-usw2-np
  HOSTED_ZONE_NAME: agent.opsera.dev

jobs:
  setup-dns:
    name: "🌐 Setup Route 53 DNS"
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Determine Environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            ENV="${{ inputs.environment }}"
          else
            ENV="dev"
          fi
          echo "environment=${ENV}" >> $GITHUB_OUTPUT
          echo "Environment: ${ENV}"

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Get NLB Hostname
        id: nlb
        run: |
          NAMESPACE="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ steps.env.outputs.environment }}"
          
          echo "Getting NLB hostname from namespace: ${NAMESPACE}"
          
          NLB_HOSTNAME=$(kubectl get svc ${{ env.APP_NAME }} -n ${NAMESPACE} \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")
          
          if [ -z "$NLB_HOSTNAME" ] || [ "$NLB_HOSTNAME" = "null" ]; then
            echo "::error::NLB hostname not found. Is the service deployed?"
            exit 1
          fi
          
          echo "nlb_hostname=${NLB_HOSTNAME}" >> $GITHUB_OUTPUT
          echo "NLB Hostname: ${NLB_HOSTNAME}"

      - name: Get Hosted Zone ID
        id: zone
        run: |
          ZONE_ID=$(aws route53 list-hosted-zones-by-name \
            --dns-name "${{ env.HOSTED_ZONE_NAME }}" \
            --query "HostedZones[?Name=='${{ env.HOSTED_ZONE_NAME }}.'].Id" \
            --output text | sed 's|/hostedzone/||')
          
          if [ -z "$ZONE_ID" ]; then
            echo "::error::Hosted zone not found for ${{ env.HOSTED_ZONE_NAME }}"
            exit 1
          fi
          
          echo "zone_id=${ZONE_ID}" >> $GITHUB_OUTPUT
          echo "Hosted Zone ID: ${ZONE_ID}"

      - name: Get NLB Hosted Zone ID
        id: nlb_zone
        env:
          NLB_HOSTNAME: ${{ steps.nlb.outputs.nlb_hostname }}
        run: |
          # Extract the NLB name from hostname
          # Format: name-hash.elb.region.amazonaws.com
          NLB_NAME=$(echo "${NLB_HOSTNAME}" | cut -d'.' -f1)
          
          # Get NLB details
          NLB_INFO=$(aws elbv2 describe-load-balancers \
            --query "LoadBalancers[?DNSName=='${NLB_HOSTNAME}']" \
            --output json)
          
          NLB_ZONE_ID=$(echo "$NLB_INFO" | jq -r '.[0].CanonicalHostedZoneId')
          
          if [ -z "$NLB_ZONE_ID" ] || [ "$NLB_ZONE_ID" = "null" ]; then
            # Fallback: Use the known hosted zone ID for us-west-2 NLBs
            NLB_ZONE_ID="Z18D5FSROUN65G"
            echo "Using default NLB hosted zone ID for us-west-2"
          fi
          
          echo "nlb_zone_id=${NLB_ZONE_ID}" >> $GITHUB_OUTPUT
          echo "NLB Hosted Zone ID: ${NLB_ZONE_ID}"

      - name: Create/Update Route 53 ALIAS Record
        env:
          ZONE_ID: ${{ steps.zone.outputs.zone_id }}
          NLB_HOSTNAME: ${{ steps.nlb.outputs.nlb_hostname }}
          NLB_ZONE_ID: ${{ steps.nlb_zone.outputs.nlb_zone_id }}
          ENVIRONMENT: ${{ steps.env.outputs.environment }}
        run: |
          RECORD_NAME="${{ env.TENANT }}-${{ env.APP_NAME }}-${ENVIRONMENT}.${{ env.HOSTED_ZONE_NAME }}"
          
          echo "Creating ALIAS record:"
          echo "  ${RECORD_NAME} -> ${NLB_HOSTNAME}"
          
          # Create change batch JSON
          cat > /tmp/change-batch.json << EOF
          {
            "Comment": "ALIAS record for ${{ env.APP_NAME }}-${ENVIRONMENT}",
            "Changes": [
              {
                "Action": "UPSERT",
                "ResourceRecordSet": {
                  "Name": "${RECORD_NAME}",
                  "Type": "A",
                  "AliasTarget": {
                    "HostedZoneId": "${NLB_ZONE_ID}",
                    "DNSName": "${NLB_HOSTNAME}",
                    "EvaluateTargetHealth": true
                  }
                }
              }
            ]
          }
          EOF
          
          echo "Change batch:"
          cat /tmp/change-batch.json
          
          # Apply the change
          CHANGE_ID=$(aws route53 change-resource-record-sets \
            --hosted-zone-id "${ZONE_ID}" \
            --change-batch file:///tmp/change-batch.json \
            --query 'ChangeInfo.Id' \
            --output text)
          
          echo "Change ID: ${CHANGE_ID}"
          
          # Wait for the change to propagate
          echo "Waiting for DNS propagation..."
          aws route53 wait resource-record-sets-changed --id "${CHANGE_ID}"
          
          echo "✅ DNS record created successfully!"

      - name: Verify DNS Record
        env:
          ENVIRONMENT: ${{ steps.env.outputs.environment }}
        run: |
          RECORD_NAME="${{ env.TENANT }}-${{ env.APP_NAME }}-${ENVIRONMENT}.${{ env.HOSTED_ZONE_NAME }}"
          
          echo "Verifying DNS record..."
          echo ""
          
          # Check via Route 53
          echo "=== Route 53 Record ==="
          aws route53 list-resource-record-sets \
            --hosted-zone-id ${{ steps.zone.outputs.zone_id }} \
            --query "ResourceRecordSets[?Name=='${RECORD_NAME}.']" \
            --output table
          
          echo ""
          echo "=== DNS Lookup ==="
          # Give DNS a moment to propagate
          sleep 5
          nslookup ${RECORD_NAME} || echo "DNS may still be propagating..."
          
          echo ""
          echo "========================================="
          echo "🎉 YOUR APPLICATION URL:"
          echo "http://${RECORD_NAME}"
          echo "========================================="

      - name: Summary
        env:
          ENVIRONMENT: ${{ steps.env.outputs.environment }}
          NLB_HOSTNAME: ${{ steps.nlb.outputs.nlb_hostname }}
        run: |
          RECORD_NAME="${{ env.TENANT }}-${{ env.APP_NAME }}-${ENVIRONMENT}.${{ env.HOSTED_ZONE_NAME }}"
          
          cat << EOF >> $GITHUB_STEP_SUMMARY
          # 🌐 DNS Setup Complete!
          
          ## Application URL
          
          \`\`\`
          http://${RECORD_NAME}
          \`\`\`
          
          ## DNS Configuration
          
          | Setting | Value |
          |---------|-------|
          | **Domain** | \`${RECORD_NAME}\` |
          | **Type** | ALIAS (A Record) |
          | **Target** | \`${NLB_HOSTNAME}\` |
          | **Hosted Zone** | \`${{ env.HOSTED_ZONE_NAME }}\` |
          
          ## Notes
          
          - DNS propagation typically takes 60 seconds
          - ALIAS records are free (no Route 53 query charges)
          - Health checks are enabled for automatic failover
          EOF

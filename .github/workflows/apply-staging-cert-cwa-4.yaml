# Apply staging certificate fix
name: "🔐 cwa-4: Apply Staging Cert"

on:
  workflow_dispatch:

env:
  AWS_REGION: us-west-2
  SPOKE_CLUSTER: opsera-usw2-np
  APP_NAMESPACE: opsera-cwa-4-dev

jobs:
  apply-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Delete old certificate objects
        run: |
          echo "=== Deleting old cert-manager objects ==="
          kubectl delete certificate --all -n ${{ env.APP_NAMESPACE }} 2>/dev/null || true
          kubectl delete certificaterequest --all -n ${{ env.APP_NAMESPACE }} 2>/dev/null || true
          kubectl delete order --all -n ${{ env.APP_NAMESPACE }} 2>/dev/null || true
          kubectl delete challenge --all -n ${{ env.APP_NAMESPACE }} 2>/dev/null || true
          kubectl delete secret cwa-4-dev-tls -n ${{ env.APP_NAMESPACE }} 2>/dev/null || true
          echo "✅ Old objects deleted"

      - name: Update ingress to use staging issuer
        run: |
          echo "=== Updating ingress annotation ==="
          kubectl annotate ingress cwa-4 -n ${{ env.APP_NAMESPACE }} \
            cert-manager.io/cluster-issuer=letsencrypt-staging --overwrite
          echo "✅ Ingress updated to use letsencrypt-staging"

      - name: Wait for certificate provisioning
        run: |
          echo "=== Waiting for certificate ==="
          for i in {1..30}; do
            STATUS=$(kubectl get certificate -n ${{ env.APP_NAMESPACE }} -o jsonpath='{.items[0].status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || echo "Pending")
            echo "Attempt $i: Certificate status: $STATUS"
            if [ "$STATUS" = "True" ]; then
              echo "✅ Certificate is ready!"
              break
            fi
            sleep 10
          done

      - name: Verify TLS secret
        run: |
          echo "=== TLS Secret Status ==="
          kubectl get secrets -n ${{ env.APP_NAMESPACE }} | grep tls || echo "No TLS secrets yet"
          
          echo ""
          echo "=== Certificate Status ==="
          kubectl get certificates -n ${{ env.APP_NAMESPACE }}
          
          echo ""
          echo "=== Ingress Status ==="
          kubectl get ingress -n ${{ env.APP_NAMESPACE }} -o wide

      - name: Restart deployment
        run: |
          kubectl rollout restart deployment/cwa-4 -n ${{ env.APP_NAMESPACE }} || true
          echo "✅ Deployment restarted"

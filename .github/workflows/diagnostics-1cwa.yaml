# ════════════════════════════════════════════════════════════════════════════
# DIAGNOSTICS WORKFLOW - Full pipeline debugging (RULE 50)
# Generated by Code-to-Cloud Enterprise v0.901
# ════════════════════════════════════════════════════════════════════════════
name: "🔬 1cwa: Diagnostics"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        options: [dev, qa, staging]
        default: dev
      diagnostic_type:
        description: 'Type of diagnostic'
        type: choice
        options:
          - full-pipeline
          - pod-logs
          - argocd-debug
          - force-sync
        default: full-pipeline

env:
  APP_NAME: 1cwa
  TENANT: opsera
  AWS_REGION: us-west-2
  SPOKE_CLUSTER: opsera-usw2-np
  HUB_CLUSTER: argocd-usw2
  DOMAIN: agent.opsera.dev

permissions:
  contents: read
  id-token: write

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # FULL PIPELINE DIAGNOSTICS
  # ════════════════════════════════════════════════════════════════════════════
  full-pipeline:
    name: "🔍 Full Pipeline Diagnostics"
    runs-on: ubuntu-latest
    if: inputs.diagnostic_type == 'full-pipeline'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: "1️⃣ ECR Repository"
        run: |
          echo "### 📦 Stage 1: ECR Repository" >> $GITHUB_STEP_SUMMARY
          
          REPO="${{ env.TENANT }}/${{ env.APP_NAME }}"
          if aws ecr describe-repositories --repository-names "$REPO" 2>/dev/null; then
            echo "✅ ECR repository exists" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            aws ecr describe-images --repository-name "$REPO" \
              --query 'imageDetails[*].[imageTags[0],imagePushedAt]' \
              --output table | head -10 >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ ECR repository NOT found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: "2️⃣ ArgoCD Application"
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}
          
          echo "### 🔄 Stage 2: ArgoCD Application" >> $GITHUB_STEP_SUMMARY
          
          APP="${{ env.APP_NAME }}-${{ inputs.environment }}"
          if kubectl get application "$APP" -n argocd 2>/dev/null; then
            echo "✅ ArgoCD application exists" >> $GITHUB_STEP_SUMMARY
            SYNC=$(kubectl get application "$APP" -n argocd -o jsonpath='{.status.sync.status}')
            HEALTH=$(kubectl get application "$APP" -n argocd -o jsonpath='{.status.health.status}')
            echo "- Sync: \`$SYNC\`" >> $GITHUB_STEP_SUMMARY
            echo "- Health: \`$HEALTH\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ ArgoCD application NOT found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: "3️⃣ Kubernetes Resources"
        run: |
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}
          
          NAMESPACE="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ inputs.environment }}"
          
          echo "### 🎯 Stage 3: Kubernetes Resources" >> $GITHUB_STEP_SUMMARY
          
          if kubectl get namespace "$NAMESPACE" 2>/dev/null; then
            echo "✅ Namespace exists: \`$NAMESPACE\`" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Pods:**" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            kubectl get pods -n "$NAMESPACE" -o wide 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No pods found"
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Services:**" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            kubectl get svc -n "$NAMESPACE" 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No services found"
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Ingress:**" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            kubectl get ingress -n "$NAMESPACE" 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No ingress found"
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Namespace NOT found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: "4️⃣ Health Check"
        run: |
          URL="https://${{ env.TENANT }}-${{ env.APP_NAME }}-${{ inputs.environment }}.${{ env.DOMAIN }}"
          
          echo "### 🏥 Stage 4: Health Check" >> $GITHUB_STEP_SUMMARY
          
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$URL" || echo "000")
          
          if [ "$STATUS" = "200" ]; then
            echo "✅ Application accessible: HTTP $STATUS" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Application status: HTTP $STATUS" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "URL: \`$URL\`" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # POD LOGS
  # ════════════════════════════════════════════════════════════════════════════
  pod-logs:
    name: "📋 Pod Logs"
    runs-on: ubuntu-latest
    if: inputs.diagnostic_type == 'pod-logs'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get Pod Logs
        run: |
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}
          
          NAMESPACE="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ inputs.environment }}"
          
          echo "### 📋 Pod Logs" >> $GITHUB_STEP_SUMMARY
          
          for POD in $(kubectl get pods -n "$NAMESPACE" -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "#### Pod: $POD" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            kubectl logs "$POD" -n "$NAMESPACE" --tail=50 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No logs"
            echo '```' >> $GITHUB_STEP_SUMMARY
          done

  # ════════════════════════════════════════════════════════════════════════════
  # ARGOCD DEBUG
  # ════════════════════════════════════════════════════════════════════════════
  argocd-debug:
    name: "🔄 ArgoCD Debug"
    runs-on: ubuntu-latest
    if: inputs.diagnostic_type == 'argocd-debug'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Debug ArgoCD
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}
          
          APP="${{ env.APP_NAME }}-${{ inputs.environment }}"
          
          echo "### 🔄 ArgoCD Debug: $APP" >> $GITHUB_STEP_SUMMARY
          
          echo "**Application YAML:**" >> $GITHUB_STEP_SUMMARY
          echo '```yaml' >> $GITHUB_STEP_SUMMARY
          kubectl get application "$APP" -n argocd -o yaml 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "Not found"
          echo '```' >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Recent Events:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get events -n argocd --field-selector involvedObject.name="$APP" \
            --sort-by='.lastTimestamp' 2>/dev/null | tail -20 >> $GITHUB_STEP_SUMMARY || echo "No events"
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # FORCE SYNC
  # ════════════════════════════════════════════════════════════════════════════
  force-sync:
    name: "⚡ Force Sync"
    runs-on: ubuntu-latest
    if: inputs.diagnostic_type == 'force-sync'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Force Sync ArgoCD
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}
          
          APP="${{ env.APP_NAME }}-${{ inputs.environment }}"
          
          echo "### ⚡ Force Sync: $APP" >> $GITHUB_STEP_SUMMARY
          
          # Hard refresh
          kubectl annotate application "$APP" -n argocd \
            argocd.argoproj.io/refresh=hard --overwrite
          
          echo "✅ Force sync triggered" >> $GITHUB_STEP_SUMMARY
          
          sleep 10
          
          STATUS=$(kubectl get application "$APP" -n argocd -o jsonpath='{.status.sync.status}')
          echo "**Status after sync:** \`$STATUS\`" >> $GITHUB_STEP_SUMMARY

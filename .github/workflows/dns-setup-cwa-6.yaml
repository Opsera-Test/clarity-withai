# ════════════════════════════════════════════════════════════════════════════
# DNS SETUP - cwa-6
# Code-to-Cloud Enterprise v1.7.3
# One-time setup per environment (RULE 94)
# ════════════════════════════════════════════════════════════════════════════

name: "🌐 cwa-6: DNS Setup"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to setup DNS for'
        type: choice
        options: [dev]
        default: dev
      hosted_zone_id:
        description: 'Route53 Hosted Zone ID (optional - will auto-discover)'
        type: string
        required: false

env:
  APP_NAME: cwa-6
  TENANT: opsera
  AWS_REGION: us-east-1
  SPOKE_CLUSTER: opsera-use1-np
  DOMAIN: agent.opsera.dev

permissions:
  contents: read
  id-token: write

jobs:
  check-dns:
    name: "🔍 Check DNS Status"
    runs-on: ubuntu-latest
    outputs:
      needs_setup: ${{ steps.check.outputs.needs_setup }}
      current_target: ${{ steps.check.outputs.current_target }}
    steps:
      - name: Check if DNS Already Configured
        id: check
        run: |
          FQDN="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ inputs.environment }}.${{ env.DOMAIN }}"
          
          echo "### DNS Status Check" >> $GITHUB_STEP_SUMMARY
          echo "Checking: \`$FQDN\`" >> $GITHUB_STEP_SUMMARY
          
          RESOLVED=$(dig +short $FQDN @8.8.8.8 | head -1)
          
          if [ -n "$RESOLVED" ]; then
            echo "✅ DNS already configured: \`$RESOLVED\`" >> $GITHUB_STEP_SUMMARY
            echo "needs_setup=false" >> $GITHUB_OUTPUT
            echo "current_target=$RESOLVED" >> $GITHUB_OUTPUT
          else
            echo "📝 DNS not configured - setup needed" >> $GITHUB_STEP_SUMMARY
            echo "needs_setup=true" >> $GITHUB_OUTPUT
          fi

  setup-dns:
    name: "🌐 Configure DNS"
    runs-on: ubuntu-latest
    needs: [check-dns]
    if: needs.check-dns.outputs.needs_setup == 'true'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Get Load Balancer Hostname
        id: lb
        run: |
          echo "### Load Balancer" >> $GITHUB_STEP_SUMMARY
          
          LB_HOSTNAME=$(kubectl get svc ingress-nginx-controller -n ingress-nginx \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || echo "")
          
          if [ -z "$LB_HOSTNAME" ]; then
            echo "❌ Load Balancer not found" >> $GITHUB_STEP_SUMMARY
            echo "Make sure NGINX Ingress Controller is installed" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          
          echo "hostname=$LB_HOSTNAME" >> $GITHUB_OUTPUT
          echo "✅ Found: \`$LB_HOSTNAME\`" >> $GITHUB_STEP_SUMMARY
          
          # Verify region (RULE 91)
          if echo "$LB_HOSTNAME" | grep -q "${{ env.AWS_REGION }}"; then
            echo "✅ LB in correct region" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ WARNING: LB may be in different region" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Discover Hosted Zone
        id: zone
        run: |
          if [ -n "${{ inputs.hosted_zone_id }}" ]; then
            ZONE_ID="${{ inputs.hosted_zone_id }}"
            echo "Using provided zone: $ZONE_ID"
          else
            # Auto-discover hosted zone
            ZONE_ID=$(aws route53 list-hosted-zones \
              --query "HostedZones[?Name=='${{ env.DOMAIN }}.'].Id" \
              --output text | cut -d'/' -f3)
          fi
          
          if [ -z "$ZONE_ID" ]; then
            echo "❌ Hosted zone not found for: ${{ env.DOMAIN }}" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          
          echo "zone_id=$ZONE_ID" >> $GITHUB_OUTPUT
          echo "- Hosted Zone: \`$ZONE_ID\`" >> $GITHUB_STEP_SUMMARY

      - name: Create DNS Record (RULE 56 - with fallback)
        id: dns
        env:
          ZONE_ID: ${{ steps.zone.outputs.zone_id }}
          LB_HOSTNAME: ${{ steps.lb.outputs.hostname }}
        run: |
          FQDN="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ inputs.environment }}.${{ env.DOMAIN }}"
          
          # Create change batch
          cat > /tmp/dns-change.json << EOF
          {
            "Changes": [{
              "Action": "UPSERT",
              "ResourceRecordSet": {
                "Name": "${FQDN}",
                "Type": "CNAME",
                "TTL": 300,
                "ResourceRecords": [{"Value": "${LB_HOSTNAME}"}]
              }
            }]
          }
          EOF
          
          echo "### DNS Record Creation" >> $GITHUB_STEP_SUMMARY
          
          # Try DNS automation
          set +e
          CHANGE_OUTPUT=$(aws route53 change-resource-record-sets \
            --hosted-zone-id "$ZONE_ID" \
            --change-batch file:///tmp/dns-change.json \
            --query 'ChangeInfo.Id' \
            --output text 2>&1)
          DNS_EXIT=$?
          set -e
          
          if [ $DNS_EXIT -eq 0 ]; then
            echo "✅ DNS record created: \`$CHANGE_OUTPUT\`" >> $GITHUB_STEP_SUMMARY
            echo "dns_created=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ **DNS Automation Failed - Manual Setup Required**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Record Name | \`${FQDN}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| Type | CNAME |" >> $GITHUB_STEP_SUMMARY
            echo "| Value | \`${LB_HOSTNAME}\` |" >> $GITHUB_STEP_SUMMARY
            echo "| TTL | 300 |" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Error:** \`$CHANGE_OUTPUT\`" >> $GITHUB_STEP_SUMMARY
            echo "dns_created=false" >> $GITHUB_OUTPUT
          fi

      - name: Wait for DNS Propagation
        if: steps.dns.outputs.dns_created == 'true'
        run: |
          FQDN="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ inputs.environment }}.${{ env.DOMAIN }}"
          
          echo "### DNS Propagation" >> $GITHUB_STEP_SUMMARY
          echo "Waiting for DNS to propagate..." >> $GITHUB_STEP_SUMMARY
          
          for i in {1..30}; do
            RESOLVED=$(dig +short $FQDN @8.8.8.8 | head -1)
            if [ -n "$RESOLVED" ]; then
              echo "✅ DNS propagated: \`$RESOLVED\`" >> $GITHUB_STEP_SUMMARY
              exit 0
            fi
            echo "Attempt $i/30 - waiting..."
            sleep 10
          done
          
          echo "⚠️ DNS not yet propagated - may need more time" >> $GITHUB_STEP_SUMMARY

  summary:
    name: "📋 Summary"
    runs-on: ubuntu-latest
    needs: [check-dns, setup-dns]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          FQDN="${{ env.TENANT }}-${{ env.APP_NAME }}-${{ inputs.environment }}.${{ env.DOMAIN }}"
          
          cat << EOF >> $GITHUB_STEP_SUMMARY
          
          ---
          
          ## 🌐 DNS Setup Summary
          
          | Field | Value |
          |-------|-------|
          | Environment | \`${{ inputs.environment }}\` |
          | FQDN | \`${FQDN}\` |
          | URL | https://${FQDN} |
          
          ### Verification
          \`\`\`bash
          dig +short ${FQDN}
          curl -I https://${FQDN}
          \`\`\`
          EOF

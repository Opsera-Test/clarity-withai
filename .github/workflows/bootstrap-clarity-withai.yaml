# Bootstrap Workflow - clarity-withai
# One-time infrastructure setup with hub-spoke architecture
# Generated by Opsera Code-to-Cloud Enterprise v1.7.2

name: "Bootstrap clarity-withai"

on:
  workflow_dispatch:
    inputs:
      proceed:
        description: 'Confirm bootstrap execution'
        type: boolean
        default: false
      skip_spoke_registration:
        description: 'Skip spoke registration if already registered'
        type: boolean
        default: false

env:
  APP_NAME: clarity-withai
  TENANT: opsera
  AWS_REGION: us-east-1
  HUB_CLUSTER: argocd-use1
  SPOKE_CLUSTER: opsera-use1-np
  ECR_REPO: opsera/clarity-withai

permissions:
  contents: write
  id-token: write

jobs:
  validate:
    name: "Validate Inputs"
    runs-on: ubuntu-latest
    if: inputs.proceed == true
    outputs:
      repo_url: ${{ steps.repo.outputs.url }}
      aws_account_id: ${{ steps.aws.outputs.account_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Repository URL
        id: repo
        run: |
          REPO_URL="https://github.com/${{ github.repository }}.git"
          echo "url=${REPO_URL}" >> $GITHUB_OUTPUT
          echo "Repository: ${REPO_URL}" >> $GITHUB_STEP_SUMMARY

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get AWS Account ID
        id: aws
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=${ACCOUNT_ID}" >> $GITHUB_OUTPUT
          echo "AWS Account: ${ACCOUNT_ID}" >> $GITHUB_STEP_SUMMARY

  verify-infrastructure:
    name: "Verify Infrastructure"
    needs: [validate]
    runs-on: ubuntu-latest
    outputs:
      hub_exists: ${{ steps.check-hub.outputs.exists }}
      spoke_exists: ${{ steps.check-spoke.outputs.exists }}
      spoke_registered: ${{ steps.check-registration.outputs.registered }}
      connection_healthy: ${{ steps.check-registration.outputs.connection_healthy }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check Hub Cluster Exists
        id: check-hub
        run: |
          echo "### Hub Cluster Check" >> $GITHUB_STEP_SUMMARY
          if aws eks describe-cluster --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }} 2>/dev/null; then
            echo "Hub cluster exists: ${{ env.HUB_CLUSTER }}" >> $GITHUB_STEP_SUMMARY
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Hub cluster NOT found: ${{ env.HUB_CLUSTER }}" >> $GITHUB_STEP_SUMMARY
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Check Spoke Cluster Exists
        id: check-spoke
        run: |
          echo "### Spoke Cluster Check" >> $GITHUB_STEP_SUMMARY
          if aws eks describe-cluster --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }} 2>/dev/null; then
            echo "Spoke cluster exists: ${{ env.SPOKE_CLUSTER }}" >> $GITHUB_STEP_SUMMARY
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Spoke cluster NOT found: ${{ env.SPOKE_CLUSTER }}" >> $GITHUB_STEP_SUMMARY
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Configure kubectl for Hub
        if: steps.check-hub.outputs.exists == 'true'
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Check Spoke Registration in ArgoCD
        id: check-registration
        if: steps.check-hub.outputs.exists == 'true'
        run: |
          echo "### Spoke Registration Check" >> $GITHUB_STEP_SUMMARY
          
          # Check if spoke secret exists
          if kubectl get secret ${{ env.SPOKE_CLUSTER }} -n argocd 2>/dev/null; then
            echo "Spoke secret exists in ArgoCD" >> $GITHUB_STEP_SUMMARY
            
            # Verify connection actually works by checking ArgoCD cluster list
            CLUSTER_STATUS=$(kubectl get secret ${{ env.SPOKE_CLUSTER }} -n argocd -o jsonpath='{.data.server}' | base64 -d 2>/dev/null)
            
            if [ -n "$CLUSTER_STATUS" ]; then
              echo "Spoke cluster URL configured: (redacted)" >> $GITHUB_STEP_SUMMARY
              echo "registered=true" >> $GITHUB_OUTPUT
              echo "connection_healthy=true" >> $GITHUB_OUTPUT
            else
              echo "Spoke secret exists but may be misconfigured" >> $GITHUB_STEP_SUMMARY
              echo "registered=true" >> $GITHUB_OUTPUT
              echo "connection_healthy=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "Spoke NOT registered - will register" >> $GITHUB_STEP_SUMMARY
            echo "registered=false" >> $GITHUB_OUTPUT
            echo "connection_healthy=false" >> $GITHUB_OUTPUT
          fi

  create-ecr:
    name: "Create ECR Repository"
    needs: [validate, verify-infrastructure]
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create ECR Repository
        run: |
          echo "### ECR Repository" >> $GITHUB_STEP_SUMMARY
          if aws ecr describe-repositories --repository-names ${{ env.ECR_REPO }} 2>/dev/null; then
            echo "ECR repository already exists" >> $GITHUB_STEP_SUMMARY
          else
            aws ecr create-repository \
              --repository-name ${{ env.ECR_REPO }} \
              --image-scanning-configuration scanOnPush=true \
              --encryption-configuration encryptionType=AES256 \
              --tags Key=tenant,Value=${{ env.TENANT }} Key=app,Value=${{ env.APP_NAME }}
            echo "ECR repository created: ${{ env.ECR_REPO }}" >> $GITHUB_STEP_SUMMARY
          fi
          ACCOUNT_ID="${{ needs.validate.outputs.aws_account_id }}"
          ECR_URI="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}"
          echo "ECR URI: ${ECR_URI}" >> $GITHUB_STEP_SUMMARY

  register-spoke:
    name: "Register Spoke with ArgoCD"
    needs: [validate, verify-infrastructure]
    # Only register if: spoke not registered OR connection unhealthy (and not skipped)
    if: |
      needs.verify-infrastructure.outputs.hub_exists == 'true' &&
      needs.verify-infrastructure.outputs.spoke_exists == 'true' &&
      (needs.verify-infrastructure.outputs.spoke_registered != 'true' || needs.verify-infrastructure.outputs.connection_healthy != 'true') &&
      inputs.skip_spoke_registration != true
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get Spoke Cluster Info
        id: spoke-info
        run: |
          SPOKE_ENDPOINT=$(aws eks describe-cluster --name ${{ env.SPOKE_CLUSTER }} \
            --query 'cluster.endpoint' --output text)
          echo "endpoint=${SPOKE_ENDPOINT}" >> $GITHUB_OUTPUT
          SPOKE_CA=$(aws eks describe-cluster --name ${{ env.SPOKE_CLUSTER }} \
            --query 'cluster.certificateAuthority.data' --output text)
          echo "ca=${SPOKE_CA}" >> $GITHUB_OUTPUT

      - name: Configure kubectl for Spoke
        run: |
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Create ArgoCD Manager ServiceAccount on Spoke
        run: |
          echo "Setting up ArgoCD manager on spoke cluster..."
          
          # Create namespace if not exists
          kubectl create namespace argocd-manager --dry-run=client -o yaml | kubectl apply -f -
          
          # Create service account if not exists
          kubectl create serviceaccount argocd-manager -n argocd-manager --dry-run=client -o yaml | kubectl apply -f -
          
          # Check if ClusterRoleBinding exists and has correct config
          EXISTING_ROLE=$(kubectl get clusterrolebinding argocd-manager-role-binding -o jsonpath='{.roleRef.name}' 2>/dev/null || echo "")
          EXISTING_SA=$(kubectl get clusterrolebinding argocd-manager-role-binding -o jsonpath='{.subjects[0].name}' 2>/dev/null || echo "")
          
          if [ "$EXISTING_ROLE" == "cluster-admin" ] && [ "$EXISTING_SA" == "argocd-manager" ]; then
            echo "ClusterRoleBinding already correctly configured - skipping recreation"
          else
            echo "ClusterRoleBinding needs to be created/updated"
            # Delete existing if it exists (roleRef is immutable)
            kubectl delete clusterrolebinding argocd-manager-role-binding --ignore-not-found=true
            
            # Create fresh ClusterRoleBinding
            cat <<EOF | kubectl apply -f -
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: argocd-manager-role-binding
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: cluster-admin
          subjects:
            - kind: ServiceAccount
              name: argocd-manager
              namespace: argocd-manager
          EOF
          fi

      - name: Generate Token
        id: token
        run: |
          TOKEN=$(kubectl create token argocd-manager -n argocd-manager --duration=87600h)
          echo "token=${TOKEN}" >> $GITHUB_OUTPUT

      - name: Configure kubectl for Hub
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Register Spoke in ArgoCD
        env:
          SPOKE_ENDPOINT: ${{ steps.spoke-info.outputs.endpoint }}
          SPOKE_CA: ${{ steps.spoke-info.outputs.ca }}
          SPOKE_TOKEN: ${{ steps.token.outputs.token }}
        run: |
          echo "### Spoke Registration" >> $GITHUB_STEP_SUMMARY
          
          # Check if any cluster secret already has this server URL
          EXISTING_SECRETS=$(kubectl get secrets -n argocd -l argocd.argoproj.io/secret-type=cluster -o name 2>/dev/null || echo "")
          DUPLICATE_FOUND=false
          
          for secret in $EXISTING_SECRETS; do
            SECRET_NAME=$(echo $secret | cut -d'/' -f2)
            EXISTING_SERVER=$(kubectl get $secret -n argocd -o jsonpath='{.data.server}' 2>/dev/null | base64 -d 2>/dev/null || echo "")
            
            if [ "$EXISTING_SERVER" == "${SPOKE_ENDPOINT}" ] && [ "$SECRET_NAME" != "${{ env.SPOKE_CLUSTER }}" ]; then
              echo "Found duplicate cluster registration: $SECRET_NAME with same server URL" >> $GITHUB_STEP_SUMMARY
              echo "Removing duplicate: $SECRET_NAME"
              kubectl delete secret $SECRET_NAME -n argocd --ignore-not-found=true
              DUPLICATE_FOUND=true
            fi
          done
          
          # Check if our cluster secret already exists with correct server
          CURRENT_SERVER=$(kubectl get secret ${{ env.SPOKE_CLUSTER }} -n argocd -o jsonpath='{.data.server}' 2>/dev/null | base64 -d 2>/dev/null || echo "")
          
          if [ "$CURRENT_SERVER" == "${SPOKE_ENDPOINT}" ]; then
            echo "Cluster ${{ env.SPOKE_CLUSTER }} already registered with correct server URL - skipping" >> $GITHUB_STEP_SUMMARY
          else
            echo "Registering/updating cluster ${{ env.SPOKE_CLUSTER }}" >> $GITHUB_STEP_SUMMARY
            # Delete existing if server URL is different
            kubectl delete secret ${{ env.SPOKE_CLUSTER }} -n argocd --ignore-not-found=true
            
            cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: Secret
          metadata:
            name: ${{ env.SPOKE_CLUSTER }}
            namespace: argocd
            labels:
              argocd.argoproj.io/secret-type: cluster
          type: Opaque
          stringData:
            name: ${{ env.SPOKE_CLUSTER }}
            server: ${SPOKE_ENDPOINT}
            config: |
              {
                "bearerToken": "${SPOKE_TOKEN}",
                "tlsClientConfig": {
                  "insecure": false,
                  "caData": "${SPOKE_CA}"
                }
              }
          EOF
            echo "Spoke cluster registered: ${{ env.SPOKE_CLUSTER }}" >> $GITHUB_STEP_SUMMARY
          fi

  setup-cert-manager:
    name: "Setup cert-manager ClusterIssuer"
    needs: [validate, verify-infrastructure, register-spoke]
    if: |
      always() &&
      needs.verify-infrastructure.outputs.spoke_exists == 'true' &&
      (needs.register-spoke.result == 'success' || needs.register-spoke.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for Spoke
        run: |
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Verify cert-manager is installed
        id: check-cert-manager
        run: |
          echo "### cert-manager Check" >> $GITHUB_STEP_SUMMARY
          if kubectl get namespace cert-manager 2>/dev/null; then
            echo "cert-manager namespace exists" >> $GITHUB_STEP_SUMMARY
            
            # Check if cert-manager pods are running
            READY_PODS=$(kubectl get pods -n cert-manager --no-headers 2>/dev/null | grep -c "Running" || echo "0")
            if [ "$READY_PODS" -gt 0 ]; then
              echo "cert-manager is running ($READY_PODS pods)" >> $GITHUB_STEP_SUMMARY
              echo "installed=true" >> $GITHUB_OUTPUT
            else
              echo "cert-manager pods not running" >> $GITHUB_STEP_SUMMARY
              echo "installed=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "cert-manager NOT installed on spoke cluster" >> $GITHUB_STEP_SUMMARY
            echo "installed=false" >> $GITHUB_OUTPUT
          fi

      - name: Create ClusterIssuer for Let's Encrypt
        if: steps.check-cert-manager.outputs.installed == 'true'
        run: |
          echo "### ClusterIssuer Setup" >> $GITHUB_STEP_SUMMARY
          
          # Check if ClusterIssuer already exists
          if kubectl get clusterissuer letsencrypt-prod 2>/dev/null; then
            echo "ClusterIssuer letsencrypt-prod already exists" >> $GITHUB_STEP_SUMMARY
          else
            echo "Creating ClusterIssuer letsencrypt-prod" >> $GITHUB_STEP_SUMMARY
            cat <<EOF | kubectl apply -f -
          apiVersion: cert-manager.io/v1
          kind: ClusterIssuer
          metadata:
            name: letsencrypt-prod
          spec:
            acme:
              server: https://acme-v02.api.letsencrypt.org/directory
              email: devops@opsera.io
              privateKeySecretRef:
                name: letsencrypt-prod-account-key
              solvers:
                - http01:
                    ingress:
                      class: nginx
          EOF
            echo "ClusterIssuer created successfully" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Verify ClusterIssuer status
          sleep 5
          kubectl get clusterissuer letsencrypt-prod -o jsonpath='{.status.conditions[0].status}' >> $GITHUB_STEP_SUMMARY || echo "Status pending" >> $GITHUB_STEP_SUMMARY

  create-repo-secret:
    name: "Create ArgoCD Repo Secret"
    needs: [validate, verify-infrastructure, register-spoke, setup-cert-manager]
    if: |
      always() &&
      needs.verify-infrastructure.outputs.hub_exists == 'true' &&
      (needs.register-spoke.result == 'success' || needs.register-spoke.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for Hub
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Create Repository Secret
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          REPO_URL: ${{ needs.validate.outputs.repo_url }}
        run: |
          echo "### Repository Secret" >> $GITHUB_STEP_SUMMARY
          
          # Validate GH_PAT is set
          if [ -z "${GH_PAT}" ]; then
            echo "ERROR: GH_PAT secret is not set!" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          
          # Check if repo secret already exists with correct URL
          EXISTING_URL=$(kubectl get secret repo-${{ env.APP_NAME }} -n argocd -o jsonpath='{.data.url}' 2>/dev/null | base64 -d 2>/dev/null || echo "")
          
          if [ "$EXISTING_URL" == "${REPO_URL}" ]; then
            echo "Repository secret already exists with correct URL" >> $GITHUB_STEP_SUMMARY
            # Update the password in case it changed
            kubectl patch secret repo-${{ env.APP_NAME }} -n argocd \
              --type='json' -p="[{\"op\": \"replace\", \"path\": \"/data/password\", \"value\": \"$(echo -n ${GH_PAT} | base64)\"}]" 2>/dev/null || true
          else
            echo "Creating/updating repository secret" >> $GITHUB_STEP_SUMMARY
            # Delete and recreate to ensure clean state
            kubectl delete secret repo-${{ env.APP_NAME }} -n argocd --ignore-not-found=true
            
            # Create secret with proper ArgoCD format
            cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: Secret
          metadata:
            name: repo-${{ env.APP_NAME }}
            namespace: argocd
            labels:
              argocd.argoproj.io/secret-type: repository
          type: Opaque
          stringData:
            type: git
            url: "${REPO_URL}"
            username: git
            password: "${GH_PAT}"
          EOF
          fi
          
          # Verify secret was created correctly
          kubectl get secret repo-${{ env.APP_NAME }} -n argocd -o jsonpath='{.metadata.labels}' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Repository secret created for ArgoCD" >> $GITHUB_STEP_SUMMARY

  update-manifests:
    name: "Update Manifests"
    needs: [validate, create-ecr, create-repo-secret]
    if: |
      always() &&
      needs.validate.result == 'success' &&
      needs.create-ecr.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Update Kustomization with ECR URI
        env:
          AWS_ACCOUNT_ID: ${{ needs.validate.outputs.aws_account_id }}
        run: |
          ECR_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}"
          sed -i "s|PLACEHOLDER_ECR_REPO|${ECR_URI}|g" \
            .opsera-${{ env.APP_NAME }}/k8s/overlays/dev/kustomization.yaml
          echo "Updated ECR URI: ${ECR_URI}"

      - name: Update ArgoCD Application with Repo URL
        env:
          REPO_URL: ${{ needs.validate.outputs.repo_url }}
        run: |
          sed -i "s|PLACEHOLDER_REPO_URL|${REPO_URL}|g" \
            .opsera-${{ env.APP_NAME }}/argocd/dev/application.yaml
          echo "Updated repo URL: ${REPO_URL}"

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .opsera-${{ env.APP_NAME }}/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: Bootstrap ${{ env.APP_NAME }} DEV configuration [skip ci]"
            git pull --rebase origin main
            git push origin main
            echo "Manifests committed" >> $GITHUB_STEP_SUMMARY
          fi

  apply-argocd-app:
    name: "Apply ArgoCD Application"
    needs: [validate, verify-infrastructure, create-repo-secret, update-manifests]
    if: |
      always() &&
      needs.verify-infrastructure.outputs.hub_exists == 'true' &&
      needs.update-manifests.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for Hub
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Apply ArgoCD Application
        run: |
          echo "### ArgoCD Application" >> $GITHUB_STEP_SUMMARY
          kubectl apply -f .opsera-${{ env.APP_NAME }}/argocd/dev/application.yaml
          echo "ArgoCD Application applied: ${{ env.APP_NAME }}-dev" >> $GITHUB_STEP_SUMMARY

      - name: Verify Application Created
        run: |
          sleep 5
          kubectl get application ${{ env.APP_NAME }}-dev -n argocd -o wide
          SYNC_STATUS=$(kubectl get application ${{ env.APP_NAME }}-dev -n argocd \
            -o jsonpath='{.status.sync.status}' 2>/dev/null || echo "Unknown")
          echo "Sync Status: ${SYNC_STATUS}" >> $GITHUB_STEP_SUMMARY

  summary:
    name: "Bootstrap Summary"
    needs: [validate, verify-infrastructure, create-ecr, register-spoke, setup-cert-manager, create-repo-secret, update-manifests, apply-argocd-app]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate Summary
        run: |
          echo "# Bootstrap Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- App: clarity-withai" >> $GITHUB_STEP_SUMMARY
          echo "- Tenant: opsera" >> $GITHUB_STEP_SUMMARY
          echo "- Region: us-east-1" >> $GITHUB_STEP_SUMMARY
          echo "- Hub: argocd-use1" >> $GITHUB_STEP_SUMMARY
          echo "- Spoke: opsera-use1-np" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Push code to trigger CI/CD" >> $GITHUB_STEP_SUMMARY
          echo "2. Or run: gh workflow run ci-build-push-clarity-withai.yaml" >> $GITHUB_STEP_SUMMARY

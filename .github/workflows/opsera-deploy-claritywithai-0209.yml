name: Opsera Deploy - claritywithai-0209
on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
  workflow_call:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: string
permissions:
  contents: read
  id-token: write
env:
  APP_NAME: claritywithai-0209
  TENANT: opsera
  AWS_REGION: us-west-2
  REGION_SHORT: usw2
  SPOKE_CLUSTER: opsera-usw2-np

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Check Environment Filter
        id: check
        run: |
          ENV="${{ inputs.environment }}"
          if [ -z "$ENV" ] || [ "$ENV" = "null" ]; then echo "skip=true" >> $GITHUB_OUTPUT; else echo "skip=false" >> $GITHUB_OUTPUT; fi
      - uses: actions/checkout@v4
        if: steps.check.outputs.skip != 'true'
      - uses: aws-actions/configure-aws-credentials@v4
        if: steps.check.outputs.skip != 'true'
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Get AWS Account ID
        if: steps.check.outputs.skip != 'true'
        id: aws
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=$AWS_ACCOUNT_ID" >> $GITHUB_OUTPUT
      - uses: azure/setup-kubectl@v3
        if: steps.check.outputs.skip != 'true'
      - name: Configure kubeconfig
        if: steps.check.outputs.skip != 'true'
        run: |
          echo "${{ secrets.KUBECONFIG_SPOKE }}" | base64 -d > kubeconfig
          echo "KUBECONFIG=$(pwd)/kubeconfig" >> $GITHUB_ENV
      - name: Set namespace and ECR URI
        if: steps.check.outputs.skip != 'true'
        id: vars
        run: |
          ENV="${{ inputs.environment }}"
          NS="${TENANT}-${APP_NAME}-${ENV}"
          ECR_URI="${{ steps.aws.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.APP_NAME }}"
          echo "namespace=${NS}" >> $GITHUB_OUTPUT
          echo "ecr_uri=${ECR_URI}" >> $GITHUB_OUTPUT
        env:
          TENANT: opsera
          APP_NAME: claritywithai-0209
      - name: Refresh ECR pull secret
        if: steps.check.outputs.skip != 'true'
        run: |
          ECR_TOKEN=$(aws ecr get-login-password --region ${{ env.AWS_REGION }})
          kubectl create secret docker-registry ecr-pull-secret \
            --docker-server=${{ steps.aws.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com \
            --docker-username=AWS --docker-password="$ECR_TOKEN" \
            --namespace=${{ steps.vars.outputs.namespace }} \
            --dry-run=client -o yaml | kubectl apply -f -
      - name: Apply manifests
        if: steps.check.outputs.skip != 'true'
        run: |
          kubectl apply -k .opsera-${{ env.APP_NAME }}/k8s/overlays/${{ inputs.environment }} --server-side --force-conflicts 2>/dev/null || \
          kubectl apply -k .opsera-${{ env.APP_NAME }}/k8s/overlays/${{ inputs.environment }}
      - name: Wait for rollout
        if: steps.check.outputs.skip != 'true'
        run: |
          kubectl rollout status deployment/${{ env.APP_NAME }} -n ${{ steps.vars.outputs.namespace }} --timeout=300s
      - name: Pod status
        if: steps.check.outputs.skip != 'true'
        run: |
          kubectl get pods -n ${{ steps.vars.outputs.namespace }} -l app=${{ env.APP_NAME }} -o wide | tee -a $GITHUB_STEP_SUMMARY
      - name: Health check (port-forward)
        if: steps.check.outputs.skip != 'true'
        run: |
          POD=$(kubectl get pods -n ${{ steps.vars.outputs.namespace }} -l app=${{ env.APP_NAME }} -o jsonpath='{.items[0].metadata.name}')
          kubectl port-forward -n ${{ steps.vars.outputs.namespace }} $POD 8081:8080 &
          sleep 3
          wget -qO- http://localhost:8081/ | head -c 200
          echo ""
      - name: Deployment summary
        if: steps.check.outputs.skip != 'true'
        run: |
          echo "## Deploy complete" >> $GITHUB_STEP_SUMMARY
          echo "- Environment: ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "- Namespace: ${{ steps.vars.outputs.namespace }}" >> $GITHUB_STEP_SUMMARY

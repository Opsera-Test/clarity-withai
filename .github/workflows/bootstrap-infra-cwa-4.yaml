# ════════════════════════════════════════════════════════════════════════════
# BOOTSTRAP INFRASTRUCTURE - cwa-4
# Generated by Code-to-Cloud Enterprise v1.7.3
# RULE 2: Bootstrap MUST complete before CI/CD
# RULE 103: Spoke registration ONLY in this workflow (not CI/CD)
# ════════════════════════════════════════════════════════════════════════════

name: "🚀 cwa-4: Bootstrap Infrastructure"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to bootstrap'
        type: choice
        options: [dev, qa, staging, all]
        default: dev
      proceed:
        description: '✅ I confirm to proceed with bootstrap'
        type: boolean
        default: false
        required: true

env:
  APP_NAME: cwa-4
  TENANT: opsera
  AWS_REGION: us-west-2
  HUB_CLUSTER: argocd-usw2
  SPOKE_CLUSTER: opsera-usw2-np
  ECR_REPO: opsera/cwa-4

permissions:
  contents: write
  id-token: write

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # VALIDATION
  # ════════════════════════════════════════════════════════════════════════════
  validate:
    name: "✅ Validate"
    runs-on: ubuntu-latest
    if: inputs.proceed == true
    outputs:
      aws_account_id: ${{ steps.aws.outputs.account_id }}
      ecr_uri: ${{ steps.aws.outputs.ecr_uri }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # RULE 68: Use AWS Access Keys by default
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # RULE 7: Get AWS Account ID dynamically
      - name: Get AWS Account Info
        id: aws
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=${ACCOUNT_ID}" >> $GITHUB_OUTPUT
          echo "ecr_uri=${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com" >> $GITHUB_OUTPUT
          echo "### AWS Account" >> $GITHUB_STEP_SUMMARY
          echo "- Account ID: \`${ACCOUNT_ID}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Region: \`${{ env.AWS_REGION }}\`" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # CREATE ECR REPOSITORY
  # ════════════════════════════════════════════════════════════════════════════
  create-ecr:
    name: "📦 Create ECR Repository"
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # RULE 75: Auto-create ECR if not exists
      - name: Create ECR Repository
        run: |
          if aws ecr describe-repositories --repository-names "${{ env.ECR_REPO }}" 2>/dev/null; then
            echo "✅ ECR repository already exists"
          else
            aws ecr create-repository \
              --repository-name "${{ env.ECR_REPO }}" \
              --image-scanning-configuration scanOnPush=true \
              --tags Key=tenant,Value=${{ env.TENANT }} Key=app,Value=${{ env.APP_NAME }}
            echo "✅ ECR repository created"
          fi
          echo "### ECR Repository" >> $GITHUB_STEP_SUMMARY
          echo "- Name: \`${{ env.ECR_REPO }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- URI: \`${{ needs.validate.outputs.ecr_uri }}/${{ env.ECR_REPO }}\`" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # VERIFY SPOKE CLUSTER
  # ════════════════════════════════════════════════════════════════════════════
  verify-spoke:
    name: "🔍 Verify Spoke Cluster"
    needs: [validate]
    runs-on: ubuntu-latest
    outputs:
      spoke_exists: ${{ steps.check.outputs.exists }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # RULE 90: Verify infrastructure via direct API calls
      - name: Check Spoke Cluster Exists
        id: check
        run: |
          if aws eks describe-cluster --name ${{ env.SPOKE_CLUSTER }} 2>/dev/null; then
            echo "✅ Spoke cluster exists: ${{ env.SPOKE_CLUSTER }}"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Spoke cluster NOT found: ${{ env.SPOKE_CLUSTER }}"
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "::error::Spoke cluster ${{ env.SPOKE_CLUSTER }} does not exist. Please create the EKS cluster first."
            exit 1
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # CHECK SPOKE REGISTRATION (RULE 103)
  # ════════════════════════════════════════════════════════════════════════════
  check-spoke-registration:
    name: "🔗 Check Spoke Registration"
    needs: [validate, verify-spoke]
    runs-on: ubuntu-latest
    outputs:
      already_registered: ${{ steps.check.outputs.registered }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for Hub
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Check if Spoke Already Registered
        id: check
        run: |
          if kubectl get secret "cluster-${{ env.SPOKE_CLUSTER }}" -n argocd &>/dev/null; then
            echo "✅ Spoke cluster already registered in ArgoCD"
            echo "registered=true" >> $GITHUB_OUTPUT
          else
            echo "📝 Spoke cluster not yet registered"
            echo "registered=false" >> $GITHUB_OUTPUT
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # REGISTER SPOKE CLUSTER (Only if not already registered)
  # ════════════════════════════════════════════════════════════════════════════
  register-spoke:
    name: "🔗 Register Spoke with ArgoCD"
    needs: [validate, verify-spoke, check-spoke-registration]
    if: needs.check-spoke-registration.outputs.already_registered == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # RULE 61: Auto-register spoke with ArgoCD hub
      - name: Register Spoke Cluster
        run: |
          # Get spoke cluster endpoint
          SPOKE_ENDPOINT=$(aws eks describe-cluster --name ${{ env.SPOKE_CLUSTER }} \
            --query 'cluster.endpoint' --output text)
          SPOKE_CA=$(aws eks describe-cluster --name ${{ env.SPOKE_CLUSTER }} \
            --query 'cluster.certificateAuthority.data' --output text)

          # Configure kubectl for spoke to create service account
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}

          # Create ArgoCD manager service account on spoke
          kubectl apply -f - <<EOF
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: argocd-manager
            namespace: kube-system
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: argocd-manager-role-binding
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: cluster-admin
          subjects:
            - kind: ServiceAccount
              name: argocd-manager
              namespace: kube-system
          EOF

          # RULE 62: K8s 1.24+ token generation
          TOKEN=$(kubectl create token argocd-manager -n kube-system --duration=87600h)

          # Switch to hub cluster
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

          # Create cluster secret in ArgoCD
          kubectl apply -f - <<EOF
          apiVersion: v1
          kind: Secret
          metadata:
            name: cluster-${{ env.SPOKE_CLUSTER }}
            namespace: argocd
            labels:
              argocd.argoproj.io/secret-type: cluster
          type: Opaque
          stringData:
            name: ${{ env.SPOKE_CLUSTER }}
            server: ${SPOKE_ENDPOINT}
            config: |
              {
                "bearerToken": "${TOKEN}",
                "tlsClientConfig": {
                  "insecure": false,
                  "caData": "${SPOKE_CA}"
                }
              }
          EOF

          echo "✅ Spoke cluster registered with ArgoCD hub"
          echo "### Spoke Registration" >> $GITHUB_STEP_SUMMARY
          echo "- Spoke: \`${{ env.SPOKE_CLUSTER }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Hub: \`${{ env.HUB_CLUSTER }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ✅ Registered" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # CREATE ARGOCD REPO SECRET
  # ════════════════════════════════════════════════════════════════════════════
  create-repo-secret:
    name: "🔐 Create ArgoCD Repo Secret"
    needs: [validate, check-spoke-registration, register-spoke]
    # RULE 89: Handle job skip states
    if: always() && needs.validate.result == 'success' && (needs.register-spoke.result == 'success' || needs.register-spoke.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for Hub
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      # RULE 63: Create ArgoCD repository secret
      - name: Create Repository Secret
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_PAT" ]; then
            echo "::error::GH_PAT secret is required for ArgoCD to access private repository"
            exit 1
          fi

          SECRET_NAME="repo-${{ env.APP_NAME }}"
          REPO_URL="https://github.com/${{ github.repository }}"

          if kubectl get secret "$SECRET_NAME" -n argocd &>/dev/null; then
            echo "✅ Repository secret already exists"
          else
            kubectl create secret generic "$SECRET_NAME" -n argocd \
              --from-literal=type=git \
              --from-literal=url="$REPO_URL" \
              --from-literal=password="$GH_PAT" \
              --from-literal=username=git

            kubectl label secret "$SECRET_NAME" -n argocd \
              argocd.argoproj.io/secret-type=repository
            echo "✅ Repository secret created"
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # UPDATE MANIFESTS WITH ACTUAL VALUES
  # ════════════════════════════════════════════════════════════════════════════
  update-manifests:
    name: "📝 Update Manifests"
    needs: [validate, create-ecr, create-repo-secret]
    if: always() && needs.validate.result == 'success' && needs.create-ecr.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Update ECR URI in Manifests
        env:
          ECR_URI: ${{ needs.validate.outputs.ecr_uri }}
        run: |
          # Update kustomization files with actual ECR URI
          for env_dir in dev qa staging; do
            KUST_FILE=".opsera-${{ env.APP_NAME }}/k8s/overlays/${env_dir}/kustomization.yaml"
            if [ -f "$KUST_FILE" ]; then
              sed -i "s|PLACEHOLDER_ECR_URI|${ECR_URI}|g" "$KUST_FILE"
              echo "✅ Updated ${env_dir} kustomization"
            fi
          done

      - name: Update ArgoCD Application Repo URL
        run: |
          REPO_URL="https://github.com/${{ github.repository }}.git"
          for env_dir in dev qa staging; do
            APP_FILE=".opsera-${{ env.APP_NAME }}/argocd/${env_dir}/application.yaml"
            if [ -f "$APP_FILE" ]; then
              sed -i "s|repoURL: .*|repoURL: ${REPO_URL}|g" "$APP_FILE"
              echo "✅ Updated ${env_dir} ArgoCD application"
            fi
          done

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "chore(${{ env.APP_NAME }}): Update manifests with actual values [skip ci]"
          git pull --rebase origin main
          git push origin main

  # ════════════════════════════════════════════════════════════════════════════
  # APPLY ARGOCD APPLICATIONS
  # ════════════════════════════════════════════════════════════════════════════
  apply-argocd-apps:
    name: "🎯 Apply ArgoCD Applications"
    needs: [validate, update-manifests, create-repo-secret]
    if: always() && needs.update-manifests.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for Hub
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Apply ArgoCD Applications
        run: |
          ENVS="${{ inputs.environment }}"
          if [ "$ENVS" = "all" ]; then
            ENVS="dev qa staging"
          fi

          for env in $ENVS; do
            APP_FILE=".opsera-${{ env.APP_NAME }}/argocd/${env}/application.yaml"
            if [ -f "$APP_FILE" ]; then
              kubectl apply -f "$APP_FILE"
              echo "✅ Applied ArgoCD application for ${env}"
            fi
          done

          echo "### ArgoCD Applications" >> $GITHUB_STEP_SUMMARY
          kubectl get applications -n argocd -l app=${{ env.APP_NAME }} -o wide >> $GITHUB_STEP_SUMMARY || true

  # ════════════════════════════════════════════════════════════════════════════
  # SUMMARY
  # ════════════════════════════════════════════════════════════════════════════
  summary:
    name: "📋 Summary"
    needs: [validate, create-ecr, verify-spoke, register-spoke, create-repo-secret, update-manifests, apply-argocd-apps]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate Summary
        run: |
          cat << EOF >> $GITHUB_STEP_SUMMARY
          # 🚀 Bootstrap Complete: ${{ env.APP_NAME }}

          ## Configuration
          | Setting | Value |
          |---------|-------|
          | **App Name** | \`${{ env.APP_NAME }}\` |
          | **Tenant** | \`${{ env.TENANT }}\` |
          | **Region** | \`${{ env.AWS_REGION }}\` |
          | **Hub Cluster** | \`${{ env.HUB_CLUSTER }}\` |
          | **Spoke Cluster** | \`${{ env.SPOKE_CLUSTER }}\` |
          | **ECR Repository** | \`${{ env.ECR_REPO }}\` |

          ## URLs (After DNS Setup)
          - DEV: \`https://opsera-cwa-4-dev.agent.opsera.dev\`
          - QA: \`https://opsera-cwa-4-qa.agent.opsera.dev\`
          - Staging: \`https://opsera-cwa-4-staging.agent.opsera.dev\`

          ## Next Steps
          1. **Push code to main** to trigger CI/CD pipeline
          2. **Run DNS setup** after first deployment:
             \`\`\`bash
             gh workflow run dns-setup-cwa-4.yaml -f environment=dev
             \`\`\`

          ---
          *Generated by Code-to-Cloud Enterprise v1.7.3*
          EOF

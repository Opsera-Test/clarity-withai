# ════════════════════════════════════════════════════════════════════════════
# CI/CD WORKFLOW - Build, Push, and Deploy
# Generated by: Opsera Code-to-Cloud Enterprise v0.901
# ════════════════════════════════════════════════════════════════════════════

name: "🔨 CI/CD: clarity"

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'vite.config.ts'
      - 'tailwind.config.ts'
      - '.opsera-clarity/Dockerfile'
      - '.opsera-clarity/nginx.conf'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        options: [dev]
        default: dev

env:
  APP_NAME: clarity
  TENANT: opsera
  AWS_REGION: us-west-2
  EKS_HUB_CLUSTER: argocd-usw2
  EKS_SPOKE_CLUSTER: opsera-usw2-np

permissions:
  contents: write
  id-token: write

# Prevent concurrent runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # VERIFY BOOTSTRAP
  # ════════════════════════════════════════════════════════════════════════════
  verify-bootstrap:
    name: "🔍 Verify Bootstrap"
    runs-on: ubuntu-latest
    outputs:
      ecr_uri: ${{ steps.ecr.outputs.uri }}
      image_tag: ${{ steps.tag.outputs.tag }}
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get AWS Account ID and ECR URI
        id: ecr
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_URI="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.TENANT }}/${{ env.APP_NAME }}"
          echo "uri=${ECR_URI}" >> $GITHUB_OUTPUT
          
          # Verify ECR repo exists
          if ! aws ecr describe-repositories --repository-names "${{ env.TENANT }}/${{ env.APP_NAME }}" &>/dev/null; then
            echo "❌ ECR repository not found. Run bootstrap first!" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "✅ ECR repository verified" >> $GITHUB_STEP_SUMMARY

      - name: Generate Image Tag
        id: tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          TAG="${SHORT_SHA}-${TIMESTAMP}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "📦 Image Tag: ${TAG}" >> $GITHUB_STEP_SUMMARY

      - name: Determine Environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "environment=dev" >> $GITHUB_OUTPUT
          else
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # BUILD AND PUSH
  # ════════════════════════════════════════════════════════════════════════════
  build-and-push:
    name: "🐳 Build & Push"
    needs: [verify-bootstrap]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            docker login --username AWS --password-stdin ${{ needs.verify-bootstrap.outputs.ecr_uri }}

      - name: Build Docker Image
        run: |
          docker build \
            -f .opsera-${{ env.APP_NAME }}/Dockerfile \
            -t ${{ needs.verify-bootstrap.outputs.ecr_uri }}:${{ needs.verify-bootstrap.outputs.image_tag }} \
            -t ${{ needs.verify-bootstrap.outputs.ecr_uri }}:latest \
            .
          echo "✅ Built image: ${{ needs.verify-bootstrap.outputs.image_tag }}" >> $GITHUB_STEP_SUMMARY

      - name: Push Docker Image
        run: |
          docker push ${{ needs.verify-bootstrap.outputs.ecr_uri }}:${{ needs.verify-bootstrap.outputs.image_tag }}
          docker push ${{ needs.verify-bootstrap.outputs.ecr_uri }}:latest
          echo "✅ Pushed to ECR" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # UPDATE MANIFESTS
  # ════════════════════════════════════════════════════════════════════════════
  update-manifests:
    name: "📝 Update Manifests"
    needs: [verify-bootstrap, build-and-push]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Pull Latest
        run: git pull --rebase origin main

      - name: Update Kustomization Image Tag
        run: |
          ENVIRONMENT="${{ needs.verify-bootstrap.outputs.environment }}"
          IMAGE_TAG="${{ needs.verify-bootstrap.outputs.image_tag }}"
          
          cd .opsera-${{ env.APP_NAME }}/k8s/overlays/${ENVIRONMENT}
          
          # Update image tag
          sed -i "s/newTag: .*/newTag: ${IMAGE_TAG}/" kustomization.yaml
          
          echo "✅ Updated image tag to: ${IMAGE_TAG}" >> $GITHUB_STEP_SUMMARY

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .opsera-${{ env.APP_NAME }}/k8s/overlays/
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "deploy: Update ${{ env.APP_NAME }} to ${{ needs.verify-bootstrap.outputs.image_tag }} [skip ci]"
            git pull --rebase origin main
            git push origin main
            echo "✅ Committed manifest update" >> $GITHUB_STEP_SUMMARY
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # SYNC AND WAIT
  # ════════════════════════════════════════════════════════════════════════════
  sync-and-wait:
    name: "🔄 Deploy"
    needs: [verify-bootstrap, update-manifests]
    # RULE 42: Use always() for jobs that should run when upstream completes
    if: always() && needs.update-manifests.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for Hub Cluster
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      # RULE 66: Force ArgoCD sync after manifest updates
      - name: Force ArgoCD Sync
        run: |
          ENVIRONMENT="${{ needs.verify-bootstrap.outputs.environment }}"
          APP_NAME="${{ env.APP_NAME }}-${ENVIRONMENT}"
          
          kubectl annotate application ${APP_NAME} -n argocd \
            argocd.argoproj.io/refresh=hard --overwrite || true
          
          echo "✅ Triggered ArgoCD sync for ${APP_NAME}" >> $GITHUB_STEP_SUMMARY

      - name: Wait for Deployment
        run: |
          ENVIRONMENT="${{ needs.verify-bootstrap.outputs.environment }}"
          NAMESPACE="opsera-${{ env.APP_NAME }}-${ENVIRONMENT}"
          
          # Configure kubectl for spoke cluster to check pods
          aws eks update-kubeconfig --name ${{ env.EKS_SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}
          
          # Wait for pods to be ready (max 5 minutes)
          echo "Waiting for pods in ${NAMESPACE}..."
          
          TIMEOUT=300
          ELAPSED=0
          
          while [ $ELAPSED -lt $TIMEOUT ]; do
            READY=$(kubectl get pods -n ${NAMESPACE} -o jsonpath='{.items[*].status.phase}' 2>/dev/null | tr ' ' '\n' | grep -c Running || echo 0)
            TOTAL=$(kubectl get pods -n ${NAMESPACE} --no-headers 2>/dev/null | wc -l || echo 0)
            
            echo "Pods: ${READY}/${TOTAL} ready (${ELAPSED}s elapsed)"
            
            if [ "$TOTAL" -gt 0 ] && [ "$READY" -eq "$TOTAL" ]; then
              echo "✅ All pods ready!" >> $GITHUB_STEP_SUMMARY
              exit 0
            fi
            
            sleep 15
            ELAPSED=$((ELAPSED + 15))
          done
          
          echo "⚠️ Deployment timeout - check ArgoCD for status" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # SUMMARY
  # ════════════════════════════════════════════════════════════════════════════
  summary:
    name: "📋 Summary"
    needs: [verify-bootstrap, build-and-push, update-manifests, sync-and-wait]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate Summary
        run: |
          ENVIRONMENT="${{ needs.verify-bootstrap.outputs.environment }}"
          
          cat << EOF >> $GITHUB_STEP_SUMMARY
          # 📋 Deployment Summary
          
          | Field | Value |
          |-------|-------|
          | **App** | \`${{ env.APP_NAME }}\` |
          | **Environment** | \`${ENVIRONMENT}\` |
          | **Image Tag** | \`${{ needs.verify-bootstrap.outputs.image_tag }}\` |
          | **Build** | ${{ needs.build-and-push.result }} |
          | **Deploy** | ${{ needs.sync-and-wait.result }} |
          
          ## URL
          \`\`\`
          https://opsera-${{ env.APP_NAME }}-${ENVIRONMENT}.${{ env.DOMAIN }}
          \`\`\`
          
          ## Troubleshooting
          If deployment failed, run diagnostics:
          \`\`\`bash
          gh workflow run "diagnostics-clarity.yaml" -f environment=${ENVIRONMENT}
          \`\`\`
          EOF
        env:
          DOMAIN: agent.opsera.dev

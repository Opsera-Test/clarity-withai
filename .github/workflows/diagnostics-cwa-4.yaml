# ════════════════════════════════════════════════════════════════════════════
# DIAGNOSTICS - cwa-4
# Generated by Code-to-Cloud Enterprise v1.7.3
# RULE 50: MANDATORY diagnostics workflow
# ════════════════════════════════════════════════════════════════════════════

name: "🔬 cwa-4: Diagnostics"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        type: choice
        options: [dev, qa, staging]
        default: dev
      diagnostic_type:
        description: 'Diagnostic type'
        type: choice
        options:
          - full-pipeline
          - pod-logs
          - argocd-debug
          - force-sync
        default: full-pipeline

env:
  APP_NAME: cwa-4
  TENANT: opsera
  AWS_REGION: us-west-2
  HUB_CLUSTER: argocd-usw2
  SPOKE_CLUSTER: opsera-usw2-np

permissions:
  contents: read
  id-token: write

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # FULL PIPELINE DIAGNOSTICS
  # ════════════════════════════════════════════════════════════════════════════
  full-pipeline:
    name: "🔍 Full Pipeline Diagnostics"
    runs-on: ubuntu-latest
    if: inputs.diagnostic_type == 'full-pipeline'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: "1️⃣ ECR Repository Status"
        run: |
          echo "### 📦 Stage 1: ECR Repository" >> $GITHUB_STEP_SUMMARY
          if aws ecr describe-repositories --repository-names "${{ env.TENANT }}/${{ env.APP_NAME }}" 2>/dev/null; then
            echo "✅ ECR repository exists" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Recent Images:**" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            aws ecr describe-images --repository-name "${{ env.TENANT }}/${{ env.APP_NAME }}" \
              --query 'imageDetails[*].[imageTags[0],imagePushedAt]' \
              --output table 2>/dev/null | head -10 >> $GITHUB_STEP_SUMMARY || echo "No images" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ ECR repository NOT found" >> $GITHUB_STEP_SUMMARY
          fi

      - name: "2️⃣ EKS Cluster Status"
        run: |
          echo "### 🎯 Stage 2: EKS Clusters" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Hub Cluster:**" >> $GITHUB_STEP_SUMMARY
          if aws eks describe-cluster --name ${{ env.HUB_CLUSTER }} &>/dev/null; then
            echo "✅ \`${{ env.HUB_CLUSTER }}\` - Active" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ \`${{ env.HUB_CLUSTER }}\` - NOT FOUND" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Spoke Cluster:**" >> $GITHUB_STEP_SUMMARY
          if aws eks describe-cluster --name ${{ env.SPOKE_CLUSTER }} &>/dev/null; then
            echo "✅ \`${{ env.SPOKE_CLUSTER }}\` - Active" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ \`${{ env.SPOKE_CLUSTER }}\` - NOT FOUND" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Configure kubectl for Hub
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: "3️⃣ ArgoCD Application Status"
        run: |
          echo "### 🔄 Stage 3: ArgoCD Applications" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get applications -n argocd -l app=${{ env.APP_NAME }} -o wide 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No applications found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Configure kubectl for Spoke
        run: |
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: "4️⃣ Kubernetes Resources"
        env:
          NAMESPACE: ${{ env.TENANT }}-${{ env.APP_NAME }}-${{ inputs.environment }}
        run: |
          echo "### 🎯 Stage 4: Kubernetes Resources" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Namespace:** \`${NAMESPACE}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "**Pods:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get pods -n $NAMESPACE -o wide 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "Namespace not found or no pods" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Services:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get svc -n $NAMESPACE 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No services" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Ingress:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get ingress -n $NAMESPACE 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No ingress" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # POD LOGS
  # ════════════════════════════════════════════════════════════════════════════
  pod-logs:
    name: "📋 Pod Logs"
    runs-on: ubuntu-latest
    if: inputs.diagnostic_type == 'pod-logs'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Get Pod Logs
        env:
          NAMESPACE: ${{ env.TENANT }}-${{ env.APP_NAME }}-${{ inputs.environment }}
        run: |
          echo "### 📋 Pod Logs: ${NAMESPACE}" >> $GITHUB_STEP_SUMMARY

          for POD in $(kubectl get pods -n $NAMESPACE -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "#### Pod: \`$POD\`" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            kubectl logs $POD -n $NAMESPACE --tail=50 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No logs available" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY

            echo "**Previous Container:**" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            kubectl logs $POD -n $NAMESPACE --previous --tail=20 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "No previous logs" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          done

  # ════════════════════════════════════════════════════════════════════════════
  # ARGOCD DEBUG
  # ════════════════════════════════════════════════════════════════════════════
  argocd-debug:
    name: "🔄 ArgoCD Debug"
    runs-on: ubuntu-latest
    if: inputs.diagnostic_type == 'argocd-debug'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Debug ArgoCD Application
        run: |
          APP_NAME="${{ env.APP_NAME }}-${{ inputs.environment }}"
          echo "### 🔄 ArgoCD Debug: ${APP_NAME}" >> $GITHUB_STEP_SUMMARY

          echo "**Application Status:**" >> $GITHUB_STEP_SUMMARY
          echo '```yaml' >> $GITHUB_STEP_SUMMARY
          kubectl get application $APP_NAME -n argocd -o yaml 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "Application not found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Sync Events:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get events -n argocd --field-selector involvedObject.name=$APP_NAME --sort-by='.lastTimestamp' 2>/dev/null | tail -20 >> $GITHUB_STEP_SUMMARY || echo "No events" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # FORCE SYNC
  # ════════════════════════════════════════════════════════════════════════════
  force-sync:
    name: "⚡ Force Sync"
    runs-on: ubuntu-latest
    if: inputs.diagnostic_type == 'force-sync'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Force Sync ArgoCD
        run: |
          APP_NAME="${{ env.APP_NAME }}-${{ inputs.environment }}"
          echo "### ⚡ Force Sync: ${APP_NAME}" >> $GITHUB_STEP_SUMMARY

          # Hard refresh
          kubectl annotate application $APP_NAME -n argocd \
            argocd.argoproj.io/refresh=hard --overwrite 2>/dev/null || true

          echo "✅ Force sync triggered" >> $GITHUB_STEP_SUMMARY

          # Wait and check status
          sleep 30

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Status after sync:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get application $APP_NAME -n argocd -o wide 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "Application not found" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

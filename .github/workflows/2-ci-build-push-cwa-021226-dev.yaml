# CI/CD: Dev - cwa-021226
# Required: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, GH_PAT
# Trigger: push to main or workflow_dispatch

name: "CI/CD: Dev - cwa-021226"

concurrency:
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches: [main]
    paths-ignore:
      - '.opsera-cwa-021226/k8s/**'
      - '.github/workflows/1-bootstrap-*.yaml'
      - '**/*.md'
      - '**/*.disabled'
  workflow_dispatch:

env:
  APP_NAME: cwa-021226
  TENANT: opsera
  ENV: dev
  AWS_REGION: us-west-2
  HUB_CLUSTER: argocd-usw2
  SPOKE_CLUSTER: opsera-usw2-np
  NAMESPACE: opsera-cwa-021226-dev

jobs:
  security-scan:
    name: "🔒 Security Scan"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: true

  build-and-scan:
    name: "🐳 Build & Scan"
    runs-on: ubuntu-latest
    needs: [security-scan]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: cwa-021226:${{ github.sha }}
      - name: Grype Scan
        uses: anchore/scan-action@v3
        with:
          image: cwa-021226:${{ github.sha }}
          fail-build: false
        continue-on-error: true

  push-to-ecr:
    name: "📤 Push to ECR"
    needs: [build-and-scan]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Ensure ECR Repository Exists
        run: |
          aws ecr describe-repositories --repository-names opsera/cwa-021226 2>/dev/null || \
          aws ecr create-repository --repository-name opsera/cwa-021226 --image-tag-mutability IMMUTABLE

      - name: Get ECR URI
        id: ecr
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "uri=${AWS_ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/opsera/cwa-021226" >> $GITHUB_OUTPUT

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.ecr.outputs.uri }}:${{ github.sha }}

  update-manifests:
    name: "📝 Update Manifests"
    needs: [push-to-ecr]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update Kustomize
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/opsera/cwa-021226"
          cd .opsera-cwa-021226/k8s/overlays/dev
          sed -i "s|newName: PLACEHOLDER_ECR_URI|newName: ${ECR_URI}|g" kustomization.yaml
          sed -i "s|newTag: placeholder|newTag: ${{ github.sha }}|g" kustomization.yaml
          cd -
          git add .opsera-cwa-021226/k8s/overlays/dev/kustomization.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --staged --quiet || git commit -m "chore(deploy): update dev image to ${{ github.sha }} [skip ci]"
          git push origin main

  create-argocd-app:
    name: "🔄 Create/Update ArgoCD App"
    needs: [update-manifests]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }} --alias hub

      - name: Apply ArgoCD Application
        run: kubectl --context hub apply -f .opsera-cwa-021226/argocd/dev/application.yaml

  refresh-ecr-secret:
    name: "🔐 Refresh ECR Secret"
    needs: [create-argocd-app]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }} --alias spoke

      - name: Create/Update ECR Pull Secret
        run: |
          AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          ECR_PASSWORD=$(aws ecr get-login-password --region ${{ env.AWS_REGION }})
          kubectl --context spoke create secret docker-registry ecr-pull-secret \
            --namespace ${{ env.NAMESPACE }} \
            --docker-server=${ECR_URI} \
            --docker-username=AWS \
            --docker-password="${ECR_PASSWORD}" \
            --dry-run=client -o yaml | kubectl --context spoke apply -f -
          echo "✓ ECR secret refreshed"

  sync-argocd:
    name: "🔄 Sync ArgoCD"
    needs: [refresh-ecr-secret]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }} --alias hub

      - name: Hard Refresh and Sync
        run: |
          kubectl --context hub annotate application cwa-021226-dev -n argocd argocd.argoproj.io/refresh=hard --overwrite
          sleep 15
          kubectl --context hub get application cwa-021226-dev -n argocd -o jsonpath='{.status.sync.status}'

  verify-deployment:
    name: "✅ Verify Deployment"
    needs: [sync-argocd]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Kubeconfig
        run: aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }} --alias spoke

      - name: Verify Pods
        run: |
          for i in {1..30}; do
            READY=$(kubectl --context spoke get deployment cwa-021226 -n ${{ env.NAMESPACE }} -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "0")
            if [ "$READY" = "1" ]; then
              echo "✓ Deployment ready"
              kubectl --context spoke get pods -n ${{ env.NAMESPACE }} -l app=cwa-021226
              exit 0
            fi
            echo "Waiting for pods... ($i/30)"
            sleep 10
          done
          echo "❌ Deployment verification timeout"
          kubectl --context spoke get pods -n ${{ env.NAMESPACE }}
          exit 1

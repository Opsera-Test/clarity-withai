# Force HTTP by completely removing TLS config and disabling all redirects
name: "🔓 cwa-4: Force HTTP Access"

on:
  workflow_dispatch:

env:
  AWS_REGION: us-west-2
  SPOKE_CLUSTER: opsera-usw2-np
  APP_NAMESPACE: opsera-cwa-4-dev

jobs:
  force-http:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Delete and recreate ingress without TLS
        run: |
          echo "=== Deleting existing ingress ==="
          kubectl delete ingress cwa-4 -n ${{ env.APP_NAMESPACE }} || true
          
          echo "=== Creating HTTP-only ingress ==="
          cat <<EOF | kubectl apply -f -
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: cwa-4
            namespace: ${{ env.APP_NAMESPACE }}
            labels:
              app: cwa-4
              tenant: opsera
            annotations:
              kubernetes.io/ingress.class: nginx
              nginx.ingress.kubernetes.io/ssl-redirect: "false"
              nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
              nginx.ingress.kubernetes.io/proxy-body-size: "10m"
          spec:
            ingressClassName: nginx
            rules:
              - host: opsera-cwa-4-dev.agent.opsera.dev
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: cwa-4
                          port:
                            number: 80
          EOF
          
          echo "✅ HTTP-only ingress created"

      - name: Clean up certificate objects
        run: |
          kubectl delete certificate --all -n ${{ env.APP_NAMESPACE }} 2>/dev/null || true
          kubectl delete secret cwa-4-dev-tls -n ${{ env.APP_NAMESPACE }} 2>/dev/null || true
          echo "✅ Certificate objects cleaned"

      - name: Verify ingress
        run: |
          echo "=== Ingress Details ==="
          kubectl get ingress cwa-4 -n ${{ env.APP_NAMESPACE }} -o yaml
          
          echo ""
          echo "=== Pods ==="
          kubectl get pods -n ${{ env.APP_NAMESPACE }}

      - name: Test endpoint
        run: |
          sleep 5
          echo ""
          echo "=========================================="
          echo "🌐 Application Endpoint (HTTP ONLY):"
          echo "   http://opsera-cwa-4-dev.agent.opsera.dev"
          echo ""
          echo "⚠️  If browser still redirects to HTTPS:"
          echo "   1. Use Incognito/Private window"
          echo "   2. Or clear HSTS cache in browser"
          echo "=========================================="

# Check for wildcard certificate - outputs to stdout
name: "🔐 cwa-4: Check Wildcard Cert"

on:
  workflow_dispatch:

env:
  AWS_REGION: us-west-2
  SPOKE_CLUSTER: opsera-usw2-np

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl
        run: aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Check cert-manager
        run: |
          echo "=== CERT-MANAGER PODS ==="
          kubectl get pods -n cert-manager 2>/dev/null || echo "NOT INSTALLED"
          
          echo ""
          echo "=== CLUSTER ISSUERS ==="
          kubectl get clusterissuers 2>/dev/null || echo "NONE FOUND"
          
          echo ""
          echo "=== WILDCARD SECRETS (all namespaces) ==="
          kubectl get secrets -A | grep -i "wildcard\|opsera.*tls" || echo "NONE FOUND"
          
          echo ""
          echo "=== TLS SECRETS IN ingress-nginx ==="
          kubectl get secrets -n ingress-nginx | grep -i tls || echo "NONE"
          
          echo ""
          echo "=== CERTIFICATES IN opsera-cwa-4-dev ==="
          kubectl get certificates -n opsera-cwa-4-dev 2>/dev/null || echo "NONE"
          
          echo ""
          echo "=== INGRESS IN opsera-cwa-4-dev ==="
          kubectl get ingress -n opsera-cwa-4-dev -o wide

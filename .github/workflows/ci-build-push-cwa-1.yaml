# ════════════════════════════════════════════════════════════════════════════
# CI/CD WORKFLOW - cwa-1
# Code-to-Cloud Enterprise v1.7.2
# ════════════════════════════════════════════════════════════════════════════

name: "🔨 cwa-1: CI Build & Push"

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package*.json'
      - 'vite.config.ts'
      - 'tsconfig*.json'
      - 'tailwind.config.ts'
      - '.opsera-cwa-1/Dockerfile'
      - '.opsera-cwa-1/nginx.conf'
  workflow_dispatch:
    inputs:
      skip_build:
        description: 'Skip build (use existing image)'
        type: boolean
        default: false
      image_tag:
        description: 'Use existing image tag (if skip_build)'
        type: string

env:
  APP_NAME: cwa-1
  TENANT: opsera
  AWS_REGION: us-east-1
  SPOKE_CLUSTER: opsera-use1-np
  HUB_CLUSTER: argocd-use1
  NAMESPACE: opsera-cwa-1-dev

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # JOB 1: Verify Prerequisites
  # ════════════════════════════════════════════════════════════════════════════
  verify-prerequisites:
    name: "✅ Verify Prerequisites"
    runs-on: ubuntu-latest
    outputs:
      ecr_uri: ${{ steps.ecr.outputs.uri }}
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get ECR URI
        id: ecr
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ECR_URI="${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.TENANT }}/${{ env.APP_NAME }}"
          echo "uri=${ECR_URI}" >> $GITHUB_OUTPUT
          echo "ECR URI: ${ECR_URI}" >> $GITHUB_STEP_SUMMARY

      - name: Verify ECR Repository Exists
        run: |
          ECR_REPO="${{ env.TENANT }}/${{ env.APP_NAME }}"
          if ! aws ecr describe-repositories --repository-names $ECR_REPO > /dev/null 2>&1; then
            echo "❌ ECR repository not found: $ECR_REPO" >> $GITHUB_STEP_SUMMARY
            echo "Please run the bootstrap workflow first" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "✅ ECR repository exists" >> $GITHUB_STEP_SUMMARY

      - name: Generate Image Tag
        id: tag
        run: |
          if [ "${{ inputs.skip_build }}" = "true" ] && [ -n "${{ inputs.image_tag }}" ]; then
            TAG="${{ inputs.image_tag }}"
          else
            SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
            TIMESTAMP=$(date +%Y%m%d%H%M%S)
            TAG="${SHORT_SHA}-${TIMESTAMP}"
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Image Tag: \`${TAG}\`" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 2: Build & Push
  # ════════════════════════════════════════════════════════════════════════════
  build-and-push:
    name: "🔨 Build & Push"
    needs: [verify-prerequisites]
    if: inputs.skip_build != true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            docker login --username AWS --password-stdin ${{ needs.verify-prerequisites.outputs.ecr_uri }}

      - name: Build Docker Image
        env:
          ECR_URI: ${{ needs.verify-prerequisites.outputs.ecr_uri }}
          IMAGE_TAG: ${{ needs.verify-prerequisites.outputs.image_tag }}
        run: |
          docker build \
            -t ${ECR_URI}:${IMAGE_TAG} \
            -t ${ECR_URI}:latest \
            -f .opsera-${{ env.APP_NAME }}/Dockerfile \
            .

      - name: Push Docker Image
        env:
          ECR_URI: ${{ needs.verify-prerequisites.outputs.ecr_uri }}
          IMAGE_TAG: ${{ needs.verify-prerequisites.outputs.image_tag }}
        run: |
          docker push ${ECR_URI}:${IMAGE_TAG}
          docker push ${ECR_URI}:latest
          
          echo "✅ Image pushed: \`${ECR_URI}:${IMAGE_TAG}\`" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 3: Update Manifests
  # ════════════════════════════════════════════════════════════════════════════
  update-manifests:
    name: "📝 Update Manifests"
    needs: [verify-prerequisites, build-and-push]
    if: always() && needs.verify-prerequisites.result == 'success' && (needs.build-and-push.result == 'success' || needs.build-and-push.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Update Kustomization
        env:
          IMAGE_TAG: ${{ needs.verify-prerequisites.outputs.image_tag }}
        run: |
          cd .opsera-${{ env.APP_NAME }}/k8s/overlays/dev
          
          # Update image tag
          sed -i "s/newTag: .*/newTag: ${IMAGE_TAG}/" kustomization.yaml
          
          echo "Updated image tag to: ${IMAGE_TAG}"

      - name: Commit and Push
        env:
          IMAGE_TAG: ${{ needs.verify-prerequisites.outputs.image_tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .opsera-${{ env.APP_NAME }}/k8s/overlays/dev/kustomization.yaml
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "deploy(dev): Update image to ${IMAGE_TAG} [skip ci]"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin ${{ github.ref_name }}
          fi
          
          echo "✅ Manifests updated" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 4: Deploy
  # ════════════════════════════════════════════════════════════════════════════
  deploy:
    name: "🚀 Deploy to DEV"
    needs: [verify-prerequisites, update-manifests]
    if: always() && needs.update-manifests.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for Hub
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Force ArgoCD Sync (RULE 66)
        run: |
          kubectl annotate application ${{ env.APP_NAME }}-dev -n argocd \
            argocd.argoproj.io/refresh=hard --overwrite
          
          echo "✅ ArgoCD sync triggered" >> $GITHUB_STEP_SUMMARY

      - name: Wait for Deployment
        timeout-minutes: 5
        run: |
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}
          
          echo "Waiting for pods to be ready..."
          
          ELAPSED=0
          TIMEOUT=300
          
          while [ $ELAPSED -lt $TIMEOUT ]; do
            READY=$(kubectl get pods -n ${{ env.NAMESPACE }} -l app=${{ env.APP_NAME }} -o jsonpath='{.items[*].status.phase}' 2>/dev/null | tr ' ' '\n' | grep -c Running || echo 0)
            TOTAL=$(kubectl get pods -n ${{ env.NAMESPACE }} -l app=${{ env.APP_NAME }} --no-headers 2>/dev/null | wc -l || echo 0)
            
            echo "Pods: ${READY}/${TOTAL} running (${ELAPSED}s elapsed)"
            
            if [ "$TOTAL" -gt 0 ] && [ "$READY" -eq "$TOTAL" ]; then
              echo "✅ All pods running!" >> $GITHUB_STEP_SUMMARY
              exit 0
            fi
            
            sleep 15
            ELAPSED=$((ELAPSED + 15))
          done
          
          echo "⚠️ Deployment timeout - pods may still be starting" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # JOB 5: Summary
  # ════════════════════════════════════════════════════════════════════════════
  summary:
    name: "📋 Summary"
    needs: [verify-prerequisites, build-and-push, update-manifests, deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate Summary
        env:
          IMAGE_TAG: ${{ needs.verify-prerequisites.outputs.image_tag }}
          ECR_URI: ${{ needs.verify-prerequisites.outputs.ecr_uri }}
        run: |
          cat << EOF >> $GITHUB_STEP_SUMMARY
          
          # 📋 CI/CD Summary: ${{ env.APP_NAME }}
          
          ## Deployment Details
          
          | Field | Value |
          |-------|-------|
          | **Image** | \`${ECR_URI}:${IMAGE_TAG}\` |
          | **Environment** | DEV |
          | **Namespace** | \`${{ env.NAMESPACE }}\` |
          | **URL** | https://opsera-${{ env.APP_NAME }}-dev.agent.opsera.dev |
          
          ## Job Results
          
          | Job | Status |
          |-----|--------|
          | Verify Prerequisites | \`${{ needs.verify-prerequisites.result }}\` |
          | Build & Push | \`${{ needs.build-and-push.result }}\` |
          | Update Manifests | \`${{ needs.update-manifests.result }}\` |
          | Deploy | \`${{ needs.deploy.result }}\` |
          
          ---
          *Generated by Code-to-Cloud Enterprise v1.7.2*
          EOF

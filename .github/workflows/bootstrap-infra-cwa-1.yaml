# Bootstrap Workflow - cwa-1
# Code-to-Cloud Enterprise v1.7.2

name: Bootstrap cwa-1

on:
  workflow_dispatch:
    inputs:
      proceed:
        description: 'Confirm bootstrap execution'
        type: boolean
        default: false
        required: true

env:
  APP_NAME: cwa-1
  TENANT: opsera
  AWS_REGION: us-east-1
  SPOKE_CLUSTER: opsera-use1-np
  HUB_CLUSTER: argocd-use1
  NAMESPACE: opsera-cwa-1-dev
  DOMAIN: agent.opsera.dev

permissions:
  contents: write
  id-token: write

jobs:
  validate-prerequisites:
    name: Validate Prerequisites
    runs-on: ubuntu-latest
    if: inputs.proceed == true
    outputs:
      aws_account_id: ${{ steps.aws-info.outputs.account_id }}
      ecr_uri: ${{ steps.aws-info.outputs.ecr_uri }}
      spoke_endpoint: ${{ steps.spoke-info.outputs.endpoint }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get AWS Account Info
        id: aws-info
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=${ACCOUNT_ID}" >> $GITHUB_OUTPUT
          echo "ecr_uri=${ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.TENANT }}/${{ env.APP_NAME }}" >> $GITHUB_OUTPUT
          echo "### AWS Account Info" >> $GITHUB_STEP_SUMMARY
          echo "- Account ID: ${ACCOUNT_ID}" >> $GITHUB_STEP_SUMMARY

      - name: Validate GH_PAT Secret
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_PAT" ]; then
            echo "ERROR: GH_PAT secret is not set" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          set +e
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -H "Authorization: token $GH_PAT" "https://api.github.com/user")
          set -e
          if [ "$RESPONSE" = "200" ]; then
            echo "GH_PAT is valid" >> $GITHUB_STEP_SUMMARY
          else
            echo "ERROR: GH_PAT validation failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Verify Spoke Cluster Exists
        id: spoke-info
        run: |
          set +e
          CLUSTER_INFO=$(aws eks describe-cluster --name ${{ env.SPOKE_CLUSTER }} --output json 2>&1)
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -ne 0 ]; then
            echo "ERROR: Spoke cluster not found" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          ENDPOINT=$(echo "$CLUSTER_INFO" | jq -r '.cluster.endpoint')
          echo "endpoint=${ENDPOINT}" >> $GITHUB_OUTPUT
          echo "Spoke cluster verified: ${{ env.SPOKE_CLUSTER }}" >> $GITHUB_STEP_SUMMARY

      - name: Verify Hub Cluster Exists
        run: |
          set +e
          aws eks describe-cluster --name ${{ env.HUB_CLUSTER }} > /dev/null 2>&1
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -ne 0 ]; then
            echo "ERROR: Hub cluster not found" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "Hub cluster verified: ${{ env.HUB_CLUSTER }}" >> $GITHUB_STEP_SUMMARY

  check-spoke-health:
    name: Check Spoke Health
    needs: [validate-prerequisites]
    runs-on: ubuntu-latest
    outputs:
      spoke_healthy: ${{ steps.check-health.outputs.healthy }}
      spoke_registered: ${{ steps.check-registration.outputs.registered }}
      needs_registration: ${{ steps.decision.outputs.needs_registration }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for Hub
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Check Existing Registration By URL
        id: check-registration
        env:
          SPOKE_ENDPOINT: ${{ needs.validate-prerequisites.outputs.spoke_endpoint }}
        run: |
          echo "Checking if spoke cluster is already registered in ArgoCD..."
          echo "Looking for secret: ${{ env.SPOKE_CLUSTER }}"
          
          # Check by name
          if kubectl get secret ${{ env.SPOKE_CLUSTER }} -n argocd > /dev/null 2>&1; then
            NAME_EXISTS="true"
            echo "Found cluster secret by name: ${{ env.SPOKE_CLUSTER }}"
          else
            NAME_EXISTS="false"
            echo "Cluster secret not found by name"
          fi
          
          # Check by URL if not found by name
          URL_EXISTS="false"
          if [ "$NAME_EXISTS" = "false" ]; then
            echo "Checking all cluster secrets for matching endpoint: $SPOKE_ENDPOINT"
            CLUSTER_SECRETS=$(kubectl get secrets -n argocd -l argocd.argoproj.io/secret-type=cluster -o json 2>/dev/null || echo '{"items":[]}')
            SECRET_COUNT=$(echo "$CLUSTER_SECRETS" | jq '.items | length')
            echo "Found $SECRET_COUNT cluster secrets"
            
            MATCHING=$(echo "$CLUSTER_SECRETS" | jq -r --arg endpoint "$SPOKE_ENDPOINT" '.items[] | select(.data.server != null) | .data.server | @base64d | select(. == $endpoint) | "found"' | head -1)
            if [ "$MATCHING" = "found" ]; then
              URL_EXISTS="true"
              echo "Found matching cluster by URL"
            fi
          fi
          
          echo "DEBUG: NAME_EXISTS=$NAME_EXISTS, URL_EXISTS=$URL_EXISTS"
          
          if [ "$NAME_EXISTS" = "true" ] || [ "$URL_EXISTS" = "true" ]; then
            echo "registered=true" >> $GITHUB_OUTPUT
            echo "Spoke cluster IS registered in ArgoCD" >> $GITHUB_STEP_SUMMARY
          else
            echo "registered=false" >> $GITHUB_OUTPUT
            echo "Spoke cluster is NOT registered in ArgoCD" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Check Spoke Connection Health
        id: check-health
        if: steps.check-registration.outputs.registered == 'true'
        run: |
          set +e
          CLUSTER_SECRET=$(kubectl get secret ${{ env.SPOKE_CLUSTER }} -n argocd -o json 2>/dev/null)
          if [ -z "$CLUSTER_SECRET" ]; then
            echo "healthy=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }} --alias spoke-test
          kubectl --context spoke-test get nodes --request-timeout=10s > /dev/null 2>&1
          HEALTH_EXIT=$?
          set -e
          if [ $HEALTH_EXIT -eq 0 ]; then
            echo "healthy=true" >> $GITHUB_OUTPUT
            echo "Spoke connection is HEALTHY" >> $GITHUB_STEP_SUMMARY
          else
            echo "healthy=false" >> $GITHUB_OUTPUT
            echo "Spoke connection is UNHEALTHY" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Determine Registration Needs
        id: decision
        run: |
          REGISTERED="${{ steps.check-registration.outputs.registered }}"
          HEALTHY="${{ steps.check-health.outputs.healthy }}"
          
          echo "DEBUG: REGISTERED=$REGISTERED, HEALTHY=$HEALTHY"
          
          # If not registered at all, need to register
          if [ "$REGISTERED" = "false" ]; then
            echo "needs_registration=true" >> $GITHUB_OUTPUT
            echo "Spoke not registered - will register" >> $GITHUB_STEP_SUMMARY
          # If registered but explicitly unhealthy, need to re-register
          elif [ "$HEALTHY" = "false" ]; then
            echo "needs_registration=true" >> $GITHUB_OUTPUT
            echo "Spoke unhealthy - will re-register" >> $GITHUB_STEP_SUMMARY
          # If registered and healthy (or health check passed/skipped with no issues)
          else
            echo "needs_registration=false" >> $GITHUB_OUTPUT
            echo "**SKIP**: Spoke is registered and healthy - skipping registration" >> $GITHUB_STEP_SUMMARY
          fi

  register-spoke:
    name: Register Spoke Cluster
    needs: [validate-prerequisites, check-spoke-health]
    if: needs.check-spoke-health.outputs.needs_registration == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Spoke Cluster RBAC
        run: |
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}
          kubectl create serviceaccount argocd-manager -n kube-system 2>/dev/null || echo "ServiceAccount exists"
          EXISTING_CRB=$(kubectl get clusterrolebinding argocd-manager-role -o json 2>/dev/null || echo "")
          if [ -n "$EXISTING_CRB" ]; then
            EXISTING_SA=$(echo "$EXISTING_CRB" | jq -r '.subjects[0].name // ""')
            EXISTING_NS=$(echo "$EXISTING_CRB" | jq -r '.subjects[0].namespace // ""')
            if [ "$EXISTING_SA" = "argocd-manager" ] && [ "$EXISTING_NS" = "kube-system" ]; then
              echo "ClusterRoleBinding already configured correctly"
            else
              kubectl delete clusterrolebinding argocd-manager-role --ignore-not-found=true
              kubectl create clusterrolebinding argocd-manager-role --clusterrole=cluster-admin --serviceaccount=kube-system:argocd-manager
            fi
          else
            kubectl create clusterrolebinding argocd-manager-role --clusterrole=cluster-admin --serviceaccount=kube-system:argocd-manager
          fi

      - name: Generate Service Account Token
        id: token
        run: |
          TOKEN=$(kubectl create token argocd-manager -n kube-system --duration=87600h 2>/dev/null || echo "")
          if [ -z "$TOKEN" ]; then
            cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: Secret
          metadata:
            name: argocd-manager-token
            namespace: kube-system
            annotations:
              kubernetes.io/service-account.name: argocd-manager
          type: kubernetes.io/service-account-token
          EOF
            sleep 5
            TOKEN=$(kubectl get secret argocd-manager-token -n kube-system -o jsonpath='{.data.token}' | base64 -d)
          fi
          echo "token=${TOKEN}" >> $GITHUB_OUTPUT

      - name: Register Spoke in ArgoCD Hub
        env:
          SPOKE_ENDPOINT: ${{ needs.validate-prerequisites.outputs.spoke_endpoint }}
          TOKEN: ${{ steps.token.outputs.token }}
        run: |
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }} --alias spoke
          CA_DATA=$(kubectl config view --raw -o jsonpath='{.clusters[?(@.name=="spoke")].cluster.certificate-authority-data}')
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}
          kubectl delete secret ${{ env.SPOKE_CLUSTER }} -n argocd --ignore-not-found=true
          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: Secret
          metadata:
            name: ${{ env.SPOKE_CLUSTER }}
            namespace: argocd
            labels:
              argocd.argoproj.io/secret-type: cluster
          type: Opaque
          stringData:
            name: ${{ env.SPOKE_CLUSTER }}
            server: ${SPOKE_ENDPOINT}
            config: |
              {
                "bearerToken": "${TOKEN}",
                "tlsClientConfig": {
                  "insecure": false,
                  "caData": "${CA_DATA}"
                }
              }
          EOF
          echo "Spoke cluster registered in ArgoCD hub" >> $GITHUB_STEP_SUMMARY

  setup-infrastructure:
    name: Setup Infrastructure
    needs: [validate-prerequisites, check-spoke-health, register-spoke]
    if: always() && needs.validate-prerequisites.result == 'success' && (needs.register-spoke.result == 'success' || needs.register-spoke.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create ECR Repository
        env:
          ECR_REPO: ${{ env.TENANT }}/${{ env.APP_NAME }}
        run: |
          set +e
          aws ecr describe-repositories --repository-names $ECR_REPO > /dev/null 2>&1
          EXISTS=$?
          set -e
          if [ $EXISTS -eq 0 ]; then
            echo "ECR repository already exists" >> $GITHUB_STEP_SUMMARY
          else
            aws ecr create-repository --repository-name $ECR_REPO --image-scanning-configuration scanOnPush=true
            echo "ECR repository created: $ECR_REPO" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Configure kubectl for Spoke
        run: |
          aws eks update-kubeconfig --name ${{ env.SPOKE_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Verify cert-manager Installation
        run: |
          set +e
          kubectl get namespace cert-manager > /dev/null 2>&1
          CM_EXISTS=$?
          set -e
          if [ $CM_EXISTS -ne 0 ]; then
            echo "Installing cert-manager..." >> $GITHUB_STEP_SUMMARY
            kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.14.0/cert-manager.yaml
            kubectl wait --for=condition=Available deployment --all -n cert-manager --timeout=5m
          else
            echo "cert-manager already installed" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Create letsencrypt-prod ClusterIssuer
        run: |
          set +e
          kubectl get clusterissuer letsencrypt-prod > /dev/null 2>&1
          ISSUER_EXISTS=$?
          set -e
          if [ $ISSUER_EXISTS -eq 0 ]; then
            READY=$(kubectl get clusterissuer letsencrypt-prod -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}')
            if [ "$READY" = "True" ]; then
              echo "ClusterIssuer already exists and ready" >> $GITHUB_STEP_SUMMARY
              exit 0
            else
              kubectl delete clusterissuer letsencrypt-prod --ignore-not-found=true
            fi
          fi
          cat <<EOF | kubectl apply -f -
          apiVersion: cert-manager.io/v1
          kind: ClusterIssuer
          metadata:
            name: letsencrypt-prod
          spec:
            acme:
              email: devops@opsera.io
              server: https://acme-v02.api.letsencrypt.org/directory
              privateKeySecretRef:
                name: letsencrypt-prod-key
              solvers:
                - http01:
                    ingress:
                      class: nginx
          EOF
          echo "ClusterIssuer created" >> $GITHUB_STEP_SUMMARY

      - name: Create Namespace
        run: |
          kubectl create namespace ${{ env.NAMESPACE }} --dry-run=client -o yaml | kubectl apply -f -
          kubectl label namespace ${{ env.NAMESPACE }} app=${{ env.APP_NAME }} tenant=${{ env.TENANT }} environment=dev --overwrite

      - name: Create ECR Pull Secret
        env:
          AWS_ACCOUNT_ID: ${{ needs.validate-prerequisites.outputs.aws_account_id }}
        run: |
          ECR_TOKEN=$(aws ecr get-login-password --region ${{ env.AWS_REGION }})
          ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          kubectl create secret docker-registry ecr-secret --namespace=${{ env.NAMESPACE }} --docker-server=$ECR_REGISTRY --docker-username=AWS --docker-password=$ECR_TOKEN --dry-run=client -o yaml | kubectl apply -f -

      - name: Configure kubectl for Hub
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Create ArgoCD Repository Secret
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          REPO_URL="https://github.com/${{ github.repository }}"
          kubectl create secret generic repo-${{ env.APP_NAME }} -n argocd --from-literal=type=git --from-literal=url="${REPO_URL}" --from-literal=username=git --from-literal=password="${GH_PAT}" --dry-run=client -o yaml | kubectl apply -f -
          kubectl label secret repo-${{ env.APP_NAME }} -n argocd argocd.argoproj.io/secret-type=repository --overwrite

      - name: Update Kustomization with ECR URI
        env:
          ECR_URI: ${{ needs.validate-prerequisites.outputs.ecr_uri }}
        run: |
          cd .opsera-${{ env.APP_NAME }}/k8s/overlays/dev
          sed -i "s|PLACEHOLDER_ECR_URI|${ECR_URI}|g" kustomization.yaml

      - name: Commit Configuration Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .opsera-${{ env.APP_NAME }}/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: Bootstrap ${{ env.APP_NAME }} DEV configuration [skip ci]"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin ${{ github.ref_name }}
          fi

  apply-argocd-app:
    name: Apply ArgoCD Application
    needs: [validate-prerequisites, setup-infrastructure]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for Hub
        run: |
          aws eks update-kubeconfig --name ${{ env.HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Update ArgoCD Application with Correct Repo URL
        run: |
          REPO_URL="https://github.com/${{ github.repository }}.git"
          APP_FILE=".opsera-${{ env.APP_NAME }}/argocd/dev/application.yaml"
          sed -i "s|repoURL: .*|repoURL: ${REPO_URL}|g" "$APP_FILE"

      - name: Apply ArgoCD Application
        run: |
          kubectl apply -f .opsera-${{ env.APP_NAME }}/argocd/dev/application.yaml
          echo "ArgoCD Application applied" >> $GITHUB_STEP_SUMMARY

      - name: Force Sync ArgoCD
        run: |
          sleep 5
          kubectl annotate application ${{ env.APP_NAME }}-dev -n argocd argocd.argoproj.io/refresh=hard --overwrite

  summary:
    name: Bootstrap Summary
    needs: [validate-prerequisites, check-spoke-health, register-spoke, setup-infrastructure, apply-argocd-app]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate Summary
        env:
          ECR_URI: ${{ needs.validate-prerequisites.outputs.ecr_uri }}
        run: |
          cat << EOF >> $GITHUB_STEP_SUMMARY
          
          # Bootstrap Complete: ${{ env.APP_NAME }}
          
          ## Configuration
          | Setting | Value |
          |---------|-------|
          | App Name | ${{ env.APP_NAME }} |
          | Tenant | ${{ env.TENANT }} |
          | Environment | DEV |
          | Namespace | ${{ env.NAMESPACE }} |
          | Hub Cluster | ${{ env.HUB_CLUSTER }} |
          | Spoke Cluster | ${{ env.SPOKE_CLUSTER }} |
          | ECR Repository | ${ECR_URI} |
          | Hostname | opsera-${{ env.APP_NAME }}-dev.${{ env.DOMAIN }} |
          
          ## Job Results
          | Job | Status |
          |-----|--------|
          | Validate Prerequisites | ${{ needs.validate-prerequisites.result }} |
          | Check Spoke Health | ${{ needs.check-spoke-health.result }} |
          | Register Spoke | ${{ needs.register-spoke.result }} |
          | Setup Infrastructure | ${{ needs.setup-infrastructure.result }} |
          | Apply ArgoCD App | ${{ needs.apply-argocd-app.result }} |
          
          ## Next Steps
          1. Push code changes to trigger CI/CD
          2. Access: https://opsera-${{ env.APP_NAME }}-dev.${{ env.DOMAIN }}
          EOF

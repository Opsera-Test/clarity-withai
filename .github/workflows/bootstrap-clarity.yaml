# ════════════════════════════════════════════════════════════════════════════
# BOOTSTRAP WORKFLOW - One-time infrastructure setup
# Generated by: Opsera Code-to-Cloud Enterprise v0.901
# ════════════════════════════════════════════════════════════════════════════

name: "🚀 Bootstrap: clarity"

on:
  workflow_dispatch:
    inputs:
      proceed:
        description: '✅ I confirm to proceed with bootstrap'
        type: boolean
        default: false
        required: true

env:
  APP_NAME: clarity
  TENANT: opsera
  AWS_REGION: us-west-2
  EKS_HUB_CLUSTER: argocd-usw2
  EKS_SPOKE_CLUSTER: opsera-usw2-np
  DOMAIN: agent.opsera.dev

permissions:
  contents: write
  id-token: write

jobs:
  # ════════════════════════════════════════════════════════════════════════════
  # VERIFY PREREQUISITES
  # ════════════════════════════════════════════════════════════════════════════
  verify-prerequisites:
    name: "🔍 Verify Prerequisites"
    runs-on: ubuntu-latest
    if: inputs.proceed == true
    outputs:
      aws_account_id: ${{ steps.aws.outputs.account_id }}
      ecr_uri: ${{ steps.ecr.outputs.uri }}
      repo_url: ${{ steps.repo.outputs.url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # RULE 68: Use AWS Access Keys by default
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # RULE 7: Get AWS Account ID dynamically
      - name: Get AWS Account ID
        id: aws
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=${ACCOUNT_ID}" >> $GITHUB_OUTPUT
          echo "✅ AWS Account: ${ACCOUNT_ID}" >> $GITHUB_STEP_SUMMARY

      - name: Get Repository URL
        id: repo
        run: |
          REPO_URL="https://github.com/${{ github.repository }}.git"
          echo "url=${REPO_URL}" >> $GITHUB_OUTPUT
          echo "✅ Repository: ${REPO_URL}" >> $GITHUB_STEP_SUMMARY

      - name: Calculate ECR URI
        id: ecr
        run: |
          ECR_URI="${{ steps.aws.outputs.account_id }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.TENANT }}/${{ env.APP_NAME }}"
          echo "uri=${ECR_URI}" >> $GITHUB_OUTPUT
          echo "✅ ECR URI: ${ECR_URI}" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # CREATE ECR REPOSITORY
  # ════════════════════════════════════════════════════════════════════════════
  create-ecr:
    name: "📦 Create ECR Repository"
    needs: [verify-prerequisites]
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # RULE 75: ECR repositories MUST auto-create if not exists
      - name: Create ECR Repository (if not exists)
        run: |
          REPO_NAME="${{ env.TENANT }}/${{ env.APP_NAME }}"
          
          if aws ecr describe-repositories --repository-names "$REPO_NAME" 2>/dev/null; then
            echo "✅ ECR repository already exists: $REPO_NAME" >> $GITHUB_STEP_SUMMARY
          else
            aws ecr create-repository \
              --repository-name "$REPO_NAME" \
              --image-scanning-configuration scanOnPush=true \
              --encryption-configuration encryptionType=AES256
            echo "✅ Created ECR repository: $REPO_NAME" >> $GITHUB_STEP_SUMMARY
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # UPDATE MANIFESTS WITH ACTUAL VALUES
  # ════════════════════════════════════════════════════════════════════════════
  update-manifests:
    name: "📝 Update Manifests"
    needs: [verify-prerequisites, create-ecr]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Update Kustomization with ECR URI
        run: |
          ECR_URI="${{ needs.verify-prerequisites.outputs.ecr_uri }}"
          
          # Update DEV overlay
          sed -i "s|PLACEHOLDER_ECR_URI|${ECR_URI}|g" \
            .opsera-${{ env.APP_NAME }}/k8s/overlays/dev/kustomization.yaml
          
          echo "✅ Updated kustomization with ECR URI: ${ECR_URI}" >> $GITHUB_STEP_SUMMARY

      - name: Update ArgoCD Application with Repo URL
        run: |
          REPO_URL="${{ needs.verify-prerequisites.outputs.repo_url }}"
          
          # Update ArgoCD application
          sed -i "s|PLACEHOLDER_REPO_URL|${REPO_URL}|g" \
            .opsera-${{ env.APP_NAME }}/argocd/dev/application.yaml
          
          echo "✅ Updated ArgoCD application with repo URL" >> $GITHUB_STEP_SUMMARY

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add .opsera-${{ env.APP_NAME }}/
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: Bootstrap ${{ env.APP_NAME }} with ECR and repo URL [skip ci]"
            git push
            echo "✅ Committed manifest updates" >> $GITHUB_STEP_SUMMARY
          fi

  # ════════════════════════════════════════════════════════════════════════════
  # APPLY ARGOCD APPLICATION
  # ════════════════════════════════════════════════════════════════════════════
  apply-argocd:
    name: "🔄 Apply ArgoCD Application"
    needs: [verify-prerequisites, update-manifests]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull Latest Changes
        run: git pull origin main

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for Hub Cluster
        run: |
          aws eks update-kubeconfig --name ${{ env.EKS_HUB_CLUSTER }} --region ${{ env.AWS_REGION }}

      # RULE 63: Create ArgoCD repository secret with GH_PAT
      - name: Create ArgoCD Repository Secret
        run: |
          SECRET_NAME="repo-${{ env.APP_NAME }}"
          REPO_URL="${{ needs.verify-prerequisites.outputs.repo_url }}"
          
          if kubectl get secret "$SECRET_NAME" -n argocd &>/dev/null; then
            echo "✅ Repository secret already exists" >> $GITHUB_STEP_SUMMARY
          else
            kubectl create secret generic "$SECRET_NAME" -n argocd \
              --from-literal=type=git \
              --from-literal=url="$REPO_URL" \
              --from-literal=username=git \
              --from-literal=password="${{ secrets.GH_PAT }}"
            
            kubectl label secret "$SECRET_NAME" -n argocd \
              argocd.argoproj.io/secret-type=repository
            
            echo "✅ Created ArgoCD repository secret" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Apply ArgoCD Application
        run: |
          kubectl apply -f .opsera-${{ env.APP_NAME }}/argocd/dev/application.yaml
          echo "✅ Applied ArgoCD application for DEV" >> $GITHUB_STEP_SUMMARY

      # RULE 66: Force ArgoCD sync after manifest updates
      - name: Force ArgoCD Sync
        run: |
          sleep 5
          kubectl annotate application ${{ env.APP_NAME }}-dev -n argocd \
            argocd.argoproj.io/refresh=hard --overwrite || true
          echo "✅ Triggered ArgoCD sync" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════════════════════════════════════
  # SUMMARY
  # ════════════════════════════════════════════════════════════════════════════
  summary:
    name: "📋 Bootstrap Summary"
    needs: [verify-prerequisites, create-ecr, update-manifests, apply-argocd]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate Summary
        run: |
          cat << 'EOF' >> $GITHUB_STEP_SUMMARY
          # 🎉 Bootstrap Complete
          
          ## Configuration
          | Setting | Value |
          |---------|-------|
          | **App Name** | `${{ env.APP_NAME }}` |
          | **Tenant** | `${{ env.TENANT }}` |
          | **Region** | `${{ env.AWS_REGION }}` |
          | **ECR URI** | `${{ needs.verify-prerequisites.outputs.ecr_uri }}` |
          | **Hub Cluster** | `${{ env.EKS_HUB_CLUSTER }}` |
          | **Spoke Cluster** | `${{ env.EKS_SPOKE_CLUSTER }}` |
          
          ## Next Steps
          
          1. **Push code changes** to trigger CI/CD:
             ```bash
             git push origin main
             ```
          
          2. **Or manually trigger** the CI/CD workflow:
             ```bash
             gh workflow run "ci-build-push-clarity.yaml"
             ```
          
          3. **Monitor deployment** in ArgoCD or run diagnostics:
             ```bash
             gh workflow run "diagnostics-clarity.yaml" -f environment=dev
             ```
          
          ## Expected URL
          ```
          https://opsera-clarity-dev.agent.opsera.dev
          ```
          EOF

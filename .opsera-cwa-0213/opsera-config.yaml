# Opsera Code-to-Cloud Configuration - cwa-0213
# Single source of truth for deployment

tenant: opsera
app_name: cwa-0213
cloud_provider: aws
region: us-west-2
region_short: usw2
domain: agent.opsera.dev

clusters:
  hub: argocd-usw2
  spoke: opsera-usw2-np

ecr_repo: opsera/cwa-0213
port: 8080

environments:
  dev:
    namespace: opsera-cwa-0213-dev
    strategy: rolling
    url: https://cwa-0213-dev.agent.opsera.dev

security:
  gitleaks: warn
  grype: warn

apiVersion: apps/v1
kind: Deployment
metadata:
  name: cwa-6
  labels:
    app: cwa-6
    tenant: opsera
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cwa-6
  template:
    metadata:
      labels:
        app: cwa-6
        tenant: opsera
    spec:
      containers:
        - name: cwa-6
          image: cwa-6:latest
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
      imagePullSecrets:
        - name: ecr-credentials

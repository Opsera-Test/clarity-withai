apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: opsera-cwa-6-dev

resources:
  - ../../base
  - namespace.yaml

commonLabels:
  environment: dev

images:
  - name: cwa-6
    newName: PLACEHOLDER_ECR_REPO
    newTag: latest

patches:
  - target:
      kind: Ingress
      name: cwa-6
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: opsera-cwa-6-dev.agent.opsera.dev
      - op: replace
        path: /spec/tls/0/hosts/0
        value: opsera-cwa-6-dev.agent.opsera.dev

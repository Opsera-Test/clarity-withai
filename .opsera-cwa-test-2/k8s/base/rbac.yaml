apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cwa-test-2-role
  labels:
    app: cwa-test-2
    tenant: opsera
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cwa-test-2-rolebinding
  labels:
    app: cwa-test-2
    tenant: opsera
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cwa-test-2-role
subjects:
  - kind: ServiceAccount
    name: cwa-test-2
    namespace: opsera-cwa-test-2-dev

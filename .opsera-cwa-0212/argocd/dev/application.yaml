apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cwa-0212-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/opsera-agentic/clarity-withai.git
    path: .opsera-cwa-0212/k8s/overlays/dev
    targetRevision: main
  destination:
    name: opsera-usw2-np
    namespace: opsera-cwa-0212-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - Replace=true
